# CAN SLIM 评分卡参数配置
# 所有阈值可调，保存后立即生效

c_current_earnings:
  eps_yoy_tiers:          [25, 18, 10]       # EPS同比增速阈值(%): 优秀/良好/及格
  eps_yoy_scores:         [12, 8, 5]         # 对应得分
  eps_accel_threshold:    10                  # EPS加速度阈值(%) — 增速提高≥此值额外加分
  eps_accel_score:        4                   # 加速加分
  eps_decel_penalty:      -2                  # 减速(增速放缓>5%)扣分
  revenue_yoy_tiers:      [25, 15]           # 营收同比增速阈值(%)
  revenue_yoy_scores:     [4, 2]             # 对应得分
  nonrecurring_ratio:     90                  # 扣非净利润/净利润 ≥ 此值加分(%)
  nonrecurring_score:     3                   # 扣非纯度加分
  nonrecurring_warning:   -3                  # 扣非<70%警告扣分

a_annual_earnings:
  eps_cagr_3y_tiers:      [25, 15, 5]        # 3年EPS CAGR阈值(%)
  eps_cagr_scores:        [9, 6, 3]          # 对应得分
  positive_years_score:   [5, 2]             # 3年/2年正增长加分
  stability_cv_threshold: 30                  # CV<此值加分(%)
  stability_score:        3

n_new:
  high_lookback_days:     5                   # 回溯天数
  decay_factors:          [1.0, 0.8, 0.6, 0.4, 0.4]  # 第1~5天衰减系数
  engine_scores:
    breakout:             5                   # 标准突破基础分
    pocket_pivot:         4                   # 口袋支点
    double_bottom:        3                   # 双重底
    flat_base:            3                   # 扁平基部
    cdl_bullish:          2                   # K线看涨(每个)
    cdl_bullish_max:      4                   # CDL看涨累计上限
    talib_bullish:        1                   # TA-Lib看涨(每个)
    talib_bullish_max:    3                   # TA-Lib累计上限
  high52_tiers:           [-5, -15]          # 距52周高点阈值(%): 5%/15%
  high52_scores:          [7, 5]             # 对应得分

s_supply_demand:
  market_cap_tiers:       [50, 200, 500]     # 流通市值分档(亿)
  market_cap_scores:      [4, 2, 1]          # 对应得分
  vol_ratio_tiers:        [1.5, 1.2]         # 5日均量/50日均量
  vol_ratio_scores:       [3, 2]             # 对应得分
  buyback_ratio_tiers:    [1.0, 0.5]         # 回购/总市值阈值(%)
  buyback_scores:         [2, 1]             # 对应得分

l_leader:
  rs250_tiers:            [95, 90, 80, 70]   # RS_250阈值
  rs250_scores:           [11, 9, 6, 3]      # 对应得分
  rs_momentum_score:      2                   # RS加速(RS20>RS60>RS120)加分
  rs_momentum_penalty:    -2                  # RS减速扣分
  industry_rs_threshold:  80                  # 行业RS阈值(%)
  industry_rs_score_high: 5                   # 行业RS≥80加分
  industry_rs_score_mid:  2                   # 行业RS 70~79加分
  excess_return_threshold: 5                  # 20日超额收益阈值(%)
  excess_return_scores:   [3, 1]             # 超额收益得分

i_institutional:
  inst_holding_tiers:     [15, 5, 1]         # 机构持股/总股本阈值(%)
  inst_holding_scores:    [5, 3, 1]          # 对应得分
  inst_count_increase:    10                  # 机构数增加≥此值额外加分
  inst_count_score:       [5, 2]             # [增加≥10, 增加1~9]加分
  analyst_coverage_tiers: [3, 1]             # 研报覆盖机构数
  analyst_coverage_score: 3                   # 研报加分
  first_coverage_score:   2                   # 首次覆盖加分
  rating_upgrade_score:   1                   # 评级上调加分
  analyst_lookback_days:  90                  # 研报回溯天数
  debt_ratio_warning:     60                  # 负债率>此值警告(%)
  debt_ratio_ok:           2                  # 负债率<30%加分
  debt_ratio_penalty:     -2                  # 负债率>60%扣分

# 仓位管理因子(M): 不参与评分，仅作仓位参考
m_market:
  health_strong:          70                  # 大盘健康度≥此值→满仓
  health_neutral:         50                  # ≥此值→七成仓
  health_weak:            30                  # ≥此值→半仓
  # <30 → 三成仓或空仓

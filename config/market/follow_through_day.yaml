# 追盘日 Follow-Through Day 参数配置
# 所有阈值可调，通过回测看板实时生效

rally:
  new_low_days: 20
  close_strength: either
  protection_days: 1

ftd:
  window_start: 4
  window_end: 10
  min_gain_pct: 0
  min_vol_ratio_prev: 1
  vol_ratio_ma10_enabled: false
  vol_ratio_ma10: 0
  close_position_min: 50

rally_failure:
  reset_window_start: 2
  reset_window_end: 10
  no_ftd_days: 10

failure:
  breakdown_days: 5
  weak_continuation_days: 5
  weak_continuation_min_gain: 1
  retracement_enabled: true
  min_retracement_pct: 2.0
  retracement_days: 15
  retracement_ratio: 0.618
  distribution_cover_days: 20
  distribution_cover_count: 3

manual_annotations:
  - rally_date: "2024-09-18"
    ftd_date: "2024-09-24"

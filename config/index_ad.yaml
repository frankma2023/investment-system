# index_ad.yaml — 指数机构吸筹/出货评级参数配置

# 计算方法: raw(原始换手率) | zscore(Z-score标准化)
method: raw

# 滚动窗口交易日数
window_days: 65

# 评级映射（只读，供回测看板参考）
ratings:
  - { grade: "A+", min_pct: 90 }
  - { grade: "A", min_pct: 80 }
  - { grade: "B+", min_pct: 70 }
  - { grade: "B", min_pct: 60 }
  - { grade: "C+", min_pct: 50 }
  - { grade: "C", min_pct: 40 }
  - { grade: "D+", min_pct: 30 }
  - { grade: "D", min_pct: 20 }
  - { grade: "E", min_pct: 10 }
  - { grade: "E-", min_pct: 0 }

method: zscore
window_days: 65

ratings:
  - { grade: "A+", min_pct: 90 }
  - { grade: "A", min_pct: 80 }
  - { grade: "B+", min_pct: 70 }
  - { grade: "B", min_pct: 60 }
  - { grade: "C+", min_pct: 50 }
  - { grade: "C", min_pct: 40 }
  - { grade: "D+", min_pct: 30 }
  - { grade: "D", min_pct: 20 }
  - { grade: "E", min_pct: 10 }
  - { grade: "E-", min_pct: 0 }

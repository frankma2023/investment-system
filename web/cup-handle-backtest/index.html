<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .bottom-layout{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:380px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}

  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}

  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .table-wrapper td{border-bottom-color:rgba(0,0,0,.03)}
.top-bar { display:flex; gap:12px; align-items:flex-end; padding:16px 20px; background:var(--card-bg); border-radius:18px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,0.04); flex-wrap:wrap; }
    .top-bar .fld { flex:1; min-width:100px; }

    .top-bar .code-wrap { flex:1.5; display:flex; gap:6px; }
    .top-bar .code-wrap input { flex:1; }
    .chart-wrap { width:100%; height:480px; margin-bottom:12px; }
    .bottom-layout { display:flex; gap:14px; align-items:flex-start; }

    .bottom-right { flex:1; min-width:0; display:flex; flex-direction:column; gap:14px; }
    .btn-run { width:100%; padding:11px; background:#FE2C55; color:#FFF; border:none; border-radius:14px; font-size:0.95rem; font-weight:800; cursor:pointer; }
    .btn-run:hover { opacity:0.88; } .btn-run:disabled { background:#CCC; cursor:not-allowed; }
    .btn-save { width:100%; padding:9px; background:var(--card-bg); border:1.5px solid var(--divider); border-radius:14px; font-size:0.85rem; font-weight:700; cursor:pointer; }
    .btn-save.saved { background:#E8F5E9; border-color:#4CAF50; color:#2E7D32; }
    .param-card { background:var(--card-bg); border:1px solid var(--divider); border-radius:16px; overflow:hidden; }
    .param-card-hd { display:flex; align-items:center; padding:9px 14px; cursor:pointer; font-size:0.73rem; font-weight:800; }

    .param-card-bd { padding:0 14px 10px; } .param-card-bd.collapsed { display:none; }
    .sr { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .sr .sl { width:78px; font-size:0.58rem; font-weight:600; color:var(--text-tertiary); flex-shrink:0; }
    .sr input[type=range] { flex:1; height:3px; }

    .tog-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .tog-row .sl { width:78px; font-size:0.58rem; font-weight:600; color:var(--text-tertiary); }
    .tsw { position:relative; width:32px; height:16px; border-radius:8px; border:none; cursor:pointer; }

    .tsw::after { content:''; position:absolute; top:2px; width:12px; height:12px; border-radius:50%; background:#FFF; transition:left 0.2s; }

<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>

  <script>
    const ST='cup_handle';
    function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
    function tog(id){const b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off')}
    function svp(id){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
    function svn(id){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
    function svs(id,mul){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v){const nv=(parseInt(e.value)*mul).toFixed(mul<1?1:0);v.textContent=nv}}
    let ck=[],cs=[],chart,rawKlines=[];

    document.addEventListener('DOMContentLoaded',async()=>{
      const now=new Date();document.getElementById('date-end').value=now.toISOString().split('T')[0];
      const ago=new Date(now);ago.setFullYear(ago.getFullYear()-3);
      document.getElementById('date-start').value=ago.toISOString().split('T')[0];
      chart=echarts.init(document.getElementById('chart'));
      document.getElementById('btn-run').addEventListener('click',run);
      document.getElementById('btn-save').addEventListener('click',saveCfg);
      document.querySelector('.theme-toggle').addEventListener('click',function(){var h=document.documentElement;h.dataset.theme=h.dataset.theme==='light'?'dark':'light';this.textContent=h.dataset.theme==='light'?'🌙':'☀️';if(ck.length){chart.dispose();chart=echarts.init(document.getElementById('chart'));renderChart();}});
      await loadCfg();setTimeout(run,500);
    });

    function onModeChange(){var m=document.getElementById('mode').value;var inp=document.getElementById('stock-code');inp.value=m==='stock'?'600519':'000300';run();}

    function aggregate(raw,period){
      if(period==='day'||!raw||!raw.length)return raw;
      var result=[],cur=null;
      raw.forEach(function(k){
        var d=k.date;
        var dt=new Date(d.substr(0,4)+'-'+d.substr(4,2)+'-'+d.substr(6,2));
        var key;
        if(period==='week'){var s=new Date(dt);s.setDate(dt.getDate()-dt.getDay());key=s.toISOString().split('T')[0];}
        else{key=dt.getFullYear()+'-'+(dt.getMonth()+1);}
        if(key!==cur){if(result.length)result[result.length-1]._done=true;cur=key;result.push({date:d,open:k.open,close:k.close,high:k.high,low:k.low,volume:k.volume,_done:false});}
        else{var r=result[result.length-1];r.high=Math.max(r.high,k.high);r.low=Math.min(r.low,k.low);r.close=k.close;r.volume+=k.volume;r.date=d;}
      });
      return result;
    }

    function gp(){return {cup_handle:{
      lookback:parseInt(document.getElementById('p-lb').value),
      min_prior_advance:parseInt(document.getElementById('p-pa').value)/100,
      cut_pct:parseInt(document.getElementById('p-cut').value)/100,
      cut_check_A_pct:parseInt(document.getElementById('p-ca').value)/100,
      local_extreme_window:parseInt(document.getElementById('p-lw').value),
      cup_min_age:parseInt(document.getElementById('p-cma').value),
      cup_max_age:parseInt(document.getElementById('p-cmx').value),
      cup_drawdown_min:parseInt(document.getElementById('p-dmin').value)/100,
      cup_drawdown_max:parseInt(document.getElementById('p-dmax').value)/100,
      cup_recovery:parseInt(document.getElementById('p-rec').value)/100,
      cup_bottom_check:document.getElementById('p-cbc-on').classList.contains('on'),
      cup_bottom_flatness:parseInt(document.getElementById('p-cba').value)/100,
      ascent_descent_check:document.getElementById('p-adc-on').classList.contains('on'),
      ascent_descent_ratio:parseInt(document.getElementById('p-adr').value)/100,
      vol_bottom_max:parseInt(document.getElementById('p-vb').value)/100,
      vol_contraction:parseInt(document.getElementById('p-vc').value)/100,
      handle_required:document.getElementById('p-hr-on').classList.contains('on'),
      handle_min_days:parseInt(document.getElementById('p-hmin').value),
      handle_max_days:parseInt(document.getElementById('p-hmax').value),
      handle_max_drawdown:parseInt(document.getElementById('p-hdd').value)/100,
      handle_position_ratio:parseInt(document.getElementById('p-hp').value)/100,
      handle_vol_ratio:parseInt(document.getElementById('p-hv').value)/100,
      breakout_vol_ratio:parseInt(document.getElementById('p-bv').value)/10,
      require_green:document.getElementById('p-gr-on').classList.contains('on'),
      close_position_min:parseInt(document.getElementById('p-cp').value)/100,
      rs_required:document.getElementById('p-rsr-on').classList.contains('on'),
      rs_threshold:parseInt(document.getElementById('p-rst').value),
    }}}

    async function run(){
      var btn=document.getElementById('btn-run');btn.disabled=true;btn.textContent='⏳';
      var code=document.getElementById('stock-code').value.trim();
      var mode=document.getElementById('mode').value;
      if(!code){btn.disabled=false;btn.textContent='☕';return}
      try{var nr=await fetch('http://'+window.location.hostname+':8788/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
      try{
        var end=document.getElementById('date-end').value;
        var start=document.getElementById('date-start').value;
        var period=document.getElementById('period').value;
        var url='http://'+window.location.hostname+':8788/api/cup-handle?stock='+code+'&date='+end+'&start='+start+'&mode='+mode;
        var resp=await fetch(url);
        var data=await resp.json();
        rawKlines=data.klines||[];
        ck=aggregate(rawKlines,period);
        renderChart();
        cs=(data.signals||[]).filter(function(s){return s.signal_date>=start&&s.signal_date<=end});
        renderTable();
        btn.textContent='🔄';
      }catch(e){console.error(e);btn.textContent='❌'}
      btn.disabled=false;
    }

    function renderChart(){
      if(!chart||!ck.length)return;
      var dates=ck.map(function(k){return k.date});
      var ma=function(p){var r=[];var s=0;for(var i=0;i<ck.length;i++){if(ck[i].close!=null){s+=ck[i].close;if(i>=p){s-=ck[i-p].close;r.push(s/p)}else{r.push(null)}}else{r.push(null)}}return r};
      var ma50=ma(50),ma150=ma(150);
      var ckData=ck.map(function(k){return[k.open,k.close,k.low,k.high]});
      var pts=[];
      cs.forEach(function(s){
        var si=dates.indexOf(s.signal_date);if(si<0)return;
        pts.push({value:[si,s.buy_point],symbol:'diamond',symbolSize:18,symbolRotate:45,itemStyle:{color:'#E91E63',borderColor:'#FFF',borderWidth:1}});
        var pi=dates.indexOf(s.prior_high_date);if(pi>=0)pts.push({value:[pi,s.prior_high_price],symbol:'circle',symbolSize:11,itemStyle:{color:'#FF9800',borderColor:'#FFF',borderWidth:1}});
        var bi=dates.indexOf(s.bottom_date);if(bi>=0)pts.push({value:[bi,s.bottom_price],symbol:'circle',symbolSize:11,itemStyle:{color:'#4CAF50',borderColor:'#FFF',borderWidth:1}});
      });
      var volData=ck.map(function(k,i){var color=ck[i].close>=ck[i].open?'rgba(229,57,53,0.35)':'rgba(38,198,218,0.35)';return{value:k.volume,itemStyle:{color:color}}});

      chart.setOption({
        backgroundColor:document.documentElement.dataset.theme==='dark'?'#2A2627':'#fff',
        tooltip:{trigger:'axis',axisPointer:{type:'cross'},formatter:function(params){
          if(!params||!params.length)return'';
          var k=params[0];var di=k.dataIndex;var d=ck[di];if(!d)return'';
          var o=d.open,c=d.close,h=d.high,l=d.low,v=d.volume;
          var chg=c>=o?'<span style="color:#E53935">▲ '+'</span>':'<span style="color:#26C6DA">▼ '+'</span>';
          var chgPct=o>0?((c-o)/o*100).toFixed(2):'—';
          var amp=h>l?((h-l)/l*100).toFixed(2):'—';
          var volStr=v>=1e8?(v/1e8).toFixed(2)+'亿':v>=1e4?(v/1e4).toFixed(0)+'万':v.toFixed(0);
          var htm='<div style="font-weight:700;margin-bottom:6px">'+d.date+'</div>';
          htm+='<table style="font-size:0.75rem;line-height:1.6">';
          htm+='<tr><td>开盘：</td><td style="font-weight:700">'+o.toFixed(2)+'</td></tr>';
          htm+='<tr><td>收盘：</td><td style="font-weight:700">'+c.toFixed(2)+'</td></tr>';
          htm+='<tr><td>最高：</td><td style="color:#E53935">'+h.toFixed(2)+'</td></tr>';
          htm+='<tr><td>最低：</td><td style="color:#26C6DA">'+l.toFixed(2)+'</td></tr>';
          htm+='<tr><td>涨幅：</td><td>'+chg+chgPct+'%</td></tr>';
          htm+='<tr><td>振幅：</td><td>'+amp+'%</td></tr>';
          htm+='<tr><td>成交量：</td><td>'+volStr+'</td></tr>';
          if(ma50[di]!=null)htm+='<tr><td>MA50：</td><td style="color:#2196F3">'+ma50[di].toFixed(2)+'</td></tr>';
          if(ma150[di]!=null)htm+='<tr><td>MA150：</td><td style="color:#9C27B0">'+ma150[di].toFixed(2)+'</td></tr>';
          htm+='</table>';
          return htm;
        }},
        grid:[{left:'8%',right:'1%',top:8,height:'60%'},{left:'8%',right:'1%',top:'75%',height:'15%'}],
        xAxis:[{type:'category',data:dates,axisLabel:{fontSize:9},axisLine:{lineStyle:{color:'#ccc'}}},{type:'category',data:dates,axisLabel:{show:false},gridIndex:1}],
        yAxis:[{type:'value',scale:true,axisLabel:{fontSize:9},splitLine:{lineStyle:{color:'#eee'}}},{type:'value',scale:true,axisLabel:{fontSize:8},gridIndex:1,splitLine:{show:false}}],
        dataZoom:[{type:'inside',xAxisIndex:[0,1]},{type:'slider',xAxisIndex:[0,1],height:16,bottom:4}],
        series:[
          {name:'K线',type:'candlestick',data:ckData,itemStyle:{color:'#E53935',color0:'#26C6DA',borderColor:'#E53935',borderColor0:'#26C6DA'},markPoint:{data:pts,symbol:'diamond',symbolSize:14}},
          {name:'成交量',type:'bar',data:volData,xAxisIndex:1,yAxisIndex:1},
          {name:'MA50',type:'line',data:ma50,smooth:true,symbol:'none',lineStyle:{width:1.5,color:'#2196F3'}},
          {name:'MA150',type:'line',data:ma150,smooth:true,symbol:'none',lineStyle:{width:1,color:'#9C27B0'}}
        ]
      });
    }

    function renderTable(){
      var div=document.getElementById('table');
      if(!cs.length){div.innerHTML='<div class="loading-row">无杯柄形态突破信号</div>';return}
      var h='<table><thead><tr><th>#</th><th>日期</th><th>类型</th><th>前高</th><th>杯底</th><th>回调</th><th>买点</th><th>量比</th><th>柄回撤</th></tr></thead><tbody>';
      [].concat(cs).reverse().forEach(function(s,i){h+='<tr><td>'+(cs.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td>'+s.pattern_type+'</td><td class="t-up">'+s.prior_high_price+'</td><td>'+s.bottom_price+'</td><td>'+s.drawdown_pct+'%</td><td>'+s.buy_point+'</td><td>'+s.breakout_vol_ratio+'</td><td>'+(s.handle_drawdown_pct!=null?s.handle_drawdown_pct+'%':'—')+'</td></tr>'});
      div.innerHTML=h+'</tbody></table>';
    }

    async function loadCfg(){try{
      var r=await fetch('http://'+window.location.hostname+':8788/api/config?signal_type='+ST,{cache:'no-store'});var c=await r.json();if(!c||!c.cup_handle)return;var b=c.cup_handle;
      svs2('p-lb',b.lookback||120);svn('p-lb');svs2('p-pa',Math.round((b.min_prior_advance||0.30)*100));svp('p-pa');
      svs2('p-cut',Math.round((b.cut_pct||0.20)*100));svp('p-cut');svs2('p-ca',Math.round((b.cut_check_A_pct||0.02)*100));svp('p-ca');
      svs2('p-lw',b.local_extreme_window||13);svn('p-lw');
      svs2('p-cma',b.cup_min_age||35);svn('p-cma');svs2('p-cmx',b.cup_max_age||325);svn('p-cmx');
      svs2('p-dmin',Math.round((b.cup_drawdown_min||0.12)*100));svp('p-dmin');svs2('p-dmax',Math.round((b.cup_drawdown_max||0.33)*100));svp('p-dmax');
      svs2('p-rec',Math.round((b.cup_recovery||0.90)*100));svp('p-rec');
      stog('p-cbc-on',b.cup_bottom_check!==false);svs2('p-cba',Math.round((b.cup_bottom_flatness||0.08)*100));svp('p-cba');
      stog('p-adc-on',b.ascent_descent_check!==false);svs2('p-adr',Math.round((b.ascent_descent_ratio||0.50)*100));svp('p-adr');
      svs2('p-vb',Math.round((b.vol_bottom_max||0.60)*100));svp('p-vb');svs2('p-vc',Math.round((b.vol_contraction||0.65)*100));svp('p-vc');
      stog('p-hr-on',b.handle_required!==false);svs2('p-hmin',b.handle_min_days||5);svn('p-hmin');svs2('p-hmax',b.handle_max_days||30);svn('p-hmax');
      svs2('p-hdd',Math.round((b.handle_max_drawdown||0.12)*100));svp('p-hdd');svs2('p-hp',Math.round((b.handle_position_ratio||0.50)*100));svp('p-hp');
      svs2('p-hv',Math.round((b.handle_vol_ratio||0.50)*100));svp('p-hv');
      svs2('p-bv',Math.round((b.breakout_vol_ratio||1.4)*10));svs('p-bv',0.1);
      stog('p-gr-on',b.require_green!==false);svs2('p-cp',Math.round((b.close_position_min||0.50)*100));svp('p-cp');
      stog('p-rsr-on',b.rs_required===true);svs2('p-rst',b.rs_threshold||80);svn('p-rst');
    }catch(e){}}
    function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}
    function stog(id,on){var b=document.getElementById(id);if(b)b.className='tsw '+(on?'on':'off')}

    async function runDiag(){
      var date=document.getElementById('diag-date').value;
      var div=document.getElementById('diag-result');
      if(!date){div.style.display='none';return}
      var code=document.getElementById('stock-code').value.trim();
      var mode=document.getElementById('mode').value;
      div.innerHTML='<div style="font-size:0.7rem;color:var(--text-tertiary);padding:8px 0">⏳ 检测中...</div>';
      div.style.display='block';
      try{
        var resp=await fetch('http://'+window.location.hostname+':8788/api/cup-handle/diag?stock='+code+'&date='+date+'&mode='+mode);
        var d=await resp.json();
        if(d.error){div.innerHTML='<div style="font-size:0.7rem;color:#FF6B6B">'+d.error+'</div>';return}
        var all=d.all_pass,r=d.results;
        var h='<div style="font-size:0.6rem;color:var(--text-tertiary);margin-bottom:6px">'+date;
        if(d.ohlc)h+=' O='+d.ohlc.open.toFixed(2)+' H='+d.ohlc.high.toFixed(2)+' L='+d.ohlc.low.toFixed(2)+' C='+d.ohlc.close.toFixed(2);
        h+='</div>';
        if(d.cup&&d.cup.prior_high)h+='<div style="font-size:0.58rem;color:var(--text-tertiary);margin-bottom:4px">前高='+d.cup.prior_high.toFixed(2)+'('+d.cup.prior_high_date+') 杯底='+d.cup.bottom.toFixed(2)+'('+d.cup.bottom_date+') 回调='+d.cup.drawdown_pct+'%</div>';
        else if(d.cup===null)h+='<div style="font-size:0.58rem;color:#FF6B6B;margin-bottom:4px">前高未找到（形态切割法无法定位）</div>';
        h+='<table style="margin:0;font-size:0.68rem"><thead><tr><th>条件</th><th>实际值</th><th>阈值</th><th>判定</th></tr></thead><tbody>';
        r.forEach(function(c){var cc=c.pass?'<td style="color:#4CAF50">✅ '+(c.note||'')+'</td>':'<td style="color:#FF6B6B">❌ '+(c.note||'')+'</td>';h+='<tr><td>'+c.condition+'</td><td>'+c.value+'</td><td>'+c.threshold+'</td>'+cc+'</tr>'});
        h+='<tr style="border-top:2px solid var(--divider)"><td style="font-weight:900">综合</td><td colspan=2></td><td style="font-weight:900;font-size:0.85rem;color:'+(all?'#4CAF50':'#FF6B6B')+'">'+(all?'🎯 应为杯柄突破日':'❌ 不满足')+'</td></tr></tbody></table>';
        div.innerHTML=h;
      }catch(e){div.innerHTML='<div style="font-size:0.7rem;color:#FF6B6B">请求失败: '+e+'</div>'}
    }

    async function saveCfg(){
      var btn=document.getElementById('btn-save');btn.textContent='⏳';btn.disabled=true;
      var p=gp().cup_handle;
      var t=prompt('确认保存配置到服务端？参数将覆盖 cup_handle.yaml。输入 "yes" 确认。');
      if(t!=='yes'){btn.textContent='💾';btn.disabled=false;return}
      var y=['# 杯柄形态参数','cup_handle:',
        '  lookback: '+p.lookback,'  cup_min_age: '+p.cup_min_age,'  cup_max_age: '+p.cup_max_age,
        '  min_descent_days: '+p.min_descent_days,'  min_ascent_days: '+p.min_ascent_days,
        '  min_prior_advance: '+p.min_prior_advance,'  cut_pct: '+p.cut_pct,'  cut_check_A_pct: '+p.cut_check_A_pct,
        '  local_extreme_window: '+p.local_extreme_window,'  cup_drawdown_min: '+p.cup_drawdown_min,'  cup_drawdown_max: '+p.cup_drawdown_max,
        '  cup_recovery: '+p.cup_recovery,'  cup_bottom_check: '+(p.cup_bottom_check?'true':'false'),
        '  cup_bottom_flatness: '+p.cup_bottom_flatness,'  ascent_descent_check: '+(p.ascent_descent_check?'true':'false'),
        '  ascent_descent_ratio: '+p.ascent_descent_ratio,'  vol_bottom_max: '+p.vol_bottom_max,'  vol_contraction: '+p.vol_contraction,
        '  handle_required: '+(p.handle_required?'true':'false'),'  handle_min_days: '+p.handle_min_days,'  handle_max_days: '+p.handle_max_days,
        '  handle_max_drawdown: '+p.handle_max_drawdown,'  handle_position_ratio: '+p.handle_position_ratio,'  handle_vol_ratio: '+p.handle_vol_ratio,
        '  breakout_vol_ratio: '+p.breakout_vol_ratio,'  require_green: '+(p.require_green?'true':'false'),
        '  close_position_min: '+p.close_position_min,'  rs_required: '+(p.rs_required?'true':'false'),'  rs_threshold: '+p.rs_threshold,''
      ].join('\n');
      try{var r=await fetch('http://'+window.location.hostname+':8788/api/config?signal_type='+ST,{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();
      if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾';btn.classList.remove('saved');btn.disabled=false},2000)}}
      catch(e){btn.textContent='❌';btn.disabled=false}
    }
  </script>
  <script src="../shared/js/nav.js"></script>

(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>

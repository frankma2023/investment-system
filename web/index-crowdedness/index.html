<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}

  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}
  .param-card-bd{padding:8px 0 0}.param-card-bd.collapsed{display:none}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .table-wrapper td{border-bottom-color:rgba(0,0,0,.03)}

<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>

<script>
var API_BASE = 'http://'+window.location.hostname+':8788';
var allIndices = [];

function toggleTheme() {
  var html = document.documentElement;
  var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  var btn = document.querySelector('.theme-toggle');
  if (btn) btn.textContent = next === 'dark' ? '☀' : '🌙';
  localStorage.setItem('theme', next);
}
(function() {
  var s = localStorage.getItem('theme') || 'light';
  document.documentElement.dataset.theme = s;
  var btn = document.querySelector('.theme-toggle');
  if (btn) btn.textContent = s === 'dark' ? '☀' : '🌙';
})();

function toggleCard(id) { var b = document.getElementById(id + '-body'); if (b) b.classList.toggle('hidden'); }
function syncSlider(id) { document.getElementById(id + '-v').textContent = document.getElementById(id).value + '%'; }

async function loadIndices() {
  try {
    var resp = await fetch(API_BASE + '/api/crowding/indices');
    allIndices = await resp.json();
  } catch (e) { console.error(e); }
}

function getPoolIndices() {
  var pool = document.getElementById('index-pool').value;
  if (pool === 'all') return allIndices.map(function(x) { return x.code; });
  return allIndices.filter(function(x) { return x.category === pool; }).map(function(x) { return x.code; });
}

function getWeights() {
  var keys = ['turnover_ratio','turnover_rate','margin_balance','margin_buy','pe_pct','pb_pct','dyr_pct','fund_holding'];
  var w = {};
  keys.forEach(function(k) { w[k] = parseInt(document.getElementById('w-' + k).value) / 100; });
  return w;
}

var tblSort = { key: null, dir: 'asc' };
var lastResults = [];

function renderTableData(data, sortKey, sortDir) {
  var d = [].concat(data);
  if (sortKey) {
    d.sort(function(a, b) {
      var va = a[sortKey] != null ? a[sortKey] : -Infinity;
      var vb = b[sortKey] != null ? b[sortKey] : -Infinity;
      return sortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
  }
  var cols = ['代码','名称','拥挤度','等级','热度','资金','估值','PE分位','PB分位','成交占比分位','换手率分位'];
  var html = '<table class="xhs-table"><thead><tr>';
  cols.forEach(function(c, i) {
    var keys = ['stock_code','name','composite_score','crowd_level','heat_score','flow_score','valuation_score','pe_pct','pb_pct','turnover_ratio_pct','turnover_rate_pct'];
    var cls = sortKey === keys[i] ? (sortDir === 'asc' ? ' style="color:var(--color-up)"' : ' style="color:var(--color-down)"') : '';
    html += '<th' + cls + ' onclick="sortTable(\'' + keys[i] + '\')">' + c + '</th>';
  });
  html += '</tr></thead><tbody>';
  d.forEach(function(r) {
    var lvl = r.crowd_level || '—';
    var badge = 'xhs-badge-normal';
    if (lvl === '高拥挤') badge = 'xhs-badge-high';
    else if (lvl === '偏高') badge = 'xhs-badge-elevated';
    else if (lvl === '低拥挤') badge = 'xhs-badge-low';
    html += '<tr>';
    html += '<td class="constituent-code" onclick="showConstituents(\'' + r.stock_code + '\', \'' + (r.name || '').replace(/'/g, "\\'") + '\')">' + r.stock_code + '</td>';
    html += '<td style="font-weight:600">' + (r.name || r.stock_code) + '</td>';
    html += '<td style="font-weight:700;font-size:0.75rem">' + (r.composite_score != null ? r.composite_score.toFixed(1) : '—') + '</td>';
    html += '<td><span class="' + badge + '">' + lvl + '</span></td>';
    html += '<td>' + (r.heat_score != null ? r.heat_score.toFixed(1) : '—') + '</td>';
    html += '<td>' + (r.flow_score != null ? r.flow_score.toFixed(1) : '—') + '</td>';
    html += '<td>' + (r.valuation_score != null ? r.valuation_score.toFixed(1) : '—') + '</td>';
    html += '<td>' + (r.pe_pct != null ? (r.pe_pct*100).toFixed(0)+'%' : '—') + '</td>';
    html += '<td>' + (r.pb_pct != null ? (r.pb_pct*100).toFixed(0)+'%' : '—') + '</td>';
    html += '<td>' + (r.turnover_ratio_pct != null ? (r.turnover_ratio_pct*100).toFixed(0)+'%' : '—') + '</td>';
    html += '<td>' + (r.turnover_rate_pct != null ? (r.turnover_rate_pct*100).toFixed(0)+'%' : '—') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('results-table').innerHTML = html;
}

function sortTable(key) {
  if (tblSort.key === key) tblSort.dir = tblSort.dir === 'asc' ? 'desc' : 'asc';
  else { tblSort.key = key; tblSort.dir = 'asc'; }
  renderTableData(lastResults, tblSort.key, tblSort.dir);
}

async function runBacktest() {
  var btn = document.getElementById('btn-run');
  var loading = document.getElementById('loading');
  var error = document.getElementById('error-msg');
  btn.disabled = true; btn.textContent = '⏳ 计算中...';
  loading.classList.add('active'); error.classList.remove('active');

  var indexCodes = getPoolIndices().slice(0, 100);
  try {
    var resp = await fetch(API_BASE + '/api/crowding/backtest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        index_codes: indexCodes,
        start_date: document.getElementById('date-start').value,
        end_date: document.getElementById('date-end').value,
        weights: getWeights(),
        levels: { low_max: 30, normal_max: 60, elevated_max: 80 }
      })
    });
    var data = await resp.json();
    lastResults = data.results || [];
    renderTableData(lastResults);
    updateStats(lastResults);
  } catch (e) {
    error.textContent = '回测失败: ' + e.message;
    error.classList.add('active');
  } finally {
    btn.disabled = false; btn.textContent = '🔍 运行回测';
    loading.classList.remove('active');
  }
}

function updateStats(results) {
  document.getElementById('stat-total').textContent = results.length;
  document.getElementById('stat-high').textContent = results.filter(function(r){return r.crowd_level==='高拥挤'}).length;
  document.getElementById('stat-elevated').textContent = results.filter(function(r){return r.crowd_level==='偏高'}).length;
  document.getElementById('stat-normal').textContent = results.filter(function(r){return r.crowd_level==='正常'}).length;
  document.getElementById('stat-low').textContent = results.filter(function(r){return r.crowd_level==='低拥挤'}).length;
}

async function saveConfig() {
  var weights = getWeights();
  var yaml = 'weights:\n';
  Object.keys(weights).forEach(function(k) { yaml += '  ' + k + ': ' + weights[k].toFixed(2) + '\n'; });
  yaml += '\nlevels:\n  low_max: 30\n  normal_max: 60\n  elevated_max: 80\n';
  try {
    await fetch(API_BASE + '/api/crowding/config', { method: 'POST', headers: {'Content-Type':'text/yaml'}, body: yaml });
    var btn = document.getElementById('btn-save');
    btn.textContent = '✓ 已保存到 index_crowding.yaml';
    setTimeout(function() { btn.textContent = '💾 保存配置'; }, 2000);
  } catch (e) { console.error(e); }
}

loadIndices();

/* ═══════════ 成分股弹窗 ═══════════ */
function closeModal(e) {
  if (e && e.target !== document.getElementById('constituent-modal')) return;
  document.getElementById('constituent-modal').classList.remove('active');
}

async function showConstituents(indexCode, indexName) {
  var modal = document.getElementById('constituent-modal');
  var loading = document.getElementById('modal-loading');
  var table = document.getElementById('modal-table');

  document.getElementById('modal-title').textContent = indexCode + ' ' + (indexName || '');
  document.getElementById('modal-subtitle').textContent = '';
  modal.classList.add('active');
  loading.classList.add('active');
  table.innerHTML = '';

  try {
    var resp = await fetch(API_BASE + '/api/index-constituents?index_code=' + indexCode);
    var data = await resp.json();
    document.getElementById('modal-subtitle').textContent =
      '快照 ' + (data.snapshot_date || '—') + ' · ' + data.count + ' 只成分股';
    loading.classList.remove('active');
    renderConstituentTable(data.constituents || []);
  } catch (e) {
    loading.classList.remove('active');
    table.innerHTML = '<div style="padding:20px;text-align:center;color:var(--color-up)">加载失败</div>';
  }
}

function renderConstituentTable(constituents) {
  var html = '<table class="xhs-table"><thead><tr>';
  html += '<th>代码</th><th>名称</th><th>权重</th></tr></thead><tbody>';
  constituents.forEach(function(c) {
    html += '<tr>';
    html += '<td class="constituent-code">' + c.stock_code + '</td>';
    html += '<td style="font-weight:600">' + (c.name || c.stock_code) + '</td>';
    html += '<td>' + (c.weighting != null ? (c.weighting * 100).toFixed(2) + '%' : '—') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('modal-table').innerHTML = html;
}
</script>

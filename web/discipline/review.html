<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个股复核</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
  .top-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{font-family:var(--font-body);padding:5px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);outline:none;transition:all .2s}
  .page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .page-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:#d4d4d8;letter-spacing:-.01em}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .page-header h1{color:#374151}
    .panel-header { padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
    .panel-header h1 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 900; margin: 0; }
    .section-title { font-family: var(--font-display); font-size: 0.85rem; font-weight: 800; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 2px solid var(--divider); }
    /* K线图容器 */
    #kline-chart { height: 400px; margin-bottom: 4px; }
    #rs-chart { height: 140px; margin-bottom: 12px; }
    #chart-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; font-size: 0.6rem; }
    .legend-item { display: flex; align-items: center; gap: 3px; padding: 1px 6px; border-radius: 4px; background: var(--card-bg); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    /* 体检表 */
    .health-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .health-card { background: var(--card-bg); border-radius: 10px; padding: 12px; text-align: center; }
    .health-card .label { font-size: 0.6rem; color: var(--text-tertiary); }
    .health-card .value { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; margin: 2px 0; }
    .health-card .sub { font-size: 0.55rem; color: var(--text-tertiary); }
    /* 风险收益卡 */
    .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .risk-card { background: var(--card-bg); border-radius: 12px; padding: 14px; }
    .risk-card h4 { font-family: var(--font-display); font-size: 0.75rem; font-weight: 800; margin: 0 0 8px; }
    .risk-card .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.7rem; border-bottom: 1px solid var(--divider); }
    .risk-card .row .val { font-weight: 700; }
    .risk-card input { width: 80px; padding: 4px 8px; border: 1px solid var(--divider); border-radius: 6px; font-size: 0.7rem; background: var(--bg); color: var(--text-primary); text-align: right; }
    .warning-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 600; background: #FFF3CD; color: #856404; }
    .good-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 600; background: #D4EDDA; color: #155724; }
    .bad-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 600; background: #F8D7DA; color: #721C24; }
    .btn-row { display: flex; gap: 10px; margin: 16px 0; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

  <nav class="top-nav" id="top-nav"></nav>

    <div class="panel-header">
      <h1 id="review-title">复核详情</h1>
      <a href="observation.html" style="font-size:0.7rem;">← 返回观察池</a>
    </div>

    <!-- 图例 -->
    <div id="chart-legend"></div>

    <!-- K线图 -->
    <div id="kline-chart"></div>

    <!-- RS 副图 -->
    <div id="rs-chart"></div>

    <!-- 操作按钮 -->
    <div class="btn-row">
      <button class="btn-run" onclick="addToWatchlist()">⭐ 加入自选池</button>
      <a href="trades.html" style="font-size:0.7rem;padding:6px 16px;background:var(--card-bg);border-radius:10px;text-decoration:none;color:var(--text-primary);">📈 计划买入</a>
    </div>

    <!-- 体检表 -->
    <div class="section-title">📋 CAN SLIM 体检表</div>
    <div class="health-grid" id="health-grid"></div>

    <!-- 量价结构 -->
    <div class="section-title">📊 量价结构 + 行业/机构/大盘</div>
    <div class="risk-grid" id="env-grid"></div>

    <!-- 风险收益卡 -->
    <div class="section-title">🎯 风险收益评估</div>
    <div class="risk-grid" id="risk-grid"></div>

    <div id="kelly-section"></div>
  </div>

  <script src="../shared/js/nav.js"></script>
  <script>
    Nav.init({ brandIcon: '🦊', brandText: '知行', currentPage: 'discipline' });

    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    if (!code) { document.body.innerHTML = '<div class="loading">缺少股票代码参数 (?code=XXXXXX)</div>'; throw new Error('no code'); }

    let reviewData = null;
    let mainChart = null;
    let rsChartInst = null;

    // ── 引擎样式（颜色 + 符号 + 大小）──
    const ENGINE_STYLES = {
      'base_breakout':      { color: '#FF6384', symbol: 'triangle', size: 14 },
      'double_bottom':      { color: '#36A2EB', symbol: 'diamond', size: 14 },
      'flat_base':          { color: '#FFCE56', symbol: 'pin', size: 14 },
      'saucer_base':        { color: '#4BC0C0', symbol: 'rect', size: 12 },
      'box_range':          { color: '#9966FF', symbol: 'arrow', size: 14 },
      'high_tight_flag':    { color: '#FF9F40', symbol: 'circle', size: 12 },
      'stepping_bottom':    { color: '#C9CBCF', symbol: 'roundRect', size: 12 },
      'pocket_pivot':       { color: '#FD03E7', symbol: 'pin', size: 15 },
      'lower_low_breakout': { color: '#E8C3B9', symbol: 'emptyCircle', size: 12 },
      'standard_breakout':  { color: '#1ABC9C', symbol: 'diamond', size: 14 },
      'top_pattern':        { color: '#333333', symbol: 'triangle', size: 14 },
      'cdl':                { color: '#9C27B0', symbol: 'emptyCircle', size: 10 },
      'volume_divergence':  { color: '#8D6E63', symbol: 'roundRect', size: 10 },
    };
    const DEFAULT_STYLE = { color: '#999', symbol: 'circle', size: 10 };

    // ── 引擎中文名 ──
    const DISPLAY_NAMES = {
      'base_breakout': '基部突破', 'double_bottom': '双重底', 'flat_base': '扁平基部',
      'saucer_base': '碟形基部', 'box_range': '箱体震荡', 'high_tight_flag': '高紧旗',
      'stepping_bottom': '递升底部', 'pocket_pivot': '口袋支点', 'lower_low_breakout': '递升突破',
      'standard_breakout': '标准突破', 'top_pattern': '顶部形态', 'cdl': 'K线形态',
      'volume_divergence': '量价背离', 'talib': 'TA指标',
      'breakout_failure': '突破失败', 'climax_top': '高潮见顶',
      'distribution_day': '抛盘日',
    };
    function getDisplayName(src) { return DISPLAY_NAMES[src] || src; }

    function getSignalStyle(signal) {
      const src = signal.source || '';
      if (src === 'cdl') {
        const bull = (signal.type !== 'bearish');
        return { color: bull ? '#9C27B0' : '#333333', symbol: 'emptyCircle', size: 10 };
      }
      return ENGINE_STYLES[src] || DEFAULT_STYLE;
    }

    async function load() {
      try {
        const resp = await fetch('/api/discipline/review/' + code);
        reviewData = await resp.json();
        render();
      } catch (e) {
        document.body.innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
      }
    }

    function render() {
      const d = reviewData;
      const s = d.stock_info || {};
      document.getElementById('review-title').textContent = `${s.name || code} (${code}) · ${d.industry || ''}`;

      if (d.klines && d.klines.length > 0) {
        renderChart();
      } else {
        document.getElementById('kline-chart').innerHTML = '<div class="loading">无K线数据</div>';
      }

      renderHealthCheck();
      renderEnvGrid();
      renderRiskCard();
      renderKelly();
    }

    // ═══════════════════════════════════════
    // K线图 + 信号标记（pattern-scan 同款 ECharts 渲染）
    // ═══════════════════════════════════════
    function renderChart() {
      const d = reviewData;
      const ck = d.klines.map(k => ({
        date: k.date, open: k.open, close: k.close, high: k.high, low: k.low, volume: k.volume, amount: k.amount, change_pct: k.change_pct
      }));
      const dates = ck.map(k => k.date);

      // ── 移动均线 ──
      function calcMA(p) {
        const r = []; let sum = 0;
        for (let i = 0; i < ck.length; i++) {
          if (ck[i].close != null) { sum += ck[i].close; if (i >= p) sum -= ck[i - p].close; r.push(i >= p - 1 ? sum / p : null); }
          else r.push(null);
        }
        return r;
      }
      const ma5 = calcMA(5), ma10 = calcMA(10), ma20 = calcMA(20);
      const ma60 = calcMA(60), ma120 = calcMA(120), ma250 = calcMA(250);
      const maColors = ['#FF9800', '#2196F3', '#4CAF50', '#9C27B0', '#00BCD4', '#795548'];

      // ── 信号按日期索引分组 → 置于蜡烛下方 ──
      const dateIndex = {};
      dates.forEach((dt, i) => { dateIndex[dt] = i; });
      const signalsByDate = {};
      (d.signals || []).forEach(sig => {
        const sd = sig.date || sig.signal_date;
        if (!sd) return;
        if (!signalsByDate[sd]) signalsByDate[sd] = [];
        signalsByDate[sd].push(sig);
      });

      const signalPoints = [];
      const legendSrcs = new Set();
      Object.keys(signalsByDate).forEach(dt => {
        const idx = dateIndex[dt];
        if (idx === undefined) return;
        const sigs = signalsByDate[dt];
        const k = ck[idx];
        const range = k.high - k.low;
        const gap = Math.max(range * 0.50, 0.06);
        sigs.forEach((sig, i) => {
          const style = getSignalStyle(sig);
          const src = sig.source || '?';
          const name = getDisplayName(src);
          legendSrcs.add(src);
          signalPoints.push({
            name: name,
            value: [idx, k.low - gap * (i + 1)],
            symbol: style.symbol,
            symbolSize: style.size,
            symbolRotate: style.symbol === 'triangle' ? 180 : 0,
            itemStyle: { color: style.color, borderColor: '#FFF', borderWidth: 0.8 }
          });
        });
      });

      // ── 图例（含信号符号形状）──
      const symChars = { triangle: '▲', diamond: '◆', pin: '▼', rect: '■', arrow: '▶', circle: '●', roundRect: '▬', emptyCircle: '○' };
      let legendHtml = '';
      for (const src of legendSrcs) {
        const st = getSignalStyle({ source: src });
        const sym = symChars[st.symbol] || '●';
        legendHtml += `<span class="legend-item"><span style="color:${st.color};font-size:0.75rem;">${sym}</span> ${getDisplayName(src)}</span>`;
      }
      document.getElementById('chart-legend').innerHTML = legendHtml || '<span style="font-size:0.6rem;color:var(--text-tertiary)">无形态信号</span>';

      // ── ECharts 主题 ──
      const dark = document.documentElement.dataset.theme === 'dark';
      const bg = dark ? '#2A2627' : '#fff';
      const axisColor = dark ? 'rgba(200,200,200,0.3)' : 'rgba(128,128,128,0.3)';
      const gridColor = dark ? 'rgba(200,200,200,0.12)' : 'rgba(128,128,128,0.15)';

      // ── 成交量格式化 ──
      function fmtVol(v) {
        if (v == null) return '—';
        if (v >= 1e8) return (v / 1e8).toFixed(2) + '亿';
        if (v >= 1e4) return (v / 1e4).toFixed(0) + '万';
        return v.toFixed(0);
      }

      // ── 主Chart ──
      const container = document.getElementById('kline-chart');
      if (mainChart) { try { mainChart.dispose(); } catch(e) {} }
      mainChart = echarts.init(container, dark ? 'dark' : null, { renderer: 'canvas' });

      const option = {
        backgroundColor: bg,
        axisPointer: { link: [{ xAxisIndex: [0, 1] }] },
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'cross', crossStyle: { color: '#999' }, link: [{ xAxisIndex: [0, 1] }] },
          backgroundColor: 'rgba(255,255,255,0.75)', borderColor: '#ddd',
          textStyle: { fontSize: 10, color: '#333' },
          formatter: function(params) {
            if (!params || !params.length) return '';
            const ki = params[0].dataIndex;
            const k = ck[ki]; if (!k) return '';
            const chg = k.close - k.open;
            const raw = k.change_pct != null ? k.change_pct : null;
            const chgPct = raw != null ? (Math.abs(raw) > 1 ? raw : raw * 100).toFixed(2) : (k.open > 0 ? (chg / k.open * 100).toFixed(2) : '0.00');
            const col = chg >= 0 ? '#E53935' : '#26C6DA';
            let h = `<span style="font-size:12px;font-weight:700">${k.date}</span><br/>`;
            h += `开盘：<b>${(k.open||0).toFixed(2)}</b><br/>`;
            h += `收盘：<b style="color:${col}">${(k.close||0).toFixed(2)}</b><br/>`;
            h += `最高：<b>${(k.high||0).toFixed(2)}</b><br/>`;
            h += `最低：<b>${(k.low||0).toFixed(2)}</b><br/>`;
            h += `涨跌：<b style="color:${col}">${chg>=0?'+':''}${chg.toFixed(2)}（${chg>=0?'+':''}${chgPct}%）</b><br/>`;
            h += `成交量：<b>${fmtVol(k.volume)}</b><br/>`;
            h += `成交额：<b>${fmtVol(k.amount)}</b>`;
            const daySigs = signalsByDate[k.date];
            if (daySigs && daySigs.length > 0) {
              h += '<div style="margin-top:4px;padding-top:4px;border-top:1px dashed #ddd;font-weight:700;font-size:10px;">📌 当日信号</div>';
              daySigs.forEach(sig => {
                const st = getSignalStyle(sig);
                const tb = sig.type === 'bearish' ? '看跌' : '看涨';
                h += `<span style="color:${st.color};font-weight:700">●</span> <b>${getDisplayName(sig.source||'?')}</b> · ${tb}<br/>`;
              });
            }
            return h;
          }
        },
        grid: [
          { left: '8%', right: '1%', top: 16, height: '55%' },
          { left: '8%', right: '1%', top: '78%', height: '16%' }
        ],
        xAxis: [
          { type: 'category', data: dates, gridIndex: 0, axisLabel: { show: false }, axisLine: { lineStyle: { color: axisColor } }, axisTick: { show: false } },
          { type: 'category', data: dates, gridIndex: 1, axisLabel: { show: false }, axisLine: { lineStyle: { color: axisColor } }, axisTick: { show: false } }
        ],
        yAxis: [
          { type: 'value', gridIndex: 0, scale: true, axisLabel: { fontSize: 8 }, splitLine: { lineStyle: { color: gridColor } } },
          { type: 'value', gridIndex: 1, scale: true, axisLabel: { fontSize: 8, formatter: fmtVol }, splitLine: { show: false } }
        ],
        dataZoom: [
          { type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 },
          { type: 'slider', xAxisIndex: [0, 1], start: 0, end: 100, height: 18, bottom: 4, borderColor: axisColor, backgroundColor: bg, fillerColor: 'rgba(254,44,85,0.1)', handleStyle: { color: '#FE2C55' } }
        ],
        series: [
          { name: 'K线', type: 'candlestick', xAxisIndex: 0, yAxisIndex: 0,
            data: ck.map(k => [k.open, k.close, k.low, k.high]),
            itemStyle: { color: '#E53935', color0: '#26C6DA', borderColor: '#E53935', borderColor0: '#26C6DA' }
          },
          { name: 'MA5', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma5, smooth: true, symbol: 'none', lineStyle: { width: 1, color: maColors[0] } },
          { name: 'MA10', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma10, smooth: true, symbol: 'none', lineStyle: { width: 1, color: maColors[1] } },
          { name: 'MA20', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma20, smooth: true, symbol: 'none', lineStyle: { width: 1, color: maColors[2] } },
          { name: 'MA60', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma60, smooth: true, symbol: 'none', lineStyle: { width: 1.2, color: maColors[3] } },
          { name: 'MA120', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma120, smooth: true, symbol: 'none', lineStyle: { width: 1.2, color: maColors[4] } },
          { name: 'MA250', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma250, smooth: true, symbol: 'none', lineStyle: { width: 1.5, color: maColors[5] } },
          // 成交量
          { name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 1,
            data: ck.map((k, i) => ({ value: k.volume, itemStyle: { color: ck[i].close >= ck[i].open ? '#E53935' : '#26C6DA' } }))
          },
        ].concat(signalPoints.length > 0 ? [{
          name: '信号标注', type: 'scatter', xAxisIndex: 0, yAxisIndex: 0,
          data: signalPoints, z: 10,
          emphasis: { scale: 1.6, itemStyle: { shadowBlur: 8, shadowColor: 'rgba(0,0,0,0.3)' } }
        }] : [])
      };
      mainChart.setOption(option);

      // RS 副图
      renderRSChart(ck);
    }

    function renderRSChart(klines) {
      const container = document.getElementById('rs-chart');
      if (rsChartInst) { try { rsChartInst.dispose(); } catch(e) {} }

      const rsData = reviewData.rs || {};
      const rsLine = rsData.rs_line;

      if (!rsLine || !Array.isArray(rsLine) || rsLine.length < 2) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-tertiary);font-size:0.6rem;padding-top:60px;">暂无RS线数据</div>';
        return;
      }

      // 截取与K线图相同的日期范围
      const dates = klines.map(k => k.date);
      const rsValues = [];
      for (const d of dates) {
        const match = rsLine.find(r => r.date === d);
        rsValues.push(match ? match.value : null);
      }

      const dark = document.documentElement.dataset.theme === 'dark';
      rsChartInst = echarts.init(container, dark ? 'dark' : null, { renderer: 'canvas' });

      rsChartInst.setOption({
        backgroundColor: dark ? '#2A2627' : '#fff',
        grid: { left: '8%', right: '1%', top: 8, bottom: 4 },
        xAxis: { type: 'category', data: dates, axisLabel: { show: false } },
        yAxis: { type: 'value', scale: true, axisLabel: { fontSize: 8 }, splitLine: { lineStyle: { color: dark ? '#3a3a3a' : '#eee' } } },
        series: [{
          name: 'RS线',
          type: 'line',
          data: rsValues,
          symbol: 'none',
          lineStyle: { width: 1.5, color: '#FF6B35' },
          areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[
            {offset:0, color:'rgba(255,107,53,0.3)'},
            {offset:1, color:'rgba(255,107,53,0.02)'}
          ])},
        }],
        tooltip: {
          trigger: 'axis',
          formatter: function(params) {
            const v = params[0].value;
            return params[0].axisValue + '<br/>RS: <b>' + (v != null ? v.toFixed(2) : '—') + '</b>';
          }
        },
      });
    }

    // ═══════════════════════════════════════
    // CAN SLIM 七维体检表
    // ═══════════════════════════════════════
    function renderHealthCheck() {
      const d = reviewData;
      const cs = d.canslim || {};
      const fin = d.financial || {};
      const rs = d.rs || {};

      const items = [
        { label: 'C 当季利润', value: cs.score_c, fmt: v => v != null ? v.toFixed(0) : '—' },
        { label: 'A 年度利润', value: cs.score_a, fmt: v => v != null ? v.toFixed(0) : '—' },
        { label: 'N 新事物', value: cs.score_n, fmt: v => v != null ? v.toFixed(0) : '—' },
        { label: 'S 供需关系', value: cs.score_s, fmt: v => v != null ? v.toFixed(0) : '—' },
        { label: 'L 领涨股', value: cs.score_l, fmt: v => v != null ? v.toFixed(0) : '—' },
        { label: 'I 机构', value: cs.score_i, fmt: v => v != null ? v.toFixed(0) : '—' },
        { label: '总分', value: cs.score || cs.grade, fmt: v => v != null ? (typeof v === 'number' ? v.toFixed(0) : v) : '—' },
        { label: 'ROE', value: fin.roe, fmt: v => v != null ? v.toFixed(1) + '%' : '—' },
        { label: '营收增速', value: fin.revenue_yoy, fmt: v => v != null ? v.toFixed(1) + '%' : '—' },
        { label: '毛利率', value: fin.gross_margin, fmt: v => v != null ? v.toFixed(1) + '%' : '—' },
        { label: '资产负债率', value: fin.debt_ratio || fin.asset_liability_ratio, fmt: v => v != null ? v.toFixed(1) + '%' : '—' },
        { label: 'RPS 20日', value: rs.rps_20, fmt: v => v != null ? v.toFixed(0) : '—' },
        { label: 'RPS 250日', value: rs.rps_250, fmt: v => v != null ? v.toFixed(0) : '—' },
      ];

      let html = '';
      for (const item of items) {
        html += `<div class="health-card">
          <div class="label">${item.label}</div>
          <div class="value">${item.fmt(item.value)}</div>
        </div>`;
      }
      document.getElementById('health-grid').innerHTML = html;
    }

    // ═══════════════════════════════════════
    // 环境信息 (L/I/M + 量价结构)
    // ═══════════════════════════════════════
    function renderEnvGrid() {
      const d = reviewData;
      const srs = d.sector_rs || {};
      const inst = d.institutional || {};
      const mkt = d.market || {};
      const vol = d.vol_structure || {};

      let html = '';

      // L维度
      html += `<div class="risk-card">
        <h4>🏭 L 行业排名</h4>
        <div class="row"><span>行业RS</span><span class="val">${srs.rs_line != null ? srs.rs_line.toFixed(2) : (srs.score_l != null ? srs.score_l : '—')}</span></div>
        <div class="row"><span>行业</span><span class="val">${d.industry || '—'}</span></div>
      </div>`;

      // I维度
      html += `<div class="risk-card">
        <h4>🏦 I 机构持股</h4>`;
      if (inst && Object.keys(inst).length > 0) {
        for (const [k, v] of Object.entries(inst).slice(0, 4)) {
          html += `<div class="row"><span>${k}</span><span class="val">${v != null ? v : '—'}</span></div>`;
        }
      } else {
        html += `<div style="font-size:0.65rem;color:var(--text-tertiary);padding:8px 0;">暂无机构数据</div>`;
      }
      html += `</div>`;

      // M维度
      html += `<div class="risk-card">
        <h4>🌍 M 大盘环境</h4>
        <div class="row"><span>市场阶段</span><span class="val">${mkt.market_phase || '—'}</span></div>
        <div class="row"><span>风险级别</span><span class="val">${mkt.risk_level || '—'}</span></div>
        <div class="row"><span>建议仓位</span><span class="val">${mkt.suggested_position_size != null ? mkt.suggested_position_size + '%' : '—'}</span></div>
        <div class="row"><span>抛盘日(25d)</span><span class="val">${mkt.distribution_days_25d != null ? mkt.distribution_days_25d : '—'}</span></div>
        <div class="row"><span>跟进日</span><span class="val">${mkt.ftd_exists ? '✅ ' + mkt.ftd_date : '—'}</span></div>
      </div>`;

      // 量价结构
      html += `<div class="risk-card">
        <h4>📊 量价结构 (25日)</h4>
        <div class="row"><span>吸筹日</span><span class="val" style="color:#4CAF50">${vol.accumulation_days || 0}</span></div>
        <div class="row"><span>出货日</span><span class="val" style="color:#F44336">${vol.distribution_days || 0}</span></div>
        <div class="row"><span>样本天数</span><span class="val">${vol.sample_days || 0}</span></div>
        <div style="font-size:0.55rem;color:var(--text-tertiary);margin-top:4px;">价涨量增=吸筹 / 价跌量增=出货</div>
      </div>`;

      document.getElementById('env-grid').innerHTML = html;
    }

    // ═══════════════════════════════════════
    // 风险收益卡
    // ═══════════════════════════════════════
    function renderRiskCard() {
      const d = reviewData;
      const klines = d.klines || [];
      const ib = d.ideal_buy || {};
      const lastClose = klines.length > 0 ? klines[klines.length - 1].close : 0;

      // 理想买点
      const idealBuyPrice = ib.price || lastClose;

      // 止损价 = 买入价 × 0.92 (默认用当前价估算)
      const stopLossPrice = (idealBuyPrice * 0.92).toFixed(2);

      // 前高距离（200日最高）
      const lookback = Math.min(200, klines.length);
      const highs200 = klines.slice(-lookback).map(k => k.high);
      const high200 = highs200.length > 0 ? Math.max(...highs200) : lastClose * 1.1;

      // 潜在收益空间
      const upsidePct = ((high200 - lastClose) / lastClose * 100);
      const downsidePct = ((lastClose - stopLossPrice) / lastClose * 100);
      const riskReward = downsidePct > 0 ? (upsidePct / downsidePct) : 0;

      let html = `<div class="risk-card">
        <h4>🎯 理想买点</h4>
        <div class="row"><span>买点价格</span><span class="val">¥${idealBuyPrice.toFixed(2)}</span></div>
        <div class="row"><span>来源</span><span class="val">${ib.source === 'pattern_engine' ? '形态引擎' : '200天最高价'}</span></div>
        ${ib.warning ? `<div style="margin-top:4px"><span class="warning-badge">${ib.warning_msg || '⚠ 基于简单前高，未结合形态分析'}</span></div>` : ''}
      </div>`;

      html += `<div class="risk-card">
        <h4>⚖️ 风险收益</h4>
        <div class="row"><span>当前价</span><span class="val">¥${lastClose.toFixed(2)}</span></div>
        <div class="row"><span>止损价 (×0.92)</span><span class="val" style="color:#F44336">¥${stopLossPrice}</span></div>
        <div class="row"><span>前高 (200日)</span><span class="val">¥${high200.toFixed(2)}</span></div>
        <div class="row"><span>潜在收益</span><span class="val" style="color:${upsidePct > 0 ? '#4CAF50' : '#F44336'}">${upsidePct.toFixed(1)}%</span></div>
        <div class="row"><span>下行风险</span><span class="val" style="color:#F44336">${downsidePct.toFixed(1)}%</span></div>
        <div class="row"><span>风险收益比</span><span class="val" style="font-size:1.1rem;color:${riskReward >= 2 ? '#4CAF50' : '#F44336'}">${riskReward.toFixed(1)}</span></div>
        ${riskReward < 2 ? `<div style="margin-top:4px"><span class="warning-badge">⚠ 风险收益比 < 2，谨慎操作</span></div>` : `<div style="margin-top:4px"><span class="good-badge">✅ 风险收益比合理</span></div>`}
      </div>`;

      document.getElementById('risk-grid').innerHTML = html;
    }

    // ═══════════════════════════════════════
    // 凯利公式仓位建议
    // ═══════════════════════════════════════
    async function renderKelly() {
      const d = reviewData;
      let html = '<div class="section-title">📐 凯利仓位建议</div><div class="risk-grid"><div class="risk-card">';

      try {
        const resp = await fetch('/api/discipline/summary');
        const summary = await resp.json();
        const closed = summary.closed || {};
        const winRate = closed.win_rate || 50;
        const avgWin = closed.avg_pnl_pct || 10;
        const avgLoss = (closed.total_trades || 0) > 0 && closed.lose_count > 0
          ? Math.abs((closed.total_pnl || 0) / (closed.lose_count || 1))
          : 5;

        const b = avgWin / (avgLoss || 1);
        const p = winRate / 100;
        const q = 1 - p;
        const kelly = b > 0 ? Math.max(0, (b * p - q) / b) : 0;
        const halfKelly = (kelly * 0.5 * 100).toFixed(1);

        html += `<h4>凯利公式: f* = (bp - q) / b</h4>
          <div class="row"><span>历史胜率 (p)</span><span class="val">${winRate}%</span></div>
          <div class="row"><span>平均盈亏比 (b)</span><span class="val">${b.toFixed(2)}</span></div>
          <div class="row"><span>凯利最优仓位 (f*)</span><span class="val">${(kelly * 100).toFixed(1)}%</span></div>
          <div class="row"><span>半凯利建议仓位</span><span class="val" style="color:var(--accent);font-size:1.1rem">${halfKelly}%</span></div>
          <div style="font-size:0.55rem;color:var(--text-tertiary);margin-top:6px;">半凯利 = 凯利 × 0.5，降低波动风险</div>`;
      } catch (e) {
        html += `<div style="color:var(--text-tertiary)">暂无历史交易数据，无法计算凯利仓位</div>`;
      }

      html += '</div><div class="risk-card">';
      html += `<h4>💰 仓位计算器</h4>
        <div class="row"><span>总资产</span><input type="number" id="total-capital" value="100000" oninput="calcPosition()" style="width:100px"></div>
        <div class="row"><span>单笔最大亏损</span><input type="number" id="max-loss" value="2000" oninput="calcPosition()" style="width:100px"></div>
        <div class="row"><span>买入价</span><span class="val" id="calc-buy-price">—</span></div>
        <div class="row"><span>止损价</span><span class="val" id="calc-stop">—</span></div>
        <div class="row"><span>每股风险</span><span class="val" id="calc-risk-per-share">—</span></div>
        <div class="row"><span>最多可买</span><span class="val" id="calc-max-shares" style="color:var(--accent);font-size:1.1rem">—</span></div>
        <div class="row"><span>买入金额</span><span class="val" id="calc-amount" style="color:var(--accent)">—</span></div>`;
      html += '</div></div>';

      document.getElementById('kelly-section').innerHTML = html;

      // 初始化计算
      setTimeout(calcPosition, 100);
    }

    function calcPosition() {
      const d = reviewData;
      if (!d) return;
      const ib = d.ideal_buy || {};
      const klines = d.klines || [];
      const buyPrice = ib.price || (klines.length > 0 ? klines[klines.length - 1].close : 50);
      const stopPrice = buyPrice * 0.92;

      document.getElementById('calc-buy-price').textContent = '¥' + buyPrice.toFixed(2);
      document.getElementById('calc-stop').textContent = '¥' + stopPrice.toFixed(2);

      const riskPerShare = buyPrice - stopPrice;
      document.getElementById('calc-risk-per-share').textContent = '¥' + riskPerShare.toFixed(2);

      const totalCapital = parseFloat(document.getElementById('total-capital')?.value || 0);
      const maxLoss = parseFloat(document.getElementById('max-loss')?.value || 0);
      if (totalCapital > 0 && maxLoss > 0 && riskPerShare > 0) {
        const maxShares = Math.floor(maxLoss / riskPerShare);
        document.getElementById('calc-max-shares').textContent = maxShares + ' 股';
        document.getElementById('calc-amount').textContent = '¥' + (maxShares * buyPrice).toFixed(0);
      } else {
        document.getElementById('calc-max-shares').textContent = '—';
        document.getElementById('calc-amount').textContent = '—';
      }
    }

    // ═══════════════════════════════════════
    // 快速操作
    // ═══════════════════════════════════════
    async function addToWatchlist() {
      const d = reviewData;
      const s = d.stock_info || {};
      const name = s.name || code;
      try {
        const resp = await fetch('/api/discipline/watchlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ stock_code: code, stock_name: name })
        });
        const data = await resp.json();
        alert(data.added ? '已加入自选池' : (data.error || '操作失败'));
      } catch (e) {
        alert('请求失败: ' + e.message);
      }
    }

    load();

(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>

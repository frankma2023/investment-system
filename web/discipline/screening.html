<!DOCTYPE html>

<html lang="zh-CN" data-theme="light">

<head>

  <meta charset="UTF-8">

  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>每日精选 · 知行</title>

  <link rel="stylesheet" href="../shared/css/theme.css"><link rel="stylesheet" href="../shared/css/base.css">

  <link rel="stylesheet" href="../shared/css/xhs-cards.css"><link rel="stylesheet" href="../shared/css/components.css">

  <script src="../shared/js/theme.js"></script>

  <style>

    body{max-width:1400px;margin:0 auto}

    .panel-header{padding:16px 0 8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}

    .panel-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:900;margin:0}

    .mkt-badge{font-size:.65rem;padding:3px 10px;border-radius:10px;font-weight:600}

    .mkt-up{background:#E8F5E9;color:#2E7D32}.mkt-cor{background:#FFF3E0;color:#E65100}.mkt-bear{background:#FFEBEE;color:#C62828}

    .gate-msg{text-align:center;padding:60px 20px;font-size:.85rem;color:var(--text-secondary)}

    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:10px 0}

    .toolbar input,.toolbar select{padding:5px 10px;border:1px solid var(--divider);border-radius:8px;font-size:.7rem;background:var(--card-bg);color:var(--text-primary)}

    .scr-table{width:100%;border-collapse:collapse;font-size:.7rem}

    .scr-table th{text-align:center;padding:7px 3px;border-bottom:2px solid var(--divider);font-size:.6rem;font-weight:700;color:var(--text-secondary);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;background:var(--bg)}

    .scr-table th:hover{color:var(--accent)}

    .scr-table td{padding:5px 3px;border-bottom:1px solid var(--divider);text-align:center}

    .scr-table tr:hover{background:var(--card-bg)}

    .scr-table a{color:var(--accent);text-decoration:none;font-weight:600}

    .tag{display:inline-block;padding:1px 5px;border-radius:5px;font-size:.5rem;font-weight:600}

    .tag-l{background:#F3E5F5;color:#7B1FA2}.tag-b{background:#E0F7FA;color:#00838F}

    .tag-d{background:#FFEBEE;color:#C62828}

    .score-bar{display:inline-block;height:6px;border-radius:3px;vertical-align:middle;margin-right:3px}

    .btn-xs{font-size:.55rem;padding:2px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--divider);background:var(--card-bg);color:var(--text-primary);text-decoration:none;display:inline-block}

    .btn-xs.add{background:#FE2C55;color:#fff;border-color:#FE2C55}

    .info-row{font-size:.6rem;color:var(--text-tertiary);margin:4px 0}

    .mode-tabs{display:flex;gap:4px;margin:8px 0}

    .mode-tab{padding:5px 14px;border-radius:8px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid var(--divider);background:var(--card-bg);color:var(--text-secondary)}

    .mode-tab.active{background:#FE2C55;color:#fff;border-color:#FE2C55}

    .loading{text-align:center;padding:40px;color:var(--text-tertiary)}

  </style>

</head>

<body>

<div class="app-container">

  <nav class="top-nav" id="top-nav"></nav>

  <div class="panel-header">

    <h1>📋 欧奈尔每日精选</h1>

    <span id="market-badge" class="mkt-badge">加载中...</span>

  </div>

  <div class="info-row" id="info-row"></div>

  <div class="mode-tabs">

    <div class="mode-tab active" id="tab-stock" onclick="switchMode('stock')">📈 股票精选</div>

    <div class="mode-tab" id="tab-index" onclick="switchMode('index')">📊 指数精选</div>

  </div>

  <div class="toolbar">

    <input type="text" id="filter-input" placeholder="搜索..." oninput="renderTable()">

    <select id="cat-filter" onchange="renderTable()">

      <option value="">全部</option><option value="双强">双强</option><option value="龙头">龙头</option>

    </select>

    <select id="score-filter" onchange="renderTable()">

      <option value="0">全部得分</option><option value="80">≥80</option><option value="70">≥70</option><option value="60">≥60</option>

    </select>

  </div>

  <div id="table-wrap"><div class="loading">加载中...</div></div>

</div>



<div class="modal-overlay" id="rec-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto;">

  <div style="background:var(--card-bg);max-width:800px;margin:40px auto;border-radius:16px;padding:32px;position:relative;">

    <button onclick="document.getElementById('rec-modal').style.display='none'" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-secondary);">✕</button>

    <div id="rec-content" style="font-size:.8rem;line-height:1.8;color:var(--text-primary);"></div>

  </div>

</div>

<div class="modal-overlay" id="oneil-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto;">
  <div style="background:var(--card-bg);max-width:900px;margin:40px auto;border-radius:16px;padding:32px;position:relative;">
    <button onclick="document.getElementById('oneil-modal').style.display='none'" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-secondary);">✕</button>
    <div id="oneil-content" style="font-size:.8rem;line-height:1.8;color:var(--text-primary);"></div>
  </div>
</div>


<script src="../shared/js/nav.js"></script>

<script>

Nav.init({brandIcon:'🦊',brandText:'知行',currentPage:'screening'});

let allItems=[],sortCol='oneil_score',sortDir='desc',currentMode='stock';

const DISPLAY_NAMES={'base_breakout':'基部突破','double_bottom':'双重底','flat_base':'扁平基部','saucer_base':'碟形基部','standard_breakout':'标准突破','cup_handle':'杯柄突破','pocket_pivot':'口袋支点','top_pattern':'顶部形态','climax_top':'高潮见顶','breakout_failure':'突破失败','distribution_day':'抛盘日','box_range':'箱体震荡','high_tight_flag':'高紧旗','stepping_bottom':'递升底部','lower_low_breakout':'递升突破','cdl':'K线形态','talib':'TA指标','volume_divergence':'量价背离','railroad_tracks':'铁轨线','double_top':'双重顶','head_shoulders_top':'头肩顶'};

function cn(s){return DISPLAY_NAMES[s]||s}



function switchMode(mode){

  currentMode=mode;

  document.getElementById('tab-stock').className='mode-tab'+(mode==='stock'?' active':'');

  document.getElementById('tab-index').className='mode-tab'+(mode==='index'?' active':'');

  // 指数模式下隐藏股票专属筛选器

  document.getElementById('cat-filter').style.display=mode==='stock'?'':'none';

  document.getElementById('score-filter').style.display=mode==='stock'?'':'none';

  allItems=[]; sortCol=(mode==='stock'?'oneil_score':'index_score');

  document.getElementById('table-wrap').innerHTML='<div class="loading">加载中...</div>';

  load();

}

async function load(){

  try{

    const r=await fetch('/api/discipline/screening?mode='+currentMode);const d=await r.json();

    if(d.market_warning){

      document.getElementById('info-row').insertAdjacentHTML('beforebegin','<div style="background:#FFF3E0;border:1px solid #FF9800;border-radius:8px;padding:8px 14px;margin:8px 0;font-size:.7rem;color:#E65100;text-align:center;">⚠ <b>市场提醒</b>：当前大盘处于「'+d.market_phase+'」阶段，非 O\'Neil 理想买入环境。以下精选仅供观察参考，建议控制仓位、等待追盘日确认后再行动。</div>');

    }

    allItems=d.items||[];

    document.getElementById('info-row').innerHTML=`${d.date||'—'} · ${d.count} 只 · 大盘: ${d.market_phase||'—'} · 建议仓位: ${allItems[0]?.suggested_position_size||'—'}%`;

    const ph=d.market_phase||'';const b=document.getElementById('market-badge');

    if(ph.includes('上升')||ph.includes('确认')){b.className='mkt-badge mkt-up';b.textContent='🟢 '+ph}

    else if(ph.includes('回调')||ph.includes('修正')){b.className='mkt-badge mkt-cor';b.textContent='🟡 '+ph}

    else{b.className='mkt-badge mkt-bear';b.textContent=ph||'—'}

    renderTable();

  }catch(e){document.getElementById('table-wrap').innerHTML='<div class="loading">加载失败: '+e.message+'</div>'}

}



function fs(s){if(s==null)return'-';const v=Math.max(0,Math.min(100,s));let c='#4CAF50';if(v<60)c='#FF9800';if(v<40)c='#F44336';return`<span style="display:inline-flex;align-items:center;gap:2px"><span class="score-bar" style="width:${v*.4}px;background:${c}"></span><b style="color:${c}">${v.toFixed(0)}</b></span>`}



function renderTable(){

  const f=(document.getElementById('filter-input').value||'').toLowerCase();

  const cat=document.getElementById('cat-filter').value;

  const smin=parseInt(document.getElementById('score-filter').value)||0;

  let items=allItems.slice();
  if(currentMode==='index'&&items.length>10) items=items.slice(0,10);

  if(cat) items=items.filter(i=>(i.rs_category||'').includes(cat));

  if(f) items=items.filter(i=>(i.stock_code||'').toLowerCase().includes(f)||(i.stock_name||'').toLowerCase().includes(f));

  if(smin) items=items.filter(i=>(i.oneil_score||0)>=smin);

  const col=sortCol||'oneil_score',dir=sortDir||'desc';

  items.sort((a,b)=>{let va=a[col]!=null?a[col]:-Infinity,vb=b[col]!=null?b[col]:-Infinity;if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}return dir==='asc'?(va-vb):(vb-va)});

  if(!items.length){document.getElementById('table-wrap').innerHTML='<div class="loading">无匹配结果</div>';return}

  let h='<table class="scr-table"><thead><tr>';

  if(currentMode==='index'){

    h+=`<th onclick="tc('index_score')">得分${sa('index_score')}</th>`;

    h+=`<th onclick="tc('index_code')">指数代码${sa('index_code')}</th>`;

    h+=`<th onclick="tc('index_name')">名称${sa('index_name')}</th>`;

    h+=`<th onclick="tc('pool_name')">池${sa('pool_name')}</th>`;

    h+=`<th onclick="tc('rps_250')">RPS250${sa('rps_250')}</th>`;

    h+=`<th onclick="tc('rps_20')">RPS20${sa('rps_20')}</th>`;

    h+=`<th onclick="tc('signal_count')">信号${sa('signal_count')}</th>`;

    h+=`<th onclick="tc('ideal_buy')">买点${sa('ideal_buy')}</th>`;
      h+=`<th>操作</th>`;

  }else{

    h+=`<th onclick="tc('oneil_score')">O'Neil${sa('oneil_score')}</th>`;

    h+=`<th onclick="tc('stock_code')">代码${sa('stock_code')}</th>`;

    h+=`<th onclick="tc('stock_name')">名称${sa('stock_name')}</th>`;

    h+=`<th onclick="tc('industry_name')">行业${sa('industry_name')}</th>`;

    h+=`<th>RS</th>`;

    h+=`<th onclick="tc('rps_250')">RPS250${sa('rps_250')}</th>`;

    h+=`<th onclick="tc('canslim_total')">CANSLIM${sa('canslim_total')}</th>`;

    h+=`<th onclick="tc('signal_count')">信号${sa('signal_count')}</th>`;

    h+=`<th onclick="tc('ideal_buy')">买点${sa('ideal_buy')}</th>`;

    h+=`<th onclick="tc('resonance_name')">共振${sa('resonance_name')}</th>`;

    h+=`<th>操作</th>`;

  }

  h+='</tr></thead><tbody>';

  for(const it of items){

    h+='<tr>';

    if(currentMode==='index'){

      const poolTag = `<span style="font-size:.55rem;color:var(--text-secondary)">${it.pool_name||''}</span>`;

      h+=`<td>${fs(it.index_score)}</td>`;

      h+=`<td><a href="review-index.html?code=${it.index_code||''}"><b>${it.index_code||''}</b></a></td>`;

      h+=`<td>${it.index_name||''}</td>`;

      h+=`<td>${poolTag}</td>`;

      h+=`<td>${(it.rps_250||0).toFixed(0)}</td>`;

      h+=`<td>${(it.rps_20||0).toFixed(0)}</td>`;

      h+=`<td>${it.signal_count||0} <span style="font-size:.5rem;color:var(--text-tertiary)">${(it.signal_summary||'').split('/').map(cn).join('/')}</span></td>`;

      h+=`<td>${it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—'}</td>`;
      h+=`<td style="display:flex;gap:3px;justify-content:center;"><button class="btn-xs add" onclick="addWL('${it.index_code||''}','${it.index_name||''}')">+自选</button><a class="btn-xs" href="javascript:void(0)" onclick="showIndexRec('${it.index_code||''}','${it.index_name||''}')">📝 精选理由</a><a class="btn-xs" href="javascript:void(0)" onclick="showIndexOneil('${it.index_code||''}','${it.index_name||''}')">🧭 欧奈尔说</a></td>`;

    }else{

      const cats=(it.rs_category||'').split(' / ').map(c=>{let cl='tag-l';if(c==='加速')cl='tag-b';if(c==='双强')cl='tag-d';return`<span class="tag ${cl}">${c.trim()}</span>`}).join(' ');

      h+=`<td>${fs(it.oneil_score)}</td>`;

      h+=`<td><a href="review.html?code=${it.stock_code}">${it.stock_code}</a></td>`;

      h+=`<td>${it.stock_name||''}</td>`;

      h+=`<td>${it.industry_name||''}</td>`;

      h+=`<td>${cats}</td>`;

      h+=`<td>${(it.rps_250||0).toFixed(0)}</td>`;

      h+=`<td>${it.canslim_total!=null?it.canslim_total.toFixed(0):'-'}</td>`;

      h+=`<td>${it.signal_count||0} <span style="font-size:.5rem;color:var(--text-tertiary)">${it.signal_summary.split('/').map(cn).join('/')}</span></td>`;

      h+=`<td>${it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—'}</td>`;

      h+=`<td>${it.resonance_name?`<span style="color:#E65100;font-weight:600">${it.resonance_name}</span><br><span style="font-size:.5rem;color:var(--text-tertiary)">${it.resonance_pool||''}</span>`:'—'}</td>`;

      h+=`<td style="display:flex;gap:3px;justify-content:center;">`;

      h+=`<button class="btn-xs add" onclick="addWL('${it.stock_code}','${it.stock_name}')">+自选</button>`;

      h+=`<a class="btn-xs" href="javascript:void(0)" onclick="showRec('${it.stock_code}','${it.stock_name}')">📝 精选理由</a>
      <a class="btn-xs" href="javascript:void(0)" onclick="showOneil('${it.stock_code}','${it.stock_name}')">🧭 欧奈尔说</a>`;

      h+=`</td>`;

    }

    h+='</tr>';

  }

  h+='</tbody></table>';

  document.getElementById('table-wrap').innerHTML=h;

}



function sa(c){return c===sortCol?(sortDir==='asc'?' ▲':' ▼'):''}

function tc(c){if(sortCol===c)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=c;sortDir='desc'}renderTable()}



async function addWL(code,name){

  try{const r=await fetch('/api/discipline/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stock_code:code,stock_name:name})});const d=await r.json();alert(d.added?'已加入自选池':(d.error||'失败'))}catch(e){alert('请求失败')}

}



async function showRec(code,name){

  document.getElementById('rec-modal').style.display='block';

  document.getElementById('rec-content').innerHTML='<div class="loading">加载推荐信中...</div>';

  try{

    const r=await fetch('/api/discipline/recommendation/'+code);

    const d=await r.json();

    const sigNames=d.signals?.sources?.map(cn).join('、')||'无';

    const m=d.market||{},rs=d.rs||{},cs=d.canslim||{},fin=d.financial||{},inst=d.institutional||{};

    let html=`<h2 style="margin:0 0 4px;font-size:1.1rem;">📝 ${d.stock_name}（${d.stock_code}）· 欧奈尔精选推荐</h2>`;

    html+=`<p style="color:var(--text-tertiary);font-size:.7rem;margin:0 0 20px;">${d.industry||''} · 生成时间 ${new Date().toLocaleString()}</p>`;

    html+=`<p style="font-size:.85rem;line-height:2;">亲爱的投资者，</p>`;

    html+=`<p style="text-indent:2em;">基于威廉·欧奈尔的 CAN SLIM 投资体系，我对 <b>${d.stock_name}（${d.stock_code}）</b> 进行了六层系统化评估。以下是详细分析：</p>`;



    // 第一层

    html+=`<h3 style="color:#C62828;margin:20px 0 8px;">第一层 · 大盘环境</h3>`;

    html+=`<p style="text-indent:2em;">当前市场处于 <b>${m.phase||'—'}</b> 阶段，风险级别 <b>${m.risk||'—'}</b>，建议总仓位 <b>${m.position||'—'}%</b>。`;

    if(m.ftd) html+=`最近一次追盘日确认于 ${m.ftd}。`;

    html+=`过去25个交易日出现 ${m.dist_days||0} 个抛盘日。O'Neil 强调，3/4 的股票跟随大盘方向，当前环境${m.phase&&m.phase.includes('上升')?'有利于精选个股':'需谨慎控制仓位'}。</p>`;



    // 第二层

    html+=`<h3 style="color:#E65100;margin:20px 0 8px;">第二层 · RS 动量强度</h3>`;

    html+=`<p style="text-indent:2em;">${d.stock_name} 的 RPS 250 日强度为 <b>${(rs.rps_250||0).toFixed(0)}</b>（全市场前 ${(100-(rs.rps_250||0)).toFixed(0)}%），RPS 20 日强度为 <b>${(rs.rps_20||0).toFixed(0)}</b>。`;

    html+=`该股属于 RS 分类中的"双强/龙头"级别，长期与短期动量共振——这是 O'Neil 最看重的领涨股特征。RS 线当前值为 <b>${(rs.rs_line||0).toFixed(1)}</b>。</p>`;



    // 第三层

    html+=`<h3 style="color:#F57C00;margin:20px 0 8px;">第三层 · CAN SLIM 基本面</h3>`;

    html+=`<p style="text-indent:2em;">CANSLIM 综合评分 <b>${cs.score||'—'}</b> 分（等级 ${cs.grade||'—'}）。`;

    html+=`C（当季利润）<b>${cs.score_c||'—'}</b>，A（年度利润）<b>${cs.score_a||'—'}</b>，N（新事物）<b>${cs.score_n||'—'}</b>，S（供需关系）<b>${cs.score_s||'—'}</b>，L（领涨）<b>${cs.score_l||'—'}</b>，I（机构）<b>${cs.score_i||'—'}</b>。<br>`;

    html+=`财务健康度：ROE <b>${fin.roe!=null?(fin.roe).toFixed(1)+'%':'—'}</b>，营收增速 <b>${fin.revenue_yoy!=null?(fin.revenue_yoy).toFixed(1)+'%':'—'}</b>，毛利率 <b>${fin.gross_margin!=null?(fin.gross_margin).toFixed(1)+'%':'—'}</b>，资产负债率 <b>${fin.debt_ratio!=null?(fin.debt_ratio).toFixed(1)+'%':'—'}</b>。</p>`;



    // 第四层

    html+=`<h3 style="color:#2E7D32;margin:20px 0 8px;">第四层 · 技术形态信号</h3>`;

    html+=`<p style="text-indent:2em;">近5日检测到 <b>${d.signals?.buy||0}</b> 个买入形态信号：${sigNames}。`;

    if(d.ideal_buy) html+=`理想买点 <b>¥${d.ideal_buy.toFixed(2)}</b>（来源：${cn(d.buy_source||'')}），止损价 <b>¥${(d.stop_loss||0).toFixed(2)}</b>（买点 × 0.92）。`;

    if(d.signals?.veto>0) html+=`⚠ 检测到 ${d.signals.veto} 个看跌/顶部信号，请结合K线图仔细评估。`;

    html+=`</p>`;



    // 第五层

    html+=`<h3 style="color:#1565C0;margin:20px 0 8px;">第五层 · 机构与行业共振</h3>`;

    html+=`<p style="text-indent:2em;">机构持股：覆盖基金 <b>${inst.fund_count||'—'}</b> 只，前十机构持股占比 <b>${inst.top10_pct!=null?(inst.top10_pct*100).toFixed(1)+'%':'—'}</b>。`;

    html+=`所属行业为 <b>${d.industry||'—'}</b>，当前行业RS排名及最强指数归属请参考复核详情页。</p>`;



    // 总结

    html+=`<h3 style="color:#FE2C55;margin:20px 0 8px;">📌 O'Neil 总结</h3>`;

    html+=`<p style="text-indent:2em;">综合六层评估，${d.stock_name} 在 CANSLIM 基本面和 RS 动量方面表现${(cs.score||0)>=70?'优秀':'良好'}，技术形态上有明确的基部突破信号，属于 O'Neil 体系中典型的"领涨股突破买点"模式。`;

    html+=`建议在 ${d.ideal_buy?'¥'+d.ideal_buy.toFixed(2)+' 附近':'当前价附近'} 考虑建仓，止损设在 ¥${(d.stop_loss||0).toFixed(2)}，仓位控制在总资产的 10-20%。`;

    html+=`</p>`;



    html+=`<hr style="border:0;border-top:1px solid var(--divider);margin:24px 0;">`;

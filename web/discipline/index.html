<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知行 · 投资纪律系统</title>
  <link rel="stylesheet" href="../shared/css/theme.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/xhs-cards.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <script src="../shared/js/theme.js"></script>
  <style>
    body { max-width: 1100px; margin: 0 auto; }
    .hero { text-align: center; padding: 40px 0 20px; }
    .hero h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 900; margin: 0; }
    .hero p { color: var(--text-tertiary); font-size: 0.75rem; margin-top: 6px; }
    .stage-row { display: flex; gap: 12px; margin: 20px 0; }
    .stage-card { flex: 1; background: var(--card-bg); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: transform .15s; text-decoration: none; color: inherit; }
    .stage-card:hover { transform: translateY(-2px); }
    .stage-card .icon { font-size: 2rem; margin-bottom: 8px; }
    .stage-card h3 { font-family: var(--font-display); font-size: 0.85rem; font-weight: 800; margin: 0 0 4px; }
    .stage-card p { font-size: 0.62rem; color: var(--text-tertiary); margin: 0; }
    .quick-stats { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
    .qs { flex: 1 1 140px; background: var(--card-bg); border-radius: 14px; padding: 16px; text-align: center; }
    .qs .n { font-family: var(--font-display); font-size: 1.6rem; font-weight: 900; }
    .qs .l { font-size: 0.55rem; color: var(--text-tertiary); margin-top: 2px; }
    .loading { text-align: center; padding: 40px; color: var(--text-tertiary); }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="top-nav" id="top-nav"></nav>

    <div class="hero">
      <h1>⚖️ 知行</h1>
      <p>O'Neil Discipline Engine · 投资纪律系统</p>
    </div>

    <div class="stage-row">
      <a href="observation.html" class="stage-card">
        <div class="icon">🔍</div>
        <h3>观察池</h3>
        <p>今日自动筛选结果</p>
      </a>
      <a href="watchlist.html" class="stage-card">
        <div class="icon">⭐</div>
        <h3>自选池</h3>
        <p>我的重点关注</p>
      </a>
      <a href="trades.html" class="stage-card">
        <div class="icon">📊</div>
        <h3>交易记录</h3>
        <p>买入 · 卖出 · 复盘</p>
      </a>
      <a href="monitor.html" class="stage-card">
        <div class="icon">📡</div>
        <h3>持仓监控</h3>
        <p>告警 · 止损 · 扫描</p>
      </a>
    </div>

    <div id="summary-stats" class="quick-stats">
      <div class="qs"><div class="n" id="stat-obs">-</div><div class="l">观察池标的</div></div>
      <div class="qs"><div class="n" id="stat-wl">-</div><div class="l">自选池标的</div></div>
      <div class="qs"><div class="n" id="stat-hold">-</div><div class="l">持仓中</div></div>
      <div class="qs"><div class="n" id="stat-pnl">-</div><div class="l">累计盈亏</div></div>
      <div class="qs"><div class="n" id="stat-rate">-</div><div class="l">胜率</div></div>
      <div class="qs"><div class="n" id="stat-plr">-</div><div class="l">盈亏比</div></div>
      <div class="qs"><div class="n" id="stat-mdd">-</div><div class="l">最大回撤</div></div>
      <div class="qs" id="stat-asset-box" style="cursor:pointer" onclick="editTotalAsset()">
        <div class="n" id="stat-asset">-</div><div class="l">总资产 💰</div>
      </div>
      <div class="qs"><div class="n" id="stat-mv">-</div><div class="l">总市值</div></div>
      <div class="qs"><div class="n" id="stat-cash">-</div><div class="l">现金</div></div>
      <div class="qs"><div class="n" id="stat-pos">-</div><div class="l">仓位%</div></div>
    </div>

  </div>

  <script src="../shared/js/nav.js"></script>
  <script>
    Nav.init({ brandIcon: '🦊', brandText: '知行', currentPage: 'discipline' });

    async function loadStats() {
      try {
        const [obs, wl, summary, configResp] = await Promise.all([
          fetch('/api/discipline/observation').then(r => r.json()),
          fetch('/api/discipline/watchlist').then(r => r.json()),
          fetch('/api/discipline/summary').then(r => r.json()),
          fetch('/api/discipline/config').then(r => r.json()).catch(() => ({ total_asset: null })),
        ]);
        document.getElementById('stat-obs').textContent = obs.count || 0;
        document.getElementById('stat-wl').textContent = wl.count || 0;
        document.getElementById('stat-hold').textContent = summary.holding?.count || 0;
        const pnl = summary.closed?.total_pnl || 0;
        document.getElementById('stat-pnl').textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(0);
        document.getElementById('stat-pnl').style.color = pnl >= 0 ? '#4CAF50' : '#F44336';
        document.getElementById('stat-rate').textContent = (summary.closed?.win_rate || 0) + '%';

        // D模块: 盈亏比
        const plr = summary.closed?.profit_loss_ratio;
        if (plr != null && plr !== 0) {
          document.getElementById('stat-plr').textContent = (plr >= 999 ? '∞' : plr.toFixed(1));
          document.getElementById('stat-plr').style.color = plr >= 2 ? '#4CAF50' : plr > 0 ? '#FF9800' : '#F44336';
        }
        // D模块: 最大回撤
        const mdd = summary.closed?.max_drawdown_pct;
        if (mdd != null) {
          document.getElementById('stat-mdd').textContent = mdd.toFixed(1) + '%';
          document.getElementById('stat-mdd').style.color = mdd <= 5 ? '#4CAF50' : mdd <= 15 ? '#FF9800' : '#F44336';
        }

        // D模块: 总资产/市值/现金/仓位
        const totalAsset = configResp.total_asset || 0;
        const marketValue = summary.holding?.market_value || summary.holding?.total_cost || 0;
        const cash = totalAsset - marketValue;
        const posPct = totalAsset > 0 ? Math.min(100, Math.round(marketValue / totalAsset * 100)) : 0;

        document.getElementById('stat-asset').textContent = '¥' + totalAsset.toLocaleString();
        document.getElementById('stat-mv').textContent = '¥' + marketValue.toLocaleString();
        document.getElementById('stat-cash').textContent = '¥' + Math.max(0, cash).toLocaleString();
        document.getElementById('stat-pos').textContent = posPct + '%';
      } catch (e) {
        console.error('加载统计数据失败', e);
      }
    }

    async function editTotalAsset() {
      const current = document.getElementById('stat-asset').textContent.replace(/[^0-9]/g, '') || '0';
      const val = prompt('输入总资产金额：', parseInt(current) || 100000);
      if (!val) return;
      const amount = parseFloat(val);
      if (isNaN(amount) || amount <= 0) return;

      try {
        await fetch('/api/discipline/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: 'total_asset', value: amount })
        });
        // 重新加载
        loadStats();
      } catch (e) {
        alert('保存失败: ' + e.message);
      }
    }

    loadStats();
  </script>
</body>
</html>

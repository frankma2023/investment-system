<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>知行</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  .top-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{font-family:var(--font-body);padding:5px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);outline:none;transition:all .2s}
  .page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .page-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:#d4d4d8;letter-spacing:-.01em}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .page-header h1{color:#374151}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

  <nav class="top-nav" id="top-nav"></nav>

    <div class="hero">
      <h1>⚖️ 知行</h1>
      <p>O'Neil Discipline Engine · 投资纪律系统</p>
    </div>

    <div class="stage-row">
      <a href="screening.html" class="stage-card">
        <div class="icon">📋</div>
        <h3>每日精选</h3>
        <p>O'Neil 综合评分</p>
      </a>
      <a href="observation.html" class="stage-card">
        <div class="icon">🔍</div>
        <h3>观察池</h3>
        <p>今日自动筛选结果</p>
      </a>
      <a href="watchlist.html" class="stage-card">
        <div class="icon">⭐</div>
        <h3>自选池</h3>
        <p>我的重点关注</p>
      </a>
      <a href="trades.html" class="stage-card">
        <div class="icon">📊</div>
        <h3>交易记录</h3>
        <p>买入 · 卖出 · 复盘</p>
      </a>
      <a href="monitor.html" class="stage-card">
        <div class="icon">📡</div>
        <h3>持仓监控</h3>
        <p>告警 · 止损 · 扫描</p>
      </a>
    </div>

    <div id="summary-stats" class="quick-stats">
      <div class="qs"><div class="n" id="stat-obs">-</div><div class="l">观察池标的</div></div>
      <div class="qs"><div class="n" id="stat-wl">-</div><div class="l">自选池标的</div></div>
      <div class="qs"><div class="n" id="stat-hold">-</div><div class="l">持仓中</div></div>
      <div class="qs"><div class="n" id="stat-pnl">-</div><div class="l">累计盈亏</div></div>
      <div class="qs"><div class="n" id="stat-rate">-</div><div class="l">胜率</div></div>
      <div class="qs"><div class="n" id="stat-plr">-</div><div class="l">盈亏比</div></div>
      <div class="qs"><div class="n" id="stat-mdd">-</div><div class="l">最大回撤</div></div>
      <div class="qs" id="stat-asset-box" style="cursor:pointer" onclick="editTotalAsset()">
        <div class="n" id="stat-asset">-</div><div class="l">总资产 💰</div>
      </div>
      <div class="qs"><div class="n" id="stat-mv">-</div><div class="l">总市值</div></div>
      <div class="qs"><div class="n" id="stat-cash">-</div><div class="l">现金</div></div>
      <div class="qs"><div class="n" id="stat-pos">-</div><div class="l">仓位%</div></div>
    </div>

  </div>

  <script src="../shared/js/nav.js"></script>
  <script>
    Nav.init({ brandIcon: '🦊', brandText: '知行', currentPage: 'discipline' });

    async function loadStats() {
      try {
        const [obs, wl, summary, configResp] = await Promise.all([
          fetch('/api/discipline/observation').then(r => r.json()),
          fetch('/api/discipline/watchlist').then(r => r.json()),
          fetch('/api/discipline/summary').then(r => r.json()),
          fetch('/api/discipline/config').then(r => r.json()).catch(() => ({ total_asset: null })),
        ]);
        document.getElementById('stat-obs').textContent = obs.count || 0;
        document.getElementById('stat-wl').textContent = wl.count || 0;
        document.getElementById('stat-hold').textContent = summary.holding?.count || 0;
        const pnl = summary.closed?.total_pnl || 0;
        document.getElementById('stat-pnl').textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(0);
        document.getElementById('stat-pnl').style.color = pnl >= 0 ? '#4CAF50' : '#F44336';
        document.getElementById('stat-rate').textContent = (summary.closed?.win_rate || 0) + '%';

        // D模块: 盈亏比
        const plr = summary.closed?.profit_loss_ratio;
        if (plr != null && plr !== 0) {
          document.getElementById('stat-plr').textContent = (plr >= 999 ? '∞' : plr.toFixed(1));
          document.getElementById('stat-plr').style.color = plr >= 2 ? '#4CAF50' : plr > 0 ? '#FF9800' : '#F44336';
        }
        // D模块: 最大回撤
        const mdd = summary.closed?.max_drawdown_pct;
        if (mdd != null) {
          document.getElementById('stat-mdd').textContent = mdd.toFixed(1) + '%';
          document.getElementById('stat-mdd').style.color = mdd <= 5 ? '#4CAF50' : mdd <= 15 ? '#FF9800' : '#F44336';
        }

        // D模块: 总资产/市值/现金/仓位
        const totalAsset = configResp.total_asset || 0;
        const marketValue = summary.holding?.market_value || summary.holding?.total_cost || 0;
        const cash = totalAsset - marketValue;
        const posPct = totalAsset > 0 ? Math.min(100, Math.round(marketValue / totalAsset * 100)) : 0;

        document.getElementById('stat-asset').textContent = '¥' + totalAsset.toLocaleString();
        document.getElementById('stat-mv').textContent = '¥' + marketValue.toLocaleString();
        document.getElementById('stat-cash').textContent = '¥' + Math.max(0, cash).toLocaleString();
        document.getElementById('stat-pos').textContent = posPct + '%';
      } catch (e) {
        console.error('加载统计数据失败', e);
      }
    }

    async function editTotalAsset() {
      const current = document.getElementById('stat-asset').textContent.replace(/[^0-9]/g, '') || '0';
      const val = prompt('输入总资产金额：', parseInt(current) || 100000);
      if (!val) return;
      const amount = parseFloat(val);
      if (isNaN(amount) || amount <= 0) return;

      try {
        await fetch('/api/discipline/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: 'total_asset', value: amount })
        });
        // 重新加载
        loadStats();
      } catch (e) {
        alert('保存失败: ' + e.message);
      }
    }

    loadStats();
  
function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

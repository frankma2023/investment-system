<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>交易记录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="preload" href="../shared/js/nav.js" as="script">
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary)}
.page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.page-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--text-primary)}
html[data-theme="light"] .page-header h1{color:#374151}

.btn-primary{padding:6px 16px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s}
.btn-primary:hover{background:rgba(245,158,11,.18)}

.filters{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.filters button{padding:4px 12px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text-secondary);font-size:11px;cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.filters button.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border);font-weight:600}

.table-shell{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-card)}
.tr-table{width:100%;border-collapse:collapse;font-size:11px}
.tr-table th{text-align:center;padding:9px 4px;border-bottom:1px solid var(--border);font-size:9px;font-weight:500;color:var(--muted);background:var(--card);backdrop-filter:blur(10px);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.tr-table td{text-align:center;padding:7px 4px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300;font-variant-numeric:tabular-nums}
.tr-table tr:hover{background:rgba(255,255,255,.02)}
.pnl-pos{color:#ef4444;font-weight:700}
.pnl-neg{color:#10b981;font-weight:700}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:500px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal-box h3{font-family:var(--font-display);font-size:0.9rem;margin:0 0 10px;color:var(--text-primary)}
.modal-box label{display:block;font-size:0.62rem;color:var(--muted);margin:8px 0 2px;text-transform:uppercase;letter-spacing:.03em}
.modal-box input,.modal-box select,.modal-box textarea{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.7rem;background:rgba(26,26,31,.4);color:var(--text-primary);box-sizing:border-box;outline:none}
.modal-box textarea{min-height:60px;resize:vertical}
.modal-row{display:flex;gap:8px;margin-top:12px}
.modal-row .btn-cancel{background:transparent;border:1px solid var(--border);padding:6px 16px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:12px}

.loading{text-align:center;padding:60px;color:var(--muted);font-family:var(--font-display)}

html[data-theme="light"] .table-shell{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,.06)}
html[data-theme="light"] .tr-table th{background:rgba(255,255,255,.9);color:#6b7280;border-bottom:1px solid rgba(0,0,0,.06)}
html[data-theme="light"] .tr-table td{border-bottom:1px solid rgba(0,0,0,.03)}
html[data-theme="light"] .tr-table tr:hover{background:rgba(0,0,0,.02)}
html[data-theme="light"] .modal-box{background:rgba(255,255,255,.95)}
html[data-theme="light"] .modal-box input,.modal-box select,.modal-box textarea{background:rgba(255,255,255,.7);border-color:var(--divider)}
html[data-theme="light"] .filters button{background:rgba(255,255,255,.6)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();</script>
<div class="app-container">

<nav id="top-nav"></nav>
<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandIcon:'🦊',brandText:'知行',currentPage:'trades'})</script>

<div class="page-header">
  <h1>📊 交易记录</h1>
  <button class="btn-primary" onclick="showBuyForm()">+ 录入买入</button>
</div>

<div class="filters">
  <button class="active" onclick="setFilter('all', this)">全部</button>
  <button onclick="setFilter('holding', this)">持仓中</button>
  <button onclick="setFilter('closed', this)">已平仓</button>
</div>

<div id="summary-line" style="font-size:0.62rem;color:var(--muted);margin:4px 0;"></div>
<div class="table-shell" id="table-wrap"><div class="loading">加载中...</div></div>
</div>

<!-- 弹窗保持不变，只改 class 名 -->
<div class="modal-overlay" id="buy-modal">
  <div class="modal-box">
    <h3>🛒 录入买入</h3>
    <label>代码</label>
    <div style="display:flex;gap:8px">
      <input type="text" id="buy-code" placeholder="如 600519" style="flex:1" oninput="previewName()">
      <select id="buy-asset-type" onchange="previewName()" style="width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:0.7rem;background:rgba(26,26,31,.4);color:var(--text-primary);">
        <option value="stock">股票</option><option value="index">指数</option>
      </select>
    </div>
    <div id="buy-name-preview" style="font-size:0.65rem;color:var(--accent);margin-top:2px;min-height:1.2em;"></div>
    <label>买入日期</label><input type="date" id="buy-date">
    <label>买入价格</label><input type="number" id="buy-price" step="0.01">
    <label>买入数量</label><input type="number" id="buy-qty" step="100">
    <label>止损价</label><input type="number" id="buy-stop" step="0.01">
    <label>目标周期</label>
    <select id="buy-period" style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.7rem;background:rgba(26,26,31,.4);color:var(--text-primary);">
      <option value="swing">波段</option><option value="medium">中线</option><option value="long">长线</option>
    </select>
    <label>买入理由（≥20字）</label><textarea id="buy-reason"></textarea>
    <label>买入时情绪</label>
    <select id="buy-emotion" style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.7rem;background:rgba(26,26,31,.4);color:var(--text-primary);">
      <option value="calm">冷静</option><option value="excited">兴奋</option><option value="fomo">FOMO</option><option value="anxious">焦虑</option>
    </select>
    <div id="precheck-results" style="margin-top:12px;display:none;"></div>
    <div class="modal-row">
      <button class="btn-primary" id="btn-submit-buy" onclick="submitBuy()">确认买入</button>
      <button class="btn-cancel" onclick="closeBuyForm()">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="sell-modal">
  <div class="modal-box">
    <h3>💰 录入卖出</h3>
    <label>卖出日期</label><input type="date" id="sell-date">
    <label>卖出价格</label><input type="number" id="sell-price" step="0.01">
    <label>卖出理由</label><textarea id="sell-reason"></textarea>
    <label>卖出时情绪</label>
    <select id="sell-emotion" style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.7rem;background:rgba(26,26,31,.4);color:var(--text-primary);">
      <option value="calm">冷静</option><option value="panic">恐慌</option><option value="frustrated">沮丧</option><option value="relieved">解脱</option>
    </select>
    <input type="hidden" id="sell-trade-id">
    <div class="modal-row">
      <button class="btn-primary" onclick="submitSell()">确认卖出</button>
      <button class="btn-cancel" onclick="document.getElementById('sell-modal').classList.remove('show')">取消</button>
    </div>
  </div>
</div>

<script>
var currentFilter = 'all';

async function loadTrades() {
  try {
    var resp = await fetch('/api/discipline/trades?status=' + currentFilter + '&limit=100');
    var data = await resp.json();
    document.getElementById('summary-line').textContent = '共 ' + (data.total || 0) + ' 条记录';
    renderTable(data.trades || []);
  } catch(e) { document.getElementById('table-wrap').innerHTML = '<div class="loading">加载失败</div>'; }
}

function renderTable(trades) {
  if (!trades.length) { document.getElementById('table-wrap').innerHTML = '<div class="loading">暂无交易记录</div>'; return; }
  var html = '<table class="tr-table"><thead><tr><th>ID</th><th>代码</th><th>名称</th><th>买入日</th><th>买入价</th><th>数量</th><th>卖出日</th><th>卖出价</th><th>盈亏</th><th>盈亏%</th><th>天数</th><th>操作</th></tr></thead><tbody>';
  for (var i = 0; i < trades.length; i++) {
    var t = trades[i];
    var pnl = t.pnl_amount || 0, pnlPct = t.pnl_pct || 0;
    html += '<tr>';
    html += '<td>' + t.id + '</td><td>' + (t.stock_code || '') + '</td><td>' + (t.stock_name || '') + '</td>';
    html += '<td>' + (t.buy_date || '') + '</td><td>' + (t.buy_price != null ? t.buy_price : '') + '</td><td>' + (t.buy_qty || '') + '</td>';
    html += '<td>' + (t.sell_date || '—') + '</td><td>' + (t.sell_price != null ? t.sell_price : '—') + '</td>';
    html += '<td class="' + (pnl >= 0 ? 'pnl-pos' : 'pnl-neg') + '">' + (t.sell_date ? (pnl >= 0 ? '+' : '') + pnl.toFixed(2) : '—') + '</td>';
    html += '<td class="' + (pnlPct >= 0 ? 'pnl-pos' : 'pnl-neg') + '">' + (t.sell_date ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : '—') + '</td>';
    html += '<td>' + (t.hold_days || '—') + '</td>';
    html += '<td>' + (t.sell_date ? '已平仓' : '<button class="btn-primary" onclick="showSellForm(' + t.id + ',\'' + t.stock_code + '\')">卖出</button>') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  loadTrades();
}

function showBuyForm() {
  document.getElementById('buy-code').value = '';
  document.getElementById('buy-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('buy-price').value = ''; document.getElementById('buy-qty').value = '';
  document.getElementById('buy-stop').value = ''; document.getElementById('buy-reason').value = '';
  document.getElementById('precheck-results').style.display = 'none';
  document.getElementById('btn-submit-buy').disabled = false;
  document.getElementById('btn-submit-buy').textContent = '确认买入';
  document.getElementById('buy-modal').classList.add('show');
}
function closeBuyForm() { document.getElementById('buy-modal').classList.remove('show'); }

var nameTimer = null;
function previewName() {
  clearTimeout(nameTimer);
  var code = document.getElementById('buy-code').value.trim();
  var preview = document.getElementById('buy-name-preview');
  if (!code || code.length < 2) { preview.textContent = ''; return; }
  preview.textContent = '⏳ ...';
  nameTimer = setTimeout(async function() {
    try {
      var atype = document.getElementById('buy-asset-type').value;
      var resp = await fetch('/api/discipline/lookup-name?code=' + encodeURIComponent(code) + '&type=' + atype);
      var data = await resp.json();
      preview.textContent = data.name && data.name !== code ? data.name : '';
    } catch(e) { preview.textContent = ''; }
  }, 400);
}

async function submitBuy() {
  var btn = document.getElementById('btn-submit-buy');
  var body = {
    stock_code: document.getElementById('buy-code').value.trim(),
    asset_type: document.getElementById('buy-asset-type').value,
    buy_date: document.getElementById('buy-date').value,
    buy_price: parseFloat(document.getElementById('buy-price').value),
    buy_qty: parseInt(document.getElementById('buy-qty').value),
    stop_loss_price: parseFloat(document.getElementById('buy-stop').value),
    buy_reason: document.getElementById('buy-reason').value.trim(),
    target_period: document.getElementById('buy-period').value,
    buy_emotion: document.getElementById('buy-emotion').value
  };
  if (body.buy_reason.length < 20) { alert('买入理由至少 20 字'); return; }
  var loss = Math.abs(body.stop_loss_price - body.buy_price) * body.buy_qty;
  var pct = Math.abs(body.stop_loss_price - body.buy_price) / body.buy_price * 100;
  if (!confirm('⚠ 后果预览\n\n止损亏损: ' + loss.toFixed(2) + '元 (-' + pct.toFixed(1) + '%)\n\n确认继续？')) return;

  btn.disabled = true; btn.textContent = '⏳ 检查中...';
  try {
    var totalCapital = 0;
    try { var cfgResp = await fetch('/api/discipline/config'); var cfg = await cfgResp.json(); totalCapital = cfg.total_asset || 0; } catch(e){}
    var pcResp = await fetch('/api/discipline/precheck', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({stock_code:body.stock_code,buy_qty:body.buy_qty,buy_price:body.buy_price,total_capital:totalCapital}) });
    var pcData = await pcResp.json();
    var pcHtml = '';
    var isDark = document.documentElement.dataset.theme === 'dark';
    for (var i = 0; i < pcData.results.length; i++) {
      var r = pcData.results[i];
      var bg = r.result === 'fail' ? (isDark ? '#3e1a1a' : '#FFEBEE') : r.result === 'warn' ? (isDark ? '#3e2e0a' : '#FFF8E1') : (isDark ? '#1a3e1a' : '#E8F5E9');
      var icon = r.result === 'fail' ? '🛑' : r.result === 'warn' ? '⚠️' : '✅';
      pcHtml += '<div style="display:flex;justify-content:space-between;padding:4px 8px;margin:2px 0;border-radius:6px;background:' + bg + ';font-size:0.65rem;"><span>' + icon + ' ' + r.display_name + '</span><span>' + (r.message||'') + '</span></div>';
    }
    document.getElementById('precheck-results').innerHTML = pcHtml;
    document.getElementById('precheck-results').style.display = 'block';
    if (!pcData.all_pass) { btn.disabled = false; btn.textContent = '确认买入'; return; }
    if (!pcData.all_clean) {
      var warns = pcData.results.filter(function(r){return r.result==='warn'}).map(function(r){return r.message}).join('\n');
      if (!confirm('⚠ 风险提示:\n\n' + warns)) { btn.disabled = false; btn.textContent = '确认买入'; return; }
    }
  } catch(e) { document.getElementById('precheck-results').innerHTML = '<div style="color:#ef4444;font-size:0.65rem;">检查失败: ' + e.message + '</div>'; document.getElementById('precheck-results').style.display = 'block'; }
  btn.disabled = false; btn.textContent = '确认买入';

  var resp = await fetch('/api/discipline/trades', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  var data = await resp.json();
  if (data.id) { closeBuyForm(); loadTrades(); }
  else { alert(data.error || JSON.stringify(data)); }
}

function showSellForm(id, code) { document.getElementById('sell-trade-id').value = id; document.getElementById('sell-date').value = new Date().toISOString().slice(0,10); document.getElementById('sell-modal').classList.add('show'); }
async function submitSell() {
  var id = document.getElementById('sell-trade-id').value;
  var body = { sell_date: document.getElementById('sell-date').value, sell_price: parseFloat(document.getElementById('sell-price').value), sell_reason: document.getElementById('sell-reason').value.trim(), sell_emotion: document.getElementById('sell-emotion').value };
  var resp = await fetch('/api/discipline/trades/' + id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  var data = await resp.json();
  if (data.status === 'closed') { document.getElementById('sell-modal').classList.remove('show'); loadTrades(); }
  else { alert(data.error); }
}

loadTrades();

function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>交易记录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  .top-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{font-family:var(--font-body);padding:5px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);outline:none;transition:all .2s}
  .page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .page-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:#d4d4d8;letter-spacing:-.01em}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .page-header h1{color:#374151}
    .panel-header { padding: 16px 0 8px; display: flex; justify-content: space-between; align-items: center; }
    .panel-header h1 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 900; margin: 0; }
    .filters { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; align-items: center; }
    .filters button { padding: 4px 12px; border: 1px solid var(--divider); border-radius: 8px; background: var(--card-bg); color: var(--text-primary); font-size: 0.65rem; cursor: pointer; }
    .filters button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .trades-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
    .trades-table th { text-align: left; padding: 8px 6px; border-bottom: 2px solid var(--divider); font-size: 0.6rem; font-weight: 700; color: var(--text-secondary); }
    .trades-table td { padding: 8px 6px; border-bottom: 1px solid var(--divider); }
    .trades-table tr:hover { background: var(--card-bg); }
    .pnl-pos { color: #F44336; font-weight: 700; }
    .pnl-neg { color: #4CAF50; font-weight: 700; }
    .modal { background: var(--card-bg); border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; }
    .modal h3 { font-family: var(--font-display); font-size: 0.9rem; margin: 0 0 12px; }
    .modal label { display: block; font-size: 0.65rem; color: var(--text-secondary); margin: 8px 0 2px; }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--divider); border-radius: 8px; font-size: 0.7rem; background: var(--bg); color: var(--text-primary); box-sizing: border-box; }
    .modal textarea { min-height: 60px; resize: vertical; }
    .modal-row { display: flex; gap: 8px; margin-top: 12px; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

  <nav class="top-nav" id="top-nav"></nav>

    <div class="panel-header">
      <h1>📊 交易记录</h1>
      <button class="btn-run" onclick="showBuyForm()" style="width:auto;font-size:0.7rem;padding:4px 14px;">+ 录入买入</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">全部</button>
      <button onclick="setFilter('holding', this)">持仓中</button>
      <button onclick="setFilter('closed', this)">已平仓</button>
    </div>

    <div id="summary-line" style="font-size:0.65rem;color:var(--muted);margin:4px 0;"></div>
    <div id="table-wrap"><div class="loading">加载中...</div></div>
  </div>

  <!-- 买入弹窗 -->
  <div class="modal-overlay" id="buy-modal">
    <div class="modal">
      <h3>🛒 录入买入</h3>
      <label>代码</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="buy-code" placeholder="如 600519 或 000300" style="flex:1" oninput="previewName()">
        <select id="buy-asset-type" onchange="previewName()" style="width:80px;padding:6px 8px;border:1px solid var(--divider);border-radius:8px;font-size:0.7rem;background:var(--card-bg);color:var(--text-primary);">
          <option value="stock">股票</option>
          <option value="index">指数</option>
        </select>
      </div>
      <div id="buy-name-preview" style="font-size:0.65rem;color:var(--accent);margin-top:2px;min-height:1.2em;"></div>
      <label>买入日期</label><input type="date" id="buy-date">
      <label>买入价格</label><input type="number" id="buy-price" step="0.01">
      <label>买入数量（股）</label><input type="number" id="buy-qty" step="100">
      <label>止损价</label><input type="number" id="buy-stop" step="0.01">
      <label>目标周期</label>
      <select id="buy-period"><option value="swing">波段 (1-4周)</option><option value="medium">中线 (1-3月)</option><option value="long">长线 (3月+)</option></select>
      <label>买入理由（≥20字）</label><textarea id="buy-reason" placeholder="为什么买这只股票？"></textarea>
      <label>买入时情绪</label>
      <select id="buy-emotion"><option value="calm">冷静</option><option value="excited">兴奋</option><option value="fomo">FOMO怕错过</option><option value="anxious">焦虑</option></select>
      <div id="precheck-results" style="margin-top:12px;display:none;"></div>
      <div class="modal-row">
        <button class="btn-run" id="btn-submit-buy" onclick="submitBuy()">确认买入</button>
        <button onclick="closeBuyForm()" style="background:var(--divider);border:none;padding:6px 16px;border-radius:8px;cursor:pointer;">取消</button>
      </div>
    </div>
  </div>

  <!-- 卖出弹窗 -->
  <div class="modal-overlay" id="sell-modal">
    <div class="modal">
      <h3>💰 录入卖出</h3>
      <label>卖出日期</label><input type="date" id="sell-date">
      <label>卖出价格</label><input type="number" id="sell-price" step="0.01">
      <label>卖出理由</label><textarea id="sell-reason"></textarea>
      <label>卖出时情绪</label>
      <select id="sell-emotion"><option value="calm">冷静</option><option value="panic">恐慌</option><option value="frustrated">沮丧</option><option value="relieved">解脱</option></select>
      <input type="hidden" id="sell-trade-id">
      <div class="modal-row">
        <button class="btn-run" onclick="submitSell()">确认卖出</button>
        <button onclick="document.getElementById('sell-modal').style.display='none'" style="background:var(--divider);border:none;padding:6px 16px;border-radius:8px;cursor:pointer;">取消</button>
      </div>
    </div>
  </div>

  <script src="../shared/js/nav.js"></script>
  <script>
    Nav.init({ brandIcon: '🦊', brandText: '知行', currentPage: 'discipline' });

    let currentFilter = 'all';

    async function loadTrades() {
      try {
        const resp = await fetch(`/api/discipline/trades?status=${currentFilter}&limit=100`);
        const data = await resp.json();
        document.getElementById('summary-line').textContent = `共 ${data.total} 条记录`;
        renderTable(data.trades || []);
      } catch (e) {
        document.getElementById('table-wrap').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    function renderTable(trades) {
      if (!trades.length) {
        document.getElementById('table-wrap').innerHTML = '<div class="loading">暂无交易记录</div>';
        return;
      }
      let html = '<table class="trades-table"><thead><tr>';
      html += '<th>ID</th><th>代码</th><th>名称</th><th>买入日</th><th>买入价</th><th>数量</th>';
      html += '<th>卖出日</th><th>卖出价</th><th>盈亏</th><th>盈亏%</th><th>持股天数</th><th>操作</th>';
      html += '</tr></thead><tbody>';
      for (const t of trades) {
        const pnl = t.pnl_amount || 0;
        const pnlPct = t.pnl_pct || 0;
        html += '<tr>';
        html += `<td>${t.id}</td><td>${t.stock_code}</td><td>${t.stock_name || ''}</td>`;
        html += `<td>${t.buy_date}</td><td>${t.buy_price}</td><td>${t.buy_qty}</td>`;
        html += `<td>${t.sell_date || '—'}</td><td>${t.sell_price || '—'}</td>`;
        html += `<td class="${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${t.sell_date ? (pnl >= 0 ? '+' : '') + pnl.toFixed(2) : '—'}</td>`;
        html += `<td class="${pnlPct >= 0 ? 'pnl-pos' : 'pnl-neg'}">${t.sell_date ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : '—'}</td>`;
        html += `<td>${t.hold_days || '—'}</td>`;
        html += `<td>${t.sell_date ? '已平仓' : `<button class="btn-run" onclick="showSellForm(${t.id},'${t.stock_code}')">卖出</button>`}</td>`;
        html += '</tr>';
      }
      html += '</tbody></table>';
      document.getElementById('table-wrap').innerHTML = html;
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadTrades();
    }

    function showBuyForm() {
      // 清空所有字段
      document.getElementById('buy-code').value = '';
      document.getElementById('buy-asset-type').value = 'stock';
      document.getElementById('buy-name-preview').textContent = '';
      document.getElementById('buy-date').value = new Date().toISOString().slice(0, 10);
      document.getElementById('buy-price').value = '';
      document.getElementById('buy-qty').value = '';
      document.getElementById('buy-stop').value = '';
      document.getElementById('buy-reason').value = '';
      document.getElementById('buy-emotion').value = 'calm';
      document.getElementById('buy-period').value = 'medium';
      document.getElementById('precheck-results').style.display = 'none';
      document.getElementById('precheck-results').innerHTML = '';
      document.getElementById('btn-submit-buy').disabled = false;
      document.getElementById('btn-submit-buy').textContent = '确认买入';
      document.getElementById('buy-modal').style.display = 'flex';
    }
    function closeBuyForm() {
      document.getElementById('buy-modal').style.display = 'none';
      document.getElementById('precheck-results').style.display = 'none';
      document.getElementById('btn-submit-buy').disabled = false;
      document.getElementById('btn-submit-buy').textContent = '确认买入';
    }

    // 代码输入时实时预览名称
    let nameTimer = null;
    function previewName() {
      clearTimeout(nameTimer);
      const code = document.getElementById('buy-code').value.trim();
      const preview = document.getElementById('buy-name-preview');
      if (!code || code.length < 2) { preview.textContent = ''; return; }
      preview.textContent = '⏳ ...';
      nameTimer = setTimeout(async () => {
        try {
          const atype = document.getElementById('buy-asset-type').value;
          const resp = await fetch(`/api/discipline/lookup-name?code=${encodeURIComponent(code)}&type=${atype}`);
          const data = await resp.json();
          preview.textContent = data.name && data.name !== code ? data.name : '';
        } catch(e) { preview.textContent = ''; }
      }, 400);
    }
    async function submitBuy() {
      const btn = document.getElementById('btn-submit-buy');
      const body = {
        stock_code: document.getElementById('buy-code').value.trim(),
        asset_type: document.getElementById('buy-asset-type').value,
        buy_date: document.getElementById('buy-date').value,
        buy_price: parseFloat(document.getElementById('buy-price').value),
        buy_qty: parseInt(document.getElementById('buy-qty').value),
        stop_loss_price: parseFloat(document.getElementById('buy-stop').value),
        buy_reason: document.getElementById('buy-reason').value.trim(),
        target_period: document.getElementById('buy-period').value,
        buy_emotion: document.getElementById('buy-emotion').value,
      };
      // 前端买入理由验证
      if (body.buy_reason.length < 20) {
        alert(`买入理由至少 20 字（当前 ${body.buy_reason.length} 字）`);
        return;
      }
      // 后果预览
      const loss = Math.abs(body.stop_loss_price - body.buy_price) * body.buy_qty;
      const pct = Math.abs(body.stop_loss_price - body.buy_price) / body.buy_price * 100;
      const ok = confirm(`⚠ 后果预览\n\n如果触发止损（${body.stop_loss_price}），你将亏损：\n${loss.toFixed(2)} 元（-${pct.toFixed(1)}%）\n\n确认继续？`);
      if (!ok) return;

      // 获取总资产配置
      let totalCapital = 0;
      try {
        const cfgResp = await fetch('/api/discipline/config');
        const cfg = await cfgResp.json();
        totalCapital = cfg.total_asset || 0;
      } catch (e) {}

      // 调 precheck
      btn.disabled = true;
      btn.textContent = '⏳ 检查中...';
      try {
        const pcResp = await fetch('/api/discipline/precheck', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ stock_code: body.stock_code, buy_qty: body.buy_qty, buy_price: body.buy_price, total_capital: totalCapital })
        });
        const pcData = await pcResp.json();

        // 展示检查结果
        let pcHtml = '';
        const isDark = document.documentElement.dataset.theme === 'dark';
        for (const r of pcData.results) {
          let bg = '';
          if (r.result === 'fail') bg = isDark ? '#3e1a1a' : '#FFEBEE';
          else if (r.result === 'warn') bg = isDark ? '#3e2e0a' : '#FFF8E1';
          else bg = isDark ? '#1a3e1a' : '#E8F5E9';
          const icon = r.result === 'fail' ? '🛑' : r.result === 'warn' ? '⚠️' : '✅';
          pcHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;margin:2px 0;border-radius:6px;background:${bg};font-size:0.65rem;"><span>${icon} ${r.display_name}</span><span>${r.message || ''}</span></div>`;
        }
        document.getElementById('precheck-results').innerHTML = pcHtml;
        document.getElementById('precheck-results').style.display = 'block';

        if (!pcData.all_pass) {
          btn.disabled = false;
          btn.textContent = '确认买入';
          return; // 不弹窗，结果已在界面上
        }
        if (!pcData.all_clean) {
          const warns = pcData.results.filter(r => r.result === 'warn').map(r => r.message).join('\n');
          const go = confirm(`⚠ 以下检查未通过，是否在已知风险下继续？\n\n${warns}`);
          if (!go) { btn.disabled = false; btn.textContent = '确认买入'; return; }
        }
      } catch (e) {
        document.getElementById('precheck-results').innerHTML = '<div style="color:#F44336;font-size:0.65rem;">检查失败: ' + e.message + '</div>';
        document.getElementById('precheck-results').style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = '确认买入';

      // 正式提交
      const resp = await fetch('/api/discipline/trades', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      if (data.id) { closeBuyForm(); loadTrades(); }
      else { alert(data.error || JSON.stringify(data)); }
    }

    function showSellForm(id, code) {
      document.getElementById('sell-trade-id').value = id;
      document.getElementById('sell-date').value = new Date().toISOString().slice(0,10);
      document.getElementById('sell-modal').style.display = 'flex';
    }
    async function submitSell() {
      const id = document.getElementById('sell-trade-id').value;
      const body = {
        sell_date: document.getElementById('sell-date').value,
        sell_price: parseFloat(document.getElementById('sell-price').value),
        sell_reason: document.getElementById('sell-reason').value.trim(),
        sell_emotion: document.getElementById('sell-emotion').value,
      };
      const resp = await fetch('/api/discipline/trades/' + id, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      if (data.status === 'closed') { document.getElementById('sell-modal').style.display = 'none'; loadTrades(); }
      else { alert(data.error); }
    }

    loadTrades();
  
function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>观察清单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="preload" href="../shared/js/nav.js" as="script">
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary)}

  .page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .page-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--text-primary)}
  .page-header p{font-size:0.65rem;color:var(--muted);margin:2px 0 0}
  html[data-theme="light"] .page-header h1{color:#374151}

  .top-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;padding:14px 20px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;box-shadow:var(--shadow-card)}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{font-family:var(--font-body);padding:6px 12px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}

  .table-shell{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-card)}
  .obs-table{width:100%;border-collapse:collapse;font-size:12px}
  .obs-table thead{position:sticky;top:0;z-index:5}
  .obs-table th{text-align:center;padding:9px 4px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;background:var(--card);backdrop-filter:blur(10px);text-transform:uppercase;letter-spacing:.04em}
  .obs-table th:hover{color:var(--text-primary)}
  .obs-table th .sort-arrow{font-size:0.5rem;margin-left:2px}
  .obs-table td{padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.03);text-align:center;font-weight:300;font-variant-numeric:tabular-nums}
  .obs-table tbody tr:hover{background:rgba(255,255,255,.02)}
  .obs-table a{color:var(--accent);text-decoration:none;font-weight:500}
  .obs-table a:hover{text-decoration:underline}

  .tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:500;margin:1px}
  .tag-leader{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
  .tag-burst{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}
  .tag-double{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
  .tag-short{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
  .tag-steady{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}

  .btn-xs{padding:3px 10px;border:1px solid var(--border);border-radius:8px;background:var(--accent-subtle);color:var(--accent);font-size:10px;cursor:pointer;font-family:var(--font-body);transition:all .15s}
  .btn-xs:hover{background:rgba(245,158,11,.18)}

  .loading{text-align:center;padding:40px;color:var(--muted);font-family:var(--font-display)}

  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .table-shell{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,.06)}
  html[data-theme="light"] .obs-table th{background:rgba(255,255,255,.9);color:#6b7280;border-bottom:1px solid rgba(0,0,0,.06)}
  html[data-theme="light"] .obs-table td{border-bottom:1px solid rgba(0,0,0,.03)}
  html[data-theme="light"] .obs-table tbody tr:hover{background:rgba(0,0,0,.02)}
  html[data-theme="light"] .obs-table a{color:#d97706}
  html[data-theme="light"] .tag-leader{background:rgba(168,85,247,.12);color:#7c3aed;border:1px solid rgba(168,85,247,.15)}
  html[data-theme="light"] .tag-burst{background:rgba(6,182,212,.12);color:#0891b2;border:1px solid rgba(6,182,212,.15)}
  html[data-theme="light"] .tag-double{background:rgba(239,68,68,.12);color:#dc2626;border:1px solid rgba(239,68,68,.15)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();</script>
<div class="app-container">

<nav id="top-nav"></nav>
<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandIcon:'🦊',brandText:'知行',currentPage:'observation'})</script>

<div class="page-header">
  <h1>🔍 观察池</h1>
  <p id="date-label">加载中...</p>
</div>

<div class="top-bar">
  <div>
    <label>搜索</label>
    <input type="text" id="filter-input" placeholder="股票代码或名称..." oninput="renderTable()">
  </div>
  <div>
    <label>RS分类</label>
    <select id="cat-filter" onchange="renderTable()">
      <option value="">全部</option>
      <option value="龙头">龙头</option>
      <option value="加速">加速</option>
      <option value="短爆">短爆</option>
      <option value="稳健">稳健</option>
    </select>
  </div>
  <div>
    <label>日期</label>
    <input type="date" id="date-input" onchange="loadByDate(this.value)">
  </div>
</div>

<div class="table-shell" id="table-wrap">
  <div class="loading">加载中...</div>
</div>
</div>

<script>
var allItems = [], sortCol = 'composite_score', sortDir = 'desc';

function sortArrow(col) {
  if (col !== sortCol) return '';
  return sortDir === 'asc' ? ' ▲' : ' ▼';
}

function thClick(col) {
  if (sortCol === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
  else { sortCol = col; sortDir = 'desc'; }
  renderTable();
}

function formatSignals(item) {
  if (item.signals_json) {
    try {
      var signals = JSON.parse(item.signals_json);
      if (signals && signals.length) return '<span style="color:var(--accent);font-weight:600">' + signals.length + '个信号</span>';
    } catch(e) {}
  }
  var count = 0;
  if (item.buy_signals_json) {
    try { var arr = JSON.parse(item.buy_signals_json); count += (arr || []).length; } catch(e) {}
  }
  if (item.sell_signals_json) {
    try { var arr = JSON.parse(item.sell_signals_json); count += (arr || []).length; } catch(e) {}
  }
  if (count > 0) return '<span style="color:var(--accent);font-weight:600">' + count + '个信号</span>';
  return '<span style="color:var(--muted)">-</span>';
}

async function loadByDate(date) {
  try {
    var url = '/api/discipline/observation';
    if (date) url += '?date=' + date;
    var resp = await fetch(url);
    var data = await resp.json();
    allItems = data.items || [];
    document.getElementById('date-label').textContent = '数据日期: ' + (data.date || '--');
    if (data.date) document.getElementById('date-input').value = data.date;
    renderTable();
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  }
}

function renderTable() {
  var filter = (document.getElementById('filter-input').value || '').toLowerCase();
  var cat = document.getElementById('cat-filter').value;

  var items = allItems.slice();
  if (cat) items = items.filter(function(i) { return (i.rs_category || '').indexOf(cat) >= 0; });
  if (filter) items = items.filter(function(i) {
    return (i.stock_code || '').toLowerCase().indexOf(filter) >= 0 || (i.stock_name || '').toLowerCase().indexOf(filter) >= 0;
  });

  items.sort(function(a, b) {
    var va = a[sortCol] != null ? a[sortCol] : -Infinity;
    var vb = b[sortCol] != null ? b[sortCol] : -Infinity;
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||'').toLowerCase(); return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va); }
    return sortDir === 'asc' ? (va - vb) : (vb - va);
  });

  if (items.length === 0) {
    document.getElementById('table-wrap').innerHTML = '<div class="loading">无匹配结果</div>';
    return;
  }

  var html = '<table class="obs-table"><thead><tr>';
  html += '<th onclick="thClick(\'stock_code\')">代码<span class="sort-arrow">' + sortArrow('stock_code') + '</span></th>';
  html += '<th onclick="thClick(\'stock_name\')">名称<span class="sort-arrow">' + sortArrow('stock_name') + '</span></th>';
  html += '<th onclick="thClick(\'industry_name\')">行业<span class="sort-arrow">' + sortArrow('industry_name') + '</span></th>';
  html += '<th>RS分类</th>';
  html += '<th onclick="thClick(\'rps_20\')">RPS20<span class="sort-arrow">' + sortArrow('rps_20') + '</span></th>';
  html += '<th onclick="thClick(\'rps_250\')">RPS250<span class="sort-arrow">' + sortArrow('rps_250') + '</span></th>';
  html += '<th onclick="thClick(\'canslim_total\')">CANSLIM<span class="sort-arrow">' + sortArrow('canslim_total') + '</span></th>';
  html += '<th onclick="thClick(\'roe\')">ROE<span class="sort-arrow">' + sortArrow('roe') + '</span></th>';
  html += '<th onclick="thClick(\'revenue_yoy\')">营收增速<span class="sort-arrow">' + sortArrow('revenue_yoy') + '</span></th>';
  html += '<th>信号</th>';
  html += '<th onclick="thClick(\'composite_score\')">综合<span class="sort-arrow">' + sortArrow('composite_score') + '</span></th>';
  html += '<th>操作</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var cats = (item.rs_category || '').split(' / ');
    var catTags = cats.map(function(c) {
      c = c.trim();
      var cls = 'tag-steady';
      if (c === '龙头') cls = 'tag-leader';
      else if (c === '加速') cls = 'tag-burst';
      else if (c === '双强') cls = 'tag-double';
      else if (c === '短爆') cls = 'tag-short';
      return '<span class="tag ' + cls + '">' + c + '</span>';
    }).join(' ');

    html += '<tr>';
    html += '<td><a href="review.html?code=' + item.stock_code + '">' + item.stock_code + '</a></td>';
    html += '<td>' + (item.stock_name || '') + '</td>';
    html += '<td>' + (item.industry_name || '') + '</td>';
    html += '<td>' + catTags + '</td>';
    html += '<td>' + (item.rps_20 || 0).toFixed(0) + '</td>';
    html += '<td>' + (item.rps_250 || 0).toFixed(0) + '</td>';
    html += '<td>' + (item.canslim_total != null ? item.canslim_total.toFixed(0) : '-') + '</td>';
    html += '<td>' + (item.roe != null ? item.roe.toFixed(1) + '%' : '-') + '</td>';
    html += '<td>' + (item.revenue_yoy != null ? item.revenue_yoy.toFixed(1) + '%' : '-') + '</td>';
    html += '<td>' + formatSignals(item) + '</td>';
    html += '<td><b>' + (item.composite_score != null ? item.composite_score.toFixed(0) : '-') + '</b></td>';
    html += '<td><button class="btn-xs" onclick="addToWatchlist(\'' + item.stock_code + '\',\'' + item.stock_name + '\')">+自选</button></td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

async function addToWatchlist(code, name) {
  try {
    var resp = await fetch('/api/discipline/watchlist', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({stock_code: code, stock_name: name})
    });
    var data = await resp.json();
    alert(data.added ? '已加入自选池' : (data.error || '操作失败'));
  } catch(e) {
    alert('请求失败: ' + e.message);
  }
}

loadByDate('');

function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

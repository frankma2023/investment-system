<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>指数精选回测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="preload" href="../shared/js/nav.js" as="script">
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  body { font-family: var(--font-body); background: var(--bg); color: var(--text-primary); }

  .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .page-header h1 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 400; color: var(--text-primary); }
  html[data-theme="light"] .page-header h1 { color: #374151; }

  .top-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; padding: 14px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; box-shadow: var(--shadow-card); }
  .top-bar label { font-size: 10px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: .03em; }
  .top-bar input, .top-bar select { font-family: var(--font-body); padding: 6px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 12px; background: rgba(26,26,31,.4); color: var(--text-primary); outline: none; transition: all .2s; }
  .top-bar input:focus, .top-bar select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,.1); }

  .btn-run { padding: 7px 20px; background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font-body); transition: all .2s; }
  .btn-run:hover { background: rgba(245,158,11,.18); }

  .stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }

  .bt-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 10px; box-shadow: var(--shadow-card); overflow-x: auto; }

  .bt-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; table-layout: auto; }
  .bt-table th { text-align: center; padding: 7px 6px; border-bottom: 2px solid var(--divider); font-size: 0.6rem; font-weight: 700; color: var(--muted); white-space: nowrap; position: sticky; top: 0; background: var(--card); }
  .bt-table td { padding: 5px 6px; border-bottom: 1px solid var(--divider); text-align: center; font-variant-numeric: tabular-nums; }
  .bt-table tr:hover { background: var(--accent-subtle); }
  .bt-table a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .bt-table a:hover { text-decoration: underline; }

  .green { color: #4CAF50; font-weight: 700; }
  .red { color: #E53935; font-weight: 700; }

  .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.75rem; }
  .loading a { color: var(--accent); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 600px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,.3); position: relative; }
  .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
  .modal-close:hover { color: var(--text-primary); }
  .modal-box h3 { font-family: var(--font-display); font-size: .9rem; margin: 0 0 12px; color: var(--text-primary); }
  .modal-box table { width: 100%; font-size: .7rem; border-collapse: collapse; }
  .modal-box td { padding: 4px 8px; border-bottom: 1px solid var(--divider); color: var(--text-primary); }
  .modal-box .label { color: var(--muted); font-size: .6rem; }
  .modal-box .val { font-weight: 700; text-align: right; }
  .modal-box .ok { color: #4CAF50; }
  .modal-box .warn { color: #E65100; }

  /* Light mode */
  html[data-theme="light"] .top-bar { background: rgba(255,255,255,.75); border-color: var(--divider); }
  html[data-theme="light"] .top-bar input, html[data-theme="light"] .top-bar select { background: rgba(255,255,255,.7); border-color: var(--divider); color: var(--text-primary); }
  html[data-theme="light"] .bt-card { background: rgba(255,255,255,.75); border-color: var(--divider); }
  html[data-theme="light"] .bt-table th { background: rgba(255,255,255,.75); }
  html[data-theme="light"] .modal-box { background: rgba(255,255,255,.95); }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();</script>

<div class="app-container">
<nav id="top-nav"></nav>
<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandIcon:'🦊',brandText:'知行',currentPage:'screening-backtest-index'})</script>

<div class="page-header">
  <h1>📈 指数精选回测</h1>
</div>

<div class="top-bar">
  <div>
    <label>精选日期</label>
    <select id="date-select" onchange="load()"></select>
  </div>
</div>

<div id="stats-row" class="stats-row"></div>
<div class="bt-card" id="table-wrap">
  <div class="loading">选择日期查看回测</div>
</div>
</div>

<div class="modal-overlay" id="bd-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('bd-modal').classList.remove('show')">✕</button>
    <div id="bd-content"></div>
  </div>
</div>

<script>
async function init() {
  var resp = await fetch('/api/discipline/screening-backtest-index');
  var d = await resp.json();
  var sel = document.getElementById('date-select');
  sel.innerHTML = '';
  if (!d.available_dates || d.available_dates.length === 0) {
    sel.innerHTML = '<option>— 暂无历史数据 —</option>';
    return;
  }
  for (var i = 0; i < d.available_dates.length; i++) {
    var dt = d.available_dates[i];
    var opt = document.createElement('option');
    opt.value = dt; opt.textContent = dt;
    if (dt === d.date) opt.selected = true;
    sel.appendChild(opt);
  }
  if (d.items && d.items.length) render(d);
}

async function load() {
  var date = document.getElementById('date-select').value;
  document.getElementById('table-wrap').innerHTML = '<div class="loading">加载中...</div>';
  var resp = await fetch('/api/discipline/screening-backtest-index?date=' + date);
  var d = await resp.json();
  render(d);
}

var _items = [];

function showBreakdown(idx) {
  var it = _items[idx];
  if (!it) return;
  var rps250 = it.rps_250 || 0;
  var rps20 = it.rps_20 || 0;
  var sigScore = it.signal_score || 0;
  var score = it.index_score || 0;
  var rpsComp = Math.min(rps250, 100) / 100 * 50;
  var sigComp = Math.min(sigScore, 100) / 100 * 50;
  var sigSummary = (it.signal_summary || '').split('/').map(function(s) {
    var MAP = {'base_breakout':'基部突破','pocket_pivot':'口袋支点','cdl':'K线形态','talib':'TA指标'};
    return MAP[s.trim()] || s.trim();
  }).join(' / ');

  var h = '<h3>📊 ' + (it.index_name || it.index_code) + ' 得分拆解</h3>';
  h += '<p style="font-size:.6rem;color:var(--muted);margin:0 0 12px;">总分 = RPS250 × 0.50 + 信号分 × 0.50</p>';

  var mkt = it.market_phase || '—';
  h += '<table><tr><td class="label">L1 大盘闸门</td><td class="val ' + (mkt.includes('上升')||mkt.includes('确认')?'ok':'warn') + '">' + mkt + '</td></tr>';

  var rsOk = rps250 >= 75 && rps20 >= 80;
  h += '<tr><td class="label">L2 RS 强度</td><td class="val">';
  h += 'RPS<sub>250</sub>=' + rps250.toFixed(0) + ' (≥75 ' + (rps250>=75?'✓':'✗') + ') ';
  h += 'RPS<sub>20</sub>=' + rps20.toFixed(0) + ' (≥80 ' + (rps20>=80?'✓':'✗') + ')';
  h += '</td></tr>';

  h += '<tr><td class="label">L3 趋势健康</td><td class="val ok">MA多头 + 量能放大 ✓</td></tr>';

  h += '<tr><td class="label">L4 技术信号</td><td class="val">';
  h += '信号数=' + (it.signal_count||0) + ' · ' + sigSummary;
  h += '<br>最佳主信号分=' + (sigScore > 0 ? (it.buy_source||'—') : '—');
  h += ' · 额外基部+0 · 额外形态+0';
  h += '</td></tr>';

  h += '<tr style="border-top:2px solid var(--divider);"><td class="label">RPS 组件</td><td class="val">' + rps250.toFixed(0) + ' / 100 × 50 = <b>' + rpsComp.toFixed(1) + '</b></td></tr>';
  h += '<tr><td class="label">信号组件</td><td class="val">' + sigScore.toFixed(0) + ' / 100 × 50 = <b>' + sigComp.toFixed(1) + '</b></td></tr>';
  h += '<tr style="font-size:.8rem;"><td class="label"><b>最终得分</b></td><td class="val" style="font-size:.9rem;"><b>' + score.toFixed(0) + '</b></td></tr>';
  h += '</table>';

  document.getElementById('bd-content').innerHTML = h;
  document.getElementById('bd-modal').classList.add('show');
}

function fmtPct(v) {
  if (v == null) return '—';
  var cls = v >= 0 ? 'green' : 'red';
  var sign = v >= 0 ? '+' : '';
  return '<span class="' + cls + '">' + sign + v + '%</span>';
}

function render(d) {
  var s = d.stats || {};
  var st = '<div class="stat-card"><div class="val">' + (s.count || 0) + '</div><div class="lbl">精选数</div></div>';
  var tags = ['return_5d', 'return_10d', 'return_20d'];
  for (var ti = 0; ti < tags.length; ti++) {
    var tag = tags[ti];
    var label = tag.replace('return_', '') + '日';
    var r = s[tag] || {};
    var cls = (r.avg_return || 0) >= 0 ? 'green' : 'red';
    st += '<div class="stat-card"><div class="val ' + cls + '">' + (r.avg_return != null ? r.avg_return + '%' : '—') + '</div><div class="lbl">' + label + ' · 均收益</div>';
    st += '<div style="font-size:0.55rem;color:var(--muted)">胜率 ' + (r.win_rate != null ? r.win_rate + '%' : '—') + ' · 有效 ' + (r.valid || 0);
    if (r.best) st += '<br>最佳 ' + r.best.index_code;
    if (r.worst) st += '<br>最差 ' + r.worst.index_code;
    st += '</div></div>';
  }
  document.getElementById('stats-row').innerHTML = st;
  var items = d.items || [];
  _items = items;
  if (!items.length) { document.getElementById('table-wrap').innerHTML = '<div class="loading">该日期无精选数据</div>'; return; }
  var h = '<table class="bt-table"><thead><tr>';
  h += '<th>排名</th><th>指数代码</th><th>名称</th><th>得分</th><th>池</th><th>买点</th><th>信号日</th><th>当日价</th><th>5日收益</th><th>10日收益</th><th>20日收益</th><th>K线天数</th>';
  h += '</tr></thead><tbody>';
  for (var idx = 0; idx < items.length; idx++) {
    var it = items[idx];
    h += '<tr>';
    h += '<td>' + (it.rank || '—') + '</td>';
    h += '<td><a href="javascript:void(0)" onclick="showBreakdown(' + idx + ')" style="cursor:pointer;text-decoration:underline">' + (it.index_code || '') + '</a></td>';
    h += '<td>' + (it.index_name || '') + '</td>';
    h += '<td><b>' + (it.index_score != null ? it.index_score.toFixed(0) : '—') + '</b></td>';
    h += '<td style="font-size:0.6rem">' + (it.pool_name || '') + '</td>';
    h += '<td>' + (it.ideal_buy ? '¥' + it.ideal_buy.toFixed(2) : '—') + '</td>';
    h += '<td style="font-size:0.6rem">' + (it.buy_signal_date || '—') + '</td>';
    h += '<td>' + (it.close_0d ? '¥' + it.close_0d.toFixed(2) : '—') + '</td>';
    h += '<td>' + fmtPct(it.return_5d) + '</td>';
    h += '<td>' + fmtPct(it.return_10d) + '</td>';
    h += '<td>' + fmtPct(it.return_20d) + '</td>';
    h += '<td style="font-size:0.6rem;color:var(--muted)">' + (it.holding_days || 0) + 'd</td>';
    h += '</tr>';
  }
  h += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = h;
}

init();

function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

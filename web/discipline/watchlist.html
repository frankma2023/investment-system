<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自选池 · 知行</title>
  <link rel="stylesheet" href="../shared/css/theme.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/xhs-cards.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <script src="../shared/js/theme.js"></script>
  <style>
    body { max-width: 1100px; margin: 0 auto; }
    .panel-header { padding: 16px 0 8px; display: flex; justify-content: space-between; align-items: center; }
    .panel-header h1 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 900; margin: 0; }
    .wl-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
    .wl-table th { text-align: center; padding: 8px 6px; border-bottom: 2px solid var(--divider); font-size: 0.6rem; font-weight: 700; color: var(--text-secondary); }
    .wl-table td { padding: 8px 6px; border-bottom: 1px solid var(--divider); text-align: center; }
    .wl-table tr:hover { background: var(--card-bg); }
    .wl-table a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 6px; font-size: 0.55rem; font-weight: 600; }
    .tag-auto { background: #E8F5E9; color: #2E7D32; }
    .tag-manual { background: #FFF3E0; color: #E65100; }
    .tag-pending { background: #FFEBEE; color: #C62828; }
    .loading { text-align: center; padding: 40px; color: var(--text-tertiary); }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
    .modal { background: var(--card-bg); border-radius: 16px; padding: 24px; max-width: 450px; width: 90%; }
    .modal h3 { font-family: var(--font-display); font-size: 0.9rem; margin: 0 0 12px; }
    .modal label { display: block; font-size: 0.65rem; color: var(--text-secondary); margin: 8px 0 2px; }
    .modal input, .modal textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--divider); border-radius: 8px; font-size: 0.7rem; background: var(--bg); color: var(--text-primary); box-sizing: border-box; }
    .modal textarea { min-height: 60px; resize: vertical; }
    .modal-row { display: flex; gap: 8px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="top-nav" id="top-nav"></nav>

    <div class="panel-header">
      <h1>⭐ 自选池</h1>
      <button class="btn-run" onclick="showManualForm()">+ 手动添加</button>
    </div>

    <div id="table-wrap"><div class="loading">加载中...</div></div>
  </div>

  <!-- 手动添加弹窗 -->
  <div class="modal-overlay" id="manual-modal">
    <div class="modal">
      <h3>⚡ 手动添加自选</h3>
      <p style="font-size:0.6rem;color:var(--text-tertiary);margin:0 0 8px;">该股未通过观察池自动筛选，将触发异步评估。评估完成前不可买入。</p>
      <label>代码</label><input type="text" id="man-code" placeholder="股票如 600519 / 指数如 000300">
      <label>添加理由</label><textarea id="man-reason" placeholder="为什么手动添加这只股票？"></textarea>
      <div class="modal-row">
        <button class="btn-run" onclick="submitManual()">确认添加</button>
        <button onclick="document.getElementById('manual-modal').style.display='none'" style="background:var(--divider);border:none;padding:6px 16px;border-radius:8px;cursor:pointer;">取消</button>
      </div>
    </div>
  </div>

  <script src="../shared/js/nav.js"></script>
  <script>
    Nav.init({ brandIcon: '🦊', brandText: '知行', currentPage: 'discipline' });

    async function load() {
      try {
        const resp = await fetch('/api/discipline/watchlist');
        const data = await resp.json();
        render(data.items || []);
      } catch (e) {
        document.getElementById('table-wrap').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    function render(items) {
      if (!items.length) {
        document.getElementById('table-wrap').innerHTML = '<div class="loading" style="padding:60px;">自选池为空<br><span style="font-size:0.6rem;">从观察池中确认加入，或手动添加</span></div>';
        return;
      }

      let html = '<table class="wl-table"><thead><tr>';
      html += '<th>代码</th><th>名称</th><th>来源</th><th>评估状态</th><th>添加时间</th><th>备注</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      for (const item of items) {
        let sourceTag = '';
        if (item.source === 'manual') {
          sourceTag = '<span class="tag tag-manual">手动</span>';
        } else {
          sourceTag = '<span class="tag tag-auto">观察池</span>';
        }

        let statusTag = '';
        if (item.review_status === 'pending_review') {
          statusTag = '<span class="tag tag-pending">评估中</span>';
        } else {
          statusTag = '<span class="tag tag-auto">已评估</span>';
        }

        html += '<tr>';
        html += `<td><a href="review.html?code=${item.stock_code}">${item.stock_code}</a></td>`;
        html += `<td>${item.stock_name || ''}</td>`;
        html += `<td>${sourceTag}</td>`;
        html += `<td>${statusTag}</td>`;
        html += `<td>${(item.added_at || '').slice(0, 10)}</td>`;
        html += `<td>${item.manual_reason || (item.source === 'manual' ? '手动添加' : '')}</td>`;
        html += `<td style="display:flex;gap:4px;">`;
        html += `<a href="trades.html" style="font-size:0.6rem;padding:2px 6px;background:var(--accent);color:#fff;border-radius:6px;text-decoration:none;">买入</a>`;
        html += `<button class="btn-run" onclick="removeFromWatchlist('${item.stock_code}')" style="font-size:0.55rem;padding:2px 6px;">移除</button>`;
        html += `</td>`;
        html += '</tr>';
      }
      html += '</tbody></table>';
      document.getElementById('table-wrap').innerHTML = html;
    }

    function showManualForm() {
      document.getElementById('manual-modal').style.display = 'flex';
    }

    async function submitManual() {
      const body = {
        stock_code: document.getElementById('man-code').value.trim(),
        manual_reason: document.getElementById('man-reason').value.trim(),
      };
      const resp = await fetch('/api/discipline/watchlist/manual', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      if (data.added) {
        document.getElementById('manual-modal').style.display = 'none';
        document.getElementById('man-code').value = '';
        document.getElementById('man-reason').value = '';
        load();
      } else {
        alert(data.error || '添加失败');
      }
    }

    async function removeFromWatchlist(code) {
      if (!confirm(`确认将 ${code} 移出自选池？`)) return;
      const resp = await fetch('/api/discipline/watchlist/' + code, { method: 'DELETE' });
      const data = await resp.json();
      if (data.removed) { load(); } else { alert(data.error || '移除失败'); }
    }

    load();
  </script>
</body>
</html>

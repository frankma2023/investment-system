<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">

<title>个股RS回测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .bottom-layout{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:380px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}
  .param-card-bd{padding:8px 0 0}.param-card-bd.collapsed{display:none}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .table-wrapper td{border-bottom-color:rgba(0,0,0,.03)}
</style>
</head>

<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">
TYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个股RS强度回测 · 投资手账本</title>
<link rel="stylesheet" href="../shared/themes/xhs-backtest.css">
</head>
<body class="xhs-body">

<nav id="top-nav"></nav>

<div class="app-container" style="padding:20px 24px">

  <div class="bt-layout">

    <!-- ═══ LEFT ═══ -->
    <div class="bt-left">

      <!-- 日期 -->
      <div class="xhs-card">
        <div class="xhs-card-header"><span class="xhs-card-label">📅 回测设置</span></div>
        <div class="date-row">
          <div><label class="xhs-label">日期</label><input type="date" class="xhs-input" id="target-date"></div>
        </div>
      </div>

      <!-- 卡片1: 稳健龙头 -->
      <div class="xhs-param" id="card1">
        <div class="xhs-param-header" onclick="toggleCard('card1')">
          <span class="xhs-param-dot" style="background:var(--color-up)"></span>
          <span class="xhs-param-title">🔴 稳健龙头</span>
        </div>
        <div class="xhs-param-body" id="card1-body">
          <div class="xhs-slider-row">
            <span class="xhs-slider-label">RPS_250 ≥</span>
            <input type="range" class="xhs-slider-input" id="robust-250" min="0" max="99" step="1" value="90" oninput="syncS('robust-250')">
            <span class="xhs-slider-val" id="robust-250-v">90</span>
          </div>
          <div class="xhs-slider-row">
            <span class="xhs-slider-label">RPS_20 ≥</span>
            <input type="range" class="xhs-slider-input" id="robust-20" min="0" max="99" step="1" value="85" oninput="syncS('robust-20')">
            <span class="xhs-slider-val" id="robust-20-v">85</span>
          </div>
        </div>
      </div>

      <!-- 卡片2: 加速爆发 -->
      <div class="xhs-param" id="card2">
        <div class="xhs-param-header" onclick="toggleCard('card2')">
          <span class="xhs-param-dot" style="background:var(--color-neutral)"></span>
          <span class="xhs-param-title">🟡 加速爆发</span>
        </div>
        <div class="xhs-param-body" id="card2-body">
          <div class="xhs-slider-row">
            <span class="xhs-slider-label">RPS_250 ≥</span>
            <input type="range" class="xhs-slider-input" id="burst-250" min="0" max="99" step="1" value="80" oninput="syncS('burst-250')">
            <span class="xhs-slider-val" id="burst-250-v">80</span>
          </div>
          <div class="xhs-slider-row">
            <span class="xhs-slider-label">RPS_20 ≥</span>
            <input type="range" class="xhs-slider-input" id="burst-20" min="0" max="99" step="1" value="95" oninput="syncS('burst-20')">
            <span class="xhs-slider-val" id="burst-20-v">95</span>
          </div>
        </div>
      </div>

      <!-- 卡片3: 过滤 -->
      <div class="xhs-param" id="card3">
        <div class="xhs-param-header" onclick="toggleCard('card3')">
          <span class="xhs-param-dot" style="background:var(--color-down)"></span>
          <span class="xhs-param-title">🟢 过滤条件</span>
        </div>
        <div class="xhs-param-body" id="card3-body">
          <div class="switch-row">
            <span>剔除 ST / 退市</span>
            <button class="switch on" id="switch-st" onclick="toggleSwitch('switch-st')"></button>
          </div>
          <div class="xhs-slider-row">
            <span class="xhs-slider-label">流动性阈值</span>
            <input type="range" class="xhs-slider-input" id="filter-amount" min="0" max="20000" step="500" value="5000" oninput="syncSAmount('filter-amount')">
            <span class="xhs-slider-val" id="filter-amount-v">5000万</span>
          </div>
        </div>
      </div>

      <!-- 卡片4: 展示 -->
      <div class="xhs-param" id="card4">
        <div class="xhs-param-header" onclick="toggleCard('card4')">
          <span class="xhs-param-dot" style="background:var(--text-tertiary)"></span>
          <span class="xhs-param-title">⚫ 展示配置</span>
        </div>
        <div class="xhs-param-body" id="card4-body">
          <div class="xhs-slider-row">
            <span class="xhs-slider-label">显示 TOP</span>
            <input type="range" class="xhs-slider-input" id="display-top" min="10" max="500" step="10" value="100" oninput="syncSI('display-top')">
            <span class="xhs-slider-val" id="display-top-v">100</span>
          </div>
        </div>
      </div>

      <button class="xhs-btn-run" id="btn-run" onclick="runBacktest()">🔍 运行回测</button>
      <button class="xhs-btn-save" id="btn-save" onclick="saveConfig()">💾 保存配置</button>
      <div class="xhs-error" id="error-msg"></div>
    </div>

    <!-- ═══ RIGHT ═══ -->
    <div class="bt-right">
      <div class="stat-cards">
        <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label">有效股票</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-rps250">—</div><div class="stat-label">RPS_250有效</div></div>
        <div class="stat-card"><div class="stat-value stat-red" id="stat-robust">—</div><div class="stat-label">稳健龙头</div></div>
        <div class="stat-card"><div class="stat-value stat-gold" id="stat-burst">—</div><div class="stat-label">加速爆发</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-ds">—</div><div class="stat-label">双强总计</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-median">—</div><div class="stat-label">RPS_250中位</div></div>
      </div>

      <div class="xhs-card">
        <div class="xhs-card-header">
          <span class="xhs-card-label">📊 RPS 排名</span>
          <div class="filter-btns">
            <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
            <button class="filter-btn" onclick="setFilter('robust',this)">稳健龙头</button>
            <button class="filter-btn" onclick="setFilter('burst',this)">加速爆发</button>
            <button class="filter-btn" onclick="setFilter('ds',this)">双强股</button>
            <input type="text" class="xhs-input" id="search-input" placeholder="搜索代码/名称..." style="width:160px;padding:5px 10px;font-size:0.65rem;margin-left:8px" oninput="applyFilter()">
          </div>
        </div>
        <div class="xhs-table-wrap" id="results-table"></div>
      </div>
    </div>
  </div>
</div>

<script>
var API='http://'+window.location.hostname+':8788';
var lastResults=[], currentFilter='all';

// ══════ THEME ══════
function toggleTheme(){
  var h=document.documentElement, n=h.dataset.theme==='dark'?'light':'dark';
  h.dataset.theme=n;
  var btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=n==='dark'?'☀':'🌙';
  localStorage.setItem('stockrs-theme',n);
}
(function(){
  var s=localStorage.getItem('stockrs-theme')||'light';
  document.documentElement.dataset.theme=s;
  var btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=s==='dark'?'☀':'🌙';
})();

// ══════ UI ══════
function toggleCard(id){document.getElementById(id+'-body').classList.toggle('hidden')}
function syncS(id){document.getElementById(id+'-v').textContent=document.getElementById(id).value}
function syncSI(id){document.getElementById(id+'-v').textContent=document.getElementById(id).value}
function syncSAmount(id){
  var v=parseInt(document.getElementById(id).value);
  document.getElementById(id+'-v').textContent=v===0?'不过滤':(v/10000).toFixed(1)+'亿';
}
function toggleSwitch(id){
  var b=document.getElementById(id);
  b.classList.toggle('on');b.classList.toggle('off');
}

// ══════ INIT ══════
(async function(){
  await loadConfig();
  var d=new Date();d.setDate(d.getDate()-1);
  document.getElementById('target-date').value=d.toISOString().slice(0,10);
})();

// ══════ RUN ══════
var currentPage=1,totalPages=1;
async function runBacktest(){
  var btn=document.getElementById('btn-run'), err=document.getElementById('error-msg');
  btn.disabled=true;btn.textContent='⏳ 计算中...';err.classList.remove('active');

  var date=document.getElementById('target-date').value;
  try{
    // 加载第一页（含总数+总页数）
    var resp=await fetch(API+'/api/stock-rs?date='+date+'&page=1&page_size=200');
    if(!resp.ok)throw new Error('API ' + resp.status);
    var data=await resp.json();
    currentPage=1;totalPages=data.stats.total_pages||1;
    lastResults=data.results||[];

    // 缓存总分页信息
    var dsCount=data.stats.double_strong_count||0;
    var total=data.stats.total||0;
    var valid250=data.stats.valid_rps250||0;

    // 加载剩余页（缓存命中，秒出）
    for(var p=2;p<=totalPages;p++){
      var pr=await fetch(API+'/api/stock-rs?date='+date+'&page='+p+'&page_size=200');
      var pd=await pr.json();
      lastResults=lastResults.concat(pd.results||[]);
    }

    // 客户端双强筛选（允许用户调阈值后即时过滤）
    var r250=parseInt(document.getElementById('robust-250').value);
    var r20=parseInt(document.getElementById('robust-20').value);
    var b250=parseInt(document.getElementById('burst-250').value);
    var b20=parseInt(document.getElementById('burst-20').value);

    lastResults.forEach(function(r){
      r._robust = (r.rps_250||0)>=r250 && (r.rps_20||0)>=r20;
      r._burst = (r.rps_250||0)>=b250 && (r.rps_20||0)>=b20;
      r._ds = r._robust || r._burst;
      r._ds_type = r._robust ? (r._burst ? '稳健+爆发' : '稳健龙头') : (r._burst ? '加速爆发' : '');
    });

    updateStats(data.stats||{}, lastResults);
    applyFilter();
  }catch(e){
    err.textContent='回测失败: '+e.message;err.classList.add('active');
  }finally{
    btn.disabled=false;btn.textContent='🔍 运行回测';
  }
}

function updateStats(stats, results){
  document.getElementById('stat-total').textContent=stats.total||results.length;
  document.getElementById('stat-rps250').textContent=stats.valid_rps250||'-';
  var robust=results.filter(function(r){return r._robust});
  var burst=results.filter(function(r){return r._burst});
  var ds=results.filter(function(r){return r._ds});
  document.getElementById('stat-robust').textContent=robust.length;
  document.getElementById('stat-burst').textContent=burst.length;
  document.getElementById('stat-ds').textContent=ds.length;
  // 中位数
  var rps250s=results.filter(function(r){return r.rps_250!=null}).map(function(r){return r.rps_250}).sort(function(a,b){return a-b});
  var mid=rps250s.length?rps250s[Math.floor(rps250s.length/2)]:'-';
  document.getElementById('stat-median').textContent=mid;
}

function setFilter(type, btn){
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  applyFilter();
}

var currentPage=1,pageSize=100;

function applyFilter(){
  var data=lastResults;

  if(currentFilter==='robust') data=data.filter(function(r){return r._robust});
  else if(currentFilter==='burst') data=data.filter(function(r){return r._burst});
  else if(currentFilter==='ds') data=data.filter(function(r){return r._ds});

  var q=(document.getElementById('search-input').value||'').toUpperCase();
  if(q) data=data.filter(function(r){return (r.stock_code||'').indexOf(q)>=0 || (r.name||'').toUpperCase().indexOf(q)>=0});

  pageSize=parseInt(document.getElementById('display-top').value);
  var totalFiltered=data.length;
  var totalP=Math.ceil(totalFiltered/pageSize)||1;
  if(currentPage>totalP)currentPage=totalP;
  var start=(currentPage-1)*pageSize;
  data=data.slice(start, start+pageSize);

  renderTable(data,currentPage,totalP,start+1,Math.min(start+pageSize,totalFiltered),totalFiltered);
}

function renderTable(data,curPg,totalPg,itemStart,itemEnd,totalItems){
  curPg=curPg||1;totalPg=totalPg||1;
  if(!data.length){
    document.getElementById('results-table').innerHTML='<div style="padding:32px;text-align:center;color:var(--text-tertiary)">暂无匹配结果</div>';
    return;
  }
  var cols=[
    {k:'stock_code',l:'代码',t:'string'},
    {k:'name',l:'名称',t:'string'},
    {k:'close',l:'现价',t:'number'},
    {k:'rps_250',l:'RPS_250',t:'number'},
    {k:'rps_120',l:'RPS_120',t:'number'},
    {k:'rps_60',l:'RPS_60',t:'number'},
    {k:'rps_20',l:'RPS_20',t:'number'},
    {k:'_ds_type',l:'双强类型',t:'string'},
    {k:'rs_line',l:'RS线',t:'number'}
  ];

  if(sortCol){
    data.sort(function(a,b){
      var va=a[sortCol],vb=b[sortCol];
      if(va==null)va=sortDir==='asc'?Infinity:-Infinity;
      if(vb==null)vb=sortDir==='asc'?Infinity:-Infinity;
      if(typeof va==='string')return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
    });
  }

  var h='<table class="xhs-table result-table"><thead><tr>';
  cols.forEach(function(c){
    var cls=sortCol===c.k?' style="color:var(--color-accent);font-weight:700"':' style="color:var(--text-tertiary)"';
    var arrow=sortCol===c.k?(sortDir==='asc'?' ▲':' ▼'):'';
    h+='<th style="padding:3px 4px;font-size:0.55rem"'+cls+' onclick="sortBy(\''+c.k+'\')">'+c.l+arrow+'</th>';
  });
  h+='</tr></thead><tbody>';
  data.forEach(function(r){
    var dsCls=r._ds_type?'tr-ds':'';
    var rps250=r.rps_250!=null?r.rps_250:'—';
    var rps250Cls=rps250>=90?'rps-high':'';
    h+='<tr class="'+dsCls+'">';
    h+='<td style="color:var(--color-accent);font-weight:600;cursor:pointer;padding-right:6px">'+r.stock_code+'</td>';
    h+='<td style="padding-right:6px">'+r.name+'</td>';
    h+='<td style="padding-right:6px">'+(r.close?r.close.toFixed(2):'—')+'</td>';
    h+='<td class="'+rps250Cls+'" style="font-weight:700;padding-right:6px">'+rps250+'</td>';
    h+='<td>'+(r.rps_120!=null?r.rps_120:'—')+'</td>';
    h+='<td>'+(r.rps_60!=null?r.rps_60:'—')+'</td>';
    h+='<td>'+(r.rps_20!=null?r.rps_20:'—')+'</td>';
    h+='<td>'+(r._ds_type?'<span class="'+(r._ds_type.indexOf('稳健')>=0?'badge-robust':'badge-burst')+'">'+r._ds_type+'</span>':'')+'</td>';
    h+='<td>'+(r.rs_line!=null?r.rs_line.toFixed(1):'—')+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  // 分页导航（表格上方）
  var pg='<div style="display:flex;gap:4px;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap">';
  pg+='<div style="display:flex;gap:4px;align-items:center">';
  pg+='<button onclick="goPage(1)" style="padding:4px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.6rem;font-family:var(--font-display)">⏮</button>';
  pg+='<button onclick="goPage('+Math.max(1,curPg-1)+')" style="padding:4px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.6rem;font-family:var(--font-display)">◀</button>';
  var ps=Math.max(1,curPg-2),pe=Math.min(totalPg,curPg+2);
  for(var i=ps;i<=pe;i++){
    pg+='<button onclick="goPage('+i+')" style="padding:4px 8px;border:1px solid '+(i===curPg?'var(--color-accent)':'var(--divider)')+';border-radius:8px;background:'+(i===curPg?'var(--color-accent)':'var(--card-bg)')+';color:'+(i===curPg?'#FFF':'var(--text-secondary)')+';cursor:pointer;font-size:0.6rem;font-family:var(--font-display);font-weight:700;min-width:26px">'+i+'</button>';
  }
  pg+='<button onclick="goPage('+Math.min(totalPg,curPg+1)+')" style="padding:4px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.6rem;font-family:var(--font-display)">▶</button>';
  pg+='<button onclick="goPage('+totalPg+')" style="padding:4px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.6rem;font-family:var(--font-display)">⏭</button>';
  pg+='</div><span style="font-size:0.6rem;color:var(--text-tertiary)">'+itemStart+'-'+itemEnd+' / '+totalItems+'</span></div>';
  document.getElementById('results-table').innerHTML=pg+h+pg;
}

function goPage(p){currentPage=p;applyFilter()}

var sortCol='rps_250',sortDir='desc';
function sortBy(col){
  if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortCol=col;sortDir='desc'}
  applyFilter();
}

// ══════ CONFIG LOAD / SAVE ══════
async function loadConfig(){
  try{
    var resp=await fetch(API+'/api/config?signal_type=stock_rs');
    var cfg=await resp.json();
    if(cfg.robust_rps_250!=null)document.getElementById('robust-250').value=cfg.robust_rps_250;
    if(cfg.robust_rps_20!=null)document.getElementById('robust-20').value=cfg.robust_rps_20;
    if(cfg.burst_rps_250!=null)document.getElementById('burst-250').value=cfg.burst_rps_250;
    if(cfg.burst_rps_20!=null)document.getElementById('burst-20').value=cfg.burst_rps_20;
    if(cfg.exclude_st!=null){
      var sw=document.getElementById('switch-st');
      if(cfg.exclude_st){sw.classList.add('on');sw.classList.remove('off')}
      else{sw.classList.add('off');sw.classList.remove('on')}
    }
    if(cfg.min_amount_20d!=null)document.getElementById('filter-amount').value=cfg.min_amount_20d;
    if(cfg.top_n!=null)document.getElementById('display-top').value=cfg.top_n;
    syncS('robust-250');syncS('robust-20');syncS('burst-250');syncS('burst-20');
    syncSAmount('filter-amount');syncSI('display-top');
  }catch(e){console.error('Load config:',e)}
}

// ══════ SAVE ══════
async function saveConfig(){
  var yaml='robust_rps_250: '+document.getElementById('robust-250').value+'\n';
  yaml+='robust_rps_20: '+document.getElementById('robust-20').value+'\n';
  yaml+='burst_rps_250: '+document.getElementById('burst-250').value+'\n';
  yaml+='burst_rps_20: '+document.getElementById('burst-20').value+'\n';
  yaml+='exclude_st: '+(document.getElementById('switch-st').classList.contains('on')?'true':'false')+'\n';
  yaml+='min_amount_20d: '+document.getElementById('filter-amount').value+'\n';
  yaml+='top_n: '+document.getElementById('display-top').value+'\n';
  try{
    await fetch(API+'/api/config?signal_type=stock_rs',{method:'POST',body:yaml});
    var btn=document.getElementById('btn-save');
    btn.textContent='✓ 已保存';setTimeout(function(){btn.textContent='💾 保存配置'},2000);
  }catch(e){console.error(e)}
}

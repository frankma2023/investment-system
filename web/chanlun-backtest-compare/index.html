<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>缠论 vs 欧奈尔回测对比</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary)}
.page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.page-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--text-primary)}
.page-header .meta{font-size:0.65rem;color:var(--muted)}
html[data-theme="light"] .page-header h1{color:#374151}

.cmp-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.cmp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;box-shadow:var(--shadow-card)}
.cmp-card h3{font-family:var(--font-display);font-size:0.85rem;font-weight:600;margin:0 0 10px;color:var(--accent)}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px}
.cmp-table th{text-align:center;padding:7px 6px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.cmp-table td{text-align:center;padding:7px 6px;border-bottom:1px solid rgba(255,255,255,.03);font-variant-numeric:tabular-nums}
.cmp-table .hl{font-weight:700;color:var(--accent)}
.cmp-table .up{color:#4CAF50;font-weight:700}
.cmp-table .dn{color:#E53935;font-weight:700}
.cmp-table .win{font-size:10px;color:var(--muted)}

.bias-note{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 14px;font-size:11px;color:var(--accent);margin-top:8px;line-height:1.5}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}

html[data-theme="light"] .cmp-card{background:rgba(255,255,255,.75)}
html[data-theme="light"] .cmp-table td{border-bottom:1px solid rgba(0,0,0,.03)}
</style>
</head>
<body>
<div class="app-container">
<nav id="top-nav"></nav>
<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandIcon:'🎋',brandText:'缠论vs欧奈尔',currentPage:'chanlun-backtest-compare'})</script>

<div class="page-header">
  <h1>🎋 缠论 vs 欧奈尔 回测对比</h1>
  <div class="meta" id="meta-info">加载中...</div>
</div>

<div class="cmp-grid" id="main-grid"></div>

<div class="bias-note">
  ⚠️ CZSC 笔划分受完整历史数据（含未来K线）影响，回测信号质量高于实盘预期。本对比仅用于两套体系的相对差异分析，不构成实盘预测。
</div>
</div>

<script>
fetch('data.json').then(function(r){return r.json()}).then(function(d){
  document.getElementById('meta-info').textContent = '观察池 671 只 | 回测 3 个月';
  var h = '';

  // A: 缠论 vs 随机
  h += '<div class="cmp-card"><h3>A. 缠论买入 vs 随机买入</h3>';
  h += '<table class="cmp-table"><thead><tr><th>持有期</th><th>缠论 均收益</th><th>缠论 胜率</th><th>随机 均收益</th><th>随机 胜率</th><th>优势</th></tr></thead><tbody>';
  ['5d','10d','20d'].forEach(function(k){
    var a = d['A_'+k]; if(!a) return;
    var adv = (a.chanlun_avg - a.random_avg).toFixed(1);
    var advCls = adv > 0 ? 'up' : 'dn';
    h += '<tr><td><b>'+k+'</b></td>';
    h += '<td class="hl">'+fmt(a.chanlun_avg)+'</td><td class="win">'+a.chanlun_win+'% ('+a.chanlun_n+')</td>';
    h += '<td>'+fmt(a.random_avg)+'</td><td class="win">'+a.random_win+'% ('+a.random_n+')</td>';
    h += '<td class="'+advCls+'">'+(adv>0?'+':'')+adv+'%</td></tr>';
  });
  h += '</tbody></table></div>';

  // B + C 两列
  h += '<div class="two-col">';

  // B: 置信度
  h += '<div class="cmp-card"><h3>B. 置信度对比</h3>';
  h += '<table class="cmp-table"><thead><tr><th>持有期</th><th>高</th><th>中</th><th>低</th></tr></thead><tbody>';
  ['5d','10d','20d'].forEach(function(k){
    h += '<tr><td><b>'+k+'</b></td>';
    ['高','中','低'].forEach(function(c){
      var b = d['B_'+k+'_'+c]; if(!b) return;
      h += '<td>'+(b.win>95?'<span class="hl">':'')+fmt(b.avg)+' <span class="win">'+b.win+'%</span>'+(b.win>95?'</span>':'')+'</td>';
    });
    h += '</tr>';
  });
  h += '<tr><td>样本</td>';
  ['高','中','低'].forEach(function(c){ var b=d['B_5d_'+c]; h+='<td class="win">'+(b?b.n:0)+'</td>'; });
  h += '</tr></tbody></table></div>';

  // C: 信号类型
  h += '<div class="cmp-card"><h3>C. 一买 vs 三买</h3>';
  h += '<table class="cmp-table"><thead><tr><th>持有期</th><th>一买</th><th>三买</th></tr></thead><tbody>';
  ['5d','10d','20d'].forEach(function(k){
    h += '<tr><td><b>'+k+'</b></td>';
    ['一买','三买'].forEach(function(t){
      var c = d['C_'+k+'_'+t]; if(!c) return;
      h += '<td>'+fmt(c.avg)+' <span class="win">'+c.win+'%</span></td>';
    });
    h += '</tr>';
  });
  h += '<tr><td>样本</td>';
  ['一买','三买'].forEach(function(t){ var c=d['C_5d_'+t]; h+='<td class="win">'+(c?c.n:0)+'</td>'; });
  h += '</tr></tbody></table></div>';

  h += '</div>'; // two-col
  document.getElementById('main-grid').innerHTML = h;
});

function fmt(v){ return (v>=0?'+':'')+v.toFixed(1)+'%'; }

function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大盘健康度 · 投资手账本</title>
  <link rel="stylesheet" href="../shared/css/theme.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/xhs-cards.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <script src="../shared/js/theme.js"></script>
  <style>
    .health-layout { max-width:1100px; margin:0 auto; }
    .score-hero { display:flex; gap:20px; align-items:center; padding:24px 28px; background:var(--card-bg); border-radius:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:16px; }
    .score-ring { width:100px; height:100px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .score-ring .num { font-family:var(--font-display); font-size:2.2rem; font-weight:900; }
    .score-ring .max { font-size:0.7rem; color:var(--text-tertiary); }
    .score-info { flex:1; }
    .score-info .label { font-size:0.65rem; color:var(--text-tertiary); letter-spacing:0.06em; margin-bottom:4px; }
    .score-info .rating { font-family:var(--font-display); font-size:1.6rem; font-weight:900; }
    .score-info .advice { font-size:0.75rem; color:var(--text-secondary); margin-top:4px; }
    .score-date { font-size:0.6rem; color:var(--text-tertiary); }
    .indicator-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:12px; margin-bottom:16px; }
    .ind-card { background:var(--card-bg); border-radius:16px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,0.05); display:flex; flex-direction:column; }
    .ind-card .ind-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
    .ind-card .ind-name { font-family:var(--font-display); font-size:0.78rem; font-weight:800; }
    .ind-card .ind-type { font-size:0.55rem; color:var(--text-tertiary); background:var(--bg); padding:2px 8px; border-radius:10px; }
    .ind-card .ind-value { font-family:var(--font-display); font-size:1.4rem; font-weight:900; }
    .ind-card .ind-unit { font-size:0.6rem; color:var(--text-tertiary); font-weight:400; }
    .ind-card .ind-bar-wrap { height:6px; background:var(--bg); border-radius:3px; margin-top:8px; overflow:hidden; }
    .ind-card .ind-bar { height:100%; border-radius:3px; transition:width 0.3s; }
    .ind-card .ind-score { font-size:0.6rem; color:var(--text-tertiary); margin-top:4px; text-align:right; }
    .ind-card .ind-desc { font-size:0.62rem; color:var(--text-tertiary); margin-top:8px; line-height:1.5; border-top:1px solid var(--divider); padding-top:8px; }
    .rotation-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .rot-card { background:var(--card-bg); border-radius:16px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
    .rot-card h3 { font-family:var(--font-display); font-size:0.78rem; font-weight:800; margin:0 0 8px; }
    .rot-card .rot-metric { font-family:var(--font-display); font-size:1.2rem; font-weight:900; }
    .rot-card .rot-desc { font-size:0.6rem; color:var(--text-tertiary); margin-top:2px; }
    .rot-card .top-list { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
    .rot-tag { font-size:0.58rem; padding:2px 8px; border-radius:8px; font-weight:600; }
    .rot-tag.this-week { background:var(--color-accent); color:#FFF; }
    .rot-tag.last-week { background:var(--bg); color:var(--text-tertiary); }
    .rot-tag.both { background:var(--color-accent-subtle); color:var(--color-accent); font-weight:700; }
    @media (max-width:700px) { .rotation-grid { grid-template-columns:1fr; } .indicator-grid { grid-template-columns:1fr 1fr; } }
    .nav-dropdown { position:relative; display:inline-flex; }
    .nav-dropdown-menu { display:none; position:absolute; top:100%; left:0; background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); min-width:150px; padding:6px 0; z-index:200; white-space:nowrap; }
    .nav-dropdown:hover .nav-dropdown-menu { display:block; }
    .nav-dropdown-menu a { display:block; padding:7px 16px; font-size:0.72rem; color:var(--text-secondary); text-decoration:none; transition:background 0.15s; font-family:var(--font-display); }
    .nav-dropdown-menu a:hover { background:var(--color-accent-subtle); color:var(--color-accent); }
    .nav-dropdown-menu a.active { color:var(--color-accent); font-weight:700; }
    .no-data { text-align:center; padding:48px; color:var(--text-tertiary); font-size:0.8rem; }
    .clickable { cursor:pointer; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px; transition:color 0.2s; }
    .clickable:hover { color:var(--color-accent); }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal-box { background:var(--card-bg); border-radius:20px; padding:24px; max-width:800px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
    .modal-box h2 { font-family:var(--font-display); font-size:1rem; font-weight:800; margin:0 0 4px; }
    .modal-box .modal-sub { font-size:0.65rem; color:var(--text-tertiary); margin-bottom:14px; }
    .modal-close { float:right; background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-tertiary); }
    .breakout-table { width:100%; border-collapse:collapse; font-size:0.72rem; }
    .breakout-table th { text-align:left; padding:6px 8px; border-bottom:1px solid var(--divider); font-size:0.65rem; color:var(--text-tertiary); font-weight:700; }
    .breakout-table td { padding:5px 8px; border-bottom:1px solid var(--divider); }
    .breakout-table .text-up { color:#E53935; font-weight:700; }
    .breakout-table .text-down { color:#26C6DA; font-weight:700; }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="top-nav">
      <div class="nav-brand"><span class="nav-fox">🦊</span><span>大盘健康度</span><span class="nav-greeting">Market Health Dashboard</span></div>
      <div class="nav-links">
        <a href="../" class="nav-item">🏠 看板</a>
        <div class="nav-dropdown">
          <a href="#" class="nav-item">回测 ▾</a>
          <div class="nav-dropdown-menu">
            <a href="../distribution-day/">📉 抛盘日</a>
            <a href="../follow-through-day/">📈 追盘日</a>
            <a href="../accumulation-day/">📦 吸筹日</a>
            <a href="../index-rs-backtest/">🏆 指数RS强度</a>
            <a href="../index-crowdedness/">📊 指数拥挤度</a>
            <a href="../stock-rs-backtest/">💪 个股RS强度</a>
            <a href="../index-ad-backtest/">🔍 机构吸筹/出货</a>
            <a href="../divergence-backtest/">⚠️ 指数背离</a>
          </div>
        </div>
        <a href="../index-scan/" class="nav-item">🔬 指数扫描</a>
        <a href="../index-valuation/" class="nav-item">📈 指数估值</a>
        <a href="../stock-valuation/" class="nav-item">💎 个股扫描</a>
        <a href="../market-health/" class="nav-item active">📊 大盘扫描</a>
        <a href="#" class="nav-item">💰 仓位管理</a>
        <button class="theme-toggle" aria-label="切换主题">🌙</button>
      </div>
    </nav>
    <div class="health-layout"><div id="content"></div></div>

    <div class="modal-overlay" id="breakout-modal" onclick="if(event.target===this)closeBreakoutModal()">
      <div class="modal-box">
        <button class="modal-close" onclick="closeBreakoutModal()">✕</button>
        <h2>🚀 放量突破个股</h2>
        <div class="modal-sub" id="breakout-meta"></div>
        <div id="breakout-table"></div>
      </div>
    </div>

    <footer class="page-footer">❤️ 投资手账本 · 大盘健康度看板</footer>
  </div>
  <script src="../shared/js/echarts.min.js"></script>
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/api-client.js"></script>
  <script>
    function ratingColor(score) {
      if (score >= 80) return '#2E7D32'; if (score >= 65) return '#558B2F';
      if (score >= 50) return '#F9A825'; if (score >= 35) return '#FF8F00';
      if (score >= 20) return '#E53935'; return '#B71C1C';
    }
    function ratingLabel(score) {
      if (score >= 80) return { r: 'A', label: '强势市场', advice: '可积极选股，仓位 70%' };
      if (score >= 65) return { r: 'B', label: '偏强市场', advice: '可适度选股，仓位 50%' };
      if (score >= 50) return { r: 'C', label: '中性市场', advice: '精选个股，仓位 35%' };
      if (score >= 35) return { r: 'D', label: '偏弱市场', advice: '减少操作，仓位 20%' };
      if (score >= 20) return { r: 'E', label: '弱势市场', advice: '暂停选股，现金为王' };
      return { r: 'F', label: '深度熊市', advice: '全面防守，停止买入' };
    }

    const DESCRIPTIONS = {
      ma50_above:   'MA50上方占比衡量市场宽度。高于70%说明大多数个股处于上升趋势，是健康牛市的标志；低于30%则意味着市场极度疲弱，但极端低值常预示反弹。',
      hl_ratio:     '新高新低比反映创新高和创新低个股的力量对比。比值>2表明多方主导、突破力量充沛；比值<0.5则意味多数个股在创新低，选股风险极大。',
      ad_ratio:     '涨跌家数比捕捉每日市场情绪。比值>2表示普涨格局、赚钱效应强；<0.6的普跌往往伴随恐慌。与指数背离时（指涨而比跌）是机构拉权重出货的典型信号。',
      vol_breakout: '放量突破数衡量机构大资金的活动频率。数值飙升意味着大量个股同时放量突破阻力位，是机构积极建仓的直接证据；持续低迷则表明市场缺乏领涨品种。',
      margin_5d:    '融资余额5日变化反映杠杆资金态度。持续增加说明资金看多后市并愿意承担融资成本；快速下降则是去杠杆信号，往往伴随市场调整。数据滞后1天但方向性可靠。',
      sector_rot:   '板块轮动稳定性看领涨行业是否持续抱团。重叠率高表示强势板块格局稳固、资金有明确方向；快速轮动则说明资金短线博弈、缺乏主线，市场稳定性差。',
      fear_greed:   '恐慌贪婪指数综合波动率、市场宽度和动量三个维度。极度恐慌(<20%)往往出现在暴跌尾声，是潜在反转前兆；极度贪婪(>80%)则提示过热风险。',
    };

    async function loadHealth() {
      const div = document.getElementById('content');
      try {
        const resp = await fetch(`${API_BASE}/api/market-health?date=latest`);
        if (!resp.ok) throw new Error('API unavailable');
        const data = await resp.json();
        if (data.status === 'no_data') {
          div.innerHTML = '<div class="no-data">📡 暂无健康度数据<br><span style="font-size:0.65rem">运行 python src/scanners/market_health.py 生成</span></div>';
          return;
        }
        render(data);
      } catch (e) {
        div.innerHTML = '<div class="no-data">📡 大盘健康度引擎暂未启动</div>';
      }
    }

    function render(d) {
      const score = d.total_score || 0;
      const rating = ratingLabel(score);
      const rc = ratingColor(score);
      let html = '';

      html += `<div class="score-hero">
        <div class="score-ring" style="background:${rc}15;border:3px solid ${rc}30">
          <div style="text-align:center"><div class="num" style="color:${rc}">${score}</div><div class="max">/ 100</div></div>
        </div>
        <div class="score-info">
          <div class="label">大盘健康度 · 综合评分</div>
          <div class="rating" style="color:${rc}">${rating.r} · ${rating.label}</div>
          <div class="advice">💡 ${rating.advice}</div>
        </div>
        <div class="score-date">${d.date || '—'}</div>
      </div>`;

      const indicators = d.indicators || [];
      const meta = {
        ma50_above:   { name: 'MA50上方占比', unit: '%', type: '宽度指标', max: 15, pct: true,  hi: 70, lo: 30, key: 'ma50_above' },
        hl_ratio:     { name: '新高新低比',   unit: '',   type: '宽度指标', max: 15, pct: false, hi: 2,  lo: 0.2, key: 'hl_ratio' },
        ad_ratio:     { name: '涨跌家数比',   unit: '',   type: '情绪指标', max: 15, pct: false, hi: 2,  lo: 0.3, key: 'ad_ratio' },
        vol_breakout: { name: '放量突破数',   unit: '只', type: '活跃度',   max: 15, pct: false, hi: 400, lo: 0, key: 'vol_breakout' },
        margin_5d:    { name: '融资余额5日变化', unit: '%', type: '资金面', max: 15, pct: true,  hi: 1.5, lo: -1, key: 'margin_5d' },
        sector_rot:   { name: '板块轮动稳定性', unit: '分', type: '结构指标', max: 15, pct: false, hi: 15, lo: 0, key: 'sector_rot' },
        fear_greed:   { name: '恐慌/贪婪指数', unit: '%', type: '极端情绪', max: 10, pct: true,  hi: 80, lo: 20, key: 'fear_greed' },
      };

      html += '<div class="indicator-grid">';
      indicators.forEach(ind => {
        const m = meta[ind.key] || { name: ind.key, unit: '', type: '', max: 15, pct: false, hi: 100, lo: 0, key: ind.key };
        const barW = m.pct ? Math.min(100, Math.max(0, (ind.value - m.lo) / (m.hi - m.lo) * 100)) :
                     Math.min(100, Math.max(0, ind.value / m.hi * 100));
        const barColor = ind.value >= m.hi * 0.7 ? '#4CAF50' : ind.value >= m.hi * 0.4 ? '#F9A825' : '#E53935';
        const desc = DESCRIPTIONS[m.key] || '';
        html += `<div class="ind-card">
          <div class="ind-header"><span class="ind-name">${m.name}</span><span class="ind-type">${m.type}</span></div>
          <div class="ind-value">${m.key === 'vol_breakout' ? '<span class="clickable" onclick="openBreakoutModal()">'+ind.value+'</span>' : (typeof ind.value === 'number' ? (Number.isInteger(ind.value) ? ind.value : ind.value.toFixed(2)) : ind.value)}<span class="ind-unit"> ${m.unit}</span></div>
          <div class="ind-bar-wrap"><div class="ind-bar" style="width:${barW}%;background:${barColor}"></div></div>
          <div class="ind-score">${ind.score}/${m.max} 分</div>
          ${desc ? '<div class="ind-desc">'+desc+'</div>' : ''}
        </div>`;
      });
      html += '</div>';

      // 板块轮动 — 4个池都展示
      const rotations = d.rotations || [];
      if (rotations.length) {
        html += '<div class="xhs-card" style="margin-bottom:16px"><div class="xhs-card-header"><span class="xhs-card-label">🔄 板块轮动</span></div>';
        html += '<div class="rotation-grid">';
        rotations.forEach(rot => {
          const isSpearman = rot.method === 'spearman';
          const metVal = rot.value;
          let metColor = '#4CAF50', metLabel = '健康';
          if (isSpearman) {
            metColor = metVal >= 0.7 ? '#4CAF50' : metVal >= 0.3 ? '#F9A825' : '#E53935';
            metLabel = metVal >= 0.7 ? '格局稳定' : metVal >= 0.3 ? '正常轮动' : '无序洗牌';
          } else {
            metColor = metVal >= 4 ? '#4CAF50' : metVal >= 2 ? '#F9A825' : '#E53935';
            metLabel = metVal >= 4 ? '板块稳定' : metVal >= 2 ? '正常轮动' : '快速轮动';
          }

          html += `<div class="rot-card">
            <h3>${rot.icon || '📦'} ${rot.name} <span style="font-size:0.55rem;color:var(--text-tertiary);font-weight:400">${rot.count || ''}个 · ${isSpearman ? 'Spearman秩相关' : 'Top5重叠率'}</span></h3>
            <div class="rot-metric" style="color:${metColor}">${isSpearman ? metVal.toFixed(3) : metVal}<span style="font-size:0.6rem;color:var(--text-tertiary);font-weight:400">${isSpearman ? ' (ρ)' : ' 个重叠'}</span></div>
            <div class="rot-desc">${metLabel}${rot.participates ? ' · 参与评分' : ' · 仅展示'}</div>`;

          if (rot.top5_current && rot.top5_current.length) {
            html += '<div class="top-list">';
            const both = rot.top5_overlap || [];
            rot.top5_current.forEach(name => {
              const isBoth = both.includes(name);
              html += `<span class="rot-tag ${isBoth ? 'both' : 'this-week'}">${name}</span>`;
            });
            html += '</div>';
            if (rot.top5_last && rot.top5_last.length) {
              html += '<div class="top-list" style="margin-top:4px"><span style="font-size:0.55rem;color:var(--text-tertiary);margin-right:4px">上周:</span>';
              rot.top5_last.forEach(name => {
                const isBoth = both.includes(name);
                html += `<span class="rot-tag ${isBoth ? 'both' : 'last-week'}">${name}</span>`;
              });
              html += '</div>';
            }
          }
          html += '</div>';
        });
        html += '</div></div>';
      }

      document.getElementById('content').innerHTML = html;
    }

    function fmtVol(v) { if (v == null) return '—'; if (v >= 1e8) return (v/1e8).toFixed(2)+'亿'; if (v >= 1e4) return (v/1e4).toFixed(0)+'万'; return v.toString(); }

    async function openBreakoutModal() {
      document.getElementById('breakout-modal').classList.add('show');
      document.getElementById('breakout-meta').textContent = '加载中...';
      document.getElementById('breakout-table').innerHTML = '';
      try {
        const resp = await fetch(`${API_BASE}/api/market-health/breakouts?date=latest`);
        const data = await resp.json();
        document.getElementById('breakout-meta').textContent = `${data.date} · 共 ${data.count} 只个股放量突破20日高点`;
        if (!data.stocks || !data.stocks.length) {
          document.getElementById('breakout-table').innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-tertiary)">暂无突破个股</div>';
          return;
        }
        let tbl = '<table class="breakout-table"><thead><tr><th>代码</th><th>名称</th><th>收盘价</th><th>涨跌幅</th><th>成交量</th><th>成交额</th></tr></thead><tbody>';
        data.stocks.forEach(s => {
          const cls = (s.change_pct||0) >= 0 ? 'text-up' : 'text-down';
          tbl += `<tr>
            <td style="font-family:var(--font-display);font-weight:700">${s.stock_code}</td>
            <td>${s.name||'—'}</td>
            <td>${s.close?.toFixed(2)||'—'}</td>
            <td class="${cls}">${(s.change_pct||0)>=0?'+':''}${(s.change_pct||0).toFixed(2)}%</td>
            <td>${fmtVol(s.volume)}</td>
            <td>${fmtVol(s.amount)}</td>
          </tr>`;
        });
        tbl += '</tbody></table>';
        document.getElementById('breakout-table').innerHTML = tbl;
      } catch(e) { document.getElementById('breakout-meta').textContent = '加载失败'; }
    }

    function closeBreakoutModal() { document.getElementById('breakout-modal').classList.remove('show'); }

    loadHealth();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>缠论分析</title>
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
  /* Page-specific only */
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .mode-btn{padding:4px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(26,26,31,.4);color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-right:4px}
  .mode-btn.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .chart-wrap{width:100%;height:520px;margin-bottom:10px}
  .bottom-layout{display:flex;gap:14px;align-items:flex-start}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:360px;flex-shrink:0}
  .stat-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .signal-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:500;margin:2px 2px}
  .signal-buy{background:rgba(239,68,68,.1);color:var(--fall);border:1px solid rgba(239,68,68,.2)}
  .signal-sell{background:rgba(16,185,129,.1);color:var(--rise);border:1px solid rgba(16,185,129,.2)}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();</script>
<div class="app-container">
<nav id="top-nav"></nav>

<div class="top-bar">
  <div class="fld" style="flex:0.7;min-width:160px">
    <label>股票/指数代码</label>
    <div style="display:flex;gap:4px;align-items:center">
      <button class="mode-btn" id="btn-stock" onclick="switchMode('stock')">个股</button>
      <button class="mode-btn active" id="btn-index" onclick="switchMode('index')">指数</button>
      <input type="text" id="code" value="000985" style="flex:1" onkeydown="if(event.key==='Enter')analyze()">
      <span id="stock-name" style="font-size:10px;color:var(--muted);white-space:nowrap"></span>
    </div>
  </div>
  <div class="fld" style="flex:0.4;min-width:80px">
    <label>周期</label>
    <select id="freq" onchange="analyze()"><option value="D">日线</option><option value="W">周线</option><option value="M">月线</option></select>
  </div>
  <button class="btn-run" onclick="analyze()">分析</button>
</div>

<div class="stat-row" id="stats"></div>
<div class="chart-card" style="padding:0;overflow:hidden"><div class="chart-wrap" id="chart"></div></div>

<div class="bottom-layout">
  <div class="bottom-left">
    <div class="xhs-card">
      <div class="xhs-card-header"><span class="xhs-card-label">笔列表</span></div>
      <div id="bi-table"></div>
    </div>
  </div>
  <div class="bottom-right">
    <div class="xhs-card">
      <div class="xhs-card-header"><span class="xhs-card-label">最近信号</span></div>
      <div id="signals-panel"></div>
    </div>
  </div>
</div>
</div>

<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandIcon:"⬤",brandText:"缠论分析",currentPage:"chanlun"})</script>
<script>
const API='http://localhost:8788';let mode='index',chartInst;
function switchMode(m){mode=m;document.getElementById('btn-stock').className='mode-btn'+(m==='stock'?' active':'');document.getElementById('btn-index').className='mode-btn'+(m==='index'?' active':'');document.getElementById('code').value=m==='stock'?'600519':'000985';analyze()}

async function analyze(){
  var code=document.getElementById('code').value.trim();if(!code)return;
  var freq=document.getElementById('freq').value;
  var btn=document.querySelector('.btn-run');btn.disabled=true;btn.textContent='⏳';
  try{var nr=await fetch(API+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
  try{
    var[optResp,dataResp]=await Promise.all([
      fetch(API+'/api/chanlun/echarts?code='+code+'&freq='+freq+'&limit=400'),
      fetch(API+'/api/chanlun/analyze?code='+code+'&freq='+freq+'&limit=400')
    ]);
    var opt=await optResp.json(),data=await dataResp.json();
    if(opt.error){alert(opt.error);return}
    renderChart(opt);renderStats(data);
  }catch(e){alert('分析失败: '+e.message)}
  btn.disabled=false;btn.textContent='分析';
}

function renderChart(opt){
  var el=document.getElementById('chart');if(!el)return;
  if(chartInst&&!chartInst.isDisposed())chartInst.dispose();
  chartInst=echarts.init(el);chartInst.setOption(opt);
}

function renderStats(data){
  var stat=document.getElementById('stats');
  if(!data.bi_count){stat.innerHTML='';return}
  var last=data.bi_list[data.bi_list.length-1];
  var dirClr=last.direction==='up'?'var(--fall)':'var(--rise)';
  stat.innerHTML=
    '<div class="stat-card"><div class="val">'+data.bi_count+'</div><div class="lbl">笔</div></div>'+
    '<div class="stat-card"><div class="val">'+data.fx_count+'</div><div class="lbl">分型</div></div>'+
    '<div class="stat-card"><div class="val" style="color:'+dirClr+'">'+(last.direction==='up'?'↑':'↓')+'</div><div class="lbl">当前方向</div></div>'+
    '<div class="stat-card"><div class="val">'+(last.power||0).toFixed(1)+'</div><div class="lbl">笔力度</div></div>';
  // 笔列表
  var tbl='<table class="mini-table"><thead><tr><th>方向</th><th>起点</th><th>终点</th><th>低</th><th>高</th><th>力度</th></tr></thead><tbody>';
  [].concat(data.bi_list).reverse().slice(0,20).forEach(function(bi){
    var d=bi.direction==='up'?'↑':'↓',c=bi.direction==='up'?'var(--fall)':'var(--rise)';
    tbl+='<tr><td style="color:'+c+';font-weight:500">'+d+'</td><td>'+bi.sdt.slice(0,10)+'</td><td>'+bi.edt.slice(0,10)+'</td><td class="mono">'+bi.low.toFixed(1)+'</td><td class="mono">'+bi.high.toFixed(1)+'</td><td class="mono">'+(bi.power||0).toFixed(1)+'</td></tr>';
  });
  document.getElementById('bi-table').innerHTML=tbl+'</tbody></table>';
  // 信号
  var sigs='';
  if(data.signals)for(var k in data.signals){if(data.signals[k])sigs+='<span class="signal-tag signal-buy">'+k+'</span> '}
  document.getElementById('signals-panel').innerHTML=sigs||'<span style="color:var(--muted);font-size:11px">暂无明确信号</span>';
}

function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
analyze();
</script>
</body>
</html>

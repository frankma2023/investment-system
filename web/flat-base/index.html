<head>

<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .bottom-layout{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:380px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}
  .param-card-bd{padding:8px 0 0}.param-card-bd.collapsed{display:none}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .table-wrapper td{border-bottom-color:rgba(0,0,0,.03)}
.top-bar{display:flex;gap:12px;align-items:flex-end;padding:16px 20px;background:var(--card-bg);border-radius:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
    .top-bar .fld{flex:1;min-width:90px}
    .top-bar label{display:block;font-size:0.6rem;font-weight:600;color:var(--muted);margin-bottom:3px}
    .top-bar input,.top-bar select{width:100%;padding:7px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.75rem;background:var(--card-bg);color:var(--text-primary);box-sizing:border-box}
    .chart-wrap{width:100%;height:520px;margin-bottom:12px}
    .bottom-layout{display:flex;gap:14px;align-items:flex-start}
    .bottom-left{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
    .bottom-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
    .btn-run{width:100%;padding:11px;background:#FE2C55;color:#FFF;border:none;border-radius:14px;font-size:0.95rem;font-weight:800;cursor:pointer}
    .btn-run:hover{opacity:0.88}.btn-run:disabled{background:#CCC}
    .btn-save{width:100%;padding:9px;background:var(--card-bg);border:1.5px solid var(--divider);border-radius:14px;font-size:0.85rem;font-weight:700;cursor:pointer}
    .btn-save.saved{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32}
    .param-card{background:var(--card-bg);border:1px solid var(--divider);border-radius:16px;overflow:hidden}
    .param-card-hd{display:flex;align-items:center;padding:9px 14px;cursor:pointer;font-size:0.73rem;font-weight:800}
    .param-card-hd .dot{width:8px;height:8px;border-radius:50%;margin-right:8px}
    .param-card-bd{padding:0 14px 10px}.param-card-bd.collapsed{display:none}
    .sr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
    .sr .sl{width:68px;font-size:0.58rem;font-weight:600;color:var(--muted);flex-shrink:0}
    .sr input[type=range]{flex:1;height:3px}
    .sr .sv{width:40px;text-align:right;font-size:0.62rem;font-weight:700}
    .tog-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
    .tog-row .sl{width:68px;font-size:0.58rem;font-weight:600;color:var(--muted)}
    .tsw{position:relative;width:32px;height:16px;border-radius:8px;border:none;cursor:pointer}
    .tsw.on{background:#FE2C55}.tsw.off{background:#CCC}
    .tsw::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:#FFF;transition:left 0.2s}
    .tsw.on::after{left:18px}.tsw.off::after{left:2px}
    table{width:100%;border-collapse:collapse;font-size:0.7rem}
    th,td{padding:4px 6px;text-align:left;border-bottom:1px solid var(--divider)}
    th{font-weight:700;color:var(--text-secondary);font-size:0.62rem;cursor:pointer}
    .t-up{color:#E53935;font-weight:700}
    .nav-dropdown:hover .nav-dropdown-menu{display:block}
    @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-left{width:100%}}
</style>

<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

  <nav id="top-nav"></nav>
    <div class="top-bar">
      <div class="fld" style="flex:0.5;min-width:80px"><label>周期</label><select id="period" style="width:100%" onchange="run()"><option value="day">日线</option><option value="week">周线</option><option value="month">月线</option></select></div>
      <div class="fld" style="flex:0.5"><label>代码</label><div style="display:flex;gap:4px"><input type="text" id="stock-code" value="600519" style="width:100px" onkeydown="if(event.key==='Enter')run()" onchange="run()"><span id="stock-name" style="font-size:0.65rem;color:var(--muted);padding:7px 6px"></span></div></div>
      <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
      <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
    </div>
    <div class="chart-wrap" id="chart"></div>
    <div class="bottom-layout">
      <div class="bottom-left">
        <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#FE2C55"></span>🔴 基部振幅</div><div class="param-card-bd" id="c1-bd">
          <div class="sr"><span class="sl">前涨幅(%)</span><input type="range" id="p-pa" min="10" max="50" value="20" oninput="sv('p-pa')"><span class="sv" id="p-pa-v">20%</span></div>
          <div class="sr"><span class="sl">最大振幅(%)</span><input type="range" id="p-am" min="5" max="25" value="12" oninput="sv('p-am')"><span class="sv" id="p-am-v">12%</span></div>
          <div class="sr"><span class="sl">最小时间(天)</span><input type="range" id="p-md" min="15" max="60" value="25" oninput="sv('p-md')"><span class="sv" id="p-md-v">25天</span></div>
          <div class="tog-row"><span class="sl">收盘价斜率检查</span><button class="tsw on" id="p-sl-on" onclick="event.stopPropagation();tog('p-sl-on')"></button></div>
        </div></div>
        <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#FF9800"></span>🟠 成交量+布林带</div><div class="param-card-bd" id="c2-bd">
          <div class="sr"><span class="sl">量萎缩比</span><input type="range" id="p-vc" min="30" max="100" value="60" oninput="sv('p-vc')"><span class="sv" id="p-vc-v">60%</span></div>
          <div class="tog-row"><span class="sl">布林带</span><button class="tsw on" id="p-bb-on" onclick="event.stopPropagation();tog('p-bb-on')"></button></div>
        </div></div>
        <div class="param-card" id="c3"><div class="param-card-hd" onclick="tc('c3')"><span class="dot" style="background:#4CAF50"></span>🟢 突破确认</div><div class="param-card-bd" id="c3-bd">
          <div class="sr"><span class="sl">突破量比(MAV50)</span><input type="range" id="p-bv" min="80" max="250" value="140" oninput="svn2('p-bv')"><span class="sv" id="p-bv-v">1.40</span></div>
          <div class="tog-row"><span class="sl">要求阳线</span><button class="tsw on" id="p-gr-on" onclick="event.stopPropagation();tog('p-gr-on')"></button></div>
        </div></div>
        <button class="btn-run" id="btn-run">🔍 运行识别</button>
        <button class="btn-save" id="btn-save">💾 保存配置</button>
      </div>
      <div class="bottom-right">
        <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 扁平基部信号</span></div><div class="table-wrapper" id="table"></div></div>
        <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🔎 区间排查</span></div>
          <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><span style="font-size:0.62rem;color:var(--muted);flex-shrink:0">区间</span><input type="date" id="diag-start" style="padding:6px 8px;border:1px solid var(--divider);border-radius:10px;font-size:0.7rem;background:var(--card-bg);color:var(--text-primary);flex:1"><span style="font-size:0.62rem;color:var(--muted);flex-shrink:0">至</span><input type="date" id="diag-end" style="padding:6px 8px;border:1px solid var(--divider);border-radius:10px;font-size:0.7rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>
          <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
        </div>
      </div>
    </div>
    <footer class="page-footer">❤️ 投资手账本 · 扁平基部</footer>
  </div>
  <script src="../shared/js/api-client.js"></script>
  <script>
    console.log('flat-base script loaded');
    const ST='flat_base';let ck=[],cs=[],chart;
    function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
    function tog(id){const b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off')}
    function sv(id){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
    function svn2(id){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=(parseInt(e.value)/100).toFixed(2)}
    document.addEventListener('DOMContentLoaded',async()=>{
      console.log('DOMContentLoaded fired');
      const now=new Date();document.getElementById('date-end').value=now.toISOString().split('T')[0];
      const ago=new Date(now);ago.setFullYear(ago.getFullYear()-5);
      document.getElementById('date-start').value=ago.toISOString().split('T')[0];
      chart=echarts.init(document.getElementById('chart'));
      document.getElementById('btn-run').addEventListener('click',run);
      document.getElementById('btn-save').addEventListener('click',saveCfg);
      await loadCfg();setTimeout(run,500);
      new MutationObserver(function(){if(ck.length){chart.dispose();chart=echarts.init(document.getElementById('chart'));renderChart()}}).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
    });
    function gp(){return {flat_base:{
      amp_max:parseInt(document.getElementById('p-am').value)/100,min_duration:parseInt(document.getElementById('p-md').value),
      slope_enabled:document.getElementById('p-sl-on').classList.contains('on'),
      vol_contraction_ratio:parseInt(document.getElementById('p-vc').value)/100,
      bb_enabled:document.getElementById('p-bb-on').classList.contains('on'),
      breakout_vol_ratio:parseInt(document.getElementById('p-bv').value)/100,
      require_green:document.getElementById('p-gr-on').classList.contains('on'),
      sma50_check:false,close_position_min:0.4,min_prior_advance:parseInt(document.getElementById('p-pa').value)/100
    }}}
    async function run(){console.log('run called');
      const btn=document.getElementById('btn-run');btn.disabled=true;btn.textContent='⏳';
      const code=document.getElementById('stock-code').value;if(!code){btn.disabled=false;btn.textContent='❌';return}
      try{const nr=await fetch(API_BASE+'/api/stock-name?code='+code);if(nr.ok){const nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
      try{const r=await fetch(API_BASE+'/api/flat-base',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stock_code:code,start:document.getElementById('date-start').value,end:document.getElementById('date-end').value,period:document.getElementById('period').value,params:gp()})});
        if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();ck=d.klines||[];cs=d.signals||[];renderChart();renderTable();btn.textContent='🔄'}catch(e){console.error(e);btn.textContent='❌'}
      btn.disabled=false
    }
    function renderChart(){
      if(!chart||!ck.length)return;const dates=ck.map(k=>k.date),bg=document.documentElement.dataset.theme==='dark'?'#1a1a1f':'#fff';
      const fmt=function(v){if(v==null)return'—';if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(0)+'万';return v.toFixed(0)};
      var ma=function(p){var r=[],sum=0;for(var i=0;i<ck.length;i++){if(ck[i].close!=null){sum+=ck[i].close;if(i>=p){sum-=ck[i-p].close;r.push(sum/p)}else{r.push(null)}}else{r.push(null)}}return r};
      var ma5=ma(5),ma10=ma(10),ma20=ma(20),ma120=ma(120),ma250=ma(250);
      var mc=['#FF9800','#2196F3','#4CAF50','#9C27B0','#795548'];
      const marks=[];cs.forEach(s=>{const si=dates.indexOf(s.date);if(si<0)return;const bs=dates.indexOf(s.base_start_date),be=dates.indexOf(s.base_end_date);
        marks.push({value:[si,s.close],symbol:'rect',symbolSize:14,itemStyle:{color:'#4CAF50',borderColor:'#FFF',borderWidth:1}})});
      chart.setOption({backgroundColor:bg,
        tooltip:{trigger:'axis',axisPointer:{type:'cross',crossStyle:{color:'#999'}},backgroundColor:'rgba(255,255,255,0.75)',textStyle:{fontSize:10},formatter:function(params){if(!params||!params.length)return'';var k=ck[params[0].dataIndex];if(!k)return'';var chg=k.close-k.open,raw=k.change_pct!=null?k.change_pct:null,chgPct=raw!=null?(Math.abs(raw)>1?raw:raw*100).toFixed(2):(k.open>0?(chg/k.open*100).toFixed(2):'0.00'),col=chg>=0?'#E53935':'#26C6DA';return '<span style=font-size:12px;font-weight:700>'+k.date+'</span><br/>开盘：<b>'+k.open.toFixed(2)+'</b><br/>最高：<b>'+k.high.toFixed(2)+'</b><br/>最低：<b>'+k.low.toFixed(2)+'</b><br/>收盘：<b style=color:'+col+'>'+k.close.toFixed(2)+'</b><br/>涨跌：<b style=color:'+col+'>'+(chg>=0?'+':'')+chg.toFixed(2)+' ('+(chg>=0?'+':'')+chgPct+'%)</b><br/>成交量：<b>'+fmt(k.volume)+'</b><br/>成交额：<b>'+fmt(k.amount)+'</b>'}},axisPointer:{link:[{xAxisIndex:'all'}]},
        grid:[{left:'8%',right:'1%',top:8,height:'60%'},{left:'8%',right:'1%',top:'75%',height:'15%'}],
        xAxis:[{type:'category',data:dates,axisLabel:{fontSize:9},axisLine:{lineStyle:{color:'rgba(128,128,128,0.3)'}}},{type:'category',data:dates,axisLabel:{show:false},axisLine:{lineStyle:{color:'rgba(128,128,128,0.3)'}},gridIndex:1}],
        yAxis:[{type:'value',scale:true,axisLabel:{fontSize:9},splitLine:{lineStyle:{color:'rgba(128,128,128,0.15)'}}},{type:'value',scale:true,axisLabel:{fontSize:8},gridIndex:1,splitLine:{show:false}}],
        dataZoom:[{type:'inside',xAxisIndex:[0,1],start:0,end:100},{type:'slider',xAxisIndex:[0,1],start:0,end:100,height:16,bottom:4}],
        series:[{name:'K线',type:'candlestick',data:ck.map(k=>[k.open,k.close,k.low,k.high]),itemStyle:{color:'#E53935',color0:'#26C6DA',borderColor:'#E53935',borderColor0:'#26C6DA'}},{name:'成交量',type:'bar',data:ck.map((k,i)=>({value:k.volume,itemStyle:{color:ck[i].close>=ck[i].open?'rgba(229,57,53,0.4)':'rgba(38,198,218,0.4)'}})),xAxisIndex:1,yAxisIndex:1},
          {name:'MA5',type:'line',data:ma5,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[0]}},{name:'MA10',type:'line',data:ma10,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[1]}},{name:'MA20',type:'line',data:ma20,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[2]}},{name:'MA120',type:'line',data:ma120,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[3]}},{name:'MA250',type:'line',data:ma250,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[4]}},{name:'扁平基部',type:'scatter',data:marks,z:10}]})
    }
    function renderTable(){const d=document.getElementById('table');if(!cs.length){d.innerHTML='<div style=padding:24px;text-align:center;color:var(--muted)>无扁平基部信号</div>';return}let h='<table><thead><tr><th>#</th><th>突破日</th><th>收盘</th><th>基部起</th><th>基部止</th><th>振幅</th><th>持续</th><th>量萎缩</th><th>量比</th></tr></thead><tbody>';[...cs].reverse().forEach((s,i)=>{h+='<tr><td>'+(cs.length-i)+'</td><td style=font-weight:700>'+s.date+'</td><td class=t-up>'+s.close.toFixed(2)+'</td><td>'+s.base_start_date+'</td><td>'+s.base_end_date+'</td><td>'+s.base_amplitude+'%</td><td>'+s.base_duration+'天</td><td>'+s.vol_contraction.toFixed(2)+'</td><td>'+s.breakout_vol_ratio.toFixed(2)+'</td></tr>'});d.innerHTML=h+'</tbody></table>'}
    async function loadCfg(){try{const r=await fetch(API_BASE+'/api/config?signal_type='+ST,{cache:'no-store'});const c=await r.json();if(!c||!c.flat_base)return;const b=c.flat_base;svs('p-am',Math.round((b.amp_max||0.12)*100));svs('p-md',b.min_duration||25);stog('p-sl-on',b.slope_enabled!==false);svs('p-vc',Math.round((b.vol_contraction_ratio||0.6)*100));stog('p-bb-on',b.bb_enabled!==false);svs('p-bv',Math.round((b.breakout_vol_ratio||1.4)*100));stog('p-gr-on',b.require_green!==false)}catch(e){}}
    function svs(id,v){const e=document.getElementById(id);if(!e)return;e.value=v;e.dispatchEvent(new Event('input',{bubbles:true}))}
    function stog(id,on){const b=document.getElementById(id);if(!b)return;b.className='tsw '+(on?'on':'off')}
    function runDiag(){const ds=document.getElementById("diag-start").value,de=document.getElementById("diag-end").value;const div=document.getElementById("diag-result");if(!ds||!de||!ck.length){div.style.display="none";return}var si=ck.findIndex(r=>r.date>=ds),ei=ck.findIndex(r=>r.date>de);if(si<0){div.innerHTML="<div style=font-size:0.7rem;color:#FF6B6B>不在K线范围</div>";div.style.display="block";return}if(ei<0)ei=ck.length;var p=gp().flat_base,dur=ei-si;var high=0,low=9e99;for(var j=si;j<ei;j++){if(ck[j].close>high)high=ck[j].close;if(ck[j].close<low)low=ck[j].close}var amp=(high-low)/high*100;
    // 斜率
    var sl=0,sl_cs=[],sl_n=0;for(var j=si;j<ei;j++){if(ck[j].close!=null){sl_cs.push(ck[j].close);sl_n++}}
    if(sl_n>=5){var xm2=0,ym2=0;for(var k=0;k<sl_n;k++){xm2+=k;ym2+=sl_cs[k]}xm2/=sl_n;ym2/=sl_n;var sn=0,sd=0;for(var k=0;k<sl_n;k++){sn+=(k-xm2)*(sl_cs[k]-ym2);sd+=(k-xm2)*(k-xm2)}sl=sd>0?sn/sd:0}var v1=0,v2=0,n1=0,n2=0,mid=Math.floor((si+ei)/2);for(var j=si;j<mid;j++){v1+=ck[j].volume;n1++}for(var j=mid;j<ei;j++){v2+=ck[j].volume;n2++}v1=n1?v1/n1:0;v2=n2?v2/n2:0;var vc=v1>0?v2/v1:1;
    // 突破日检查(区间最后一天)
    var last=ck[ei-1],ma50v=0;if(ei>50){var vs=[];for(var j=ei-50;j<ei;j++)if(ck[j].volume!=null)vs.push(ck[j].volume);ma50v=vs.length?vs.reduce((a,b)=>a+b)/vs.length:0}
    var bv=ma50v>0?last.volume/ma50v:0,green=last.close>last.open,pos=last.high!=last.low?(last.close-last.low)/(last.high-last.low)*100:100;
    var c_last=last.close>=high;
    // 前置上涨检查(简化: 基部开始前200天找峰前低点)
    var pa_start=Math.max(0,si-400),pa_hi=0,pa_lo=9e99,pa_hi_i=-1;
    for(var j=pa_start;j<si;j++){if(ck[j].close>pa_hi){pa_hi=ck[j].close;pa_hi_i=j;}}
    if(pa_hi_i>0){for(var j=pa_start;j<pa_hi_i;j++){if(ck[j].close<pa_lo)pa_lo=ck[j].close;}}
    var pa=pa_lo<9e99?(pa_hi-pa_lo)/pa_lo*100:0;
    function c3(v,t){return v?"<td style=color:#4CAF50>✅ "+t+"</td>":"<td style=color:#FF6B6B>❌ "+t+"</td>";}
    div.innerHTML="<div style=font-size:0.6rem>区间: "+ds+" ~ "+de+" ("+dur+"天)</div><table style=margin:0;font-size:0.68rem><tr><th>条件</th><th>实际</th><th>阈值</th><th>判定</th></tr>"+
    "<tr><td>振幅</td><td>"+amp.toFixed(1)+"%</td><td>≤"+Math.round(p.amp_max*100)+"%</td>"+c3(amp<=p.amp_max*100,"")+"</tr>"+
    "<tr><td>天数</td><td>"+dur+"天</td><td>≥"+p.min_duration+"天</td>"+c3(dur>=p.min_duration,"")+"</tr>"+
    "<tr><td>斜率</td><td>"+sl.toFixed(6)+"</td><td>|sl|<0.001</td>"+c3((!p.slope_enabled||Math.abs(sl)<0.001),p.slope_enabled?"":"(已关闭)")+"</tr>"+
    "<tr><td>量萎缩</td><td>"+(vc*100).toFixed(0)+"%</td><td>≤"+Math.round(p.vol_contraction_ratio*100)+"%</td>"+c3(vc<=p.vol_contraction_ratio,"")+"</tr>"+
    "<tr><td>收盘≥区间高</td><td>C="+last.close.toFixed(2)+" H="+high.toFixed(2)+"</td><td>C≥H</td>"+c3(c_last,"")+"</tr>"+
    "<tr><td>突破量比</td><td>"+bv.toFixed(2)+"</td><td>≥"+p.breakout_vol_ratio.toFixed(2)+"</td>"+c3(bv>=p.breakout_vol_ratio,"")+"</tr>"+
    "<tr><td>要求阳线</td><td>"+(green?"是":"否")+"</td><td>是</td>"+c3(!p.require_green||green,"")+"</tr>"+
    "<tr><td>收盘位置</td><td>"+pos.toFixed(0)+"%</td><td>≥50%</td>"+c3(pos>=50,"")+"</tr>"+
    "<tr><td>前涨幅</td><td>"+(pa?pa.toFixed(0)+"%":"查不到")+"</td><td>≥20%</td>"+c3(pa>=20,"")+"</tr>"+
    "<tr><td>最高</td><td>"+high.toFixed(2)+"</td><td></td><td></td></tr><tr><td>最低</td><td>"+low.toFixed(2)+"</td><td></td><td></td></tr></table>";div.style.display="block";}
    async function saveCfg(){const btn=document.getElementById('btn-save');btn.textContent='⏳';btn.disabled=true;const p=gp().flat_base;const y=['# 扁平基部参数','flat_base:','  amp_max: '+p.amp_max,'  min_duration: '+p.min_duration,'  slope_enabled: '+(p.slope_enabled?'true':'false'),'  vol_contraction_ratio: '+p.vol_contraction_ratio,'  bb_enabled: '+(p.bb_enabled?'true':'false'),'  breakout_vol_ratio: '+p.breakout_vol_ratio,'  require_green: '+(p.require_green?'true':'false'),''].join('\n');try{const r=await fetch(API_BASE+'/api/config?signal_type='+ST,{method:'POST',headers:{'Content-Type':'text/plain'},body:y});const d=await r.json();if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(()=>{btn.textContent='💾';btn.classList.remove('saved');btn.disabled=false},2000)}}catch(e){btn.textContent='❌';btn.disabled=false}}
  </script>

(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();

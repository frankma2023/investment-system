<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O'Neil 回测导航 · 投资手账本</title>
  <link rel="stylesheet" href="shared/css/theme.css">
  <link rel="stylesheet" href="shared/css/base.css">
  <link rel="stylesheet" href="shared/css/xhs-cards.css">
  <link rel="stylesheet" href="shared/css/components.css">
  <script src="shared/js/theme.js"></script>
  <style>
    .nav-grid { display:flex; flex-wrap:wrap; gap:16px; max-width:900px; margin:24px auto; }
    .nav-card { flex:1 1 240px; max-width:320px; background:var(--card-bg); border-radius:16px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); text-decoration:none; color:var(--text-primary); transition:box-shadow 0.2s; }
    .nav-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.1); }
    .nav-card .icon { font-size:2rem; margin-bottom:8px; }
    .nav-card h2 { font-family:var(--font-display); font-size:1rem; font-weight:800; margin:0 0 4px; }
    .nav-card p { font-size:0.75rem; color:var(--text-tertiary); margin:0; }
    .nav-card.coming-soon { opacity:0.5; }
    .nav-card.coming-soon::after { content:'🚧 开发中'; display:block; margin-top:8px; font-size:0.65rem; color:#FF9800; }
  </style>
</head>
<body>
  <header class="panel-header">
    <h1>🦊 O'Neil 量化回测看板</h1>
    <p>基于 William O'Neil 市场方法论的全信号回测系统</p>
  </header>

  <div class="nav-grid">
    <!-- Live -->
    <a href="distribution-day/" class="nav-card">
      <div class="icon">📉</div>
      <h2>抛盘日回测</h2>
      <p>4 卡片可配置评分卡 · K线深紫色标记 · V3 规则</p>
    </a>
    <span class="nav-card coming-soon"><div class="icon">📈</div><h2>追盘日回测</h2><p>反弹尝试评分卡 · 三层FTD体系</p></span>

    <!-- Coming soon -->
    <span class="nav-card coming-soon"><div class="icon">🧲</div><h2>吸筹日回测</h2><p>识别机构暗中收集筹码</p></span>
    <span class="nav-card coming-soon"><div class="icon">🏆</div><h2>最强指数回测</h2><p>相对强度 + 动量轮动排名</p></span>
    <span class="nav-card coming-soon"><div class="icon">🤑</div><h2>买入形态回测</h2><p>口袋支点 · 标准突破 · VCP</p></span>
    <span class="nav-card coming-soon"><div class="icon">🚨</div><h2>卖出形态回测</h2><p>顶部信号 · 止损触发 · 阶段转换</p></span>
    <span class="nav-card coming-soon"><div class="icon">🔬</div><h2>形态回测</h2><p>头肩顶 · 双重顶 · 杯柄形态</p></span>
    <span class="nav-card coming-soon"><div class="icon">🧪</div><h2>A/B 对比</h2><p>跨信号综合对比分析</p></span>
  </div>
</body>
</html>

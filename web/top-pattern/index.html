<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>头部形态回测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .bottom-layout{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:380px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}
  .param-card-bd{padding:8px 0 0}.param-card-bd.collapsed{display:none}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .table-wrapper td{border-bottom-color:rgba(0,0,0,.03)}
.chart-wrap{height:520px;margin-bottom:4px}
  .s-strong{color:#C62828;font-weight:700}.s-weak{color:#E65100;font-weight:700}.s-forming{color:#1565C0;font-weight:700}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

<nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px"><label>类型</label><select id="mode" onchange="onModeChange()"><option value="stock">个股</option><option value="index">指数</option></select></div>
    <div class="code-wrap"><div class="fld"><label>代码</label><input type="text" id="stock-code" value="600309" style="width:100px" onkeydown="if(event.key==='Enter')run()"><span id="stock-name" style="margin-left:6px;font-weight:700;font-family:var(--font-display);font-size:0.85rem"></span></div></div>
    <div class="fld" style="flex:0.5;min-width:80px"><label>周期</label><select id="freq" onchange="run()"><option value="D">日线</option><option value="W">周线</option></select></div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend"><span style="color:#C62828;font-weight:700">🔴 强确认</span> | <span style="color:#E65100;font-weight:700">🟡 弱确认</span> | <span style="color:#1565C0;font-weight:700">⚠️ 形成中</span> | <span style="color:#1565C0">▲ 左肩/顶</span> | <span style="color:#E65100">▲ 头部/中顶</span> | <span style="color:#C62828">▼ 右肩/顶</span> | <span style="color:#2E7D32">◆ 谷底</span> | <span style="color:#C62828;border-bottom:2px dashed #C62828">━ 颈线</span> | <span style="color:#9E9E9E">· 历史峰</span></div>

  <div class="bottom-layout">
    <div class="bottom-left">

      <!-- 通用参数 -->
      <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#607D8B"></span>⚙️ 通用</div><div class="param-card-bd" id="c1-bd">
        <div class="sr"><span class="sl">峰谷窗口</span><input type="range" id="p-pw" min="3" max="10" value="5" oninput="svn('p-pw')"><span class="sv" id="p-pw-v">5</span></div>
        <div class="sr"><span class="sl">突出度</span><input type="range" id="p-pp" min="1" max="8" value="3" oninput="svp('p-pp')"><span class="sv" id="p-pp-v">3%</span></div>
        <div class="sr"><span class="sl">顶窗口</span><input type="range" id="p-pwd" min="30" max="120" value="60" oninput="svn('p-pwd')"><span class="sv" id="p-pwd-v">60</span></div>
      </div></div>

      <!-- 上升背景 -->
      <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#1565C0"></span>🔵 上升背景</div><div class="param-card-bd" id="c2-bd">
        <div class="sr"><span class="sl">最小涨幅</span><input type="range" id="p-ug" min="10" max="40" value="20" oninput="svp('p-ug')"><span class="sv" id="p-ug-v">20%</span></div>
      </div></div>

      <!-- 双重顶参数 -->
      <div class="param-card" id="c3"><div class="param-card-hd" onclick="tc('c3')"><span class="dot" style="background:#C62828"></span>🔴 双重顶</div><div class="param-card-bd" id="c3-bd">
        <div class="sr"><span class="sl">回调幅度</span><input type="range" id="p-dmr" min="4" max="15" value="8" oninput="svp('p-dmr')"><span class="sv" id="p-dmr-v">8%</span></div>
        <div class="sr"><span class="sl">最大价差</span><input type="range" id="p-dmd" min="1" max="8" value="3" oninput="svp('p-dmd')"><span class="sv" id="p-dmd-v">3%</span></div>
        <div class="sr"><span class="sl">最小间隔</span><input type="range" id="p-dmi" min="5" max="30" value="15" oninput="svn('p-dmi')"><span class="sv" id="p-dmi-v">15</span></div>
        <div class="sr"><span class="sl">跌破阈值</span><input type="range" id="p-dnb" min="1" max="8" value="3" oninput="svp('p-dnb')"><span class="sv" id="p-dnb-v">3%</span></div>
        <div class="sr"><span class="sl">连续天数</span><input type="range" id="p-dcd" min="1" max="5" value="3" oninput="svn('p-dcd')"><span class="sv" id="p-dcd-v">3</span></div>
      </div></div>

      <!-- 三重顶参数 -->
      <div class="param-card" id="c4"><div class="param-card-hd" onclick="tc('c4')"><span class="dot" style="background:#E65100"></span>🟠 三重顶</div><div class="param-card-bd" id="c4-bd">
        <div class="sr"><span class="sl">回调幅度</span><input type="range" id="p-tmr" min="3" max="12" value="6" oninput="svp('p-tmr')"><span class="sv" id="p-tmr-v">6%</span></div>
        <div class="sr"><span class="sl">最大价差</span><input type="range" id="p-tmd" min="2" max="10" value="5" oninput="svp('p-tmd')"><span class="sv" id="p-tmd-v">5%</span></div>
        <div class="sr"><span class="sl">最小间隔</span><input type="range" id="p-tmi" min="5" max="30" value="15" oninput="svn('p-tmi')"><span class="sv" id="p-tmi-v">15</span></div>
        <div class="sr"><span class="sl">谷间距</span><input type="range" id="p-ttg" min="5" max="30" value="15" oninput="svn('p-ttg')"><span class="sv" id="p-ttg-v">15</span></div>
      </div></div>

      <!-- 头肩顶参数 -->
      <div class="param-card" id="c5"><div class="param-card-hd" onclick="tc('c5')"><span class="dot" style="background:#7B1FA2"></span>🟣 头肩顶</div><div class="param-card-bd" id="c5-bd">
        <div class="sr"><span class="sl">深谷回调</span><input type="range" id="p-hmr" min="5" max="20" value="10" oninput="svp('p-hmr')"><span class="sv" id="p-hmr-v">10%</span></div>
        <div class="sr"><span class="sl">头高于两肩</span><input type="range" id="p-hhr" min="1" max="8" value="3" oninput="svp('p-hhr')"><span class="sv" id="p-hhr-v">3%</span></div>
        <div class="sr"><span class="sl">肩间价差</span><input type="range" id="p-hsd" min="1" max="10" value="5" oninput="svp('p-hsd')"><span class="sv" id="p-hsd-v">5%</span></div>
        <div class="sr"><span class="sl">量萎缩比</span><input type="range" id="p-hvr" min="50" max="100" value="80" oninput="svs('p-hvr',0.01)"><span class="sv" id="p-hvr-v">0.80</span></div>
        <div class="sr"><span class="sl">量窗口</span><input type="range" id="p-hvw" min="2" max="10" value="5" oninput="svn('p-hvw')"><span class="sv" id="p-hvw-v">5</span></div>
      </div></div>

      <button class="btn-run" id="btn-run">🔍 回测</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>

    <div class="bottom-right">
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 头部形态信号</span></div><div class="table-wrapper" id="table"></div></div>
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🔎 单日排查</span></div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤️ 投资手账本 · 头部形态 Top Pattern</footer>
</div>

<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/kline-chart.js"></script>
<script>
  const API_URL='http://'+window.location.hostname+':8788';
  function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
  function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
  function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
  var dl=[],signals=[],peaks=[],troughs=[],kc,runId=0;

  document.addEventListener('DOMContentLoaded',async()=>{
    var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
    document.getElementById('date-start').value=ago.toISOString().split('T')[0];
    document.getElementById('date-end').value=now.toISOString().split('T')[0];document.getElementById('diag-date').value=now.toISOString().split('T')[0];
    document.getElementById('btn-run').addEventListener('click',run);
    document.getElementById('btn-save').addEventListener('click',saveCfg);
    await loadCfg();
    setTimeout(function(){run(true)},500);
  });

  function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600309':'000300';run()}
  async function run(auto){
    runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
    var code=document.getElementById('stock-code').value.trim();
    var mode=document.getElementById('mode').value;
    if(!code){if(!auto)btn.disabled=false;if(!auto)btn.textContent='🔍 回测';return}
    try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
    try{
      var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
      var freq=document.getElementById('freq').value;var resp=await fetch(API_URL+'/api/top-pattern?stock='+code+'&date='+end+'&start='+start+'&mode='+mode+'&freq='+freq);
      var data=await resp.json();if(runId!==myId)return;
      dl=data.daily||[];signals=data.signals||[];peaks=data.peaks||[];troughs=data.troughs||[];
      renderChart();renderTable();if(!auto)btn.textContent='🔍 回测';
    }catch(e){console.error(e);if(!auto)btn.textContent='❌'}
    if(!auto)btn.disabled=false;
  }

  function renderChart(){
    if(!dl.length)return;
    var kl=dl;

    var xmarks=[];
    // 标注所有峰（灰色小三角）
    peaks.forEach(function(p){
      xmarks.push({date:p.date,price:p.price,label:'',symbol:'triangle',color:'#9E9E9E',size:14});
    });

    // 标注当前信号的左顶、右顶、深谷
    signals.forEach(function(s){
      // 左顶
      var lp=s.left_peak;
      if(lp) xmarks.push({date:lp.date,price:lp.price,label:'左顶',symbol:'triangle',color:'#1565C0',size:28});
      // 右顶
      var rp=s.right_peak;
      if(rp) xmarks.push({date:rp.date,price:rp.price,label:'右顶',symbol:'triangle',color:'#C62828',size:28});
      // 深谷（双重顶）或双谷（三重顶）
      if(s.trough) xmarks.push({date:s.trough.date,price:s.trough.price,label:'深谷',symbol:'diamond',color:'#2E7D32',size:24});
      if(s.trough_left) xmarks.push({date:s.trough_left.date,price:s.trough_left.price,label:'左谷',symbol:'diamond',color:'#2E7D32',size:22});
      if(s.trough_right) xmarks.push({date:s.trough_right.date,price:s.trough_right.price,label:'右谷',symbol:'diamond',color:'#2E7D32',size:22});
      // 头部/中顶（头肩顶/三重顶）
      if(s.head_peak) xmarks.push({date:s.head_peak.date,price:s.head_peak.price,label:'头部',symbol:'triangle',color:'#E65100',size:30});
      if(s.middle_peak) xmarks.push({date:s.middle_peak.date,price:s.middle_peak.price,label:'中顶',symbol:'triangle',color:'#E65100',size:26});
    });

    // 信号标注点
    var sigs=[],sm={};
    signals.forEach(function(s){
      var d=kl.find(function(k){return k.date===s.signal_date});
      if(!d)return;
      var icon={'strong_confirmed':'🔴','weak_confirmed':'🟡','forming':'⚠️'}[s.status]||'❓';
      sigs.push({signal_date:s.signal_date,buy_point:d.high,drawdown_pct:0});
      sm[s.signal_date]={
        buy_point:d.high,drawdown_pct:0,
        label:icon+' '+({head_shoulders:'头肩顶',double_top:'双重顶',triple_top:'三重顶'}[s.pattern]||s.pattern)+' | '+({strong_confirmed:'强确认',weak_confirmed:'弱确认',forming:'形成中'}[s.status]||s.status),
        color:{strong_confirmed:'#C62828',weak_confirmed:'#E65100',forming:'#1565C0'}[s.status]||'#666'
      };
    });

    var sigColor=signals.length&&signals[0].status==='strong_confirmed'?'#C62828':signals.length&&signals[0].status==='weak_confirmed'?'#E65100':'#1565C0';
    if(!kc||(kc.chart&&kc.chart.isDisposed())){
      kc=KlineChart.create({container:document.getElementById('chart'),klines:kl,signals:sigs,signalMap:sm,signalColor:sigColor,extraMarkers:xmarks});
    }kc.update(kl,sigs,sm,xmarks)

    // 颈线 markLine（ECharts 原生）
    if(signals.length&&signals[0].neckline){
      var neckline=signals[0].neckline;
      var option=kc.chart.getOption();
      if(option&&option.series){
        option.series.push({
          name:'颈线',type:'line',data:[],lineStyle:{color:'#C62828',type:'dashed',width:2},
          markLine:{silent:true,symbol:'none',lineStyle:{color:'#C62828',type:'dashed',width:2},
          label:{formatter:'颈线 '+neckline.toFixed(2),fontSize:11},
          data:[{yAxis:neckline}]}
        });
        kc.chart.setOption(option);
      }
    }
  }

  function renderTable(){
    var div=document.getElementById('table');
    if(!signals.length){div.innerHTML='<div class="loading-row">未检测到头部形态</div>';return}
    var h='<table><thead><tr><th>#</th><th>日期</th><th>形态</th><th>状态</th><th>左顶</th><th>右顶</th><th>颈线</th><th>价差</th><th>回调</th></tr></thead><tbody>';
    [].concat(signals).reverse().forEach(function(s,i){
      var sc={'strong_confirmed':'s-strong','weak_confirmed':'s-weak','forming':'s-forming'}[s.status]||'';
      var st={'strong_confirmed':'🔴 强确认','weak_confirmed':'🟡 弱确认','forming':'⚠️ 形成中','dormant':'⚪ 观察中','failed':'❌ 失败'}[s.status]||s.status;
      var lp=s.left_peak?s.left_peak.date+' @ '+s.left_peak.price.toFixed(2):'—';
      var rp=s.right_peak?s.right_peak.date+' @ '+s.right_peak.price.toFixed(2):'—';
      var nl=s.neckline?s.neckline.toFixed(2):'—';
      var pd=s.price_diff_pct!=null?s.price_diff_pct+'%':'—';
      var rt=s.retrace_pct!=null?s.retrace_pct+'%':'—';
      var pn={head_shoulders:'头肩顶',double_top:'双重顶',triple_top:'三重顶'}[s.pattern]||s.pattern;
      var extra='';
      if(s.head_peak) extra=' 头='+s.head_peak.price.toFixed(2);
      if(s.middle_peak) extra=' 中='+s.middle_peak.price.toFixed(2);
      if(s.vol_ratio!=null) extra+=' 量比='+s.vol_ratio;
      h+='<tr><td>'+(signals.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td>'+pn+'</td><td class="'+sc+'">'+st+'</td><td style="font-size:0.68rem">'+lp+extra+'</td><td style="font-size:0.68rem">'+rp+'</td><td style="font-weight:700">'+nl+'</td><td>'+pd+'</td><td>'+rt+'</td></tr>';
    });
    div.innerHTML=h+'</tbody></table>';
  }

  function gp(){return {top_pattern:{
    peak_detection_window:parseInt(document.getElementById('p-pw').value),
    peak_prominence:parseInt(document.getElementById('p-pp').value)/100,
    peak_window_days:parseInt(document.getElementById('p-pwd').value),
    uptrend:{min_gain:parseInt(document.getElementById('p-ug').value)/100},
    double_top:{min_retracement:parseInt(document.getElementById('p-dmr').value)/100,max_price_diff:parseInt(document.getElementById('p-dmd').value)/100,min_days_between:parseInt(document.getElementById('p-dmi').value),neck_break_pct:parseInt(document.getElementById('p-dnb').value)/100,consecutive_days:parseInt(document.getElementById('p-dcd').value)},
    triple_top:{min_retracement:parseInt(document.getElementById('p-tmr').value)/100,max_price_diff:parseInt(document.getElementById('p-tmd').value)/100,min_days_between:parseInt(document.getElementById('p-tmi').value),min_trough_gap:parseInt(document.getElementById('p-ttg').value)},
    head_shoulders:{enabled:true,daily:{min_retracement:parseInt(document.getElementById('p-hmr').value)/100,head_above_ratio:parseInt(document.getElementById('p-hhr').value)/100,max_shoulder_diff:parseInt(document.getElementById('p-hsd').value)/100,volume_shrink_ratio:parseInt(document.getElementById('p-hvr').value)/100,volume_window:parseInt(document.getElementById('p-hvw').value)}},
  }}}
  async function saveCfg(){var btn=document.getElementById('btn-save');btn.textContent='⏳';var p=gp().top_pattern;
    var y='# top_pattern\n';for(var k in p){
      if(typeof p[k]==='object'){y+=k+':\n';for(var k2 in p[k]){if(typeof p[k][k2]==='object'){y+='  '+k2+':\n';for(var k3 in p[k][k2]){y+='    '+k3+': '+p[k][k2][k3]+'\n'}}else{y+='  '+k2+': '+p[k][k2]+'\n'}}}
      else{y+=k+': '+p[k]+'\n'}}
    try{var r=await fetch(API_URL+'/api/config?signal_type=top_pattern',{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾 保存配置';btn.classList.remove('saved')},2000)}}catch(e){btn.textContent='❌'}}
  async function loadCfg(){try{var r=await fetch(API_URL+'/api/config?signal_type=top_pattern',{cache:'no-store'});var c=await r.json();if(!c||!c.top_pattern)return;var b=c.top_pattern;
    svs2('p-pw',b.peak_detection_window||5);svn('p-pw');svs2('p-pp',Math.round((b.peak_prominence||0.03)*100));svp('p-pp');svs2('p-pwd',b.peak_window_days||60);svn('p-pwd');
    var u=b.uptrend||{};svs2('p-ug',Math.round((u.min_gain||0.20)*100));svp('p-ug');
    var dt=b.double_top||{};svs2('p-dmr',Math.round((dt.min_retracement||0.08)*100));svp('p-dmr');svs2('p-dmd',Math.round((dt.max_price_diff||0.03)*100));svp('p-dmd');svs2('p-dmi',dt.min_days_between||15);svn('p-dmi');svs2('p-dnb',Math.round((dt.neck_break_pct||0.03)*100));svp('p-dnb');svs2('p-dcd',dt.consecutive_days||3);svn('p-dcd');
    var tt=b.triple_top||{};svs2('p-tmr',Math.round((tt.min_retracement||0.06)*100));svp('p-tmr');svs2('p-tmd',Math.round((tt.max_price_diff||0.05)*100));svp('p-tmd');svs2('p-tmi',tt.min_days_between||15);svn('p-tmi');svs2('p-ttg',tt.min_trough_gap||15);svn('p-ttg');
    var hs=(b.head_shoulders||{}).daily||{};svs2('p-hmr',Math.round((hs.min_retracement||0.10)*100));svp('p-hmr');svs2('p-hhr',Math.round((hs.head_above_ratio||0.03)*100));svp('p-hhr');svs2('p-hsd',Math.round((hs.max_shoulder_diff||0.05)*100));svp('p-hsd');svs2('p-hvr',Math.round((hs.volume_shrink_ratio||0.80)*100));svs('p-hvr',0.01);svs2('p-hvw',hs.volume_window||5);svn('p-hvw')}catch(e){}}
  function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}

  async function runDiag(){
    var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
    if(!date){div.style.display='none';return}
    var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
    div.innerHTML='<div style="font-size:0.68rem;color:var(--muted);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
    try{var freq=document.getElementById('freq').value;var resp=await fetch(API_URL+'/api/top-pattern/diag?stock='+code+'&date='+date+'&mode='+mode+'&freq='+freq);var d=await resp.json();
    if(d.error){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">'+d.error+'</div>';return}
    var h='<table style="margin:0;font-size:0.62rem"><thead><tr><th>项目</th><th>值</th></tr></thead><tbody>';
    h+='<tr><td>K线总数</td><td style="font-weight:700">'+d.total_kline+'</td></tr>';
    h+='<tr><td>峰</td><td>'+d.peaks_count+' 个</td></tr>';
    h+='<tr><td>谷</td><td>'+d.troughs_count+' 个</td></tr>';
    h+='<tr><td>信号数</td><td style="font-weight:700">'+d.signals_count+'</td></tr>';
    if(d.pattern){
      var pn={head_shoulders:'头肩顶',double_top:'双重顶',triple_top:'三重顶'}[d.pattern]||d.pattern;
      h+='<tr style="background:var(--card-alt-bg)"><td>形态</td><td style="font-weight:700">'+pn+'</td></tr>';
      h+='<tr><td>状态</td><td style="font-weight:700;color:'+({strong_confirmed:'#C62828',weak_confirmed:'#E65100',forming:'#1565C0'}[d.status]||'#666')+'">'+({strong_confirmed:'🔴 强确认',weak_confirmed:'🟡 弱确认',forming:'⚠️ 形成中',dormant:'⚪ 观察中'}[d.status]||d.status)+'</td></tr>';
      h+='<tr><td>颈线</td><td style="font-weight:700">'+d.neckline.toFixed(2)+'</td></tr>';
    }
    if(d.peaks&&d.peaks.length){
      h+='<tr><td>最近峰</td><td style="font-size:0.6rem">'+d.peaks.map(function(p){return p.date+' @ '+p.price.toFixed(2)}).join('<br>')+'</td></tr>';
    }
    h+='</tbody></table>';div.innerHTML=h;}catch(e){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">请求失败: '+e+'</div>'}
  }
</script>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title><!-- 🔧 页面标题 --></title>

<!-- ═══════════════════════════════════════════════════
  共享资源：hanako-glass.css + Google Fonts + Tailwind CDN
  所有回测看板统一引用
  ═══════════════════════════════════════════════════ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/css/hanako-glass.css">

<style>
  /* ═══════════════════════════════════════════════════
     页面特有样式
     ═══════════════════════════════════════════════════ */
  .chart-wrap{height:520px;margin-bottom:4px}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:12px 16px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:90px}
  .top-bar .code-wrap{display:flex;gap:8px;align-items:flex-end}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:4px;letter-spacing:.02em;text-transform:uppercase}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .top-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}
  .bottom-layout{display:flex;gap:14px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:340px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:0;margin-bottom:8px;box-shadow:var(--shadow-card);overflow:hidden}
  .param-card-hd{padding:10px 14px;font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .param-card-bd{padding:12px 14px;display:block}
  .param-card-bd.collapsed{display:none}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;color:var(--accent);font-weight:500;min-width:40px;text-align:right}
  .sr input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none}
  .sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
  .tsw{display:inline-block;padding:4px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all .2s;border:1px solid var(--border);background:rgba(26,26,31,.4);color:var(--muted)}
  .tsw.on{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-right:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s}
  .btn-save:hover{border-color:var(--border-hover);color:#d4d4d8}
  .btn-save.saved{color:var(--rise);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}
  .page-footer{text-align:center;font-size:10px;color:var(--muted);margin-top:30px;padding:16px 0;font-weight:300}
  .loading-row{text-align:center;padding:24px;color:var(--muted);font-weight:300}

  /* Light mode */
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .top-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.3)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .tsw{background:rgba(255,255,255,.6);border-color:var(--divider);color:var(--muted)}
  html[data-theme="light"] .tsw.on{background:var(--accent-subtle);color:var(--accent)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>
(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

  <!-- ═══════════════════════════════════════════════════
     导航栏：由 nav.js 自动生成
     ═══════════════════════════════════════════════════ -->
  <nav id="top-nav"></nav>

  <!-- ═══════════════════════════════════════════════════
     控制栏
     ═══════════════════════════════════════════════════ -->
  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px">
      <label>类型</label>
      <select id="mode" onchange="onModeChange()">
        <option value="stock">个股</option>
        <option value="index">指数</option>
      </select>
    </div>
    <div class="code-wrap">
      <div class="fld">
        <label>代码</label>
        <input type="text" id="stock-code" value="600519" style="width:100px"
               onkeydown="if(event.key==='Enter')run()">
        <span id="stock-name" style="margin-left:6px;font-weight:600;
              font-family:var(--font-display);font-size:1rem;color:var(--text-primary)"></span>
      </div>
    </div>
    <!-- 🔧 如果不需要周期选择，删掉这个 fld -->
    <div class="fld" style="flex:0.5;min-width:90px">
      <label>周期</label>
      <select id="period" onchange="renderChart()">
        <option value="day">日线</option>
        <option value="week">周线</option>
      </select>
    </div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════
     K线图
     ═══════════════════════════════════════════════════ -->
  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend"><!-- 🔧 图例内容 --></div>

  <!-- ═══════════════════════════════════════════════════
     左右分栏
     ═══════════════════════════════════════════════════ -->
  <div class="bottom-layout">
    <div class="bottom-left">

      <!-- 🔧 参数卡片（可复制多份） -->
      <div class="param-card" id="c1">
        <div class="param-card-hd" onclick="tc('c1')">
          <span class="dot" style="background:#C62828"></span> 参数组1
        </div>
        <div class="param-card-bd" id="c1-bd">
          <div class="sr">
            <span class="sl">参数名</span>
            <input type="range" id="p-xxx" min="0" max="100" value="50" oninput="svp('p-xxx')">
            <span class="sv" id="p-xxx-v">50%</span>
          </div>
        </div>
      </div>
      <!-- 🔧 参数卡片结束 -->

      <button class="btn-run" id="btn-run">回测</button>
      <button class="btn-save" id="btn-save">保存配置</button>
    </div>

    <div class="bottom-right">
      <div class="xhs-card">
        <div class="xhs-card-header">
          <span class="xhs-card-label">信号明细</span>
        </div>
        <div class="table-wrapper" id="table"></div>
      </div>

      <div class="xhs-card">
        <div class="xhs-card-header">
          <span class="xhs-card-label">单日排查</span>
        </div>
        <div style="padding:10px 14px;display:flex;gap:8px;align-items:center">
          <input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--border);
            border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);font-family:var(--font-body);flex:1">
          <button onclick="runDiag()" style="padding:7px 16px;background:var(--accent-subtle);color:var(--accent);
            border:1px solid var(--accent-border);border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;font-family:var(--font-body)">排查</button>
        </div>
        <div id="diag-result" style="padding:0 14px 12px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤ 投资手账本 · <!-- 🔧 页面名称 --></footer>
</div>

<!-- ═══════════════════════════════════════════════════
  脚本
  ═══════════════════════════════════════════════════ -->
<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/kline-chart.js"></script>
<script src="../shared/js/nav.js"></script>
<script>
// 🔧 初始化导航
Nav.init({brandIcon:'⬤',brandText:'模板回测',currentPage:'home'});

const API_URL='http://'+window.location.hostname+':8788';

// ─── 主题切换 ───
function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n);if(typeof renderChart==='function')renderChart()}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();

// ─── 通用工具函数 ───
function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
function tog(id){var b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off')}
function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
function svs(id,mul){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v){v.textContent=(parseInt(e.value)*mul).toFixed(mul<1?1:0)}}
function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}
function stog(id,on){var b=document.getElementById(id);if(b)b.className='tsw '+(on?'on':'off')}

// ─── 数据变量 ───
var dl=[],wk=[],signals=[],kc,runId=0;

document.addEventListener('DOMContentLoaded',async()=>{
  var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
  document.getElementById('date-start').value=ago.toISOString().split('T')[0];
  document.getElementById('date-end').value=now.toISOString().split('T')[0];
  document.getElementById('diag-date').value=now.toISOString().split('T')[0];
  document.getElementById('btn-run').addEventListener('click',function(){run()});
  document.getElementById('btn-save').addEventListener('click',saveCfg);
  await loadCfg();
  setTimeout(function(){run(true)},800);
});

function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600519':'000300';run()}

// 🔧 核心逻辑：替换 API 路径和数据处理
async function run(auto){
  runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
  var code=document.getElementById('stock-code').value.trim();
  var mode=document.getElementById('mode').value;
  if(!code){if(!auto)btn.disabled=false;if(!auto)btn.textContent='回测';return}
  try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
  try{
    var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
    // 🔧 替换为你的 API 端点
    var resp=await fetch(API_URL+'/api/YOUR-ENDPOINT?stock='+code+'&date='+end+'&start='+start+'&mode='+mode);
    var data=await resp.json();if(runId!==myId)return;
    dl=data.daily||[];wk=data.weekly||[];signals=data.signals||[];
    renderChart();renderTable();if(!auto)btn.textContent='回测';
  }catch(e){console.error(e);if(!auto)btn.textContent='❌'}
  if(!auto)btn.disabled=false;
}

// 🔧 K线图渲染
function renderChart(){
  var period=document.getElementById('period').value;
  var kl=period==='day'&&dl.length?dl:wk;
  if(!kl.length)return;
  var sm={},sigs=[],xmarks=[];
  signals.forEach(function(s){
    var d=kl.find(function(k){return k.date===s.signal_date});
    if(!d)return;
    sigs.push({signal_date:s.signal_date,buy_point:d.high,drawdown_pct:0});
    sm[s.signal_date]={buy_point:d.high,drawdown_pct:0,label:s.label};
  });
  if(!kc||(kc.chart&&kc.chart.isDisposed())){
    kc=KlineChart.create({container:document.getElementById('chart'),klines:kl,signals:sigs,signalMap:sm,signalColor:'#C62828',extraMarkers:xmarks});
  }kc.update(kl,sigs,sm,xmarks)
}

// 🔧 信号表格
function renderTable(){
  var div=document.getElementById('table');
  if(!signals.length){div.innerHTML='<div class="loading-row">无信号</div>';return}
  var h='<table class="mini-table"><thead><tr><th>#</th><th>日期</th><th>类型</th><th>详情</th></tr></thead><tbody>';
  [].concat(signals).reverse().forEach(function(s,i){
    h+='<tr><td>'+(signals.length-i)+'</td><td style="font-weight:500">'+s.signal_date+'</td><td>'+s.label+'</td><td>—</td></tr>';
  });
  div.innerHTML=h+'</tbody></table>';
}

// ─── 保存/加载配置 ───
function gp(){return {/* 🔧 返回参数对象 */}}
async function saveCfg(){var btn=document.getElementById('btn-save');btn.textContent='⏳';var p=gp();var y='# config\n';for(var k in p){y+=k+':\n';for(var k2 in p[k]){y+='  '+k2+': '+p[k][k2]+'\n'}}
  try{var r=await fetch(API_URL+'/api/config?signal_type=YOUR_TYPE',{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();
  if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='保存配置';btn.classList.remove('saved')},2000)}}catch(e){btn.textContent='❌'}}
async function loadCfg(){try{var r=await fetch(API_URL+'/api/config?signal_type=YOUR_TYPE',{cache:'no-store'});var c=await r.json();}catch(e){}}

// 🔧 排查功能
async function runDiag(){
  var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
  if(!date){div.style.display='none';return}
  var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
  div.innerHTML='<div style="font-size:11px;color:var(--muted);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
  try{
    var resp=await fetch(API_URL+'/api/YOUR-ENDPOINT/diag?stock='+code+'&date='+date+'&mode='+mode);
    var d=await resp.json();
    var h='<table class="mini-table"><thead><tr><th>条件</th><th>值</th></tr></thead><tbody>';
    h+='</tbody></table>';div.innerHTML=h;
  }catch(e){div.innerHTML='<div style="font-size:11px;color:var(--fall)">请求失败</div>'}}
</script>
</body>
</html>

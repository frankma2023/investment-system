<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title><!-- 🔧 页面标题 --></title>

<!-- ═══════════════════════════════════════════════════
  共享资源：4个CSS + nav.js + kline-chart.js + theme.js
  所有回测看板统一引用，不做修改
  ═══════════════════════════════════════════════════ -->
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">

<style>
  /* ═══════════════════════════════════════════════════
     页面特有样式（只写这里，不要覆盖共享CSS）
     ═══════════════════════════════════════════════════ */
  .chart-wrap{height:520px;margin-bottom:4px}
  /* 🔧 按信号类型加 .s-xxx 颜色类 */
</style>
</head>
<body>
<div class="app-container">

  <!-- ═══════════════════════════════════════════════════
     导航栏：由 nav.js 自动生成
     ═══════════════════════════════════════════════════ -->
  <nav id="top-nav"></nav>

  <!-- ═══════════════════════════════════════════════════
     控制栏：类型 | 代码 | 周期 | 日期
     ═══════════════════════════════════════════════════ -->
  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px">
      <label>类型</label>
      <select id="mode" onchange="onModeChange()">
        <option value="stock">个股</option>
        <option value="index">指数</option>
      </select>
    </div>
    <div class="code-wrap">
      <div class="fld">
        <label>代码</label>
        <input type="text" id="stock-code" value="600519" style="width:100px"
               onkeydown="if(event.key==='Enter')run()">
        <span id="stock-name" style="margin-left:6px;font-weight:700;
              font-family:var(--font-display);font-size:0.85rem"></span>
      </div>
    </div>
    <!-- 🔧 如果不需要周期选择，删掉这个 fld -->
    <div class="fld" style="flex:0.5;min-width:90px">
      <label>周期</label>
      <select id="period" onchange="renderChart()">
        <option value="day">日线</option>
        <option value="week">周线</option>
      </select>
    </div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════
     K线图：由 kline-chart.js 或 原生 ECharts 渲染
     ═══════════════════════════════════════════════════ -->
  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend"><!-- 🔧 图例内容 --></div>

  <!-- ═══════════════════════════════════════════════════
     左右分栏：左参数 + 右信号表格
     ═══════════════════════════════════════════════════ -->
  <div class="bottom-layout">
    <div class="bottom-left">

      <!-- 🔧 替换为你的参数卡片（复制这个 param-card 块） -->
      <div class="param-card" id="c1">
        <div class="param-card-hd" onclick="tc('c1')">
          <span class="dot" style="background:#C62828"></span>🟥 参数组1
        </div>
        <div class="param-card-bd" id="c1-bd">
          <div class="sr">
            <span class="sl">参数名</span>
            <input type="range" id="p-xxx" min="0" max="100" value="50" oninput="svp('p-xxx')">
            <span class="sv" id="p-xxx-v">50%</span>
          </div>
        </div>
      </div>
      <!-- 🔧 参数卡片结束 -->

      <button class="btn-run" id="btn-run">🔍 回测</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>

    <div class="bottom-right">
      <div class="xhs-card">
        <div class="xhs-card-header">
          <span class="xhs-card-label">📋 信号明细</span>
        </div>
        <div class="table-wrapper" id="table"></div>
      </div>

      <div class="xhs-card">
        <div class="xhs-card-header">
          <span class="xhs-card-label">🔎 单日排查</span>
        </div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center">
          <input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);
            border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1">
          <button onclick="runDiag()" style="padding:7px 16px;background:var(--color-accent);color:#FFF;
            border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button>
        </div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤️ 投资手账本 · <!-- 🔧 页面名称 --></footer>
</div>

<!-- ═══════════════════════════════════════════════════
  脚本：共享JS + 页面业务逻辑
  ═══════════════════════════════════════════════════ -->
<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/kline-chart.js"></script>
<script src="../shared/js/theme.js"></script>
<script src="../shared/js/nav.js"></script>
<script>
// 🔧 初始化：替换 brandIcon / brandText / currentPage
Nav.init({brandIcon:'📊',brandText:'模板回测',brandSub:'Template',currentPage:'home'});

const API_URL='http://localhost:8788';

// ─── 通用工具函数（不要删） ───
function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
function tog(id){var b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off')}
function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
function svs(id,mul){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v){v.textContent=(parseInt(e.value)*mul).toFixed(mul<1?1:0)}}
function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}
function stog(id,on){var b=document.getElementById(id);if(b)b.className='tsw '+(on?'on':'off')}

// 🔧 数据变量（按页面调整）
var dl=[],wk=[],signals=[],kc,runId=0;

document.addEventListener('DOMContentLoaded',async()=>{
  var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
  document.getElementById('date-start').value=ago.toISOString().split('T')[0];
  document.getElementById('date-end').value=now.toISOString().split('T')[0];
  document.getElementById('diag-date').value=now.toISOString().split('T')[0];
  document.getElementById('btn-run').addEventListener('click',function(){run()});
  document.getElementById('btn-save').addEventListener('click',saveCfg);
  await loadCfg();
  setTimeout(function(){run(true)},800);
});

function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600519':'000300';run()}

// 🔧 核心逻辑：替换 API 路径和数据处理
async function run(auto){
  runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
  var code=document.getElementById('stock-code').value.trim();
  var mode=document.getElementById('mode').value;
  if(!code){if(!auto)btn.disabled=false;if(!auto)btn.textContent='📊';return}
  try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
  try{
    var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
    // 🔧 替换为你的 API 端点
    var resp=await fetch(API_URL+'/api/YOUR-ENDPOINT?stock='+code+'&date='+end+'&start='+start+'&mode='+mode);
    var data=await resp.json();if(runId!==myId)return;
    dl=data.daily||[];wk=data.weekly||[];signals=data.signals||[];
    renderChart();renderTable();if(!auto)btn.textContent='🔍 回测';
  }catch(e){console.error(e);if(!auto)btn.textContent='❌'}
  if(!auto)btn.disabled=false;
}

// 🔧 K线图渲染：替换信号处理逻辑
function renderChart(){
  var period=document.getElementById('period').value;
  var kl=period==='day'&&dl.length?dl:wk;
  if(!kl.length)return;
  var sm={},sigs=[],xmarks=[];
  // 🔧 处理信号 → sigs + sm + xmarks
  signals.forEach(function(s){
    var d=kl.find(function(k){return k.date===s.signal_date});
    if(!d)return;
    sigs.push({signal_date:s.signal_date,buy_point:d.high,drawdown_pct:0});
    sm[s.signal_date]={buy_point:d.high,drawdown_pct:0,label:s.label};
  });
  if(!kc||(kc.chart&&kc.chart.isDisposed())){
    kc=KlineChart.create({container:document.getElementById('chart'),klines:kl,signals:sigs,signalMap:sm,signalColor:'#C62828',extraMarkers:xmarks});
  }else{kc.update(kl,sigs,sm,xmarks)}
}

// 🔧 信号表格：替换列定义
function renderTable(){
  var div=document.getElementById('table');
  if(!signals.length){div.innerHTML='<div class="loading-row">无信号</div>';return}
  var h='<table><thead><tr><th>#</th><th>日期</th><th>类型</th><th>详情</th></tr></thead><tbody>';
  [].concat(signals).reverse().forEach(function(s,i){
    h+='<tr><td>'+(signals.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td>'+s.label+'</td><td>—</td></tr>';
  });
  div.innerHTML=h+'</tbody></table>';
}

// ─── 保存/加载配置（不要删） ───
function gp(){return {/* 🔧 返回你的参数对象 */}}
async function saveCfg(){var btn=document.getElementById('btn-save');btn.textContent='⏳';var p=gp();for(var k in p){var y='# config\n'+k+':\n';for(var k2 in p[k]){y+='  '+k2+': '+p[k][k2]+'\n'}}
  try{var r=await fetch(API_URL+'/api/config?signal_type=YOUR_TYPE',{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();
  if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾';btn.classList.remove('saved')},2000)}}catch(e){btn.textContent='❌'}}
async function loadCfg(){try{var r=await fetch(API_URL+'/api/config?signal_type=YOUR_TYPE',{cache:'no-store'});var c=await r.json();/* 🔧 加载参数到 slider */}catch(e){}}

// 🔧 排查功能：替换 API 路径
async function runDiag(){
  var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
  if(!date){div.style.display='none';return}
  var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
  div.innerHTML='<div style="font-size:0.68rem;color:var(--text-tertiary);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
  try{
    // 🔧 替换为你的 diag API
    var resp=await fetch(API_URL+'/api/YOUR-ENDPOINT/diag?stock='+code+'&date='+date+'&mode='+mode);
    var d=await resp.json();
    var h='<table style="margin:0;font-size:0.62rem"><thead><tr><th>条件</th><th>值</th></tr></thead><tbody>';
    // 🔧 渲染 diag 结果
    h+='</tbody></table>';div.innerHTML=h;
  }catch(e){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">请求失败</div>'}}
</script>
<script>
  // 🔧 注意：Nav.init 必须在 nav.js 加载后执行，但 nav.js 是同步的
  // 如果 Nav 未定义，说明 nav.js 加载失败
</script>
</body>
</html>

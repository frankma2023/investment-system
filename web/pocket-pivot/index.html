<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}

  .bottom-left{flex:1;min-width:0}

  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}

  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}

.top-bar { display:flex; gap:12px; align-items:flex-end; padding:16px 20px; background:var(--card-bg); border-radius:18px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,0.04); }

    .param-card { background:var(--card-bg); border:1px solid var(--divider); border-radius:16px; overflow:hidden; }

    @media (max-width:900px) { .bottom-layout { flex-direction:column; } .bottom-left { width:100%; } }

<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>

          <div class="sr"><span class="sl">收盘位置</span><input type="range" id="p-cp" min="30" max="90" value="50" oninput="sv('p-cp')"><span class="sv" id="p-cp-v">50%</span></div>

          <div class="sr"><span class="sl">最大涨幅</span><input type="range" id="p-em" min="20" max="200" value="50" oninput="sv('p-em')"><span class="sv" id="p-em-v">50%</span></div>

          <div class="sr"><span class="sl">距离阈值</span><input type="range" id="p-ma" min="5" max="50" value="20" oninput="svp2('p-ma')"><span class="sv" id="p-ma-v">2.0%</span></div>

          <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--color-accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>

  <script src="../shared/js/api-client.js"></script>
  <script>
    const ST='pocket_pivot';
    function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed');}
    function tog(id){const b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off');if(id==='p-sl-on'){const r=document.getElementById('p-sl-row');if(r)r.style.display=b.classList.contains('on')?'flex':'none';}}
    function sv(id){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value;}
    function svp2(id){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=(parseInt(e.value)/10).toFixed(1)+'%';}
    let ck=[],cs=[],chart;

    document.addEventListener('DOMContentLoaded',async()=>{
      const now=new Date();document.getElementById('date-end').value=now.toISOString().split('T')[0];
      const ago=new Date(now);ago.setFullYear(ago.getFullYear()-3);
      document.getElementById('date-start').value=ago.toISOString().split('T')[0];
      chart=echarts.init(document.getElementById('chart'));
      document.getElementById('btn-run').addEventListener('click',run);
      document.getElementById('btn-save').addEventListener('click',saveCfg);
      await loadCfg();setTimeout(run,500);
      // 监听主题切换，重绘图表
      new MutationObserver(function(){if(ck.length){chart.dispose();chart=echarts.init(document.getElementById('chart'));renderChart();}}).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
    });

    function gp(){return {pocket_pivot:{
      sma10_check:document.getElementById('p-s10-on').classList.contains('on'),sma50_check:document.getElementById('p-s50-on').classList.contains('on'),
      sma50_slope_10d:parseInt(document.getElementById('p-sl').value)/1000,
      sma50_slope_enabled:document.getElementById('p-sl-on').classList.contains('on'),
      close_position_min:parseInt(document.getElementById('p-cp').value)/100,
      require_green:document.getElementById('p-gr-on').classList.contains('on'),
      vol_down_lookback:parseInt(document.getElementById('p-vl').value),
      vol_fallback_enabled:document.getElementById('p-vf-on').classList.contains('on'),
      extension_lookback:parseInt(document.getElementById('p-el').value),
      extension_max_pct:parseInt(document.getElementById('p-em').value)/100,
      rs_threshold:parseInt(document.getElementById('p-rs').value),
      rs_dual_require:document.getElementById('p-rd-on').classList.contains('on'),
      ma10_bounce_proximity:parseInt(document.getElementById('p-ma').value)/1000,
      below_65d_high:document.getElementById('p-bh-on').classList.contains('on'),
    }};}

    async function run(){
      const btn=document.getElementById('btn-run');btn.disabled=true;btn.textContent='⏳';
      const code=document.getElementById('stock-code').value;
      const per=document.getElementById('period').value;
      console.log('period:',per,'select value:',document.getElementById('period').value);
      if(!code){btn.disabled=false;btn.textContent='❌';return;}
      try{const nr=await fetch(API_BASE+'/api/stock-name?code='+code);if(nr.ok){const nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||'';}}catch(e){}
      try{const r=await fetch(API_BASE+'/api/pocket-pivot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stock_code:code,start:document.getElementById('date-start').value,end:document.getElementById('date-end').value,mode:document.getElementById('mode').value,period:document.getElementById('period').value,params:gp()})});if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();ck=d.klines||[];cs=d.signals||[];renderChart();renderTable();btn.textContent='🔄';}catch(e){console.error(e);btn.textContent='❌';}
      btn.disabled=false;
    }

    function renderChart(){
      if(!chart||!ck.length)return;
      const dates=ck.map(k=>k.date);
      var ma=function(p){var r=[],sum=0;for(var i=0;i<ck.length;i++){if(ck[i].close!=null){sum+=ck[i].close;if(i>=p){sum-=ck[i-p].close;r.push(sum/p);}else{r.push(null);}}else{r.push(null);}}return r;};
      var ma5=ma(5),ma10=ma(10),ma20=ma(20),ma60=ma(60),ma250=ma(250);
      var mc=['#FF9800','#2196F3','#4CAF50','#9C27B0','#795548'];
      const colors=['#FF9800','#2196F3','#4CAF50','#9C27B0','#00BCD4','#E91E63'];
      const points=[];cs.forEach((s,i)=>{const si=dates.indexOf(s.date);if(si<0)return;const cl=s.pivot_type==='10ma_bounce'?colors[2]:colors[0];points.push({value:[si,s.close],symbol:'triangle',symbolSize:16,symbolRotate:180,itemStyle:{color:cl,borderColor:'#FFF',borderWidth:0.8}});});
      const fmt=function(v){if(v==null)return'—';if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(0)+'万';return v.toFixed(0);};
      var bg=document.documentElement.dataset.theme==='dark'?'#2A2627':'#fff';
      chart.setOption({
        backgroundColor:bg,tooltip:{trigger:'axis',axisPointer:{type:'cross',crossStyle:{color:'#999'}},backgroundColor:'rgba(255,255,255,0.75)',textStyle:{fontSize:10},formatter:function(params){if(!params||!params.length)return'';var k=ck[params[0].dataIndex];if(!k)return'';var chg=k.close-k.open;var raw=k.change_pct!=null?k.change_pct:null;var chgPct=raw!=null?(Math.abs(raw)>1?raw:raw*100).toFixed(2):(k.open>0?(chg/k.open*100).toFixed(2):'0.00');var col=chg>=0?'#E53935':'#26C6DA';return '<span style=font-size:12px;font-weight:700>'+k.date+'</span><br/>开盘：<b>'+k.open.toFixed(2)+'</b><br/>最高：<b>'+k.high.toFixed(2)+'</b><br/>最低：<b>'+k.low.toFixed(2)+'</b><br/>收盘：<b style=color:'+col+'>'+k.close.toFixed(2)+'</b><br/>涨跌：<b style=color:'+col+'>'+(chg>=0?'+':'')+chg.toFixed(2)+' ('+(chg>=0?'+':'')+chgPct+'%)</b><br/>成交量：<b>'+fmt(k.volume)+'</b><br/>成交额：<b>'+fmt(k.amount)+'</b>';}},axisPointer:{link:[{xAxisIndex:'all'}]},
        grid:[{left:'8%',right:'1%',top:8,height:'60%'},{left:'8%',right:'1%',top:'75%',height:'15%'}],
        xAxis:[{type:'category',data:dates,axisLabel:{fontSize:9},axisLine:{lineStyle:{color:'rgba(128,128,128,0.3)'}}},{type:'category',data:dates,axisLabel:{show:false},axisLine:{lineStyle:{color:'rgba(128,128,128,0.3)'}},gridIndex:1}],
        yAxis:[{type:'value',scale:true,axisLabel:{fontSize:9},splitLine:{lineStyle:{color:'rgba(128,128,128,0.15)'}}},{type:'value',scale:true,axisLabel:{fontSize:8},gridIndex:1,splitLine:{show:false}}],
        dataZoom:[{type:'inside',xAxisIndex:[0,1],start:0,end:100},{type:'slider',xAxisIndex:[0,1],start:0,end:100,height:16,bottom:4}],
        series:[{name:'K线',type:'candlestick',data:ck.map(k=>[k.open,k.close,k.low,k.high]),itemStyle:{color:'#E53935',color0:'#26C6DA',borderColor:'#E53935',borderColor0:'#26C6DA'}},
          {name:'成交量',type:'bar',data:ck.map((k,i)=>({value:k.volume,itemStyle:{color:ck[i].close>=ck[i].open?'rgba(229,57,53,0.4)':'rgba(38,198,218,0.4)'}})),xAxisIndex:1,yAxisIndex:1},
          {name:'MA5',type:'line',data:ma5,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[0]}},{name:'MA10',type:'line',data:ma10,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[1]}},{name:'MA20',type:'line',data:ma20,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[2]}},{name:'MA60',type:'line',data:ma60,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[3]}},{name:'MA250',type:'line',data:ma250,smooth:true,symbol:'none',lineStyle:{width:1,color:mc[4]}},
          {name:'口袋支点',type:'scatter',data:points,z:10}]});
    }

    function renderTable(){const div=document.getElementById('table');if(!cs.length){div.innerHTML='<div style=padding:24px;text-align:center;color:var(--text-tertiary)>无信号</div>';return;}let h='<table><thead><tr><th>#</th><th>日期</th><th>收盘</th><th>类型</th><th>收盘位</th><th>量比</th><th>SMA50</th><th>SMA10</th><th>RS_20</th><th>RS_250</th></tr></thead><tbody>';[...cs].reverse().forEach((s,i)=>{h+='<tr><td>'+(cs.length-i)+'</td><td style=font-weight:700>'+s.date+'</td><td class=t-up>'+s.close.toFixed(2)+'</td><td>'+(s.pivot_type==='10ma_bounce'?'<span style=color:#4CAF50>10日线</span>':'延续')+'</td><td>'+Math.round(s.close_position*100)+'%</td><td>'+s.vol_ratio.toFixed(2)+'</td><td>'+s.sma50.toFixed(0)+'</td><td>'+s.sma10.toFixed(0)+'</td><td>'+(s.rs_20||'-')+'</td><td>'+(s.rs_250||'-')+'</td></tr>';});div.innerHTML=h+'</tbody></table>';}

    function runDiag(){const date=document.getElementById('diag-date').value;const div=document.getElementById('diag-result');if(!date||!ck.length){div.style.display='none';return;}var idx=ck.findIndex(function(r){return r.date===date;});if(idx<0){div.innerHTML='<div style=font-size:0.7rem;color:#FF6B6B>该日期不在K线范围内</div>';div.style.display='block';return;}var k=ck[idx],p=gp().pocket_pivot;var sma10=0,sma50=0;if(idx>=10){var cs=[];for(var j=idx-10;j<idx;j++)if(ck[j].close!=null)cs.push(ck[j].close);if(cs.length)sma10=cs.reduce(function(a,b){return a+b})/cs.length;}if(idx>=50){var cs=[];for(var j=idx-50;j<idx;j++)if(ck[j].close!=null)cs.push(ck[j].close);if(cs.length)sma50=cs.reduce(function(a,b){return a+b})/cs.length;}var sma50_s=0;if(idx>=60){var cs2=[];for(var j=idx-60;j<idx-10;j++)if(ck[j].close!=null)cs2.push(ck[j].close);var sma50_old=cs2.length?cs2.reduce(function(a,b){return a+b})/cs2.length:0;if(sma50_old>0)sma50_s=(sma50-sma50_old)/sma50_old*100;}var c1a=p.sma10_check!==false?sma10>0&&k.close>sma10:true;var c1b=p.sma50_check!==false?sma50>0&&k.close>sma50:true;var c1c=p.sma50_slope_enabled!==false?sma50_s>=p.sma50_slope_10d*100:true;var pos=k.high!=k.low?(k.close-k.low)/(k.high-k.low)*100:100;var c2a=pos>=p.close_position_min*100;var c2b=p.require_green!==false?k.close>k.open:true;var mdv=0,hd=false;for(var j=Math.max(0,idx-p.vol_down_lookback);j<idx;j++){if(ck[j].close<ck[j].open){hd=true;if(ck[j].volume>mdv)mdv=ck[j].volume;}}var c3=hd?k.volume>mdv:p.vol_fallback_enabled!==false;var low65=999999,high65=0;for(var j=Math.max(0,idx-p.extension_lookback);j<idx;j++){if(ck[j].close!=null){if(ck[j].close<low65)low65=ck[j].close;if(ck[j].close>high65)high65=ck[j].close;}}var c4=low65>0?k.close<=low65*(1+p.extension_max_pct):true;var c4b=p.below_65d_high!==false?k.close<=high65:true;function cc(v,d){return v?'<td style=color:#4CAF50>✅ '+d+'</td>':'<td style=color:#FF6B6B>❌ '+d+'</td>';}function fm2(v){if(v==null)return'—';if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(0)+'万';return v.toFixed(0);}var t='<table style=margin:0;font-size:0.68rem><thead><tr><th>条件</th><th>实际值</th><th>阈值</th><th>判定</th></tr></thead><tbody>';t+='<tr><td>① SMA10</td><td>'+sma10.toFixed(2)+'</td><td>C='+k.close.toFixed(2)+'</td>'+cc(c1a,'close>SMA10')+'</tr>';t+='<tr><td>① SMA50</td><td>'+sma50.toFixed(2)+'</td><td>C='+k.close.toFixed(2)+'</td>'+cc(c1b,'close>SMA50')+'</tr>';t+='<tr><td>① SMA50斜率</td><td>'+sma50_s.toFixed(3)+'%</td><td>≥'+(p.sma50_slope_10d*100).toFixed(1)+'%</td>'+cc(c1c,'')+'</tr>';t+='<tr><td>② 收盘位置</td><td>'+pos.toFixed(0)+'%</td><td>≥'+(p.close_position_min*100).toFixed(0)+'%</td>'+cc(c2a,'')+'</tr>';t+='<tr><td>② 阳线</td><td>'+(k.close>k.open?'是':'否')+'</td><td>是</td>'+cc(c2b,'')+'</tr>';t+='<tr><td>③ 量>10日阴线</td><td>量='+fm2(k.volume)+(hd?' 最大阴量='+fm2(mdv):' 无阴线')+'</td><td>逐日对比</td>'+cc(c3,'')+'</tr>';t+='<tr><td>④ 65日低涨幅</td><td>'+((k.close-low65)/low65*100).toFixed(1)+'%</td><td>≤'+(p.extension_max_pct*100).toFixed(0)+'%</td>'+cc(c4,'')+'</tr>';t+='<tr><td>④ 不超65日高</td><td>C='+k.close.toFixed(2)+' vs H65='+high65.toFixed(2)+'</td><td>C≤H65</td>'+cc(c4b,'')+'</tr>';t+='<tr id=diag-rs-row><td>⑤ RS (加载中)</td><td colspan=3 style=color:var(--text-tertiary)>获取中...</td></tr>';var all=c1a&&c1b&&c1c&&c2a&&c2b&&c3&&c4&&c4b;t+='<tr style=border-top:2px solid var(--divider)><td style=font-weight:900>综合</td><td colspan=2></td><td style=font-weight:900;font-size:0.85rem;color:#999>RS加载中...</td></tr></tbody></table>';div.innerHTML='<div style=font-size:0.6rem;color:var(--text-tertiary);margin-bottom:6px>'+date+' O='+k.open.toFixed(2)+' H='+k.high.toFixed(2)+' L='+k.low.toFixed(2)+' C='+k.close.toFixed(2)+'</div>'+t;div.style.display='block';
    var code=document.getElementById('stock-code').value;var mode=document.getElementById('mode').value;
    fetch(API_BASE+'/api/pocket-pivot-rs?code='+code+'&date='+date+'&mode='+mode).then(function(r){return r.json();}).then(function(rs){
      if(rs&&rs.rs_20!=null){all=all&&(p.rs_dual_require?(rs.rs_20>=p.rs_threshold&&rs.rs_250>=p.rs_threshold):(rs.rs_20>=p.rs_threshold||rs.rs_250>=p.rs_threshold));document.getElementById('diag-rs-row').innerHTML='<td>⑤ RS_20</td><td>'+(rs.rs_20!=null?rs.rs_20:'—')+'</td><td>≥'+p.rs_threshold+'</td>'+cc(rs.rs_20>=p.rs_threshold,'')+'</tr><tr><td>⑤ RS_250</td><td>'+(rs.rs_250!=null?rs.rs_250:'—')+'</td><td>≥'+p.rs_threshold+'</td>'+cc(p.rs_dual_require?(rs.rs_20>=p.rs_threshold&&rs.rs_250>=p.rs_threshold):(rs.rs_20>=p.rs_threshold||rs.rs_250>=p.rs_threshold),p.rs_dual_require?'双RS':'任一满足');}else{document.getElementById('diag-rs-row').innerHTML='<td>⑤ RS</td><td colspan=2>无数据（已跳过）</td><td style=color:#4CAF50>✅ 跳过</td>';}
      var trs=document.querySelectorAll('#diag-result tr');var last=trs[trs.length-1];last.cells[3].innerHTML='<span style=font-weight:900;font-size:0.85rem;color:'+(all?'#4CAF50':'#FF6B6B')+'">'+(all?'🎯 应为口袋支点':'❌ 不满足')+'</span>';
    }).catch(function(){document.getElementById('diag-rs-row').innerHTML='<td>⑤ RS</td><td colspan=3 style=color:#FF6B6B>获取失败</td>';});}

    async function loadCfg(){try{const r=await fetch(API_BASE+'/api/config?signal_type='+ST,{cache:'no-store'});const c=await r.json();if(!c||!c.pocket_pivot)return;const b=c.pocket_pivot;stog('p-s10-on',b.sma10_check!==false);stog('p-s50-on',b.sma50_check!==false);stog('p-sl-on',b.sma50_slope_enabled!==false);svs('p-sl',Math.round((b.sma50_slope_10d||0.002)*1000));svs('p-cp',Math.round((b.close_position_min||0.5)*100));stog('p-gr-on',b.require_green!==false);svs('p-vl',b.vol_down_lookback||10);stog('p-vf-on',b.vol_fallback_enabled!==false);svs('p-el',b.extension_lookback||65);svs('p-em',Math.round((b.extension_max_pct||0.5)*100));svs('p-rs',b.rs_threshold||80);stog('p-rd-on',b.rs_dual_require===true);svs('p-ma',Math.round((b.ma10_bounce_proximity||0.02)*1000));stog('p-bh-on',b.below_65d_high!==false);}catch(e){}}
    function svs(id,v){const e=document.getElementById(id);if(!e)return;e.value=v;e.dispatchEvent(new Event('input',{bubbles:true}));}
    function stog(id,on){const b=document.getElementById(id);if(!b)return;b.className='tsw '+(on?'on':'off');}

    async function saveCfg(){const btn=document.getElementById('btn-save');btn.textContent='⏳';btn.disabled=true;const p=gp().pocket_pivot;const y=['# 口袋支点参数','pocket_pivot:','  sma10_check: '+(p.sma10_check?'true':'false'),'  sma50_check: '+(p.sma50_check?'true':'false'),'  sma50_slope_10d: '+p.sma50_slope_10d,'  sma50_slope_enabled: '+(p.sma50_slope_enabled?'true':'false'),'  close_position_min: '+p.close_position_min,'  require_green: '+(p.require_green?'true':'false'),'  vol_down_lookback: '+p.vol_down_lookback,'  vol_fallback_enabled: '+(p.vol_fallback_enabled?'true':'false'),'  extension_lookback: '+p.extension_lookback,'  extension_max_pct: '+p.extension_max_pct,'  rs_threshold: '+p.rs_threshold,'  rs_dual_require: '+(p.rs_dual_require?'true':'false'),'  ma10_bounce_proximity: '+p.ma10_bounce_proximity,'  below_65d_high: '+(p.below_65d_high?'true':'false'),''].join('\n');try{const r=await fetch(API_BASE+'/api/config?signal_type='+ST,{method:'POST',headers:{'Content-Type':'text/plain'},body:y});const d=await r.json();if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(()=>{btn.textContent='💾';btn.classList.remove('saved');btn.disabled=false;},2000);}}catch(e){btn.textContent='❌';btn.disabled=false;}}
  </script>

(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();

<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg-deep: #040810;
  --bg-surface: rgba(8,16,32,0.9);
  --bg-card: rgba(12,22,42,0.7);
  --bg-card-hover: rgba(16,28,52,0.85);
  --border-glow: rgba(0,229,255,0.12);
  --border-bright: rgba(0,229,255,0.35);
  --border-subtle: rgba(0,229,255,0.06);
  --text-primary: #d0e8ff;
  --text-secondary: #6898c0;
  --text-tertiary: #306090;
  --neon-cyan: #00e5ff;
  --neon-magenta: #ff4081;
  --neon-green: #76ff03;
  --neon-amber: #ffab00;
  --color-up: #ff4466;
  --color-up-bg: rgba(255,68,102,0.08);
  --color-down: #00e676;
  --color-down-bg: rgba(0,230,118,0.08);
  --color-neutral: #ffab00;
  --color-accent: #00e5ff;
  --font-mono: 'Share Tech Mono','Noto Sans SC',monospace;
  --font-display: 'Orbitron','Noto Sans SC',sans-serif;
  --font-sans: 'Noto Sans SC',sans-serif;
  --shadow-card: 0 0 20px rgba(0,229,255,0.04), inset 0 0 0 1px rgba(0,229,255,0.06);
  --shadow-hover: 0 0 35px rgba(0,229,255,0.08), inset 0 0 0 1px rgba(0,229,255,0.12);
  --nav-bg: rgba(4,8,16,0.95);
  --nav-border: rgba(0,229,255,0.12);
}

[data-theme="light"] {
  --bg-deep: #e8f0f8;
  --bg-surface: rgba(240,248,255,0.9);
  --bg-card: rgba(255,255,255,0.85);
  --bg-card-hover: rgba(255,255,255,0.95);
  --border-glow: rgba(0,120,180,0.12);
  --border-bright: rgba(0,120,180,0.35);
  --border-subtle: rgba(0,120,180,0.06);
  --text-primary: #0a1a2a;
  --text-secondary: #3a5a7a;
  --text-tertiary: #6888a8;
  --neon-cyan: #0088cc;
  --neon-magenta: #cc3050;
  --neon-green: #2a8a3a;
  --neon-amber: #b87800;
  --color-up: #d43050;
  --color-up-bg: rgba(212,48,80,0.06);
  --color-down: #1a8a40;
  --color-down-bg: rgba(26,138,64,0.06);
  --color-neutral: #b87800;
  --color-accent: #0088cc;
  --shadow-card: 0 0 12px rgba(0,120,180,0.04);
  --shadow-hover: 0 0 24px rgba(0,120,180,0.08);
  --nav-bg: rgba(232,240,248,0.95);
  --nav-border: rgba(0,120,180,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.5;
  letter-spacing: 0.02em;
  min-height: 100vh;
  overflow-x: hidden;
}
body::after {
  content: ''; position:fixed; inset:0; z-index:9999; pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
}
body::before {
  content: ''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
[data-theme="light"] body::after { opacity: 0.4; }

.nav {
  position:sticky; top:0; z-index:100;
  background: var(--nav-bg); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--nav-border);
  display:flex; align-items:center; padding:0 24px; height:48px;
}
.nav::after {
  content:''; position:absolute; bottom:-1px; left:0;
  width:180px; height:2px;
  background: linear-gradient(90deg, var(--neon-cyan), transparent);
}
.nav-brand {
  font-family: var(--font-display);
  font-size: 0.7rem; font-weight: 700;
  color: var(--neon-cyan); letter-spacing: 0.12em;
  text-shadow: 0 0 10px rgba(0,229,255,0.4);
  margin-right: 24px; text-transform: uppercase;
}
.nav-links { display:flex; gap:1px; flex:1; overflow-x:auto; }
.nav-link {
  padding: 6px 14px; border-radius: 3px;
  font-size: 0.66rem; color: var(--text-secondary);
  text-decoration: none; white-space: nowrap;
  transition: all 0.2s; letter-spacing: 0.04em;
  font-family: var(--font-display);
}
.nav-link:hover { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,229,255,0.3); }
.nav-link.active {
  color: var(--neon-cyan);
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.15);
  box-shadow: 0 0 8px rgba(0,229,255,0.1);
}
.nav-actions { display:flex; align-items:center; gap:14px; margin-left:auto; }
.theme-btn {
  width: 32px; height: 32px; border-radius: 4px;
  border: 1px solid var(--border-glow);
  background: var(--bg-card); color: var(--neon-cyan);
  cursor: pointer; font-size: 0.85rem;
  display:flex; align-items:center; justify-content:center;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--border-bright); box-shadow: 0 0 12px rgba(0,229,255,0.15); }
.live-dot {
  width: 7px; height: 7px;
  background: var(--neon-green); border-radius: 50%;
  box-shadow: 0 0 6px var(--neon-green), 0 0 14px var(--neon-green);
  animation: syncPulse 1.5s ease-in-out infinite;
}
@keyframes syncPulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.3; transform:scale(0.5); } }

.main { max-width: 1520px; margin: 0 auto; padding: 20px 24px 40px; position:relative; z-index:1; }
.section { margin-bottom: 20px; }
.section-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border-glow);
}
.section-title {
  font-family: var(--font-display);
  font-size: 0.6rem; font-weight: 600;
  color: var(--neon-cyan); text-transform: uppercase;
  letter-spacing: 0.14em;
}
.section-badge {
  font-family: var(--font-display);
  font-size: 0.55rem; padding: 2px 10px;
  border-radius: 3px; letter-spacing: 0.08em;
  border: 1px solid var(--border-glow); color: var(--neon-cyan);
}
.badge-up { color: var(--color-up); border-color: rgba(255,68,102,0.2); }
.badge-neutral { color: var(--neon-amber); border-color: rgba(255,171,0,0.2); }

.stats-strip {
  display:grid; grid-template-columns:repeat(8,1fr);
  gap:1px; background:var(--border-glow);
  border-radius:4px; overflow:hidden;
  margin-bottom:20px; border:1px solid var(--border-glow);
}
.stat-cell { background:var(--bg-card); backdrop-filter:blur(8px); padding:12px 14px; text-align:center; }
.stat-label {
  font-size: 0.55rem; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.1em;
  font-family: var(--font-display);
}
.stat-value {
  font-family: var(--font-display); font-size: 0.9rem;
  font-weight: 700; margin-top: 2px; letter-spacing: 0.04em;
}
.stat-value.up { color: var(--color-up); text-shadow: 0 0 6px rgba(255,68,102,0.3); }
.stat-value.down { color: var(--color-down); text-shadow: 0 0 6px rgba(0,230,118,0.3); }
.stat-value.neutral { color: var(--neon-amber); }

.card {
  background: var(--bg-card); backdrop-filter: blur(10px);
  border: 1px solid var(--border-glow); border-radius: 4px;
  overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
  box-shadow: var(--shadow-card); position: relative;
}
.card:hover { border-color: var(--border-bright); box-shadow: var(--shadow-hover); }
.card::before {
  content:''; position:absolute; top:0; right:0; pointer-events:none;
  width:20px; height:20px;
  border-right: 1px solid rgba(0,229,255,0.1);
  border-top: 1px solid rgba(0,229,255,0.1);
}
.card-body { padding: 16px; }
.chart-container { width: 100%; }

.grid-2 { display:grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

.table-wrap { overflow-x: auto; max-height: 460px; overflow-y: auto; }
.data-table {
  width: 100%; border-collapse: collapse;
  font-family: var(--font-mono); font-size: 0.66rem; min-width: 1800px;
}
.data-table thead { position:sticky; top:0; z-index:2; }
.data-table th {
  background: rgba(8,16,32,0.95); color: var(--neon-cyan);
  font-weight: 400; text-align: right; padding: 5px 6px;
  font-size: 0.53rem; text-transform: uppercase;
  letter-spacing: 0.04em; border-bottom: 1px solid var(--border-bright);
  cursor: pointer; user-select: none; white-space: nowrap;
  font-family: var(--font-display);
}
.data-table th:hover { text-shadow: 0 0 10px rgba(0,229,255,0.4); }
.data-table th::after { content:' ↕'; font-size:0.5rem; opacity:0.3; }
.data-table th.sorted-asc::after { content:' ↑'; opacity:1; color:var(--color-up); }
.data-table th.sorted-desc::after { content:' ↓'; opacity:1; color:var(--color-down); }
.data-table td {
  padding: 4px 6px; text-align: right;
  border-bottom: 1px solid var(--border-subtle);
  white-space: nowrap; color: var(--text-primary);
  font-size: 0.62rem;
}
.data-table td:first-child, .data-table th:first-child { text-align: left; }
.data-table tr:hover td { background: rgba(0,229,255,0.03); }
.td-up { color: var(--color-up); }
.td-down { color: var(--color-down); }

.config-panel {
  background: var(--bg-card); backdrop-filter: blur(10px);
  border: 1px solid var(--border-glow); border-radius: 4px;
  box-shadow: var(--shadow-card); position: relative;
}
.config-panel::before {
  content:''; position:absolute; top:0; right:0; pointer-events:none;
  width:20px; height:20px;
  border-right: 1px solid rgba(0,229,255,0.1);
  border-top: 1px solid rgba(0,229,255,0.1);
}
.config-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 14px 18px; padding: 18px 22px;
}
.config-item { display:flex; flex-direction:column; gap:5px; }
.config-label {
  display:flex; justify-content:space-between;
  font-size: 0.58rem; color: var(--text-secondary);
  letter-spacing: 0.03em;
}
.config-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.config-val {
  font-weight: 700; color: var(--neon-cyan);
  font-family: var(--font-display); font-size: 0.65rem;
}
.config-slider {
  -webkit-appearance: none; width:100%; height:3px;
  border-radius:2px; background:rgba(0,229,255,0.1); outline:none;
}
.config-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width:14px; height:14px; border-radius:2px;
  background:var(--neon-cyan); cursor:pointer;
  border:2px solid var(--bg-card);
  box-shadow: 0 0 10px rgba(0,229,255,0.5);
}

@media (max-width:1200px) {
  .grid-2 { grid-template-columns:1fr; }
  .config-grid { grid-template-columns: repeat(4,1fr); }
  .stats-strip { grid-template-columns: repeat(4,1fr); }
}
@media (max-width:768px) {
  .config-grid { grid-template-columns: repeat(2,1fr); }
  .stats-strip { grid-template-columns: repeat(2,1fr); }
  .nav-links { display:none; }
}
</style>
</head>

<script>
/* ═══════════════════ THEME ═══════════════════ */
function toggleTheme() {
  var html = document.documentElement;
  var btn = document.querySelector('.theme-btn');
  var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  btn.textContent = next === 'dark' ? '◈' : '◈';
  localStorage.setItem('cyber-theme', next);
  setTimeout(redrawAllCharts, 100);
}
(function() {
  var saved = localStorage.getItem('cyber-theme') || 'dark';
  document.documentElement.dataset.theme = saved;
  document.querySelector('.theme-btn').textContent = saved === 'dark' ? '◈' : '◈';
})();

/* ═══════════════════ STATS ═══════════════════ */
function renderStatsStrip() {
  var stats = [
    {label:'PHASE',value:'RALLY',cls:'neutral'},{label:'DAY',value:'D+3',cls:''},
    {label:'RISK',value:'ELEVATED',cls:'neutral'},{label:'POS',value:'≤30%',cls:''},
    {label:'DD_25D',value:'4',cls:'down'},{label:'FTD',value:'CONFIRMED',cls:'up'},
    {label:'FTD_D',value:'Day 5',cls:''},{label:'HEALTH',value:'52/100',cls:'neutral'}
  ];
  document.getElementById('statsStrip').innerHTML = stats.map(function(s) {
    return '<div class="stat-cell"><div class="stat-label">'+s.label+'</div><div class="stat-value '+s.cls+'">'+s.value+'</div></div>';
  }).join('');
}
renderStatsStrip();

/* ═══════════════════ K-LINE DATA ═══════════════════ */
function generateKlineData() {
  var data = [];
  var o = 3800, h, l, c, vol;
  var start = new Date(2025, 6, 1);
  for (var i = 0; i < 200; i++) {
    var d = new Date(start);
    d.setDate(d.getDate() + i);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    var change = (Math.random() - 0.48) * 2.5;
    var hlRange = o * (0.005 + Math.random() * 0.025);
    h = o + hlRange * (0.3 + Math.random() * 0.7);
    l = o - hlRange * (0.3 + Math.random() * 0.7);
    c = o * (1 + change / 100);
    c = Math.max(l, Math.min(h, c));
    vol = (0.6 + Math.random() * 2.5) * 1e8;
    if (i > 160 && i < 170 && Math.random() < 0.3) { c = o * 0.985; h = o * 1.005; l = c * 0.99; vol *= 1.6; }
    if (i > 180 && i < 190) { c = o * (1.01 + Math.random() * 0.03); vol *= 1.5; }
    data.push({ date: d.toISOString().split('T')[0], open: +o.toFixed(2), close: +c.toFixed(2), high: +h.toFixed(2), low: +l.toFixed(2), volume: Math.round(vol), turnover: (vol * 0.008).toFixed(0), turnoverRate: (0.3 + Math.random() * 1.2).toFixed(2) });
    o = c;
  }
  return data;
}
var klineRawData = generateKlineData();

function calcMA(data, field, period) {
  return data.map(function(_, i) {
    if (i < period - 1) return null;
    var sum = 0;
    for (var j = i - period + 1; j <= i; j++) sum += data[j][field];
    return +(sum / period).toFixed(2);
  });
}

function getThemeColors() {
  var isDark = document.documentElement.dataset.theme === 'dark';
  return {
    upColor: isDark ? '#ff4466' : '#d43050',
    downColor: isDark ? '#00e676' : '#1a8a40',
    upBorder: isDark ? '#e03050' : '#b82840',
    downBorder: isDark ? '#00c860' : '#148030',
    axisColor: isDark ? '#306090' : '#80a0b8',
    axisSplitColor: isDark ? 'rgba(0,229,255,0.06)' : 'rgba(0,100,160,0.08)',
    textColor: isDark ? '#6898c0' : '#3a5a7a',
    bgColor: 'transparent',
    maColors: ['#ffab00','#00e5ff','#b388ff','#ff6e40','#40c4ff','#8d6e63'],
  };
}

/* ═══════════════════ K-LINE CHART ═══════════════════ */
function buildKlineChart() {
  var dom = document.getElementById('klineChart');
  var chart = echarts.init(dom, null, { devicePixelRatio: 2 });
  var tc = getThemeColors();
  var raw = klineRawData;
  var dates = raw.map(function(d) { return d.date; });
  var ohlc = raw.map(function(d) { return [d.open, d.close, d.low, d.high]; });
  var vols = raw.map(function(d) { return d.volume; });
  var mas = {};
  [5,10,20,50,120,250].forEach(function(p) { mas[p] = calcMA(raw, 'close', p); });

  chart.setOption({
    backgroundColor: tc.bgColor,
    animation: true,
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross', crossStyle: { color: tc.axisColor }, label: { backgroundColor: 'rgba(8,16,32,0.75)', color: tc.textColor } },
      backgroundColor: 'rgba(8,16,32,0.75)',
      borderColor: 'rgba(0,229,255,0.2)',
      textStyle: { color: '#d0e8ff', fontSize: 11, fontFamily: 'Share Tech Mono, monospace' },
      formatter: function(params) {
        var d = raw[params[0].dataIndex];
        var chg = (d.close - d.open).toFixed(2);
        var chgPct = ((d.close - d.open) / d.open * 100).toFixed(2);
        var color = d.close >= d.open ? tc.upColor : tc.downColor;
        return '<div style="font-size:12px;font-weight:700;color:#00e5ff;margin-bottom:6px;">◆ '+d.date+'</div>'+
          '<div>O <b>'+d.open+'</b> &nbsp; H <b style="color:'+tc.upColor+'">'+d.high+'</b> &nbsp; L <b style="color:'+tc.downColor+'">'+d.low+'</b></div>'+
          '<div>C <b>'+d.close+'</b> &nbsp; Δ <b style="color:'+color+'">'+chg+' ('+chgPct+'%)</b></div>'+
          '<div style="margin-top:4px;">VOL <b>'+((d.volume/1e8).toFixed(2))+'亿</b> &nbsp; AMT <b>'+((d.turnover/1e8).toFixed(2))+'亿</b></div>'+
          '<div>TO_R <b>'+d.turnoverRate+'%</b></div>';
      }
    },
    axisPointer: { link: [{ xAxisIndex: [0, 1] }] },
    grid: [
      { left: '8%', right: '8%', top: 50, height: '60%' },
      { left: '8%', right: '8%', top: '76%', height: '14%' }
    ],
    xAxis: [
      { type: 'category', data: dates, gridIndex: 0, axisLine: { lineStyle: { color: tc.axisColor } }, axisTick: { show: false }, axisLabel: { color: tc.textColor, fontSize: 9 }, splitLine: { show: false }, boundaryGap: true, axisPointer: { label: { show: false } } },
      { type: 'category', data: dates, gridIndex: 1, axisLine: { lineStyle: { color: tc.axisColor } }, axisTick: { show: false }, axisLabel: { show: false }, splitLine: { show: false }, boundaryGap: true }
    ],
    yAxis: [
      { scale: true, gridIndex: 0, axisLine: { lineStyle: { color: tc.axisColor } }, axisTick: { show: false }, splitLine: { lineStyle: { color: tc.axisSplitColor, type: 'dashed' } }, axisLabel: { color: tc.textColor, fontSize: 9, formatter: function(v) { return v.toFixed(0); } } },
      { scale: true, gridIndex: 1, axisLine: { lineStyle: { color: tc.axisColor } }, axisTick: { show: false }, splitLine: { lineStyle: { color: tc.axisSplitColor, type: 'dashed' } }, axisLabel: { color: tc.textColor, fontSize: 8, formatter: function(v) { return (v/1e8).toFixed(1)+'亿'; } } }
    ],
    dataZoom: [
      { type: 'inside', xAxisIndex: [0,1], start: 50, end: 100 },

    ],

      }
    ].concat([5,10,20,50,120,250].map(function(p, idx) {

    }))
  });

}

/* ═══════════════════ TABLE ═══════════════════ */
var tableColumns = ['CODE','NAME','PRICE','CHG%','PE','PB','ROE%','REV%','PROF%','EPS','RS20','RS120','MA50%','MA200%','TO_R%','VR','MCAP','FUNDS','DIST','RTG'];
var tableKeys = ['code','name','price','chg','pe','pb','roe','rev','profit','eps','rs20','rs120','ma50','ma200','turnover','volRatio','mcap','funds','distScore','rating'];
var stockCodes = ['600519','000858','300750','601012','002415','600036','000333','688981','000001','603259'];
var stockNames = ['贵州茅台','五粮液','宁德时代','隆基绿能','海康威视','招商银行','美的集团','中芯国际','平安银行','药明康德'];

function genTableData() {
  return stockCodes.map(function(code, i) {
    return {
      code: code, name: stockNames[i],
      price: (30 + Math.random() * 300).toFixed(2),
      chg: ((Math.random() - 0.45) * 8).toFixed(2),
      pe: (15 + Math.random() * 60).toFixed(1),
      pb: (1.5 + Math.random() * 8).toFixed(1),
      roe: (5 + Math.random() * 25).toFixed(1),
      rev: ((Math.random() - 0.3) * 40).toFixed(1),
      profit: ((Math.random() - 0.3) * 50).toFixed(1),
      eps: (0.5 + Math.random() * 8).toFixed(2),
      rs20: (10 + Math.random() * 90).toFixed(0),
      rs120: (10 + Math.random() * 90).toFixed(0),
      ma50: ((Math.random() - 0.3) * 30).toFixed(1),
      ma200: ((Math.random() - 0.3) * 25).toFixed(1),
      turnover: (0.3 + Math.random() * 5).toFixed(2),
      volRatio: (0.5 + Math.random() * 2).toFixed(2),
      mcap: (100 + Math.random() * 9000).toFixed(0),
      funds: Math.floor(20 + Math.random() * 300),
      distScore: (Math.random() * 5).toFixed(1),
      rating: ['A','B+','B','C+','C','A-','B-','A+','B','B+'][i]
    };
  });
}
var tableData = genTableData();
var tableSort = { key: null, dir: 'asc' };

function renderTable(sortKey, sortDir) {
  var data = [].concat(tableData);
  if (sortKey) {
    data.sort(function(a, b) {
      var va = isNaN(a[sortKey]) ? a[sortKey] : +a[sortKey];
      var vb = isNaN(b[sortKey]) ? b[sortKey] : +b[sortKey];
      return sortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
  }
  var html = '<table class="data-table"><thead><tr>';
  tableColumns.forEach(function(col, i) {
    var cls = sortKey === tableKeys[i] ? (sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc') : '';
    html += '<th class="'+cls+'" onclick="sortTable(\''+tableKeys[i]+'\')">'+col+'</th>';
  });
  html += '</tr></thead><tbody>';
  data.forEach(function(d) {
    html += '<tr>';
    html += '<td>'+d.code+'</td><td style="font-weight:600">'+d.name+'</td>';
    html += '<td>'+d.price+'</td>';
    html += '<td class="'+(+d.chg>=0?'td-up':'td-down')+'">'+(+d.chg>=0?'+':'')+d.chg+'%</td>';
    html += '<td>'+d.pe+'</td><td>'+d.pb+'</td><td>'+d.roe+'</td><td>'+d.rev+'</td><td>'+d.profit+'</td>';
    html += '<td>'+d.eps+'</td><td>'+d.rs20+'</td><td>'+d.rs120+'</td>';
    html += '<td class="'+(+d.ma50>=0?'td-up':'td-down')+'">'+(+d.ma50>=0?'+':'')+d.ma50+'%</td>';
    html += '<td class="'+(+d.ma200>=0?'td-up':'td-down')+'">'+(+d.ma200>=0?'+':'')+d.ma200+'%</td>';
    html += '<td>'+d.turnover+'%</td><td>'+d.volRatio+'</td><td>'+d.mcap+'</td><td>'+d.funds+'</td>';
    html += '<td>'+d.distScore+'</td><td style="font-weight:700;color:var(--neon-cyan)">'+d.rating+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;
}
function sortTable(key) {
  if (tableSort.key === key) tableSort.dir = tableSort.dir === 'asc' ? 'desc' : 'asc';
  else { tableSort.key = key; tableSort.dir = 'asc'; }
  renderTable(tableSort.key, tableSort.dir);
}
renderTable();

function renderConfigPanel() {
  document.getElementById('configGrid').innerHTML = configParams.map(function(p) {
    var dv = Number.isInteger(p.val) ? p.val : p.val.toFixed(2);
    return '<div class="config-item"><div class="config-label"><span class="config-name" title="'+p.name+'">'+p.name+'</span><span class="config-val">'+dv+p.unit+'</span></div><input type="range" class="config-slider" min="'+p.min+'" max="'+p.max+'" step="'+p.step+'" value="'+p.val+'" data-unit="'+p.unit+'" oninput="updateCfg(this)"></div>';
  }).join('');
}
function updateCfg(sl) {
  var v = +sl.value; var u = sl.dataset.unit;
  var dv = Number.isInteger(v) ? v : v.toFixed(2);
  sl.closest('.config-item').querySelector('.config-val').textContent = dv + u;
}
renderConfigPanel();

function redrawAllCharts() {
  ['klineChart','chart1','chart2','chart3','chart4'].forEach(function(id) {
    var dom = document.getElementById(id);
    if (dom._echart) dom._echart.dispose();

  document.querySelectorAll('.chart-container').forEach(function(dom) {

<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最强指数 · 投资手账本</title>
  <link rel="stylesheet" href="../shared/css/theme.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/xhs-cards.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <script src="../shared/js/echarts.min.js"></script>
  <style>
    .layout { display:flex; gap:16px; align-items:flex-start; }
    .left { width:320px; flex-shrink:0; display:flex; flex-direction:column; gap:12px; }
    .right { flex:1; min-width:0; display:flex; flex-direction:column; gap:16px; }
    .date-row { display:flex; gap:8px; }
    .date-row .fld { flex:1; }
    .fld label { display:block; font-size:0.65rem; font-weight:600; color:var(--text-tertiary); margin-bottom:4px; }
    .fld input { width:100%; padding:8px 10px; border:1px solid var(--divider); border-radius:12px; font-size:0.8rem; background:var(--card-bg); color:var(--text-primary); box-sizing:border-box; }
    .btn-run { display:block; width:100%; padding:12px; background:#FE2C55; color:#FFF; border:none; border-radius:14px; font-size:1rem; font-weight:800; cursor:pointer; }
    .btn-run:hover { opacity:0.88; }
    .btn-run:disabled { background:#CCC; cursor:not-allowed; }
    .btn-save { display:block; width:100%; padding:10px; margin-top:8px; background:var(--card-bg); color:var(--text-primary); border:1.5px solid var(--divider); border-radius:14px; font-size:0.9rem; font-weight:700; cursor:pointer; }
    .btn-save.saved { background:#E8F5E9; border-color:#4CAF50; color:#2E7D32; }
    .param-card { background:var(--card-bg); border:1px solid var(--divider); border-radius:18px; overflow:hidden; }
    .param-card-hd { display:flex; align-items:center; padding:12px 16px; cursor:pointer; }
    .param-card-hd .dot { width:10px; height:10px; border-radius:50%; margin-right:8px; flex-shrink:0; }
    .param-card-hd .title { font-size:0.82rem; font-weight:800; flex:1; }
    .param-card-bd { padding:0 16px 14px; }
    .param-card-bd.collapsed { display:none; }
    .sr { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .sr .sl { width:72px; font-size:0.65rem; font-weight:600; color:var(--text-tertiary); flex-shrink:0; }
    .sr input[type=range] { flex:1; height:4px; }
    .sr .sv { width:40px; text-align:right; font-size:0.7rem; font-weight:700; }
    .tog-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .tog-row .sl { width:72px; font-size:0.65rem; font-weight:600; color:var(--text-tertiary); flex-shrink:0; }
    .tsw { position:relative; width:36px; height:20px; border-radius:10px; border:none; cursor:pointer; flex-shrink:0; }
    .tsw.on { background:#FE2C55; }
    .tsw.off { background:#CCC; }
    .tsw::after { content:''; position:absolute; top:2px; width:16px; height:16px; border-radius:50%; background:#FFF; transition:left 0.2s; }
    .tsw.on::after { left:18px; }
    .tsw.off::after { left:2px; }
    table { width:100%; border-collapse:collapse; font-size:0.72rem; }
    th, td { padding:4px 8px; text-align:left; border-bottom:1px solid var(--divider); }
    th { font-weight:700; color:var(--text-secondary); font-size:0.65rem; cursor:pointer; }
    .pool-section { margin-bottom:16px; }
    .pool-section h3 { font-size:0.78rem; font-weight:800; margin:0 0 8px; }
    @media (max-width:900px) { .layout { flex-direction:column; } .left { width:100%; } }
    .nav-dropdown { position:relative; display:inline-flex; }
    .nav-dropdown-menu { display:none; position:absolute; top:100%; left:0; background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); min-width:150px; padding:6px 0; z-index:200; white-space:nowrap; }
    .nav-dropdown:hover .nav-dropdown-menu { display:block; }
    .nav-dropdown-menu a { display:block; padding:7px 16px; font-size:0.72rem; color:var(--text-secondary); text-decoration:none; }
    .nav-dropdown-menu a:hover { background:var(--color-accent-subtle); color:var(--color-accent); }
    .nav-dropdown-menu a.active { color:var(--color-accent); font-weight:700; }
    .pool-btn { padding:4px 10px; border:1px solid var(--divider); border-radius:8px; background:var(--bg); color:var(--text-secondary); font-size:0.62rem; cursor:pointer; font-family:var(--font-display); }
    .pool-btn:hover { border-color:var(--text-tertiary); }
    .pool-btn.active { background:var(--color-accent); color:#FFF; border-color:var(--color-accent); }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="top-nav">
      <div class="nav-brand"><span class="nav-fox">🦊</span><span>最强指数</span><span class="nav-greeting">Strongest Index</span></div>
      <div class="nav-links">
        <a href="../" class="nav-item">🏠 看板</a>
        <div class="nav-dropdown"><a href="#" class="nav-item active">回测 ▾</a><div class="nav-dropdown-menu">
          <a href="../distribution-day/">📉 抛盘日</a><a href="../follow-through-day/">📈 追盘日</a><a href="../accumulation-day/">📦 吸筹日</a>
          <a href="../index-rs-backtest/">🏆 指数RS强度</a><a href="../index-crowdedness/">📊 指数拥挤度</a><a href="../stock-rs-backtest/">💪 个股RS强度</a>
          <a href="../index-ad-backtest/">🔍 机构吸筹/出货</a><a href="../divergence-backtest/">⚠️ 指数背离</a>
          <a href="../strongest-index/" class="active">⭐ 最强指数</a>
        </div></div>
        <a href="../index-scan/" class="nav-item">🔬 指数扫描</a><a href="../index-valuation/" class="nav-item">📈 指数估值</a>
        <a href="../stock-valuation/" class="nav-item">💎 个股扫描</a><a href="../market-scan/" class="nav-item">📊 大盘扫描</a>
        <a href="#" class="nav-item">💰 仓位管理</a>
        <button class="theme-toggle" aria-label="切换主题">🌙</button>
      </div>
    </nav>
    <div class="layout">
      <div class="left">
        <div class="xhs-card">
          <div class="xhs-card-header"><span class="xhs-card-label">📅 日期</span></div>
          <div class="date-row"><div class="fld"><input type="date" id="target-date"></div></div>
        </div>
        <div class="param-card" id="card-rs">
          <div class="param-card-hd" onclick="toggleCard('card-rs')"><span class="dot" style="background:#FE2C55"></span><span class="title">🔴 RS强度条件</span></div>
          <div class="param-card-bd" id="card-rs-bd">
            <div class="tog-row"><span class="sl">RS_250</span><button class="tsw on" id="c-rs250-on" onclick="event.stopPropagation();tog('c-rs250-on')"></button><span class="sv" style="margin-left:auto">≥</span><input type="range" id="c-rs250" min="60" max="99" value="80" oninput="syncNum('c-rs250')"><span class="sv" id="c-rs250-v">80</span></div>
            <div class="tog-row"><span class="sl">RS_60</span><button class="tsw on" id="c-rs60-on" onclick="event.stopPropagation();tog('c-rs60-on')"></button><span class="sv" style="margin-left:auto">≥</span><input type="range" id="c-rs60" min="60" max="99" value="85" oninput="syncNum('c-rs60')"><span class="sv" id="c-rs60-v">85</span></div>
            <div class="tog-row"><span class="sl">RS_20</span><button class="tsw on" id="c-rs20-on" onclick="event.stopPropagation();tog('c-rs20-on')"></button><span class="sv" style="margin-left:auto">≥</span><input type="range" id="c-rs20" min="60" max="99" value="90" oninput="syncNum('c-rs20')"><span class="sv" id="c-rs20-v">90</span></div>
          </div>
        </div>
        <div class="param-card" id="card-ma">
          <div class="param-card-hd" onclick="toggleCard('card-ma')"><span class="dot" style="background:#4CAF50"></span><span class="title">🟢 均线排列</span></div>
          <div class="param-card-bd" id="card-ma-bd">
            <div class="tog-row"><span class="sl">MA多头排列</span><button class="tsw on" id="c-ma-on" onclick="event.stopPropagation();tog('c-ma-on')"></button><span style="font-size:0.62rem;color:var(--text-tertiary)">MA50 > MA150 > MA200</span></div>
          </div>
        </div>
        <div class="param-card" id="card-ad">
          <div class="param-card-hd" onclick="toggleCard('card-ad')"><span class="dot" style="background:#FF9800"></span><span class="title">🟠 AD线</span></div>
          <div class="param-card-bd" id="card-ad-bd">
            <div class="tog-row"><span class="sl">AD斜率>0</span><button class="tsw on" id="c-ad-on" onclick="event.stopPropagation();tog('c-ad-on')"></button><span style="font-size:0.62rem;color:var(--text-tertiary)">20日A/D线斜率>0</span></div>
          </div>
        </div>
        <div class="param-card" id="card-relax">
          <div class="param-card-hd" onclick="toggleCard('card-relax')"><span class="dot" style="background:#9C27B0"></span><span class="title">🟣 自动放宽</span></div>
          <div class="param-card-bd" id="card-relax-bd">
            <div class="tog-row"><span class="sl">自动放宽</span><button class="tsw on" id="c-relax-on" onclick="event.stopPropagation();tog('c-relax-on')"></button></div>
            <div class="sr"><span class="sl">放宽步长</span><input type="range" id="c-relax-step" min="1" max="10" value="5" oninput="syncNum('c-relax-step')"><span class="sv" id="c-relax-step-v">5</span></div>
          </div>
        </div>
        <button class="btn-run" id="btn-run">🔍 运行筛选</button>
        <button class="btn-save" id="btn-save">💾 保存配置</button>
      </div>
      <div class="right"><div id="results"></div></div>
    </div>
    <footer class="page-footer">❤️ 投资手账本 · 最强指数筛选</footer>
  </div>
  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/api-client.js"></script>
  <script>
    const SIGNAL_TYPE='strongest_index';
    function toggleCard(id){document.getElementById(id+'-bd').classList.toggle('collapsed');}
    function tog(id){const b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off');}
    function syncNum(id){const e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value;}

    document.addEventListener('DOMContentLoaded',async()=>{
      const now=new Date();
      document.getElementById('target-date').value=now.toISOString().split('T')[0];
      document.getElementById('btn-run').addEventListener('click',runFilter);
      document.getElementById('btn-save').addEventListener('click',saveConfig);
      await loadConfig();
      setTimeout(runFilter,500);
    });

    function getParams(){
      return {
        conditions:{
          rs_250:{enabled:document.getElementById('c-rs250-on').classList.contains('on'),threshold:parseInt(document.getElementById('c-rs250').value)},
          rs_60:{enabled:document.getElementById('c-rs60-on').classList.contains('on'),threshold:parseInt(document.getElementById('c-rs60').value)},
          rs_20:{enabled:document.getElementById('c-rs20-on').classList.contains('on'),threshold:parseInt(document.getElementById('c-rs20').value)},
          ma_align:{enabled:document.getElementById('c-ma-on').classList.contains('on')},
          ad_slope:{enabled:document.getElementById('c-ad-on').classList.contains('on')},
        },
        auto_relax:document.getElementById('c-relax-on').classList.contains('on'),
        relax_step:parseInt(document.getElementById('c-relax-step').value),
      };
    }

    async function runFilter(){
      const btn=document.getElementById('btn-run');btn.disabled=true;btn.textContent='⏳ 计算中...';
      try{
        const date=document.getElementById('target-date').value;
        const resp=await fetch(API_BASE+'/api/strongest-index?date='+date+'&params='+encodeURIComponent(JSON.stringify(getParams())));
        const d=await resp.json();
        renderResults(d);
        btn.textContent='🔄 重新筛选';
      }catch(e){console.error(e);btn.textContent='❌ 失败';}
      btn.disabled=false;
    }

    function renderResults(d){
      const div=document.getElementById('results');
      if(!d||!d.pools){div.innerHTML='<div style=padding:32px;text-align:center;color:var(--text-tertiary)>暂无数据</div>';return;}

      const pools=d.pools;
      const pmeta={market:{n:'全市场指数',icon:'🏛'},sector_l1:{n:'一级行业',icon:'🏭'},sector_l2:{n:'二级行业',icon:'🔧'},thematic:{n:'主题指数',icon:'🎯'},strategy:{n:'策略指数',icon:'🧩'}};
      let html='';
      for(const [pk,pd] of Object.entries(pools)){
        const m=pmeta[pk]||{n:pk,icon:'📦'};
        const relaxed=pd.relaxed?'<span style=font-size:0.6rem;color:#FF9800>（已放宽RS_20至≥'+pd.applied_rs20+')</span>':'';
        html+='<div class="pool-section xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">'+m.icon+' '+m.n+' '+relaxed+'</span><span style=font-size:0.65rem;color:var(--text-tertiary)>Top '+pd.top_n+' · '+pd.indices.length+'/'+pd.total+' 达标</span></div>';
        if(!pd.indices||!pd.indices.length){
          html+='<div style=padding:20px;text-align:center;color:var(--text-tertiary)>无符合条件的指数</div>';
        }else{
          html+='<table><thead><tr><th>#</th><th>代码</th><th>名称</th><th>RS_20</th><th>RS_60</th><th>RS_250</th><th>MA50</th><th>MA200</th><th>AD斜率</th></tr></thead><tbody>';
          pd.indices.forEach((s,i)=>{
            html+='<tr><td>'+(i+1)+'</td><td style=font-weight:700>'+s.code+'</td><td>'+s.name+'</td><td style=color:#E53935;font-weight:700>'+s.rs_20+'</td><td>'+s.rs_60+'</td><td>'+s.rs_250+'</td><td>'+(s.ma50||0).toFixed(0)+'</td><td>'+(s.ma200||0).toFixed(0)+'</td><td>'+(s.ad_slope>0?'+':'')+(s.ad_slope||0).toFixed(0)+'</td></tr>';
          });
          html+='</tbody></table>';
        }
        html+='</div>';
      }

      // ── 全量复核表格 ──
      const all=d.all_indices||[];
      if(all.length){
        html+='<div class="xhs-card" style=margin-top:16px><div class="xhs-card-header"><span class="xhs-card-label">📋 全部指数复核表</span><span style=font-size:0.65rem;color:var(--text-tertiary)>'+all.length+'个指数</span></div>';
        html+='<div style="padding:8px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><input id=idx-search placeholder="搜索代码或名称..." style="padding:6px 12px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);width:180px" oninput="filterIdxTable()">';
        ['全部','市场指数','一级行业','二级行业','主题指数','策略指数'].forEach(function(t){html+='<button class=pool-btn onclick="filterByIdxPool(\''+t+'\')">'+t+'</button>';});
        html+='</div>';
        html+='<div class=table-wrapper><table id=idx-table><thead><tr><th>#</th><th>代码</th><th>名称</th><th>类型</th><th>RS_20</th><th>RS_60</th><th>RS_250</th><th>20日收益</th><th>60日收益</th><th>MA50</th><th>MA200</th><th>AD斜率</th></tr></thead><tbody>';
        all.forEach((s,i)=>{
          html+='<tr data-pool="'+s.pool+'"><td>'+(i+1)+'</td><td style=font-weight:700>'+s.code+'</td><td>'+s.name+'</td><td style=font-size:0.62rem;color:var(--text-tertiary)>'+s.pool+'</td><td style=color:#E53935;font-weight:700>'+s.rs_20+'</td><td>'+s.rs_60+'</td><td>'+s.rs_250+'</td><td>'+(s.ret_20>=0?'+':'')+s.ret_20+'%</td><td>'+(s.ret_60>=0?'+':'')+s.ret_60+'%</td><td>'+s.ma50+'</td><td>'+s.ma200+'</td><td>'+(s.ad_slope>0?'+':'')+s.ad_slope+'</td></tr>';
        });
        html+='</tbody></table></div></div>';
      }
      div.innerHTML=html;
    }

    function filterIdxTable(){
      const q=document.getElementById('idx-search').value.toLowerCase();
      const activePool=document.getElementById('idx-search').dataset.pool||'';
      document.querySelectorAll('#idx-table tbody tr').forEach(tr=>{
        const matchPool=!activePool||activePool==='全部'||tr.dataset.pool===activePool;
        const matchSearch=!q||tr.children[1].textContent.includes(q)||tr.children[2].textContent.toLowerCase().includes(q);
        tr.style.display=(matchPool&&matchSearch)?'':'none';
      });
    }
    function filterByIdxPool(pool){
      document.getElementById('idx-search').dataset.pool=pool;
      document.querySelectorAll('.pool-btn').forEach(function(b){b.classList.toggle('active',b.textContent===pool);});
      filterIdxTable();
    }

    async function loadConfig(){
      try{
        const r=await fetch(API_BASE+'/api/config?signal_type='+SIGNAL_TYPE,{cache:'no-store'});
        const cfg=await r.json();
        if(!cfg||!cfg.conditions)return;
        console.log('配置已加载',cfg);
        const c=cfg.conditions;
        if(c.rs_250){setTog('c-rs250-on',c.rs_250.enabled!==false);setVal('c-rs250',c.rs_250.threshold||80);}
        if(c.rs_60){setTog('c-rs60-on',c.rs_60.enabled!==false);setVal('c-rs60',c.rs_60.threshold||85);}
        if(c.rs_20){setTog('c-rs20-on',c.rs_20.enabled!==false);setVal('c-rs20',c.rs_20.threshold||90);}
        if(c.ma_align)setTog('c-ma-on',c.ma_align.enabled!==false);
        if(c.ad_slope)setTog('c-ad-on',c.ad_slope.enabled!==false);
        setTog('c-relax-on',cfg.auto_relax!==false);
        setVal('c-relax-step',cfg.relax_step||5);
      }catch(e){}
    }
    function setTog(id,on){const b=document.getElementById(id);if(!b)return;b.className='tsw '+(on?'on':'off');}
    function setVal(id,v){const e=document.getElementById(id);if(!e)return;e.value=v;e.dispatchEvent(new Event('input',{bubbles:true}));}

    async function saveConfig(){
      const btn=document.getElementById('btn-save');btn.textContent='⏳ 保存中...';btn.disabled=true;
      const p=getParams();
      const y=[
        '# 最强指数参数配置','',
        'conditions:',
        '  rs_250:',
        '    enabled: '+(p.conditions.rs_250.enabled?'true':'false'),
        '    threshold: '+p.conditions.rs_250.threshold,
        '  rs_60:',
        '    enabled: '+(p.conditions.rs_60.enabled?'true':'false'),
        '    threshold: '+p.conditions.rs_60.threshold,
        '  rs_20:',
        '    enabled: '+(p.conditions.rs_20.enabled?'true':'false'),
        '    threshold: '+p.conditions.rs_20.threshold,
        '  ma_align:',
        '    enabled: '+(p.conditions.ma_align.enabled?'true':'false'),
        '  ad_slope:',
        '    enabled: '+(p.conditions.ad_slope.enabled?'true':'false'),
        'auto_relax: '+(p.auto_relax?'true':'false'),
        'relax_step: '+p.relax_step,
        '',
      ].join('\n');
      try{
        const r=await fetch(API_BASE+'/api/config?signal_type='+SIGNAL_TYPE,{method:'POST',headers:{'Content-Type':'text/plain'},body:y});
        const d=await r.json();
        if(d.ok){btn.textContent='✅ 已保存';btn.classList.add('saved');setTimeout(()=>{btn.textContent='💾 保存配置';btn.classList.remove('saved');btn.disabled=false;},2000);}
      }catch(e){btn.textContent='❌ 失败';btn.disabled=false;}
    }
  </script>
</body>
</html>

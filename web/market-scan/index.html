<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大盘扫描</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
  .top-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{font-family:var(--font-body);padding:5px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);outline:none;transition:all .2s;backdrop-filter:blur(10px)}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;flex-wrap:wrap}
  .tab{padding:6px 14px;border:1px solid var(--border);border-radius:10px;background:rgba(26,26,31,.4);color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:500;transition:all .2s;white-space:nowrap}
  .tab:hover{border-color:var(--border-hover);color:#d4d4d8}
  .tab.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .tab-content{display:none;animation:fadeIn .4s ease}
  .tab-content.active{display:block}
  .btn-glass{font-family:var(--font-body);font-size:10px;font-weight:500;padding:4px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--card);color:var(--muted);transition:all .2s;text-decoration:none;display:inline-block}
  .btn-glass:hover{color:#d4d4d8;background:rgba(255,255,255,.04);border-color:var(--border-hover)}
  .btn-accent{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .btn-accent:hover{background:rgba(245,158,11,.18)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .tab{background:rgba(255,255,255,.6);border-color:var(--divider);color:var(--muted)}
  html[data-theme="light"] .tab:hover{border-color:rgba(0,0,0,.15);color:#374151}
  html[data-theme="light"] .tab.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
.layout { max-width:1100px; margin:0 auto; }
    /* Hero */
    .score-hero { display:flex; gap:20px; align-items:center; padding:22px 28px; background:var(--card-bg); border-radius:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:14px; }
    .score-ring { width:90px; height:90px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .score-ring .num { font-family:var(--font-display); font-size:2rem; font-weight:900; }
    .score-info .label { font-size:0.6rem; color:var(--text-tertiary); letter-spacing:0.06em; }
    .score-info .rating { font-family:var(--font-display); font-size:1.4rem; font-weight:900; }
    .score-info .advice { font-size:0.72rem; color:var(--text-secondary); margin-top:4px; }
    .score-date { font-size:0.6rem; color:var(--text-tertiary); margin-left:auto; }
    /* Section header */
    .section-hdr { font-family:var(--font-display); font-size:0.75rem; font-weight:800; color:var(--text-secondary); margin:16px 0 10px; letter-spacing:0.04em; }
    /* Core signal cards */
    .core-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:14px; }
    .core-card { padding:18px; border-radius:16px; text-align:center; }
    .core-card .icon { font-size:1.6rem; }
    .core-card .label { font-family:var(--font-display); font-size:0.7rem; font-weight:700; margin-top:6px; }
    .core-card .val { font-family:var(--font-display); font-size:1.2rem; font-weight:900; margin-top:4px; }
    .core-card .desc { font-size:0.62rem; margin-top:8px; line-height:1.5; color:var(--text-secondary); }
    .core-danger { background:#FFF5F5; border:1.5px solid #FFCDD2; }
    .core-warning { background:#FFF8E1; border:1.5px solid #FFE082; }
    .core-ok { background:#E8F5E9; border:1.5px solid #C8E6C9; }
    .core-unknown { background:var(--bg); border:1.5px solid var(--divider); }
    /* Indicator cards */
    .ind-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:12px; margin-bottom:12px; }
    .ind-card { background:var(--card-bg); border-radius:16px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,0.05); display:flex; flex-direction:column; }
    .ind-card .ih { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
    .ind-card .in { font-family:var(--font-display); font-size:0.76rem; font-weight:800; }
    .ind-card .it { font-size:0.52rem; color:var(--text-tertiary); background:var(--bg); padding:2px 8px; border-radius:10px; }
    .ind-card .iv { font-family:var(--font-display); font-size:1.3rem; font-weight:900; }
    .ind-card .iu { font-size:0.55rem; color:var(--text-tertiary); font-weight:400; }
    .ind-card .ibar { height:5px; background:var(--bg); border-radius:3px; margin-top:6px; overflow:hidden; }
    .ind-card .ibar-fill { height:100%; border-radius:3px; }
    .ind-card .is { font-size:0.58rem; color:var(--text-tertiary); margin-top:3px; text-align:right; }
    .ind-card .id { font-size:0.6rem; color:var(--text-tertiary); margin-top:8px; line-height:1.5; border-top:1px solid var(--divider); padding-top:8px; }
    .clickable { cursor:pointer; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px; }
    .clickable:hover { color:var(--color-accent); }
    /* Panorama */
    .pano-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    .pano-card { background:var(--card-bg); border-radius:16px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
    .pano-card h3 { font-family:var(--font-display); font-size:0.72rem; font-weight:800; margin:0 0 10px; color:var(--text-secondary); }
    .pano-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .pano-item { text-align:center; padding:10px 8px; background:var(--bg); border-radius:12px; }
    .pano-item .pv { font-family:var(--font-display); font-size:1.3rem; font-weight:900; }
    .pano-item .pl { font-size:0.58rem; color:var(--text-tertiary); margin-top:2px; }
    .pano-item .pd { font-size:0.55rem; color:var(--text-tertiary); margin-top:6px; line-height:1.4; }
    /* Rotation */
    .rot-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .rot-card { background:var(--card-bg); border-radius:14px; padding:14px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .rot-card h4 { font-family:var(--font-display); font-size:0.68rem; font-weight:800; margin:0 0 6px; }
    .rot-card .rm { font-family:var(--font-display); font-size:1rem; font-weight:900; }
    .rot-card .rd { font-size:0.55rem; color:var(--text-tertiary); margin-top:2px; }
    .rot-card .tl { display:flex; flex-wrap:wrap; gap:3px; margin-top:8px; }
    .rt { font-size:0.54rem; padding:2px 7px; border-radius:7px; font-weight:600; }
    .rt.tw { background:var(--color-accent); color:#FFF; }
    .rt.lw { background:var(--bg); color:var(--text-tertiary); }
    .rt.bo { background:var(--color-accent-subtle); color:var(--color-accent); }
    /* Modal */
    .modal-overlay.show { display:flex; }
    .modal-box { background:var(--card-bg); border-radius:20px; padding:24px; max-width:800px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
    .modal-box h2 { font-family:var(--font-display); font-size:1rem; font-weight:800; margin:0 0 4px; }
    .modal-sub { font-size:0.65rem; color:var(--text-tertiary); margin-bottom:14px; }
    .bt { width:100%; border-collapse:collapse; font-size:0.7rem; }
    .bt th { text-align:left; padding:5px 8px; border-bottom:1px solid var(--divider); font-size:0.62rem; color:var(--text-tertiary); font-weight:700; }
    .bt td { padding:5px 8px; border-bottom:1px solid var(--divider); }
    .tu { color:#E53935; font-weight:700; } .td { color:#26C6DA; font-weight:700; }
    @media (max-width:700px) { .core-grid,.rot-grid,.pano-row { grid-template-columns:1fr; } .pano-grid { grid-template-columns:1fr 1fr; } }
    .nav-dropdown:hover .nav-dropdown-menu { display:block; }
    .no-data { text-align:center; padding:48px; color:var(--text-tertiary); font-size:0.8rem; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

  <nav id="top-nav"></nav>
    <div class="layout"><div id="content"></div></div>
    <div class="modal-overlay" id="breakout-modal" onclick="if(event.target===this)closeBreakoutModal()">
      <div class="modal-box"><button class="modal-close" onclick="closeBreakoutModal()">✕</button><h2>🚀 放量突破个股</h2><div class="modal-sub" id="breakout-meta"></div><div id="breakout-table"></div></div>
    </div>
    <footer class="page-footer">❤️ 投资手账本 · 大盘扫描看板</footer>
  </div>
  <script src="../shared/js/echarts.min.js"></script>
  <script src="../shared/js/api-client.js"></script>
  <script>
    function rc(s) { if(s>=80)return'#2E7D32';if(s>=65)return'#558B2F';if(s>=50)return'#F9A825';if(s>=35)return'#FF8F00';if(s>=20)return'#E53935';return'#B71C1C'; }
    function rl(s) {
      if(s>=80)return{r:'A',l:'强势市场',a:'可积极选股，仓位70%'};if(s>=65)return{r:'B',l:'偏强市场',a:'可适度选股，仓位50%'};
      if(s>=50)return{r:'C',l:'中性市场',a:'精选个股，仓位35%'};if(s>=35)return{r:'D',l:'偏弱市场',a:'减少操作，仓位20%'};
      if(s>=20)return{r:'E',l:'弱势市场',a:'暂停选股，现金为王'};return{r:'F',l:'深度熊市',a:'全面防守，停止买入'};
    }
    const DESC={
      ma50_above:'MA50上方占比衡量市场宽度。高于70%说明多数个股处于上升趋势，是健康牛市的标志；低于30%意味着市场极度疲弱，但极端低值常预示反弹。',
      hl_ratio:'新高新低比反映创新高和创新低个股的力量对比。比值>2表明多方主导、突破力量充沛；比值<0.5则多数个股在创新低，选股风险极大。',
      ad_ratio:'涨跌家数比捕捉每日市场情绪。比值>2表示普涨格局、赚钱效应强；<0.6的普跌往往伴随恐慌。与指数背离时是指数涨而多数股跌，系机构拉权重出货的典型信号。',
      vol_breakout:'放量突破数衡量机构大资金的活动频率。数值飙升意味着大量个股同时放量突破阻力位，是机构积极建仓的证据；持续低迷则表明市场缺乏领涨品种。',
      margin_5d:'融资余额5日变化反映杠杆资金态度。持续增加说明资金看多后市并愿承担融资成本；快速下降则是去杠杆信号，往往伴随市场调整。',
      sector_rot:'板块轮动稳定性看领涨行业是否持续抱团。重叠率高表示强势板块格局稳固、资金有明确方向；快速轮动说明资金短线博弈、缺乏主线。',
      fear_greed:'恐慌贪婪指数综合波动率、宽度和动量三维度。极度恐慌(<20%)往往出现在暴跌尾声，是潜在反转前兆；极度贪婪(>80%)提示过热风险。',
    };
    function fm(v){if(v==null)return'—';if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(0)+'万';return v.toString();}

    async function load() {
      const div=document.getElementById('content');
      try{
        const[hr,pr]=await Promise.all([
          fetch(API_BASE+'/api/market-health?date=latest').then(r=>r.json()),
          fetch(API_BASE+'/api/market-panorama').then(r=>r.json())
        ]);
        if(hr.status==='no_data'){div.innerHTML='<div class="no-data">📡 暂无健康度数据</div>';return;}
        render(hr,pr);
      }catch(e){div.innerHTML='<div class="no-data">📡 数据加载失败</div>';}
    }

    function render(h,p){
      const score=h.total_score||0;const rt=rl(score);const rcc=rc(score);
      let html='';

      // ═══ L0: 健康度总分 ═══
      html+=`<div class="score-hero">
        <div class="score-ring" style="background:${rcc}15;border:3px solid ${rcc}30"><div style="text-align:center"><div class="num" style="color:${rcc}">${score}</div></div></div>
        <div class="score-info"><div class="label">大盘健康度 / 100</div><div class="rating" style="color:${rcc}">${rt.r} · ${rt.label}</div><div class="advice">💡 ${rt.a}</div></div>
        <div class="score-date">${h.date||'—'}</div>
        <button onclick="computeSnapshot()" style="font-size:0.62rem;padding:6px 14px;border:1px solid var(--divider);border-radius:10px;background:var(--bg);color:var(--text-secondary);cursor:pointer;font-family:var(--font-display)">🔄 刷新计算</button>
      </div>`;

      // ═══ L1: 核心信号 ═══
      html+='<div class="section-hdr">📡 核心信号</div><div class="core-grid">';
      // 抛盘日
      const dist=p?.core?.distribution||{};
      let distCls='core-ok',distIcon='📉';
      if(dist.level==='danger')distCls='core-danger';
      else if(dist.level==='warning')distCls='core-warning';
      html+=`<div class="core-card ${distCls}"><div class="icon">${distIcon}</div><div class="label">抛盘日</div><div class="val">${dist.label||'—'}<span style="font-size:0.6rem;color:var(--text-tertiary)"> /30天</span></div>${dist.dates?'<div style="font-size:0.55rem;color:var(--text-tertiary);margin-top:2px">'+dist.dates+'</div>':''}<div class="desc">${dist.desc||''}</div></div>`;
      // 追盘日
      const ftd=p?.core?.ftd||{};
      const ftdCls=(ftd.count||0)>0?'core-ok':'core-'+((ftd.level||'')||'unknown');
      html+=`<div class="core-card ${ftdCls}"><div class="icon">📈</div><div class="label">追盘日</div><div class="val">${ftd.label||'—'}<span style="font-size:0.6rem;color:var(--text-tertiary)"> /30天</span></div>${ftd.dates?'<div style="font-size:0.55rem;color:var(--text-tertiary);margin-top:2px">'+ftd.dates+'</div>':''}<div class="desc">${ftd.desc||''}</div></div>`;
      // 吸筹日
      const acc=p?.core?.accumulation||{};
      const accCls=(acc.count||0)>0?'core-ok':'core-'+((acc.level||'')||'unknown');
      html+=`<div class="core-card ${accCls}"><div class="icon">📦</div><div class="label">吸筹日</div><div class="val">${acc.label||'—'}</div><div class="desc">${acc.desc||'—'}</div></div>`;
      html+='</div>';

      // ═══ L2: 辅助指标 ═══
      html+='<div class="section-hdr">📊 辅助指标 · 参与健康评分</div><div class="ind-grid">';
      const meta={
        ma50_above:{n:'MA50上方占比',u:'%',t:'宽度',max:15,hi:70,lo:30},
        hl_ratio:{n:'新高新低比',u:'',t:'宽度',max:15,hi:2,lo:0.2},
        ad_ratio:{n:'涨跌家数比',u:'',t:'情绪',max:15,hi:2,lo:0.3},
        vol_breakout:{n:'放量突破数',u:'只',t:'活跃',max:15,hi:400,lo:0},
        margin_5d:{n:'融资余额5日',u:'%',t:'资金',max:15,hi:1.5,lo:-1},
        sector_rot:{n:'板块轮动',u:'分',t:'结构',max:15,hi:15,lo:0},
        fear_greed:{n:'恐慌贪婪',u:'%',t:'极端',max:10,hi:80,lo:20},
      };
      (h.indicators||[]).forEach(ind=>{
        const m=meta[ind.key]||{n:ind.key,u:'',t:'',max:15,hi:100,lo:0};
        const bw=m.u==='%'?Math.min(100,Math.max(0,(ind.value-m.lo)/(m.hi-m.lo)*100)):Math.min(100,Math.max(0,ind.value/m.hi*100));
        const bc=ind.value>=m.hi*.7?'#4CAF50':ind.value>=m.hi*.4?'#F9A825':'#E53935';
        const vv=m.key==='vol_breakout'?`<span class="clickable" onclick="openBreakoutModal()">${ind.value}</span>`:(Number.isInteger(ind.value)?ind.value:ind.value.toFixed(2));
        html+=`<div class="ind-card"><div class="ih"><span class="in">${m.n}</span><span class="it">${m.t}</span></div>
          <div class="iv">${vv}<span class="iu"> ${m.u}</span></div>
          <div class="ibar"><div class="ibar-fill" style="width:${bw}%;background:${bc}"></div></div>
          <div class="is">${ind.score}/${m.max}分</div><div class="id">${DESC[ind.key]||''}</div></div>`;
      });
      html+='</div>';

      // ═══ L3: 市场全景 ═══
      html+='<div class="section-hdr">🔬 市场全景</div>';

      // 指数维度
      html+='<div class="pano-row"><div class="pano-card"><h3>📊 指数维度</h3><div class="pano-grid">';
      const crowd=p?.crowding||{};
      html+=`<div class="pano-item"><div class="pv clickable" onclick="openDetailModal('crowding')">${crowd.high_count||0}</div><div class="pl">拥挤指数<span style="font-size:0.55rem;color:var(--text-tertiary)"> · <span class="clickable" style="text-decoration:underline dotted" onclick="event.stopPropagation();openDetailModal('crowding',true)">共检${crowd.total||0}个</span></span></div><div class="pd">${crowd.desc||''}</div></div>`;
      const ad=p?.ad||{};
      const adVal=(ad.positive||0)>=0?`<span class="clickable" onclick="openDetailModal('ad')">${ad.positive||0}</span>`:'—';
      html+=`<div class="pano-item"><div class="pv">${adVal}</div><div class="pl">机构吸筹出货<span style="font-size:0.55rem;color:var(--text-tertiary)"> · <span class="clickable" style="text-decoration:underline dotted" onclick="openDetailModal('ad',true)">共检${ad.total||0}个</span></span></div><div class="pd">${ad.desc||'暂无数据'}</div></div>`;
      const divg=p?.divergence||{};
      const divVal=(divg.count||0)>=0?`<span class="clickable" onclick="openDetailModal('divergence')">${divg.count||0}</span>`:'—';
      html+=`<div class="pano-item"><div class="pv">${divVal}</div><div class="pl">指数背离<span style="font-size:0.55rem;color:var(--text-tertiary)"> · <span class="clickable" style="text-decoration:underline dotted" onclick="openDetailModal('divergence',true)">共检11个</span></span></div><div class="pd">${divg.desc||'暂无数据'}</div></div>`;
      html+='</div></div>';

      // 个股维度
      const st=p?.stocks||{};
      html+=`<div class="pano-card"><h3>💎 个股维度</h3><div class="pano-grid">
        <div class="pano-item"><div class="pv" style="color:#E53935">${st.double_strong||0}</div><div class="pl">双强股</div><div class="pd">长期RPS≥90且短期RPS≥95，欧奈尔体系中最优质候选池。数量反映市场可选标的丰富度。</div></div>
        <div class="pano-item"><div class="pv" style="color:#F57C00">${st.steady_leader||0}</div><div class="pl">稳健龙头</div><div class="pd">长期RPS≥95的核心资产，适合持仓底仓。数量稳定说明权重股趋势健康。</div></div>
        <div class="pano-item"><div class="pv" style="color:#4ECDC4">${st.burst||0}</div><div class="pl">加速爆发</div><div class="pd">短期RPS≥95但长期RPS<95，潜力候选。数量激增常出现在行情启动初期。</div></div>
      </div></div></div>`;

      // 板块轮动
      const rots=h.rotations||[];
      if(rots.length){
        html+='<div style="margin-bottom:14px"><div class="section-hdr">🔄 板块轮动</div><div class="rot-grid">';
        rots.forEach(rot=>{
          const isS=rot.method==='spearman';const mv=rot.value;
          let mc='#4CAF50',ml='健康';
          if(isS){mc=mv>=.7?'#4CAF50':mv>=.3?'#F9A825':'#E53935';ml=mv>=.7?'格局稳定':mv>=.3?'正常轮动':'无序洗牌';}
          else{mc=mv>=4?'#4CAF50':mv>=2?'#F9A825':'#E53935';ml=mv>=4?'板块稳定':mv>=2?'正常轮动':'快速轮动';}
          html+=`<div class="rot-card"><h4>${rot.icon||'📦'} ${rot.name} <span style="font-size:0.5rem;color:var(--text-tertiary);font-weight:400">${rot.count||''}个 · ${isS?'Spearman':'Top5重叠'}</span></h4>
            <div class="rm" style="color:${mc}">${isS?mv.toFixed(3):mv}<span style="font-size:0.55rem;color:var(--text-tertiary);font-weight:400">${isS?' (ρ)':' 个重叠'}</span></div>
            <div class="rd">${ml}${rot.participates?' · 参与评分':' · 仅展示'}</div>`;
          if(rot.top5_current&&rot.top5_current.length){
            const both=rot.top5_overlap||[];
            html+='<div class="tl">';
            rot.top5_current.forEach(n=>{html+=`<span class="rt ${both.includes(n)?'bo':'tw'}">${n}</span>`;});
            html+='</div>';
            if(rot.top5_last&&rot.top5_last.length){
              html+='<div class="tl" style="margin-top:3px"><span style="font-size:0.5rem;color:var(--text-tertiary);margin-right:3px">上周:</span>';
              rot.top5_last.forEach(n=>{html+=`<span class="rt ${both.includes(n)?'bo':'lw'}">${n}</span>`;});
              html+='</div>';
            }
          }
          html+='</div>';
        });
        html+='</div></div>';
      }
      document.getElementById('content').innerHTML=html;
    }

    async function openBreakoutModal(){
      document.getElementById('breakout-modal').classList.add('show');
      document.getElementById('breakout-meta').textContent='加载中...';document.getElementById('breakout-table').innerHTML='';
      try{
        const r=await fetch(API_BASE+'/api/market-health/breakouts?date=latest');const d=await r.json();
        document.getElementById('breakout-meta').textContent=`${d.date} · 共${d.count}只个股放量突破20日高点`;
        if(!d.stocks||!d.stocks.length){document.getElementById('breakout-table').innerHTML='<div style="padding:24px;text-align:center;color:var(--text-tertiary)">暂无突破个股</div>';return;}
        let t='<table class="bt"><thead><tr><th>代码</th><th>名称</th><th>收盘</th><th>涨跌幅</th><th>成交量</th><th>成交额</th></tr></thead><tbody>';
        d.stocks.forEach(s=>{const cl=(s.change_pct||0)>=0?'tu':'td';t+=`<tr><td style="font-family:var(--font-display);font-weight:700">${s.stock_code}</td><td>${s.name||'—'}</td><td>${s.close?.toFixed(2)||'—'}</td><td class="${cl}">${(s.change_pct||0)>=0?'+':''}${(s.change_pct||0).toFixed(2)}%</td><td>${fm(s.volume)}</td><td>${fm(s.amount)}</td></tr>`;});
        t+='</tbody></table>';document.getElementById('breakout-table').innerHTML=t;
      }catch(e){document.getElementById('breakout-meta').textContent='加载失败';}
    }

      document.getElementById('breakout-modal').classList.add('show');
      document.querySelector('#breakout-modal h2').textContent='🚀 放量突破个股';
      document.getElementById('breakout-meta').textContent='加载中...';document.getElementById('breakout-table').innerHTML='';

        const r=await fetch(API_BASE+'/api/market-health/breakouts?date=latest');const d=await r.json();
        document.getElementById('breakout-meta').textContent=d.date+' · 共'+d.count+'只放量突破20日高点';

        d.stocks.forEach(s=>{t+='<tr><td>'+s.stock_code+'</td><td>'+(s.name||'')+'</td><td>'+(s.close||0).toFixed(2)+'</td><td>'+(s.change_pct>=0?'+':'')+s.change_pct.toFixed(2)+'%</td><td>'+fm(s.volume)+'</td><td>'+fm(s.amount)+'</td></tr>';});

    async function openDetailModal(type, showAll){
      const modal=document.getElementById('breakout-modal');
      const title=document.querySelector('#breakout-modal h2');
      const meta=document.getElementById('breakout-meta');
      const tbl=document.getElementById('breakout-table');
      modal.classList.add('show'); meta.textContent='加载中...'; tbl.innerHTML='';

      try{
        if(type==='crowding'){
          title.textContent='📊 指数拥挤度明细' + (showAll ? '（全部）' : '');
          const r=await fetch(API_BASE+'/api/crowding/latest'); const d=await r.json();
          const allSel=d.indices||[];
          const indices=showAll?allSel:allSel.filter(s=>(s.composite_score||0)>=70);
          meta.textContent=(showAll?'全部':'拥挤度≥70的')+indices.length+'个指数'+(showAll?'':' / 共'+allSel.length+'个被检');
          let t='<table class="bt"><thead><tr><th>代码</th><th>名称</th><th>拥挤度</th><th>等级</th><th>热度</th><th>资金</th><th>估值</th></tr></thead><tbody>';
          indices.forEach(s=>{const sc=s.composite_score||0;const cl=sc>=70?'#E53935':sc>=50?'#F9A825':'#4CAF50';t+='<tr><td>'+s.code+'</td><td>'+(s.name||'')+'</td><td style=color:'+cl+';font-weight:700>'+sc.toFixed(0)+'</td><td>'+(s.level||'')+'</td><td>'+(s.heat_score||0).toFixed(0)+'</td><td>'+(s.flow_score||0).toFixed(0)+'</td><td>'+(s.valuation_score||0).toFixed(0)+'</td></tr>';});
          tbl.innerHTML=t+'</tbody></table>';
        }else if(type==='ad'){
          title.textContent='🔍 机构吸筹出货明细' + (showAll ? '（全部）' : '');
          const r=await fetch(API_BASE+'/api/index-ad?pool=sector_l1&method=raw'); const d=await r.json();
          const pools=d.pools||{};let all=[];
          for(const[pn,pd]of Object.entries(pools)){(pd.rankings||[]).forEach(it=>all.push({...it,pool:pn}));}
          const filtered=showAll?all:all.filter(s=>(s.rating||'').startsWith('A')||(s.rating||'').startsWith('B'));
          meta.textContent=(showAll?'全部':'AD评级为A/B的')+filtered.length+'个指数'+(showAll?'':' / 共'+all.length+'个被检');
          let t='<table class="bt"><thead><tr><th>代码</th><th>名称</th><th>评级</th><th>含义</th><th>得分</th><th>池</th></tr></thead><tbody>';
          filtered.forEach(s=>{const r=s.rating||'';const rc=r.startsWith('A')?'#2E7D32':r.startsWith('B')?'#558B2F':r.startsWith('D')?'#E53935':r.startsWith('E')?'#B71C1C':'#999';t+='<tr><td>'+s.code+'</td><td>'+(s.name||'')+'</td><td style=color:'+rc+';font-weight:700>'+r+'</td><td>'+(s.meaning||'')+'</td><td>'+(s.score!=null?s.score.toFixed(2):'')+'</td><td>'+(s.pool||'')+'</td></tr>';});
          tbl.innerHTML=t+'</tbody></table>';
        }else if(type==='divergence'){
          title.textContent='⚠ 指数背离明细' + (showAll ? '（全部）' : '');
          const r=await fetch(API_BASE+'/api/index-divergence?pool=sector_l1'); const d=await r.json();
          const allSel=d.indices||[];
          const indices=showAll?allSel:allSel.filter(s=>s.resonance_level&&s.resonance_level!=='无信号');
          meta.textContent=(showAll?'全部':'有背离共振的')+indices.length+'个指数'+(showAll?'':' / 共'+allSel.length+'个被检');
          let t='<table class="bt"><thead><tr><th>代码</th><th>名称</th><th>量价</th><th>RSI</th><th>MACD</th><th>共振</th></tr></thead><tbody>';
          indices.forEach(s=>{const vp=s.div_vp;const rsi=s.div_rsi;const macd=s.div_macd;const res=s.resonance_level||'';const rc=res.includes('强')?'#E53935':res.includes('中')?'#F9A825':res===''?'#999':'#4CAF50';t+='<tr><td>'+s.code+'</td><td>'+(s.name||'')+'</td><td>'+(vp?vp.type+'-'+vp.level:'')+'</td><td>'+(rsi?rsi.type+'-'+rsi.level:'')+'</td><td>'+(macd?macd.type+'-'+macd.level:'')+'</td><td style=color:'+rc+';font-weight:700>'+res+'</td></tr>';});
          tbl.innerHTML=t+'</tbody></table>';
        }
      }catch(e){meta.textContent='加载失败: '+e.message;}
    }

    async function openBreakoutModal(){document.getElementById('breakout-modal').classList.add('show');document.getElementById('breakout-meta').textContent='加载中...';document.getElementById('breakout-table').innerHTML='';try{const r=await fetch(API_BASE+'/api/market-health/breakouts?date=latest');const d=await r.json();document.getElementById('breakout-meta').textContent=d.date+' · 共'+d.count+'只放量突破20日高点';if(!d.stocks||!d.stocks.length){document.getElementById('breakout-table').innerHTML='<div style=padding:24px;text-align:center>暂无突破个股</div>';return;}let t='<table class=bt><thead><tr><th>代码</th><th>名称</th><th>收盘</th><th>涨跌幅</th><th>成交量</th><th>成交额</th></tr></thead><tbody>';d.stocks.forEach(s=>{t+='<tr><td>'+s.stock_code+'</td><td>'+(s.name||'')+'</td><td>'+(s.close||0).toFixed(2)+'</td><td>'+(s.change_pct>=0?'+':'')+s.change_pct.toFixed(2)+'%</td><td>'+fm(s.volume)+'</td><td>'+fm(s.amount)+'</td></tr>';});t+='</tbody></table>';document.getElementById('breakout-table').innerHTML=t;}catch(e){document.getElementById('breakout-meta').textContent='加载失败';}}

    function closeBreakoutModal(){document.getElementById('breakout-modal').classList.remove('show');}

    async function computeSnapshot(){
      const btn=event.target; btn.textContent='⏳ 计算中...'; btn.disabled=true;
      try{
        const r=await fetch(API_BASE+'/api/market-panorama/compute',{method:'POST'});
        const d=await r.json();
        if(d.ok){btn.textContent='✅ 完成';setTimeout(()=>{btn.textContent='🔄 刷新计算';btn.disabled=false;load();},1000);}
        else{btn.textContent='❌ 失败';btn.disabled=false;}
      }catch(e){btn.textContent='❌ 失败';btn.disabled=false;}
    }

    load();
  </script>

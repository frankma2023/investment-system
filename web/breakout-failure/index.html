<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>突破失败回测 · 投资手账本</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">
<style>
  .chart-wrap{height:480px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:4px 0 8px;font-size:0.6rem;align-items:center;color:var(--text-tertiary)}
  .chart-legend .lg-item{display:inline-flex;align-items:center;gap:4px}
  .lg-pin{color:#A349A4;font-size:1.1rem}
  .lg-star-m{color:#FF9800;font-size:1rem}
  .lg-star-c{color:#9C27B0;font-size:1rem}
  .lg-star-s{color:#000;font-size:1rem}
  .severity-mild{color:#FF9800;font-weight:700}
  .severity-confirmed{color:#9C27B0;font-weight:700}
  .severity-severe{color:#000;font-weight:700}
  @media(prefers-color-scheme:dark){ .severity-severe{color:#FF5252} }
</style>
</head>
<body>
<div class="app-container">
  <nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px">
      <label>类型</label>
      <select id="mode" onchange="onModeChange()">
        <option value="stock">个股</option>
        <option value="index">指数</option>
      </select>
    </div>
    <div class="code-wrap">
      <div class="fld">
        <label>代码</label>
        <input type="text" id="stock-code" value="600519" style="width:100px"
               onkeydown="if(event.key==='Enter')run()">
        <span id="stock-name" style="margin-left:6px;font-weight:700;font-family:var(--font-display);font-size:0.85rem"></span>
      </div>
    </div>
    <div class="fld" style="flex:0.5;min-width:90px">
      <label>周期</label>
      <select id="period" onchange="renderChart()">
        <option value="day">日线</option>
        <option value="week">周线</option>
      </select>
    </div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend">
    <span class="lg-item"><span class="lg-pin">📌</span> 突破买点</span>
    <span class="lg-item"><span class="lg-star-m">★</span> 预警(mild)</span>
    <span class="lg-item"><span class="lg-star-c">★</span> 确认(confirmed)</span>
    <span class="lg-item"><span class="lg-star-s">★</span> 严重(severe)</span>
  </div>

  <div class="bottom-layout">
    <div class="bottom-left">

      <!-- 卡片1：监控参数 -->
      <div class="param-card" id="c1">
        <div class="param-card-hd" onclick="tc('c1')">
          <span class="dot" style="background:#E53935"></span>🔴 监控参数
        </div>
        <div class="param-card-bd" id="c1-bd">
          <div class="sr"><span class="sl">监控天数</span><input type="range" id="p-md" min="3" max="20" value="10" oninput="svn('p-md')"><span class="sv" id="p-md-v">10</span></div>
        </div>
      </div>

      <!-- 卡片2：规则开关 -->
      <div class="param-card" id="c2">
        <div class="param-card-hd" onclick="tc('c2')">
          <span class="dot" style="background:#FF9800"></span>🟠 规则开关
        </div>
        <div class="param-card-bd" id="c2-bd">
          <div class="tog-row"><span class="sl">跌破突破日最低价</span><button class="tsw on" id="p-rb-on" onclick="tog('p-rb-on')"></button></div>
          <div class="tog-row"><span class="sl">跌回枢轴点</span><button class="tsw on" id="p-rc-on" onclick="tog('p-rc-on')"></button></div>
          <div class="tog-row"><span class="sl">跌破谷底支撑</span><button class="tsw on" id="p-rd-on" onclick="tog('p-rd-on')"></button></div>
          <div class="tog-row"><span class="sl">放量长阴砸穿</span><button class="tsw on" id="p-re-on" onclick="tog('p-re-on')"></button></div>
          <div class="tog-row"><span class="sl">连续放量溃败</span><button class="tsw on" id="p-rf-on" onclick="tog('p-rf-on')"></button></div>
          <div class="tog-row"><span class="sl">抛盘日叠加</span><button class="tsw on" id="p-rg-on" onclick="tog('p-rg-on')"></button></div>
          <div class="tog-row"><span class="sl">窗口结束出货</span><button class="tsw on" id="p-rh-on" onclick="tog('p-rh-on')"></button></div>
        </div>
      </div>

      <!-- 卡片3：规则微调 -->
      <div class="param-card" id="c3">
        <div class="param-card-hd" onclick="tc('c3')">
          <span class="dot" style="background:#4CAF50"></span>🟢 规则微调
        </div>
        <div class="param-card-bd" id="c3-bd">
          <div class="sr"><span class="sl">长阴跌幅%</span><input type="range" id="p-ec" min="1" max="5" value="3" oninput="svp('p-ec')"><span class="sv" id="p-ec-v">3%</span></div>
          <div class="sr"><span class="sl">长阴量比</span><input type="range" id="p-ev" min="11" max="25" value="15" oninput="svs('p-ev',0.1)"><span class="sv" id="p-ev-v">1.5</span></div>
          <div class="sr"><span class="sl">连续放量天数</span><input type="range" id="p-fd" min="2" max="5" value="3" oninput="svn('p-fd')"><span class="sv" id="p-fd-v">3</span></div>
          <div class="sr"><span class="sl">连续放量量比</span><input type="range" id="p-fv" min="8" max="15" value="10" oninput="svs('p-fv',0.1)"><span class="sv" id="p-fv-v">1.0</span></div>
          <div class="sr"><span class="sl">抛盘日数量</span><input type="range" id="p-gc" min="1" max="4" value="2" oninput="svn('p-gc')"><span class="sv" id="p-gc-v">2</span></div>
          <div class="sr"><span class="sl">抛盘日跌幅%</span><input type="range" id="p-gd" min="1" max="10" value="2" oninput="svs('p-gd',0.1)"><span class="sv" id="p-gd-v">-0.2</span></div>
          <div class="sr"><span class="sl">出货量比</span><input type="range" id="p-hv" min="10" max="20" value="12" oninput="svs('p-hv',0.1)"><span class="sv" id="p-hv-v">1.2</span></div>
          <div class="sr"><span class="sl">谷底倍数</span><input type="range" id="p-dm" min="90" max="99" value="98" oninput="svs('p-dm',0.01)"><span class="sv" id="p-dm-v">0.98</span></div>
        </div>
      </div>

      <button class="btn-run" id="btn-run">🔍 回测</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>

    <div class="bottom-right">
      <div class="xhs-card">
        <div class="xhs-card-header">
          <span class="xhs-card-label">📋 信号明细</span>
        </div>
        <div class="table-wrapper" id="table"></div>
      </div>

      <div class="xhs-card">
        <div class="xhs-card-header">
          <span class="xhs-card-label">🔎 单日排查</span>
        </div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select id="diag-bo-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.7rem;background:var(--card-bg);color:var(--text-primary);flex:1;min-width:110px">
            <option value="">选择突破日</option>
          </select>
          <input type="date" id="diag-check-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1;min-width:120px">
          <button onclick="runDiag()" style="padding:7px 16px;background:var(--color-accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button>
        </div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤️ 投资手账本 · 突破失败检测</footer>
</div>

<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/kline-chart.js"></script>
<script src="../shared/js/theme.js"></script>
<script src="../shared/js/nav.js"></script>
<script>
Nav.init({brandIcon:'⚠️',brandText:'突破失败回测',brandSub:'Breakout Failure',currentPage:'breakout-failure'});

const API_URL='http://localhost:8788', ST='breakout_failure';
var dl=[],bpSignals=[],failureSignals=[],kc,runId=0,klineDisplayEnd='';

// ─── 工具函数 ───
function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
function tog(id){var b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off')}
function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
function svs(id,mul){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v){v.textContent=(parseInt(e.value)*mul).toFixed(mul<1?1:0)}}
function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}
function stog(id,on){var b=document.getElementById(id);if(b)b.className='tsw '+(on?'on':'off')}

// ─── 五角星 SVG path ───
const STAR_PATH='path://M16,0 L20,12 L32,12 L22,20 L26,32 L16,24 L6,32 L10,20 L0,12 L12,12 Z';

document.addEventListener('DOMContentLoaded',async()=>{
  var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
  document.getElementById('date-start').value=ago.toISOString().split('T')[0];
  document.getElementById('date-end').value=now.toISOString().split('T')[0];
  document.getElementById('diag-check-date').value=now.toISOString().split('T')[0];
  document.getElementById('btn-run').addEventListener('click',function(){run()});
  document.getElementById('btn-save').addEventListener('click',saveCfg);
  await loadCfg();
  setTimeout(function(){run(true)},800);
});

function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600519':'000300';run()}

function gp(){
  return {breakout_failure:{
    monitor_days:parseInt(document.getElementById('p-md').value),
    rule_b_enabled:document.getElementById('p-rb-on').classList.contains('on'),
    rule_c_enabled:document.getElementById('p-rc-on').classList.contains('on'),
    rule_d_enabled:document.getElementById('p-rd-on').classList.contains('on'),
    rule_e_enabled:document.getElementById('p-re-on').classList.contains('on'),
    rule_f_enabled:document.getElementById('p-rf-on').classList.contains('on'),
    rule_g_enabled:document.getElementById('p-rg-on').classList.contains('on'),
    rule_h_enabled:document.getElementById('p-rh-on').classList.contains('on'),
    rule_e_chg_pct:parseInt(document.getElementById('p-ec').value),
    rule_e_vol_ratio:parseInt(document.getElementById('p-ev').value)/10,
    rule_f_days:parseInt(document.getElementById('p-fd').value),
    rule_f_vol_ratio:parseInt(document.getElementById('p-fv').value)/10,
    rule_g_count:parseInt(document.getElementById('p-gc').value),
    rule_g_dd_threshold:-parseInt(document.getElementById('p-gd').value)/10,
    rule_h_total_vol_ratio:parseInt(document.getElementById('p-hv').value)/10,
    rule_d_trough_mult:parseInt(document.getElementById('p-dm').value)/100,
  }}
}

function aggregate(raw,period){
  if(!raw||!raw.length)return[];
  if(period==='day')return raw;
  var result=[],cur=null;
  raw.forEach(function(k){
    var d=k.date.replace(/-/g,'');
    var dt=new Date(d.substr(0,4)+'-'+d.substr(4,2)+'-'+d.substr(6,2));
    if(isNaN(dt.getTime()))return;
    var dow=dt.getDay()||7,week0=new Date(dt.getTime()-(dow-1)*86400000);
    var key=period==='week'?week0.toISOString().split('T')[0]:dt.getFullYear()+'-'+(dt.getMonth()+1);
    if(key!==cur){cur=key;result.push({date:k.date,open:k.open,close:k.close,high:k.high,low:k.low,volume:k.volume})}
    else{var r=result[result.length-1];r.high=Math.max(r.high,k.high);r.low=Math.min(r.low,k.low);r.close=k.close;r.volume+=k.volume;r.date=k.date}
  });
  return result;
}

async function run(auto){
  runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
  var code=document.getElementById('stock-code').value.trim();
  var mode=document.getElementById('mode').value;
  if(!code){if(!auto)btn.disabled=false;if(!auto)btn.textContent='📊';return}
  try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){console.error('stock-name fetch failed',e)}
  try{
    var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
    var p=gp().breakout_failure;
    var qs='stock='+code+'&date='+end+'&start='+start+'&mode='+mode;
    qs+='&monitor_days='+p.monitor_days;
    for(var k in p){if(k!=='monitor_days'){qs+='&'+k+'='+p[k]}}
    var resp=await fetch(API_URL+'/api/breakout-failure?'+qs);
    var data=await resp.json();if(runId!==myId)return;
    dl=data.klines||[];klineDisplayEnd=data.klines_display_end||end;
    bpSignals=data.breakout_signals||[];failureSignals=data.failure_signals||[];
    // 更新排查下拉框
    var sel=document.getElementById('diag-bo-date');
    var boDates=[];bpSignals.forEach(function(s){if(boDates.indexOf(s.signal_date)<0)boDates.push(s.signal_date)});
    boDates.sort();
    sel.innerHTML='<option value="">选择突破日</option>';
    boDates.forEach(function(d){sel.innerHTML+='<option value="'+d+'">'+d+'</option>'});
    renderChart();renderTable();if(!auto)btn.textContent='🔍 回测';
  }catch(e){console.error(e);if(!auto)btn.textContent='❌'}
  if(!auto)btn.disabled=false;
}

function renderChart(){
  var period=document.getElementById('period').value;
  var kl=period==='day'&&dl.length?dl:aggregate(dl,'week');
  if(!kl.length)return;

  var dates=kl.map(function(k){return k.date});

  // 合并所有信号
  var allSigs=[],sm={};

  // 突破信号 → 绿色 pin，Y = buy_point
  bpSignals.forEach(function(s){
    var di=dates.indexOf(s.signal_date);
    if(di<0)return;
    allSigs.push({
      date:s.signal_date,y:s.buy_point,symbol:'pin',color:'#A349A4',size:28,
      label:'🎯 突破日 买点='+s.buy_point+' 回调='+s.drawdown_pct+'%'
    });
    sm[s.signal_date]=sm[s.signal_date]||{};
    sm[s.signal_date].breakout={buy_point:s.buy_point,drawdown_pct:s.drawdown_pct,vol_ratio:s.breakout_vol_ratio};
  });

  // 失败信号 → 五角星，按严重级别颜色，Y = close - offset，多条堆叠
  var failByDate={};
  failureSignals.forEach(function(s){
    if(!failByDate[s.date])failByDate[s.date]=[];
    failByDate[s.date].push(s);
  });

  Object.keys(failByDate).forEach(function(date){
    var sigs=failByDate[date];
    var di=dates.indexOf(date);
    if(di<0)return;
    var k=kl[di];
    var range=k.high-k.low;
    var gap=Math.max(range*0.75,0.1);
    sigs.forEach(function(s,i){
      var sevColor=s.severity==='mild'?'#FF9800':s.severity==='confirmed'?'#9C27B0':'#000';
      var y=k.low-gap*(i+1);
      allSigs.push({
        date:s.date,y:y,symbol:STAR_PATH,color:sevColor,size:18,
        label:'⚠ '+s.details.rule_label+' ['+s.severity+'] 原突破='+s.breakout_date
      });
    });
    sm[date]=sm[date]||{};
    sm[date].failures=sigs;
  });

  // KlineChart
  if(!kc||(kc.chart&&kc.chart.isDisposed())){
    kc=KlineChart.create({
      container:document.getElementById('chart'),
      klines:kl,signals:allSigs,signalMap:sm,
      signalSymbol:'pin',signalColor:'#A349A4',signalSize:28,
      signalTooltipPrefix:'🎯 信号',
    });
  }else{
    kc.update(kl,allSigs,sm);
  }
}

function renderTable(){
  var div=document.getElementById('table');
  if(!failureSignals.length){
    var txt='无失败信号';
    if(bpSignals.length)txt+='（共'+bpSignals.length+'笔突破均未触发失败）';
    else txt='无突破信号，无法检测失败';
    div.innerHTML='<div class="loading-row">'+txt+'</div>';return
  }
  var sevCls=function(s){return 'severity-'+s};
  var h='<table><thead><tr><th>#</th><th>失败日</th><th>突破日</th><th>天数</th><th>触发规则</th><th>级别</th><th>买点</th><th>收盘</th><th>涨跌%</th><th>失败量比</th><th>突破量比</th></tr></thead><tbody>';
  [].concat(failureSignals).reverse().forEach(function(s,i){
    var d=s.details||{};
    h+='<tr>';
    h+='<td>'+(failureSignals.length-i)+'</td>';
    h+='<td style="font-weight:700">'+s.date+'</td>';
    h+='<td style="font-size:0.68rem;color:var(--text-tertiary)">'+s.breakout_date+'</td>';
    h+='<td>'+s.failure_day+'</td>';
    h+='<td>'+d.rule_label+'</td>';
    h+='<td class="'+sevCls(s.severity)+'">'+s.severity+'</td>';
    h+='<td>'+s.buy_point+'</td>';
    h+='<td>'+d.current_close+'</td>';
    h+='<td>'+(d.day_chg_pct!=null?(d.day_chg_pct>=0?'+':'')+d.day_chg_pct.toFixed(2)+'%':'—')+'</td>';
    h+='<td>'+(d.volume_ratio!=null?d.volume_ratio.toFixed(2):'—')+'</td>';
    h+='<td>'+(d.breakout_vol_ratio!=null?d.breakout_vol_ratio.toFixed(2):'—')+'</td>';
    h+='</tr>';
  });
  div.innerHTML=h+'</tbody></table>';
}

async function runDiag(){
  var boDate=document.getElementById('diag-bo-date').value;
  var checkDate=document.getElementById('diag-check-date').value;
  var div=document.getElementById('diag-result');
  if(!boDate||!checkDate){div.style.display='none';return}
  var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
  div.innerHTML='<div style="font-size:0.68rem;color:var(--text-tertiary);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
  try{
    var resp=await fetch(API_URL+'/api/breakout-failure/diag?stock='+code+'&breakout_date='+boDate+'&check_date='+checkDate+'&mode='+mode);
    var d=await resp.json();
    if(d.error){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">'+d.error+'</div>';return}
    var h='<div style="font-size:0.6rem;color:var(--text-tertiary);margin-bottom:6px">';
    h+='突破日='+d.breakout_date+' | 检查日='+d.check_date+' | 买点='+d.buy_point+' | 收盘='+d.close+' | D+'+d.monitor_day+'</div>';
    h+='<table style="margin:0;font-size:0.65rem"><thead><tr><th>规则</th><th>条件</th><th>实际</th><th>判定</th></tr></thead><tbody>';
    var rules=d.rules||{};
    var order=['rule_b','rule_c','rule_d','rule_e','rule_f','rule_g','rule_h'];
    order.forEach(function(id){
      var r=rules[id];if(!r)return;
      var td=r.triggered?'<td style="color:#4CAF50">✅ 触发</td>':'<td style="color:#FF6B6B">❌ 未触发</td>';
      h+='<tr><td style="font-weight:700">'+r.label+'</td><td style="font-size:0.58rem">'+escHtml(r.need)+'</td><td style="font-size:0.58rem">'+escHtml(r.actual)+'</td>'+td+'</tr>';
    });
    h+='</tbody></table>';
    div.innerHTML=h;
  }catch(e){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">请求失败: '+e+'</div>'}
}

function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ─── 保存/加载配置 ───
async function saveCfg(){
  var btn=document.getElementById('btn-save');btn.textContent='⏳';btn.disabled=true;
  var p=gp().breakout_failure;
  var y=['# 基部突破失败检测 配置','breakout_failure:'];
  for(var k in p){
    var v=p[k];
    if(typeof v==='boolean')v=v?'true':'false';
    y.push('  '+k+': '+v);
  }
  y=y.join('\n');
  try{var r=await fetch(API_URL+'/api/config?signal_type='+ST,{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();
  if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾 保存配置';btn.classList.remove('saved');btn.disabled=false},2000)}}catch(e){btn.textContent='❌';btn.disabled=false}
}

async function loadCfg(){try{

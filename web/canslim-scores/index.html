<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAN SLIM 全市场评分 · 投资手账本</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">
<style>
.top-bar { display:flex; gap:10px; align-items:flex-end; padding:14px 18px; background:var(--card-bg); border-radius:18px; margin-bottom:10px; box-shadow:0 1px 6px rgba(0,0,0,0.04); flex-wrap:wrap; }
.top-bar .fld { min-width:90px; }
.top-bar label { display:block; font-size:0.58rem; font-weight:600; color:var(--text-tertiary); margin-bottom:2px; }
.top-bar input { padding:7px 8px; border:1px solid var(--divider); border-radius:10px; font-size:0.72rem; background:var(--card-bg); color:var(--text-primary); }
.btn-run { padding:8px 22px; background:#FE2C55; color:#FFF; border:none; border-radius:12px; font-size:0.85rem; font-weight:800; cursor:pointer; }
.table-wrap { background:var(--card-bg); border-radius:18px; padding:10px; box-shadow:0 1px 6px rgba(0,0,0,0.04); overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.7rem; }
th { padding:8px 6px; font-weight:700; color:var(--text-secondary); font-size:0.6rem; border-bottom:2px solid var(--divider); cursor:pointer; white-space:nowrap; position:sticky; top:0; background:var(--card-bg); }
th:hover { color:var(--color-accent); }
td { padding:5px 6px; border-bottom:1px solid var(--divider); text-align:center; }
tr:hover { background:var(--color-accent-subtle); }
.code-link { color:var(--color-accent); font-weight:700; text-decoration:none; }
.code-link:hover { text-decoration:underline; }
.grade-S { color:#2E7D32; font-weight:900; } .grade-A { color:#1565C0; font-weight:700; }
.grade-B { color:#F57F17; font-weight:700; } .grade-C { color:#E65100; font-weight:600; }
.grade-D { color:#C62828; } .grade-E { color:#880E4F; }
.num { text-align:right; font-variant-numeric:tabular-nums; }
.pager { display:flex; gap:6px; align-items:center; padding:8px 0; font-size:0.62rem; color:var(--text-secondary); justify-content:center; }
.pager button { padding:3px 10px; border:1px solid var(--divider); border-radius:6px; background:var(--card-bg); cursor:pointer; font-size:0.6rem; }
.pager button:hover { border-color:var(--color-accent); color:var(--color-accent); }
.pager button:disabled { opacity:0.3; }
.pager select { padding:3px 6px; border:1px solid var(--divider); border-radius:6px; font-size:0.6rem; }
.pager .info { color:var(--text-tertiary); }
#stock-name { font-size:0.7rem; font-weight:700; color:var(--text-primary); padding-top:14px; flex-shrink:0; min-width:60px; }
.nav-dropdown { position:relative; display:inline-flex; }
.nav-dropdown-menu { display:none; position:absolute; top:100%; left:0; background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); min-width:150px; padding:6px 0; z-index:200; white-space:nowrap; }
.nav-dropdown:hover .nav-dropdown-menu { display:block; }
.nav-dropdown-menu a { display:block; padding:7px 16px; font-size:0.72rem; color:var(--text-secondary); text-decoration:none; }
.nav-dropdown-menu a:hover { background:var(--color-accent-subtle); color:var(--color-accent); }
.nav-dropdown-menu a.active { color:var(--color-accent); font-weight:700; }
</style>
</head>
<body>
<div class="app-container">
<nav class="top-nav">
  <div class="nav-brand"><span class="nav-fox">🎯</span><span>CAN SLIM 全市场评分</span></div>
  <div class="nav-links">
    <a href="../" class="nav-item">🏠 看板</a>
    <div class="nav-dropdown"><a href="#" class="nav-item">回测 ▾</a><div class="nav-dropdown-menu">
      <a href="../distribution-day/">📉 抛盘日</a><a href="../follow-through-day/">📈 追盘日</a>
      <a href="../index-rs-backtest/">🏆 指数RS强度</a><a href="../index-crowdedness/">📊 指数拥挤度</a>
      <a href="../stock-rs-backtest/">💪 个股RS强度</a><a href="../index-ad-backtest/">🔍 机构吸筹/出货</a>
      <a href="../divergence-backtest/">⚠️ 指数背离</a>
      <a href="../strongest-index/">⭐ 最强指数</a><a href="../base-detection/">📐 标准突破</a>
      <a href="../pocket-pivot/">🎯 口袋支点</a><a href="../pattern-scan/">🔎 形态识别</a>
    </div></div>
    <a href="../index-scan/" class="nav-item">🔬 指数扫描</a><a href="../index-valuation/" class="nav-item">📈 指数估值</a>
    <a href="../stock-valuation/" class="nav-item">💎 个股扫描</a><a href="../market-scan/" class="nav-item">📊 大盘扫描</a>
    <a href="../pattern-scan/" class="nav-item">🔎 形态识别</a>
    <button class="theme-toggle">🌙</button>
  </div>
</nav>

<div class="top-bar">
  <div class="fld"><label>股票代码</label><input type="text" id="code" style="width:90px" onkeydown="if(event.key==='Enter')filterTable()" onchange="fetchName()"></div>
  <span id="stock-name"></span>
  <div class="fld"><label>评分日期</label><input type="date" id="date"></div>
  <button class="btn-run" onclick="filterTable()">🔍 查询</button>
</div>

<div class="pager" id="pager-top"></div>

<div class="table-wrap">
<table id="tbl">
<thead><tr>
  <th onclick="sortBy(0)">#</th>
  <th onclick="sortBy(1)">代码</th>
  <th onclick="sortBy(2)">名称</th>
  <th onclick="sortBy(3)">总评分</th>
  <th onclick="sortBy(4)">C 当期盈利</th>
  <th onclick="sortBy(5)">A 年度盈利</th>
  <th onclick="sortBy(6)">N 形态新高</th>
  <th onclick="sortBy(7)">S 供给需求</th>
  <th onclick="sortBy(8)">L 领军股</th>
  <th onclick="sortBy(9)">I 机构认同</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="pager" id="pager-bottom"></div>
</div>

<script src="app.js"></script>
</body>
</html>

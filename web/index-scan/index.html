<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指数扫描看板 · 投资手账本</title>
<link rel="stylesheet" href="../shared/themes/neo.css">
<link rel="stylesheet" href="../shared/css/dashboard-base.css">
<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/dashboard-core.js"></script>
<style>
.scan-stats { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.scan-stat { flex:1; min-width:120px; background:rgba(0,200,255,0.04); border:1px solid rgba(0,200,255,0.12); border-radius:12px; padding:12px 14px; text-align:center; }
.scan-stat .val { font-family:'Share Tech Mono',monospace; font-size:1.6rem; font-weight:700; color:var(--neon-cyan); }
.scan-stat .lbl { font-size:0.6rem; color:rgba(255,255,255,0.45); margin-top:2px; text-transform:uppercase; letter-spacing:0.05em; }
.scan-stat.highlight { border-color:rgba(255,50,100,0.3); background:rgba(255,50,100,0.04); }
.scan-stat.highlight .val { color:#FF3264; }

.pool-tabs { display:flex; gap:4px; margin-bottom:12px; }
.pool-tab { padding:8px 16px; border:1px solid rgba(255,255,255,0.08); border-radius:8px; background:rgba(0,0,0,0.3); color:rgba(255,255,255,0.5); cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:0.72rem; transition:all 0.2s; }
.pool-tab.active { border-color:var(--neon-cyan); color:var(--neon-cyan); background:rgba(0,200,255,0.08); text-shadow:0 0 6px rgba(0,200,255,0.3); }

.filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
.filter-bar select,.filter-bar input { padding:6px 10px; border:1px solid rgba(255,255,255,0.1); border-radius:6px; background:rgba(0,0,0,0.4); color:rgba(255,255,255,0.7); font-family:'Share Tech Mono',monospace; font-size:0.65rem; }
.filter-bar select:focus,.filter-bar input:focus { outline:none; border-color:var(--neon-cyan); }

.scan-table { width:100%; border-collapse:collapse; font-size:0.7rem; table-layout:auto; }
.scan-table th { background:rgba(0,200,255,0.06); padding:8px 8px; text-align:left; font-family:'Share Tech Mono',monospace; color:rgba(255,255,255,0.5); font-size:0.6rem; text-transform:uppercase; letter-spacing:0.04em; border-bottom:1px solid rgba(255,255,255,0.06); cursor:pointer; white-space:nowrap; }
.scan-table th:hover { color:var(--neon-cyan); }
.scan-table th.sorted { color:var(--neon-cyan); }
.scan-table td { padding:7px 8px; border-bottom:1px solid rgba(255,255,255,0.03); color:rgba(255,255,255,0.8); }
.scan-table tr:hover td { background:rgba(0,200,255,0.03); }
.scan-table .mono { font-family:'Share Tech Mono',monospace; }

.badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:0.6rem; font-weight:700; }
.badge-rs { background:rgba(0,200,255,0.15); color:var(--neon-cyan); }
.badge-ad-a { background:rgba(255,50,100,0.15); color:#FF3264; }
.badge-ad-e { background:rgba(118,255,3,0.15); color:var(--neon-green); }
.badge-crowd-high { background:rgba(255,50,100,0.15); color:#FF3264; }
.badge-crowd-low { background:rgba(118,255,3,0.15); color:var(--neon-green); }
.badge-div-top { background:rgba(255,50,100,0.15); color:#FF3264; }
.badge-div-bot { background:rgba(118,255,3,0.15); color:var(--neon-green); }
.badge-tier-L1 { background:rgba(255,50,100,0.2); color:#FF3264; }
.badge-tier-L2 { background:rgba(255,165,0,0.2); color:#FFA500; }
.badge-tier-L3 { background:rgba(160,80,255,0.2); color:#A050FF; }

.alert-cell { font-size:0.6rem; color:rgba(255,255,255,0.55); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.loading-overlay { position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; flex-direction:column; }
.loading-overlay .spinner { width:40px; height:40px; border:3px solid rgba(0,200,255,0.2); border-top-color:var(--neon-cyan); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-overlay span { font-family:'Share Tech Mono',monospace; color:var(--neon-cyan); font-size:0.7rem; }

.clickable { cursor:pointer; }
.clickable:hover { color:var(--neon-cyan); text-decoration:underline; }

/* Light mode fixes */
[data-theme="light"] .scan-stat { background:rgba(0,0,0,0.02); border-color:rgba(0,0,0,0.08); }
[data-theme="light"] .scan-stat .val { color:#006080; }
[data-theme="light"] .scan-stat .lbl { color:rgba(0,0,0,0.45); }
[data-theme="light"] .scan-stat.highlight .val { color:#C62828; }
[data-theme="light"] .scan-table td { color:rgba(0,0,0,0.8); }
[data-theme="light"] .scan-table th { color:rgba(0,0,0,0.5); background:rgba(0,0,0,0.03); }
[data-theme="light"] .scan-table tr:hover td { background:rgba(0,0,0,0.03); }
[data-theme="light"] .pool-tab { background:rgba(0,0,0,0.03); color:rgba(0,0,0,0.5); border-color:rgba(0,0,0,0.08); }
[data-theme="light"] .pool-tab.active { color:#006080; border-color:#006080; background:rgba(0,96,128,0.06); }
[data-theme="light"] .filter-bar select, [data-theme="light"] .filter-bar input { background:rgba(0,0,0,0.02); color:rgba(0,0,0,0.7); border-color:rgba(0,0,0,0.1); }
[data-theme="light"] .alert-cell { color:rgba(0,0,0,0.55); }
</style>
</head>
<body class="neo-body">

<nav class="neo-nav">
  <span class="neo-nav-brand">INDEX SCAN //</span>
  <div class="neo-nav-links">
    <a href="../distribution-day/" class="neo-nav-link">抛盘日</a>
    <a href="../follow-through-day/" class="neo-nav-link">追盘日</a>
    <a href="../index-rs-backtest/" class="neo-nav-link">RS强度</a>
    <a href="../index-crowdedness/" class="neo-nav-link">拥挤度</a>
    <a href="../index-ad-backtest/" class="neo-nav-link">A/D评级</a>
    <a href="../divergence-backtest/" class="neo-nav-link">背离</a>
    <a href="#" class="neo-nav-link active">[SCAN]</a>
  </div>
  <div class="nav-actions">
    <span class="neo-sync-pulse" id="sync-indicator"></span>
    <button class="theme-btn" onclick="Dashboard.toggleTheme()">◈</button>
  </div>
</nav>

<div class="dashboard">

  <!-- ══════ L1: STATS STRIP ══════ -->
  <div class="section">
    <div class="neo-card-label">◆ SYS.SUMMARY // 全池快照</div>
    <div class="scan-stats" id="stats-row1"></div>
    <div class="scan-stats" id="stats-row2" style="margin-top:4px;"></div>
  </div>

  <!-- ══════ L2: POOL TABS + TABLE ══════ -->
  <div class="section">
    <div class="pool-tabs" id="pool-tabs"></div>
    <div class="filter-bar">
      <input type="text" id="filter-search" placeholder="搜索代码/名称..." oninput="applyFilters()">
      <select id="filter-rs" onchange="applyFilters()">
        <option value="">RS: 全部</option><option value="90">RS120 ≥ 90</option><option value="80">RS120 ≥ 80</option><option value="70">RS120 ≥ 70</option>
      </select>
      <select id="filter-ad" onchange="applyFilters()">
        <option value="">AD: 全部</option><option value="A+">A+</option><option value="A">≥A</option><option value="B">≥B</option><option value="D">≤D</option><option value="E">≤E</option>
      </select>
      <select id="filter-crowd" onchange="applyFilters()">
        <option value="">拥挤度: 全部</option><option value="高拥挤">高拥挤</option><option value="偏高">偏高</option><option value="正常">正常</option><option value="低拥挤">低拥挤</option>
      </select>
      <select id="filter-div" onchange="applyFilters()">
        <option value="">背离: 全部</option><option value="top">顶背离</option><option value="bottom">底背离</option>
      </select>
      <select id="filter-tier" onchange="applyFilters()">
        <option value="">层级: 全部</option><option value="L1">L1绝对强势</option><option value="L2">L2短期爆发</option><option value="L3">L3潜在共振</option>
      </select>
    </div>
    <div class="neo-card">
      <div id="main-table"></div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div><span id="loading-msg">INITIALIZING...</span>
</div>

<script>
var API='http://localhost:8788';
var allData=[];  // merged data
var poolData={}; // {pool: [items]}
var currentPool='market';
var sortCol='rs120'; var sortDir='desc';
var tierCounts={L1:0,L2:0,L3:0};

var POOLS=[
  {key:'market',name:'全市场',count:29},
  {key:'sector_l1',name:'L1行业',count:11},
  {key:'sector_l2',name:'L2行业',count:45},
  {key:'thematic',name:'主题',count:229},
  {key:'strategy',name:'策略',count:93}
];

// ══════ AUTO LOAD ══════
(async function init(){
  document.getElementById('loading-msg').textContent='FETCHING RS...';
  try{await fetchRS();}catch(e){console.error('RS:',e)}
  document.getElementById('loading-msg').textContent='FETCHING AD...';
  try{await fetchAD();}catch(e){console.error('AD:',e)}
  document.getElementById('loading-msg').textContent='FETCHING DIVERGENCE...';
  try{await fetchDivergence();}catch(e){console.error('DIV:',e)}
  document.getElementById('loading-msg').textContent='FETCHING CROWDING...';
  try{await fetchCrowding();}catch(e){console.error('CROWD:',e)}
  document.getElementById('loading-msg').textContent='MERGING...';
  mergeData();
  buildPoolTabs();
  buildStats();
  switchPool('market');
  document.getElementById('loading').style.display='none';
  document.getElementById('sync-indicator').classList.add('active');
  setTimeout(function(){document.getElementById('sync-indicator').classList.remove('active')},2000);
})();

// ══════ API FETCHES ══════
var rsMap={}, adMap={}, divMap={}, crowdMap={}, indexNames={};

async function fetchRS(){
  try{
    var resp=await fetch(API+'/api/index-rs?date='+today());
    var data=await resp.json();
    for(var pn in data.pools||{}){
      var rankings=data.pools[pn].rankings||[];
      var tiers=data.pools[pn].tiers||{L1:[],L2:[],L3:[]};
      rankings.forEach(function(r){
        if(!rsMap[r.code])rsMap[r.code]={};
        rsMap[r.code].pool=pn;
        rsMap[r.code].rs120=r.RS_120;
        rsMap[r.code].rs60=r.RS_60;
        rsMap[r.code].rs20=r.RS_20;
        rsMap[r.code].rs250=r.RS_250;
        rsMap[r.code].close=r.close;
        rsMap[r.code].change_pct=r.change_pct;
        if(r.name)indexNames[r.code]=r.name;
      });
      (tiers.L1||[]).forEach(function(t){if(!rsMap[t.code])rsMap[t.code]={};rsMap[t.code].tier='L1';tierCounts.L1++});
      (tiers.L2||[]).forEach(function(t){if(!rsMap[t.code])rsMap[t.code]={};rsMap[t.code].tier='L2';tierCounts.L2++});
      (tiers.L3||[]).forEach(function(t){if(!rsMap[t.code])rsMap[t.code]={};rsMap[t.code].tier='L3';tierCounts.L3++});
    }
  }catch(e){console.error('RS fetch failed:',e)}
}

async function fetchAD(){
  try{
    var pools=['market','sector_l1','sector_l2','thematic','strategy'];
    for(var p of pools){
      var resp=await fetch(API+'/api/index-ad?pool='+p+'&date='+today());
      var data=await resp.json();
      for(var pn in data.pools||{}){
        (data.pools[pn].rankings||[]).forEach(function(r){
          if(!adMap[r.code])adMap[r.code]={};
          adMap[r.code].ad_rating=r.rating;
          adMap[r.code].ad_score=r.ad_score;
          if(r.name)indexNames[r.code]=r.name;
        });
      }
    }
  }catch(e){console.error('AD:',e)}
}

async function fetchDivergence(){
  try{
    var pools=['market','sector_l1','sector_l2','thematic','strategy'];
    for(var p of pools){
      var resp=await fetch(API+'/api/index-divergence?pool='+p+'&date='+today()+'&sensitivity=long&_t=scan');
      var data=await resp.json();
      (data.indices||[]).forEach(function(r){
        if(!divMap[r.code])divMap[r.code]={};
        if(r.div_vp&&r.div_vp.type==='top')divMap[r.code].div='top';
        else if(r.div_vp&&r.div_vp.type==='bottom')divMap[r.code].div='bottom';
        else if(r.div_rsi&&r.div_rsi.type==='top')divMap[r.code].div='top';
        else if(r.div_rsi&&r.div_rsi.type==='bottom')divMap[r.code].div='bottom';
        else if(r.div_macd&&r.div_macd.type==='top')divMap[r.code].div='top';
        else if(r.div_macd&&r.div_macd.type==='bottom')divMap[r.code].div='bottom';
        else if(r.div_breadth&&r.div_breadth.type==='top')divMap[r.code].div='top';
        else if(r.div_breadth&&r.div_breadth.type==='bottom')divMap[r.code].div='bottom';
        if(r.name)indexNames[r.code]=r.name;
      });
    }
  }catch(e){console.error('DIV:',e)}
}

async function fetchCrowding(){
  try{
    var resp=await fetch(API+'/api/crowding/latest?date='+today());
    var data=await resp.json();
    (data.results||[]).forEach(function(r){
      crowdMap[r.stock_code]={crowd_level:r.crowd_level,composite_score:r.composite_score};
    });
  }catch(e){console.error('Crowding:',e)}
}

// ══════ MERGE ══════
function mergeData(){
  allData=[];
  var seen={};
  var allCodes=Object.keys(Object.assign({},rsMap,adMap,divMap,crowdMap));
  allCodes.forEach(function(code){
    if(seen[code])return; seen[code]=true;
    var rs=rsMap[code]||{},ad=adMap[code]||{},div=divMap[code]||{},crowd=crowdMap[code]||{};
    var item={
      code:code,name:indexNames[code]||code,
      pool:rs.pool||'',
      close:rs.close,change_pct:rs.change_pct,
      rs120:rs.rs120,rs60:rs.rs60,rs20:rs.rs20,rs250:rs.rs250,tier:rs.tier||'',
      ad_rating:ad.ad_rating,ad_score:ad.ad_score,
      crowd:crowd.crowd_level,div:div.div||'',resonance:div.resonance||''
    };
    var alerts=[];
    if((item.tier==='L1'||item.rs120>=90)&&item.div==='top'&&item.crowd==='高拥挤')alerts.push('🔴 强回调风险');
    else if(item.tier==='L1'&&item.div==='top')alerts.push('🟠 RS极高+顶背离');
    else if(item.rs120>=90&&item.crowd==='高拥挤')alerts.push('🟡 高RS+高拥挤');
    if(item.ad_rating&&item.ad_rating.indexOf('E')>=0&&item.div==='bottom')alerts.push('🟢 AD出货+底背离');
    item.alert=alerts.join(' | ');
    allData.push(item);
  });
  // split by pool
  POOLS.forEach(function(p){poolData[p.key]=allData.filter(function(x){return x.pool===p.key})});
}

// ══════ UI ══════
function buildPoolTabs(){
  var html='';
  POOLS.forEach(function(p){
    html+='<span class="pool-tab" data-pool="'+p.key+'" onclick="switchPool(\''+p.key+'\')">'+p.name+' ('+(poolData[p.key]||[]).length+')</span>';
  });
  document.getElementById('pool-tabs').innerHTML=html;
}

function switchPool(pool){
  currentPool=pool;
  document.querySelectorAll('.pool-tab').forEach(function(t){t.classList.toggle('active',t.dataset.pool===pool)});
  applyFilters();
}

function buildStats(){
  // Row 1: per-pool RS≥90 / A+ / 高拥挤 / 顶背离
  var html='';
  POOLS.forEach(function(p){
    var items=poolData[p.key]||[];
    var rs90=items.filter(function(x){return x.rs120>=90}).length;
    var ap=items.filter(function(x){return x.ad_rating==='A+'}).length;
    var high=items.filter(function(x){return x.crowd==='高拥挤'}).length;
    var divTop=items.filter(function(x){return x.div==='top'}).length;
    html+='<div class="scan-stat"><div class="val">'+rs90+'</div><div class="lbl">'+p.name+' RS≥90</div></div>';
    html+='<div class="scan-stat"><div class="val">'+ap+'</div><div class="lbl">'+p.name+' A+</div></div>';
    html+='<div class="scan-stat highlight"><div class="val">'+high+'</div><div class="lbl">'+p.name+' 高拥挤</div></div>';
    html+='<div class="scan-stat highlight"><div class="val">'+divTop+'</div><div class="lbl">'+p.name+' 顶背离</div></div>';
  });
  document.getElementById('stats-row1').innerHTML=html;

  // Row 2: L1/L2/L3 strong pools across all
  var L1items=allData.filter(function(x){return x.tier==='L1'});
  var L2items=allData.filter(function(x){return x.tier==='L2'});
  var L3items=allData.filter(function(x){return x.tier==='L3'});
  document.getElementById('stats-row2').innerHTML=
    '<div class="scan-stat highlight"><div class="val">'+tierCounts.L1+'</div><div class="lbl">L1 绝对强势指数</div></div>'+
    '<div class="scan-stat"><div class="val">'+tierCounts.L2+'</div><div class="lbl">L2 短期爆发指数</div></div>'+
    '<div class="scan-stat"><div class="val">'+tierCounts.L3+'</div><div class="lbl">L3 潜在共振指数</div></div>'+
    '<div class="scan-stat"><div class="val">'+allData.filter(function(x){return x.div==='top'}).length+'</div><div class="lbl">顶背离总计</div></div>'+
    '<div class="scan-stat"><div class="val">'+allData.filter(function(x){return x.div==='bottom'}).length+'</div><div class="lbl">底背离总计</div></div>'+
    '<div class="scan-stat"><div class="val">'+allData.filter(function(x){return x.alert}).length+'</div><div class="lbl">有预警指数</div></div>';
}

function applyFilters(){
  var items=poolData[currentPool]||[];
  var search=(document.getElementById('filter-search').value||'').toUpperCase();
  var fRS=document.getElementById('filter-rs').value;
  var fAD=document.getElementById('filter-ad').value;
  var fCrowd=document.getElementById('filter-crowd').value;
  var fDiv=document.getElementById('filter-div').value;
  var fTier=document.getElementById('filter-tier').value;

  items=items.filter(function(x){
    if(search&&x.code.indexOf(search)<0&&(x.name||'').toUpperCase().indexOf(search)<0)return false;
    if(fRS&&(!x.rs120||x.rs120<parseInt(fRS)))return false;
    if(fAD){
      if(fAD==='A+'){
        if(x.ad_rating!=='A+')return false;
      }else if(fAD==='A'){
        if(!x.ad_rating||['A+','A','B+','B'].indexOf(x.ad_rating)<0)return false;
      }else if(fAD==='B'){
        if(!x.ad_rating||['D','E'].indexOf(x.ad_rating)>=0)return false;
      }else if(fAD==='D'){
        if(!x.ad_rating||['D','E'].indexOf(x.ad_rating)<0)return false;
      }else if(fAD==='E'){
        if(!x.ad_rating||x.ad_rating.indexOf('E')<0)return false;
      }
    }
    if(fCrowd&&x.crowd!==fCrowd)return false;
    if(fDiv&&x.div!==fDiv)return false;
    if(fTier&&x.tier!==fTier)return false;
    return true;
  });

  // Sort
  items.sort(function(a,b){
    var va=getSortVal(a,sortCol),vb=getSortVal(b,sortCol);
    if(va==null)va=sortDir==='asc'?Infinity:-Infinity;
    if(vb==null)vb=sortDir==='asc'?Infinity:-Infinity;
    return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
  });

  renderTable(items);
}

function getSortVal(item,col){
  if(item[col]!=null)return item[col];
  if(col==='rs120')return item.rs120;
  return null;
}

function renderTable(items){
  var cols=[
    {k:'code',l:'代码',t:'string'},{k:'name',l:'名称',t:'string'},
    {k:'close',l:'最新价',t:'number'},{k:'change_pct',l:'涨跌%',t:'number'},
    {k:'rs120',l:'RS120',t:'number'},{k:'rs60',l:'RS60',t:'number'},{k:'rs20',l:'RS20',t:'number'},
    {k:'tier',l:'层级',t:'string'},{k:'ad_rating',l:'AD评级',t:'string'},
    {k:'crowd',l:'拥挤度',t:'string'},{k:'div',l:'背离',t:'string'},{k:'alert',l:'预警',t:'string'}
  ];
  var html='<table class="scan-table"><thead><tr>';
  cols.forEach(function(c){
    var cls=sortCol===c.k?' sorted':'';
    html+='<th class="'+cls+'" onclick="sortBy(\''+c.k+'\')">'+c.l+'</th>';
  });
  html+='</tr></thead><tbody>';
  items.forEach(function(r){
    html+='<tr>';
    html+='<td class="mono clickable" onclick="window.open(\'../index-rs-backtest/\',\'_blank\')">'+r.code+'</td>';
    html+='<td>'+r.name+'</td>';
    html+='<td class="mono">'+(r.close?r.close.toFixed(2):'—')+'</td>';
    var ch=r.change_pct||0;
    html+='<td class="mono" style="color:'+(ch>=0?'var(--neon-green)':'#FF3264')+'">'+(ch>=0?'+':'')+ch.toFixed(2)+'%</td>';
    html+='<td class="mono">'+rsDisp(r.rs120)+'</td>';
    html+='<td class="mono">'+rsDisp(r.rs60)+'</td>';
    html+='<td class="mono">'+rsDisp(r.rs20)+'</td>';
    html+='<td>'+tierBadge(r.tier)+'</td>';
    html+='<td>'+adBadge(r.ad_rating)+'</td>';
    html+='<td>'+crowdBadge(r.crowd)+'</td>';
    html+='<td>'+divBadge(r.div)+'</td>';
    html+='<td class="alert-cell" title="'+(r.alert||'')+'">'+(r.alert||'')+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('main-table').innerHTML=items.length?html:'<div style="padding:24px;text-align:center;color:rgba(255,255,255,0.3)">NO MATCHING INDICES</div>';
}

function rsDisp(v){return v!=null?(v>=90?'<span style="color:#FF3264;font-weight:700">'+v+'</span>':v):'—'}
function tierBadge(t){
  if(t==='L1')return '<span class="badge badge-tier-L1">L1 绝对强势</span>';
  if(t==='L2')return '<span class="badge badge-tier-L2">L2 短期爆发</span>';
  if(t==='L3')return '<span class="badge badge-tier-L3">L3 潜在共振</span>';
  return '';
}
function adBadge(r){
  if(!r)return '—';
  var cls=r.indexOf('A')>=0?'badge-ad-a':(r.indexOf('E')>=0||r.indexOf('D')>=0?'badge-ad-e':'');
  return '<span class="badge '+cls+'">'+r+'</span>';
}
function crowdBadge(c){
  if(!c)return '—';
  var cls=c==='高拥挤'?'badge-crowd-high':(c==='低拥挤'?'badge-crowd-low':'');
  return '<span class="badge '+cls+'">'+c+'</span>';
}
function divBadge(d){
  if(d==='top')return '<span class="badge badge-div-top">顶</span>';
  if(d==='bottom')return '<span class="badge badge-div-bot">底</span>';
  return '—';
}
function sortBy(col){
  if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortCol=col;sortDir='asc'}
  applyFilters();
}
function today(){var d=new Date();return d.toISOString().slice(0,10)}
</script>

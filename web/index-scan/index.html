<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>指数扫描</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
  .top-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{font-family:var(--font-body);padding:5px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);outline:none;transition:all .2s;backdrop-filter:blur(10px)}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;flex-wrap:wrap}
  .tab{padding:6px 14px;border:1px solid var(--border);border-radius:10px;background:rgba(26,26,31,.4);color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:500;transition:all .2s;white-space:nowrap}
  .tab:hover{border-color:var(--border-hover);color:#d4d4d8}
  .tab.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .tab-content{display:none;animation:fadeIn .4s ease}
  .tab-content.active{display:block}
  .btn-glass{font-family:var(--font-body);font-size:10px;font-weight:500;padding:4px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--card);color:var(--muted);transition:all .2s;text-decoration:none;display:inline-block}
  .btn-glass:hover{color:#d4d4d8;background:rgba(255,255,255,.04);border-color:var(--border-hover)}
  .btn-accent{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .btn-accent:hover{background:rgba(245,158,11,.18)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .tab{background:rgba(255,255,255,.6);border-color:var(--divider);color:var(--muted)}
  html[data-theme="light"] .tab:hover{border-color:rgba(0,0,0,.15);color:#374151}
  html[data-theme="light"] .tab.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">


<div class="journal-dots"></div>
<div class="washi-tape washi-1"></div>
<div class="washi-tape washi-2"></div>

<nav id="top-nav"></nav>

  <!-- ══════ STATS STRIP ══════ -->
  <div class="xhs-card" style="margin:16px 0">
    <div class="xhs-card-header"><span class="xhs-card-label">📊 全池快照</span></div>
    <div class="scan-stats" id="stats-row1"></div>
    <div class="scan-stats" id="stats-row2" style="margin-top:4px;"></div>
  </div>

  <!-- ══════ POOL TABS + TABLE ══════ -->
  <div class="pool-tabs" id="pool-tabs"></div>
  <div class="filter-bar">
    <input type="text" id="filter-search" placeholder="搜索代码/名称..." oninput="applyFilters()">
    <select id="filter-rs" onchange="applyFilters()">
      <option value="">RS: 全部</option><option value="90">RS120 ≥ 90</option><option value="80">RS120 ≥ 80</option><option value="70">RS120 ≥ 70</option>
    </select>
    <select id="filter-ad" onchange="applyFilters()">
      <option value="">AD: 全部</option><option value="A+">A+</option><option value="A">≥A</option><option value="B">≥B</option><option value="D">≤D</option><option value="E">≤E</option>
    </select>
    <select id="filter-crowd" onchange="applyFilters()">
      <option value="">拥挤度: 全部</option><option value="高拥挤">高拥挤</option><option value="偏高">偏高</option><option value="正常">正常</option><option value="低拥挤">低拥挤</option>
    </select>
    <select id="filter-div" onchange="applyFilters()">
      <option value="">背离: 全部</option><option value="top">顶背离</option><option value="bottom">底背离</option>
    </select>
    <select id="filter-tier" onchange="applyFilters()">
      <option value="">层级: 全部</option><option value="L1">L1绝对强势</option><option value="L2">L2短期爆发</option><option value="L3">L3潜在共振</option>
    </select>
  </div>
  <div class="xhs-card">
    <div id="main-table"></div>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div><span id="loading-msg">加载中...</span>
</div>

<script>function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('idxscan-theme',n)}(function(){var s=localStorage.getItem('idxscan-theme')||'light';document.documentElement.dataset.theme=s})();</script>
<script>
var API='http://'+window.location.hostname+':8788';
var allData=[];var poolData={};var currentPool='market';var sortCol='rs120';var sortDir='desc';var tierCounts={L1:0,L2:0,L3:0};
var POOLS=[{key:'market',name:'全市场',count:29},{key:'sector_l1',name:'L1行业',count:11},{key:'sector_l2',name:'L2行业',count:45},{key:'thematic',name:'主题',count:229},{key:'strategy',name:'策略',count:93}];

(async function init(){
  document.getElementById('loading-msg').textContent='加载RS强度...';
  try{await fetchRS()}catch(e){console.error(e)}
  document.getElementById('loading-msg').textContent='加载AD评级...';
  try{await fetchAD()}catch(e){console.error(e)}
  document.getElementById('loading-msg').textContent='加载背离信号...';
  try{await fetchDivergence()}catch(e){console.error(e)}
  document.getElementById('loading-msg').textContent='加载拥挤度...';
  try{await fetchCrowding()}catch(e){console.error(e)}
  mergeData();buildPoolTabs();buildStats();switchPool('market');
  document.getElementById('loading').style.display='none';
})();

var rsMap={},adMap={},divMap={},crowdMap={},indexNames={};

async function fetchRS(){
  var resp=await fetch(API+'/api/index-rs?date='+today());var data=await resp.json();
  for(var pn in data.pools||{}){
    var rankings=data.pools[pn].rankings||[],tiers=data.pools[pn].tiers||{L1:[],L2:[],L3:[]};
    rankings.forEach(function(r){
      if(!rsMap[r.code])rsMap[r.code]={};
      rsMap[r.code].pool=pn;rsMap[r.code].rs120=r.RS_120;rsMap[r.code].rs60=r.RS_60;rsMap[r.code].rs20=r.RS_20;rsMap[r.code].rs250=r.RS_250;rsMap[r.code].close=r.close;rsMap[r.code].change_pct=r.change_pct;
      if(r.name)indexNames[r.code]=r.name;
    });
    (tiers.L1||[]).forEach(function(t){if(!rsMap[t.code])rsMap[t.code]={};rsMap[t.code].tier='L1';tierCounts.L1++});
    (tiers.L2||[]).forEach(function(t){if(!rsMap[t.code])rsMap[t.code]={};rsMap[t.code].tier='L2';tierCounts.L2++});
    (tiers.L3||[]).forEach(function(t){if(!rsMap[t.code])rsMap[t.code]={};rsMap[t.code].tier='L3';tierCounts.L3++});
  }
}

async function fetchAD(){
  var pools=['market','sector_l1','sector_l2','thematic','strategy'];
  for(var p of pools){
    var resp=await fetch(API+'/api/index-ad?pool='+p+'&date='+today());var data=await resp.json();
    for(var pn in data.pools||{}){
      (data.pools[pn].rankings||[]).forEach(function(r){
        if(!adMap[r.code])adMap[r.code]={};adMap[r.code].ad_rating=r.rating;adMap[r.code].ad_score=r.ad_score;
        if(r.name)indexNames[r.code]=r.name;
      });
    }
  }
}

async function fetchDivergence(){
  var pools=['market','sector_l1','sector_l2','thematic','strategy'];
  for(var p of pools){
    try{
      var resp=await fetch(API+'/api/index-divergence?pool='+p+'&date='+today()+'&sensitivity=long&_t=scan');
      var data=await resp.json();
      (data.indices||[]).forEach(function(r){
        if(!divMap[r.code])divMap[r.code]={};
        if(r.div_vp&&r.div_vp.type==='top')divMap[r.code].div='top';else if(r.div_vp&&r.div_vp.type==='bottom')divMap[r.code].div='bottom';
        else if(r.div_rsi&&r.div_rsi.type==='top')divMap[r.code].div='top';else if(r.div_rsi&&r.div_rsi.type==='bottom')divMap[r.code].div='bottom';
        else if(r.div_macd&&r.div_macd.type==='top')divMap[r.code].div='top';else if(r.div_macd&&r.div_macd.type==='bottom')divMap[r.code].div='bottom';
        else if(r.div_breadth&&r.div_breadth.type==='top')divMap[r.code].div='top';else if(r.div_breadth&&r.div_breadth.type==='bottom')divMap[r.code].div='bottom';
        if(r.name)indexNames[r.code]=r.name;
      });
    }catch(e){}
  }
}

async function fetchCrowding(){
  try{
    var resp=await fetch(API+'/api/crowding/latest?date='+today());var data=await resp.json();
    (data.results||[]).forEach(function(r){crowdMap[r.stock_code]={crowd_level:r.crowd_level,composite_score:r.composite_score}});
  }catch(e){}
}

function mergeData(){
  allData=[];var seen={};
  var allCodes=Object.keys(Object.assign({},rsMap,adMap,divMap,crowdMap));
  allCodes.forEach(function(code){
    if(seen[code])return;seen[code]=true;
    var rs=rsMap[code]||{},ad=adMap[code]||{},div=divMap[code]||{},crowd=crowdMap[code]||{};
    var item={code:code,name:indexNames[code]||code,pool:rs.pool||'',close:rs.close,change_pct:rs.change_pct,rs120:rs.rs120,rs60:rs.rs60,rs20:rs.rs20,rs250:rs.rs250,tier:rs.tier||'',ad_rating:ad.ad_rating,ad_score:ad.ad_score,crowd:crowd.crowd_level,div:div.div||'',resonance:div.resonance||''};
    var alerts=[];
    if((item.tier==='L1'||item.rs120>=90)&&item.div==='top'&&item.crowd==='高拥挤')alerts.push('🔴 强回调风险');
    else if(item.tier==='L1'&&item.div==='top')alerts.push('🟠 RS极高+顶背离');
    else if(item.rs120>=90&&item.crowd==='高拥挤')alerts.push('🟡 高RS+高拥挤');
    if(item.ad_rating&&item.ad_rating.indexOf('E')>=0&&item.div==='bottom')alerts.push('🟢 AD出货+底背离');
    item.alert=alerts.join(' | ');allData.push(item);
  });
  POOLS.forEach(function(p){poolData[p.key]=allData.filter(function(x){return x.pool===p.key})});
}

function buildPoolTabs(){
  var h='';POOLS.forEach(function(p){h+='<span class="pool-tab" data-pool="'+p.key+'" onclick="switchPool(\''+p.key+'\')">'+p.name+' ('+(poolData[p.key]||[]).length+')</span>'});
  document.getElementById('pool-tabs').innerHTML=h;
}
function switchPool(pool){currentPool=pool;document.querySelectorAll('.pool-tab').forEach(function(t){t.classList.toggle('active',t.dataset.pool===pool)});applyFilters()}

function buildStats(){
  var h='';
  POOLS.forEach(function(p){
    var items=poolData[p.key]||[];
    h+='<div class="scan-stat"><div class="val">'+items.filter(function(x){return x.rs120>=90}).length+'</div><div class="lbl">'+p.name+' RS≥90</div></div>';
    h+='<div class="scan-stat"><div class="val">'+items.filter(function(x){return x.ad_rating==='A+'}).length+'</div><div class="lbl">'+p.name+' A+</div></div>';
    h+='<div class="scan-stat highlight"><div class="val">'+items.filter(function(x){return x.crowd==='高拥挤'}).length+'</div><div class="lbl">'+p.name+' 高拥挤</div></div>';
    h+='<div class="scan-stat highlight"><div class="val">'+items.filter(function(x){return x.div==='top'}).length+'</div><div class="lbl">'+p.name+' 顶背离</div></div>';
  });
  document.getElementById('stats-row1').innerHTML=h;
  document.getElementById('stats-row2').innerHTML=
    '<div class="scan-stat highlight"><div class="val">'+tierCounts.L1+'</div><div class="lbl">L1 绝对强势</div></div>'+
    '<div class="scan-stat"><div class="val">'+tierCounts.L2+'</div><div class="lbl">L2 短期爆发</div></div>'+
    '<div class="scan-stat"><div class="val">'+tierCounts.L3+'</div><div class="lbl">L3 潜在共振</div></div>'+
    '<div class="scan-stat"><div class="val">'+allData.filter(function(x){return x.div==='top'}).length+'</div><div class="lbl">顶背离总计</div></div>'+
    '<div class="scan-stat"><div class="val">'+allData.filter(function(x){return x.div==='bottom'}).length+'</div><div class="lbl">底背离总计</div></div>'+
    '<div class="scan-stat"><div class="val">'+allData.filter(function(x){return x.alert}).length+'</div><div class="lbl">有预警</div></div>';
}

function applyFilters(){
  var items=poolData[currentPool]||[],search=(document.getElementById('filter-search').value||'').toUpperCase();
  var fRS=document.getElementById('filter-rs').value,fAD=document.getElementById('filter-ad').value,fCrowd=document.getElementById('filter-crowd').value,fDiv=document.getElementById('filter-div').value,fTier=document.getElementById('filter-tier').value;
  items=items.filter(function(x){
    if(search&&x.code.indexOf(search)<0&&(x.name||'').toUpperCase().indexOf(search)<0)return false;
    if(fRS&&(!x.rs120||x.rs120<parseInt(fRS)))return false;
    if(fAD){
      if(fAD==='A+'){if(x.ad_rating!=='A+')return false}
      else if(fAD==='A'){if(!x.ad_rating||['A+','A','B+','B'].indexOf(x.ad_rating)<0)return false}
      else if(fAD==='B'){if(!x.ad_rating||['D','E'].indexOf(x.ad_rating)>=0)return false}
      else if(fAD==='D'){if(!x.ad_rating||['D','E'].indexOf(x.ad_rating)<0)return false}
      else if(fAD==='E'){if(!x.ad_rating||x.ad_rating.indexOf('E')<0)return false}
    }
    if(fCrowd&&x.crowd!==fCrowd)return false;
    if(fDiv&&x.div!==fDiv)return false;
    if(fTier&&x.tier!==fTier)return false;
    return true;
  });
  items.sort(function(a,b){var va=getSortVal(a,sortCol),vb=getSortVal(b,sortCol);if(va==null)va=sortDir==='asc'?Infinity:-Infinity;if(vb==null)vb=sortDir==='asc'?Infinity:-Infinity;return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1)});
  renderTable(items);
}
function getSortVal(item,col){if(item[col]!=null)return item[col];if(col==='rs120')return item.rs120;return null}

function renderTable(items){
  var cols=[{k:'code',l:'代码'},{k:'name',l:'名称'},{k:'close',l:'最新价'},{k:'change_pct',l:'涨跌%'},{k:'rs120',l:'RS120'},{k:'rs60',l:'RS60'},{k:'rs20',l:'RS20'},{k:'tier',l:'层级'},{k:'ad_rating',l:'AD评级'},{k:'crowd',l:'拥挤度'},{k:'div',l:'背离'},{k:'alert',l:'预警'}];
  var h='<table class="scan-table"><thead><tr>';
  cols.forEach(function(c){var cls=sortCol===c.k?' sorted':'';h+='<th class="'+cls+'" onclick="sortBy(\''+c.k+'\')">'+c.l+'</th>'});
  h+='</tr></thead><tbody>';
  items.forEach(function(r){
    h+='<tr>';
    h+='<td class="mono clickable">'+r.code+'</td><td>'+r.name+'</td>';
    h+='<td class="mono">'+(r.close?r.close.toFixed(2):'—')+'</td>';
    var ch=r.change_pct||0;
    h+='<td class="mono" style="color:'+(ch>=0?'var(--color-up)':'var(--color-down)')+'">'+(ch>=0?'+':'')+ch.toFixed(2)+'%</td>';
    h+='<td class="mono">'+rsDisp(r.rs120)+'</td><td class="mono">'+rsDisp(r.rs60)+'</td><td class="mono">'+rsDisp(r.rs20)+'</td>';
    h+='<td>'+tierBadge(r.tier)+'</td><td>'+adBadge(r.ad_rating)+'</td><td>'+crowdBadge(r.crowd)+'</td><td>'+divBadge(r.div)+'</td>';
    h+='<td class="alert-cell" title="'+(r.alert||'')+'">'+(r.alert||'')+'</td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById('main-table').innerHTML=items.length?h:'<div style="padding:24px;text-align:center;color:var(--text-tertiary)">暂无匹配指数</div>';
}

function rsDisp(v){return v!=null?(v>=90?'<span style="color:var(--color-up);font-weight:700">'+v+'</span>':v):'—'}
function tierBadge(t){if(t==='L1')return'<span class="badge badge-tier-L1">L1 绝对强势</span>';if(t==='L2')return'<span class="badge badge-tier-L2">L2 短期爆发</span>';if(t==='L3')return'<span class="badge badge-tier-L3">L3 潜在共振</span>';return''}
function adBadge(r){if(!r)return'—';var cls=r.indexOf('A')>=0?'badge-ad-a':(r.indexOf('E')>=0||r.indexOf('D')>=0?'badge-ad-e':'');return'<span class="badge '+cls+'">'+r+'</span>'}
function crowdBadge(c){if(!c)return'—';var cls=c==='高拥挤'?'badge-crowd-high':(c==='低拥挤'?'badge-crowd-low':'');return'<span class="badge '+cls+'">'+c+'</span>'}
function divBadge(d){if(d==='top')return'<span class="badge badge-div-top">顶</span>';if(d==='bottom')return'<span class="badge badge-div-bot">底</span>';return'—'}
function sortBy(col){if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=col;sortDir='asc'}applyFilters()}
function today(){var d=new Date();return d.toISOString().slice(0,10)}
</script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"🔬",brandText:"指数扫描",currentPage:"index-scan"})
// Theme toggle for hanako-glass
function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>

<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}

  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}

  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}

.top-bar{display:flex;gap:12px;align-items:flex-end;padding:16px 20px;background:var(--card-bg);border-radius:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04);flex-wrap:wrap}

  .bottom-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
  .btn-run{width:100%;padding:11px;background:#FE2C55;color:#FFF;border:none;border-radius:14px;font-size:0.95rem;font-weight:800;cursor:pointer}

<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

<nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px"><label>类型</label><select id="mode" onchange="onModeChange()"><option value="stock">个股</option><option value="index">指数</option></select></div>
    <div class="code-wrap"><div class="fld"><label>代码</label><input type="text" id="stock-code" value="600519" style="width:100px" onkeydown="if(event.key==='Enter')run()"><span id="stock-name" style="margin-left:6px;font-weight:700;font-family:var(--font-display);font-size:0.85rem;"></span></div></div>
    <div class="fld" style="flex:0.5;min-width:90px"><label>周期</label><select id="period" style="width:100%" onchange="run()"><option value="day">日线</option><option value="week">周线</option><option value="month">月线</option></select></div>
    <div class="fld"><label>起始日期</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>截止日期</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <div class="chart-wrap" id="chart"></div>

  <div class="bottom-layout">
    <div class="bottom-left">
      <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#FE2C55"></span>🔴 基部结构</div><div class="param-card-bd" id="c1-bd">
        <div class="sr"><span class="sl">回溯天数</span><input type="range" id="p-lb" min="60" max="250" value="120" oninput="svn('p-lb')"><span class="sv" id="p-lb-v">120</span></div>
        <div class="sr"><span class="sl">基部最少天</span><input type="range" id="p-mbd" min="10" max="40" value="20" oninput="svn('p-mbd')"><span class="sv" id="p-mbd-v">20</span></div>
        <div class="sr"><span class="sl">下行最少天</span><input type="range" id="p-mdd" min="5" max="20" value="10" oninput="svn('p-mdd')"><span class="sv" id="p-mdd-v">10</span></div>
      </div></div>

      <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#FF9800"></span>🟠 回调+回升</div><div class="param-card-bd" id="c2-bd">
        <div class="sr"><span class="sl">回调下限</span><input type="range" id="p-dmin" min="3" max="12" value="5" oninput="svp('p-dmin')"><span class="sv" id="p-dmin-v">5%</span></div>
        <div class="sr"><span class="sl">回调上限</span><input type="range" id="p-dmax" min="25" max="50" value="40" oninput="svp('p-dmax')"><span class="sv" id="p-dmax-v">40%</span></div>
        <div class="sr"><span class="sl">回升比例</span><input type="range" id="p-rec" min="65" max="90" value="75" oninput="svp('p-rec')"><span class="sv" id="p-rec-v">75%</span></div>
      </div></div>

      <div class="param-card" id="c3"><div class="param-card-hd" onclick="tc('c3')"><span class="dot" style="background:#4CAF50"></span>🟢 前置+突破</div><div class="param-card-bd" id="c3-bd">
        <div class="sr"><span class="sl">前置涨幅</span><input type="range" id="p-pa" min="5" max="30" value="30" oninput="svp('p-pa')"><span class="sv" id="p-pa-v">30%</span></div>
        <div class="sr"><span class="sl">突破量比</span><input type="range" id="p-bv" min="10" max="18" value="13" oninput="svs('p-bv',0.1)"><span class="sv" id="p-bv-v">1.3</span></div>
        <div class="tog-row"><span class="sl">要求阳线</span><button class="tsw on" id="p-gr-on" onclick="tog('p-gr-on')"></button></div>
        <div class="tog-row"><span class="sl">SMA50之上</span><button class="tsw on" id="p-sm-on" onclick="tog('p-sm-on')"></button></div>
        <div class="sr"><span class="sl">收盘位置</span><input type="range" id="p-cp" min="40" max="70" value="50" oninput="svp('p-cp')"><span class="sv" id="p-cp-v">50%</span></div>
      </div></div>

      <div class="param-card" id="cv"><div class="param-card-hd" onclick="tc('cv')"><span class="dot" style="background:#A349A4"></span>🟣 VCP 标注</div><div class="param-card-bd" id="cv-bd">
        <div class="sr"><span class="sl">最低 VCP 得分</span><input type="range" id="p-vs" min="0" max="10" value="6" oninput="svs('p-vs',0.1)"><span class="sv" id="p-vs-v">0.6</span></div>
        <div class="sr"><span class="sl">收缩率阈值</span><input type="range" id="p-vcr" min="6" max="10" value="8" oninput="svs('p-vcr',0.1)"><span class="sv" id="p-vcr-v">0.8</span></div>
        <div class="sr"><span class="sl">末端振幅上限</span><input type="range" id="p-vta" min="3" max="12" value="8" oninput="svp('p-vta')"><span class="sv" id="p-vta-v">8%</span></div>
        <div class="sr"><span class="sl">末端量干涸</span><input type="range" id="p-vdr" min="3" max="8" value="5" oninput="svs('p-vdr',0.1)"><span class="sv" id="p-vdr-v">0.5</span></div>
      </div></div>

      <button class="btn-run" id="btn-run">🔍 运行识别</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>

    <div class="bottom-right">
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 信号明细</span></div><div class="table-wrapper" id="table"></div></div>
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🔎 单日排查</span></div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--color-accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>

  <footer class="page-footer">❤️ 投资手账本 · 基部突破 Layer 1</footer>

<script src="../shared/js/api-client.js"></script>
<script>
  const API_URL='http://'+window.location.hostname+':8788', ST='base_breakout';
  function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
  function tog(id){var b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off')}
  function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
  function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
  function svs(id,mul){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v){v.textContent=(parseInt(e.value)*mul).toFixed(mul<1?1:0)}}
  var ck=[],cs=[],chart,rawKlines=[],signalMap={},runId=0;

  document.addEventListener('DOMContentLoaded',async()=>{
    var now=new Date();document.getElementById('date-end').value=now.toISOString().split('T')[0];
    var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
    document.getElementById('date-start').value=ago.toISOString().split('T')[0];
    document.getElementById('diag-date').value=now.toISOString().split('T')[0];
    chart=echarts.init(document.getElementById('chart'));
    document.getElementById('btn-run').addEventListener('click',run);
    document.getElementById('btn-save').addEventListener('click',saveCfg);
    document.addEventListener('themeChanged',function(){if(ck.length){chart.dispose();chart=echarts.init(document.getElementById('chart'));renderChart();}});
    await loadCfg();setTimeout(function(){run(true)},500);
  });

  function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600519':'000300';run()}

  function aggregate(raw,period){
    if(!raw||!raw.length)return [];
    if(period==='day')return raw;
    var result=[],cur=null;
    raw.forEach(function(k){
      var d=k.date.replace(/-/g,'');
      var dt=new Date(d.substr(0,4)+'-'+d.substr(4,2)+'-'+d.substr(6,2));
      if(isNaN(dt.getTime()))return;
      var dow=dt.getDay()||7,week0=new Date(dt.getTime()-(dow-1)*86400000);
      var key=period==='week'?week0.toISOString().split('T')[0]:dt.getFullYear()+'-'+(dt.getMonth()+1);
      if(key!==cur){cur=key;result.push({date:k.date,open:k.open,close:k.close,high:k.high,low:k.low,volume:k.volume});}
      else{var r=result[result.length-1];r.high=Math.max(r.high,k.high);r.low=Math.min(r.low,k.low);r.close=k.close;r.volume+=k.volume;r.date=k.date;}
    });
    return result;
  }

  function gp(){return {base_breakout:{
    lookback:parseInt(document.getElementById('p-lb').value),
    min_base_days:parseInt(document.getElementById('p-mbd').value),
    min_descent_days:parseInt(document.getElementById('p-mdd').value),
    drawdown_min:parseInt(document.getElementById('p-dmin').value)/100,
    drawdown_max:parseInt(document.getElementById('p-dmax').value)/100,
    min_recovery:parseInt(document.getElementById('p-rec').value)/100,
    min_prior_advance:parseInt(document.getElementById('p-pa').value)/100,
    breakout_vol_ratio:parseInt(document.getElementById('p-bv').value)/10,
    require_green:document.getElementById('p-gr-on').classList.contains('on'),
    sma50_check:document.getElementById('p-sm-on').classList.contains('on'),
    close_position_min:parseInt(document.getElementById('p-cp').value)/100,
  }}}

  async function run(auto){
    runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
    var code=document.getElementById('stock-code').value.trim();
    var mode=document.getElementById('mode').value;
    if(!code){if(!auto)btn.disabled=false;if(!auto)btn.textContent='📊';return}
    try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
    try{
      var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
      var period=document.getElementById('period').value;
      var vcpQ='&vcp_contraction_ratio='+(parseInt(document.getElementById('p-vcr').value)/10)+'&vcp_terminal_amp='+(parseInt(document.getElementById('p-vta').value)/100)+'&vcp_dryup_ratio='+(parseInt(document.getElementById('p-vdr').value)/10);var resp=await fetch(API_URL+'/api/base-breakout?stock='+code+'&date='+end+'&start='+start+'&mode='+mode+vcpQ);
      var data=await resp.json();if(runId!==myId)return;rawKlines=data.klines||[];
      if(!rawKlines.length){ck=[];if(chart)chart.clear();document.getElementById('table').innerHTML='<div class="loading-row">该时段无K线数据</div>';btn.textContent='📭';btn.disabled=false;return};ck=aggregate(rawKlines,period);
      cs=(data.signals||[]).filter(function(s){return s.signal_date>=start&&s.signal_date<=end});
      signalMap={};cs.forEach(function(s){signalMap[s.signal_date]=s});
      renderChart();renderTable();if(!auto)btn.textContent='🔍 运行识别';
    }catch(e){console.error(e);btn.textContent='❌'}
    if(!auto)btn.disabled=false;
  }

  function renderChart(){
    if(!chart||!ck.length)return;
    var dates=ck.map(function(k){return k.date});
    var ma=function(p){var r=[],s=0;for(var i=0;i<ck.length;i++){if(ck[i].close!=null){s+=ck[i].close;if(i>=p){s-=ck[i-p].close;r.push(s/p)}else r.push(null)}else r.push(null)}return r};
    var ma5=ma(5),ma10=ma(10),ma20=ma(20),ma60=ma(60),ma120=ma(120),ma250=ma(250);
    var isDark=document.documentElement.dataset.theme==='dark';
    var bg=isDark?'#1a1a1f':'#fff';
    var tx=isDark?'#ccc':'#333';
    var pts=[];
    cs.forEach(function(s){
      var si=dates.indexOf(s.signal_date);if(si<0)return;
      pts.push({name:'基部突破买点',coord:[si,s.buy_point],value:'基部突破买点 ¥'+s.buy_point,symbol:'pin',symbolSize:28,itemStyle:{color:'#A349A4',borderColor:'#FFF',borderWidth:1}});
    });

    chart.setOption({
      backgroundColor:bg,
      tooltip:{trigger:'axis',axisPointer:{type:'cross'},
        backgroundColor:isDark?'rgba(0,0,0,0.85)':'rgba(255,255,255,0.85)',
        borderColor:'transparent',borderWidth:0,
        textStyle:{color:isDark?'#eee':'#333',fontSize:11},
        formatter:function(params){
        if(!params||!params.length)return'';
        var di=params[0].dataIndex,d=ck[di];if(!d)return'';
        var o=d.open,c=d.close,h=d.high,l=d.low,v=d.volume;
        var chg=o>0?((c-o)/o*100).toFixed(2):'—';
        var amp=h>l?((h-l)/l*100).toFixed(2):'—';
        var vs=v>=1e8?(v/1e8).toFixed(2)+'亿':v>=1e4?(v/1e4).toFixed(0)+'万':v.toFixed(0);
        var tc=isDark?'#eee':'#333';
        var ln='<div style="line-height:1.9;font-size:11px">';
        ln+='<div style="font-weight:700;font-size:13px;margin-bottom:4px">'+d.date+'</div>';
        ln+='<div>开盘 <b>'+o.toFixed(2)+'</b></div>';
        ln+='<div>收盘 <b>'+c.toFixed(2)+'</b></div>';
        ln+='<div>最高 <span style="color:#E53935">'+h.toFixed(2)+'</span></div>';
        ln+='<div>最低 <span style="color:#26C6DA">'+l.toFixed(2)+'</span></div>';
        ln+='<div>涨幅 <span style="color:'+(c>=o?'#E53935':'#26C6DA')+'">'+(c>=o?'+':'')+chg+'%</span></div>';
        ln+='<div>振幅 '+amp+'%</div>';
        ln+='<div>成交量 '+vs+'</div>';
        if(ma5[di]!=null)ln+='<div>MA5 <span style="color:#E91E63">'+ma5[di].toFixed(2)+'</span></div>';
        if(ma10[di]!=null)ln+='<div>MA10 <span style="color:#FF9800">'+ma10[di].toFixed(2)+'</span></div>';
        if(ma20[di]!=null)ln+='<div>MA20 <span style="color:#FFEB3B">'+ma20[di].toFixed(2)+'</span></div>';
        if(ma60[di]!=null)ln+='<div>MA60 <span style="color:#4CAF50">'+ma60[di].toFixed(2)+'</span></div>';
        if(ma120[di]!=null)ln+='<div>MA120 <span style="color:#2196F3">'+ma120[di].toFixed(2)+'</span></div>';
        if(ma250[di]!=null)ln+='<div>MA250 <span style="color:#9C27B0">'+ma250[di].toFixed(2)+'</span></div>';
        if(signalMap[d.date]){var s=signalMap[d.date];ln+='<div style="color:#A349A4;font-weight:700;padding-top:2px">🎯 突破日 买点='+s.buy_point+' 回调='+s.drawdown_pct+'%</div>';}
        ln+='</div>';return ln;
      }},
      axisPointer:{link:[{xAxisIndex:'all'}]},
      grid:[{left:'8%',right:'1%',top:8,height:'60%'},{left:'8%',right:'1%',top:'75%',height:'15%'}],
      xAxis:[{type:'category',data:dates,axisLabel:{fontSize:9,color:tx},axisLine:{lineStyle:{color:'#ccc'}}},{type:'category',data:dates,axisLabel:{show:false},gridIndex:1}],
      yAxis:[{type:'value',scale:true,axisLabel:{fontSize:9,color:tx},splitLine:{lineStyle:{color:isDark?'#3a3a3a':'#eee'}}},{type:'value',scale:true,axisLabel:{fontSize:8},gridIndex:1,splitLine:{show:false}}],
      dataZoom:[{type:'inside',xAxisIndex:[0,1]},{type:'slider',xAxisIndex:[0,1],height:16,bottom:4}],
      series:[
        {name:'K线',type:'candlestick',data:ck.map(function(k){return[k.open,k.close,k.low,k.high]}),itemStyle:{color:'#E53935',color0:'#26C6DA',borderColor:'#E53935',borderColor0:'#26C6DA'},markPoint:{data:pts,symbol:'pin',symbolSize:28,itemStyle:{color:'#A349A4'},label:{show:false}}},
        {name:'成交量',type:'bar',data:ck.map(function(k,i){return{value:k.volume,itemStyle:{color:ck[i].close>=ck[i].open?'rgba(229,57,53,0.35)':'rgba(38,198,218,0.35)'}}}),xAxisIndex:1,yAxisIndex:1},
        {name:'MA5',type:'line',data:ma5,smooth:true,symbol:'none',lineStyle:{width:1,color:'#E91E63'}},
        {name:'MA10',type:'line',data:ma10,smooth:true,symbol:'none',lineStyle:{width:1,color:'#FF9800'}},
        {name:'MA20',type:'line',data:ma20,smooth:true,symbol:'none',lineStyle:{width:1,color:'#F4B400'}},
        {name:'MA60',type:'line',data:ma60,smooth:true,symbol:'none',lineStyle:{width:1.2,color:'#4CAF50'}},
        {name:'MA120',type:'line',data:ma120,smooth:true,symbol:'none',lineStyle:{width:1.2,color:'#2196F3'}},
        {name:'MA250',type:'line',data:ma250,smooth:true,symbol:'none',lineStyle:{width:1.5,color:'#9C27B0'}}
      ]
    });
  }

  function renderTable(){
    var div=document.getElementById('table');
    if(!cs.length){div.innerHTML='<div class="loading-row">无基部突破信号。可尝试放宽参数（增大回调上限、降低回升比例）</div>';return}
    var h='<table><thead><tr><th>#</th><th>日期</th><th>前高</th><th>前高日期</th><th>谷</th><th>谷日期</th><th>回调</th><th>回升</th><th>买点</th><th>量比</th><th>基部天数</th><th>形态</th></tr></thead><tbody>';
    [].concat(cs).reverse().forEach(function(s,i){var v=s.tags&&s.tags.vcp?s.tags.vcp:null,vc=v?v.score.toFixed(2):'—',sx=v&&v.score>=0.60?'style="color:#A349A4;font-weight:700"':'';h+='<tr><td>'+(cs.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td class="t-up">'+s.prior_high_price+'</td><td style="font-size:0.62rem;color:var(--text-tertiary)">'+s.prior_high_date+'</td><td>'+s.trough_price+'</td><td style="font-size:0.62rem;color:var(--text-tertiary)">'+s.trough_date+'</td><td>'+s.drawdown_pct+'%</td><td>'+s.recovery_pct+'%</td><td>'+s.buy_point+'</td><td>'+s.breakout_vol_ratio+'</td><td>'+s.base_days+'d</td><td '+sx+'>'+vc+(v&&v.toc_count?' ('+v.toc_count+'C)':'')+'</td></tr>'});
    div.innerHTML=h+'</tbody></table>';
  }

  async function runDiag(){
    var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
    if(!date){div.style.display='none';return}
    var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
    div.innerHTML='<div style="font-size:0.7rem;color:var(--text-tertiary);padding:8px 0">⏳ 检测中...</div>';div.style.display='block';
    try{
      var resp=await fetch(API_URL+'/api/base-breakout/diag?stock='+code+'&date='+date+'&mode='+mode);
      var d=await resp.json();
      if(d.error){div.innerHTML='<div style="font-size:0.7rem;color:#FF6B6B">'+d.error+'</div>';return}
      var all=d.all_pass,r=d.results,bd=all?'#4CAF50':'#FF9800';
      var h='<div style="font-size:0.6rem;color:var(--text-tertiary);margin-bottom:6px">'+date;
      if(d.ohlc)h+=' O='+d.ohlc.open.toFixed(2)+' H='+d.ohlc.high.toFixed(2)+' L='+d.ohlc.low.toFixed(2)+' C='+d.ohlc.close.toFixed(2);
      h+='</div>';
      if(d.prior_high)h+='<div style="font-size:0.58rem;color:var(--text-tertiary);margin-bottom:4px">前高='+d.prior_high.toFixed(2)+'('+d.prior_high_date+') 谷='+d.trough.toFixed(2)+'('+d.trough_date+') 回调='+d.drawdown_pct+'%</div>';
      else if(d.prior_high===null)h+='<div style="font-size:0.58rem;color:#FF6B6B;margin-bottom:4px">前高未找到（谷底驱动法无法定位局部高点）</div>';
      h+='<table style="margin:0;font-size:0.68rem"><thead><tr><th>条件</th><th>实际值</th><th>阈值</th><th>判定</th></tr></thead><tbody>';
      r.forEach(function(c){var cc=c.pass?'<td style="color:#4CAF50">✅ '+(c.note||'')+'</td>':'<td style="color:#FF6B6B">❌ '+(c.note||'')+'</td>';h+='<tr><td>'+c.condition+'</td><td>'+c.value+'</td><td>'+c.threshold+'</td>'+cc+'</tr>'});
      h+='<tr style="border-top:2px solid var(--divider)"><td style="font-weight:900">综合</td><td colspan=2></td><td style="font-weight:900;font-size:0.85rem;color:'+bd+'">'+(all?'🎯 应为基部突破日':'❌ 不满足')+'</td></tr></tbody></table>';
      div.innerHTML=h;
    }catch(e){div.innerHTML='<div style="font-size:0.7rem;color:#FF6B6B">请求失败: '+e+'</div>'}
  }

  async function loadCfg(){try{
    var r=await fetch(API_URL+'/api/config?signal_type='+ST,{cache:'no-store'});var c=await r.json();if(!c||!c.base_breakout)return;var b=c.base_breakout;
    svs2('p-lb',b.lookback||120);svn('p-lb');svs2('p-mbd',b.min_base_days||20);svn('p-mbd');svs2('p-mdd',b.min_descent_days||10);svn('p-mdd');
    svs2('p-dmin',Math.round((b.drawdown_min||0.05)*100));svp('p-dmin');svs2('p-dmax',Math.round((b.drawdown_max||0.40)*100));svp('p-dmax');
    svs2('p-rec',Math.round((b.min_recovery||0.75)*100));svp('p-rec');svs2('p-pa',Math.round((b.min_prior_advance||0.30)*100));svp('p-pa');
    svs2('p-bv',Math.round((b.breakout_vol_ratio||1.3)*10));svs('p-bv',0.1);
    stog('p-gr-on',b.require_green!==false);stog('p-sm-on',b.sma50_check!==false);
    svs2('p-cp',Math.round((b.close_position_min||0.50)*100));svp('p-cp');
  }catch(e){}}
  function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}
  function stog(id,on){var b=document.getElementById(id);if(b)b.className='tsw '+(on?'on':'off')}

  async function saveCfg(){
    var btn=document.getElementById('btn-save');btn.textContent='⏳';btn.disabled=true;
    var p=gp().base_breakout;
    var y=['# 基部突破检测 (Layer 1) 配置','base_breakout:',
      '  lookback: '+p.lookback,'  min_base_days: '+p.min_base_days,'  min_descent_days: '+p.min_descent_days,
      '  drawdown_min: '+p.drawdown_min,'  drawdown_max: '+p.drawdown_max,'  min_recovery: '+p.min_recovery,
      '  min_prior_advance: '+p.min_prior_advance,'  breakout_vol_ratio: '+p.breakout_vol_ratio,
      '  require_green: '+(p.require_green?'true':'false'),'  sma50_check: '+(p.sma50_check?'true':'false'),
      '  close_position_min: '+p.close_position_min,''].join('\n');
    try{var r=await fetch(API_URL+'/api/config?signal_type='+ST,{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();
    if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾';btn.classList.remove('saved');btn.disabled=false},2000)}}
    catch(e){btn.textContent='❌';btn.disabled=false}
  }
</script>

(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();

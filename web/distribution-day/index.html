<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>抛盘日回测 · 投资手账本</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">
<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .s-conf{color:#C62828;font-weight:700}.s-warn{color:#E65100;font-weight:700}.s-clr{color:#2E7D32;font-weight:700}
</style>
</head>
<body>
<div class="app-container">
  <nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px"><label>指数</label><select id="index-code" onchange="run()"><option value="000985">中证全指</option><option value="000300">沪深300</option></select></div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend">📉 抛盘日(红量柱) | 🔴 见顶确认 | ⚠️ 抛压增加 | ✅ 抛压解除</div>

  <div class="bottom-layout">
    <div class="bottom-left">
      <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#C62828"></span>🔴 标准抛盘日</div><div class="param-card-bd" id="c1-bd">
        <div class="sr"><span class="sl">跌幅阈值</span><input type="range" id="p-dc" min="1" max="10" value="2" oninput="svs3('p-dc')"><span class="sv" id="p-dc-v">-0.2%</span></div>
        <div class="sr"><span class="sl">量比阈值</span><input type="range" id="p-dv" min="85" max="110" value="95" oninput="svs2('p-dv')"><span class="sv" id="p-dv-v">0.95</span></div>
      </div></div>
      <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#E65100"></span>🟠 信号计数</div><div class="param-card-bd" id="c2-bd">
        <div class="sr"><span class="sl">窗口交易日</span><input type="range" id="p-wd" min="15" max="30" value="25" oninput="svn('p-wd')"><span class="sv" id="p-wd-v">25</span></div>
        <div class="sr"><span class="sl">Warning</span><input type="range" id="p-wc" min="2" max="4" value="3" oninput="svn('p-wc')"><span class="sv" id="p-wc-v">3</span></div>
        <div class="sr"><span class="sl">Confirmed</span><input type="range" id="p-cc" min="4" max="7" value="5" oninput="svn('p-cc')"><span class="sv" id="p-cc-v">5</span></div>
      </div></div>
      <button class="btn-run" id="btn-run">🔍 运行检测</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>
    <div class="bottom-right">
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 抛盘日信号</span></div><div class="table-wrapper" id="table"></div></div>
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🔎 单日排查</span></div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--color-accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤️ 投资手账本 · 抛盘日 Distribution Day</footer>
</div>

<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/theme.js"></script>
<script>
  const API_URL='http://localhost:8788';
  function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
  function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
  function svs2(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=(parseInt(e.value)/100).toFixed(2)}
  function svs3(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent='-'+((parseInt(e.value)/1000)).toFixed(3)}
  var kl=[],ds=[],cn=[],chart,runId=0;

  document.addEventListener('DOMContentLoaded',async()=>{
    var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
    document.getElementById('date-start').value=ago.toISOString().split('T')[0];
    document.getElementById('date-end').value=now.toISOString().split('T')[0];document.getElementById('diag-date').value=now.toISOString().split('T')[0];
    chart=echarts.init(document.getElementById('chart'));
    document.getElementById('btn-run').addEventListener('click',run);
    document.getElementById('btn-save').addEventListener('click',saveCfg);
    await loadCfg();
    setTimeout(function(){run(true)},500);
  });

  async function run(auto){
    runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
    var idx=document.getElementById('index-code').value;
    var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
    try{
      var resp=await fetch(API_URL+'/api/distribution-day?index='+idx+'&date='+end+'&start='+start);
      var data=await resp.json();if(runId!==myId)return;
      kl=data.daily||[];cn=data.counts||[];ds=data.signals||[];
      renderChart();renderTable();if(!auto)btn.textContent='🔍 运行检测';
    }catch(e){console.error(e);btn.textContent='❌'}
    if(!auto)btn.disabled=false;
  }

  function gp(){return {distribution_day:{
    standard_decline_min:-parseInt(document.getElementById('p-dc').value)/1000,
    standard_vol_ratio:parseInt(document.getElementById('p-dv').value)/100,
    window_days:parseInt(document.getElementById('p-wd').value),
    warning_count:parseInt(document.getElementById('p-wc').value),
    confirmed_count:parseInt(document.getElementById('p-cc').value),
  }}}
  async function saveCfg(){var btn=document.getElementById('btn-save');btn.textContent='⏳';var p=gp().distribution_day;
    var y='# distribution_day\ndistribution_day:\n';for(var k in p){y+='  '+k+': '+p[k]+'\n'}
    try{var r=await fetch(API_URL+'/api/config?signal_type=distribution_day',{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾 保存配置';btn.classList.remove('saved')},2000)}}catch(e){btn.textContent='❌'}}
  async function loadCfg(){try{var r=await fetch(API_URL+'/api/config?signal_type=distribution_day',{cache:'no-store'});var c=await r.json();if(!c||!c.distribution_day)return;var b=c.distribution_day;
    setV('p-dc',Math.round(Math.abs(b.standard_decline_min||0.001)*1000));svs3('p-dc');setV('p-dv',Math.round((b.standard_vol_ratio||1.0)*100));svs2('p-dv');setV('p-wd',b.window_days||25);svn('p-wd');setV('p-wc',b.warning_count||3);svn('p-wc');setV('p-cc',b.confirmed_count||5);svn('p-cc')}catch(e){}}
  function setV(id,v){var e=document.getElementById(id);if(e)e.value=v}

  function renderChart(){
    if(!chart||!kl.length)return;
    var dates=kl.map(function(k){return k.date});
    var isDark=document.documentElement.dataset.theme==='dark';
    var bg=isDark?'#2A2627':'#fff',tx=isDark?'#ccc':'#333';
    var volColors=kl.map(function(k){return k.dist_type?isDark?'rgba(198,40,40,0.6)':'rgba(198,40,40,0.45)':isDark?'rgba(229,57,53,0.25)':'rgba(229,57,53,0.2)'});
    var cntData=cn.map(function(c){return c.count});

    chart.setOption({
      backgroundColor:bg,
      tooltip:{trigger:'axis',axisPointer:{type:'cross',link:{xAxisIndex:'all'}},
        backgroundColor:isDark?'rgba(0,0,0,0.85)':'rgba(255,255,255,0.85)',borderColor:'transparent',borderWidth:0,textStyle:{color:isDark?'#eee':'#333',fontSize:11},
        formatter:function(params){
          if(!params||!params.length)return'';
          var di=params[0].dataIndex,d=kl[di];if(!d)return'';
          var cc=d.close!=null?d.close:0,chg=d.change_pct!=null?d.change_pct:0,vol=d.volume||0,vs=vol>=1e8?(vol/1e8).toFixed(2)+'亿':vol>=1e4?(vol/1e4).toFixed(0)+'万':String(vol);
          var ln='<div style="line-height:1.8;font-size:11px"><div style="font-weight:700;font-size:13px;margin-bottom:4px">'+d.date+'</div>';
          ln+='<div>收盘 <b>'+cc.toFixed(2)+'</b> 涨跌 <span style="color:'+(chg>=0?'#E53935':'#26C6DA')+'">'+(chg>=0?'+':'')+chg+'%</span></div>';
          ln+='<div>成交量 '+vs+' 量比 '+(d.vol_ratio!=null?d.vol_ratio.toFixed(2):'—')+' 位置 '+(d.close_position!=null?d.close_position.toFixed(2):'—')+'</div>';
          if(d.dist_type)ln+='<div style="color:#C62828;font-weight:700">'+d.dist_label+'</div>';
          if(cn[di])ln+='<div style="color:'+(cn[di].level==='confirmed'?'#C62828':cn[di].level==='warning'?'#E65100':'#888')+'">25日计数: '+cn[di].count+'个</div>';
          ln+='</div>';return ln;
        }
      },
      grid:[{left:'8%',right:'1%',top:8,height:'55%'},{left:'8%',right:'1%',top:'68%',height:'12%'},{left:'8%',right:'1%',top:'83%',height:'10%'}],
      xAxis:[{type:'category',data:dates,axisLabel:{fontSize:9,color:tx},axisLine:{lineStyle:{color:'#ccc'}}},{type:'category',data:dates,axisLabel:{show:false},gridIndex:1},{type:'category',data:dates,axisLabel:{show:false},gridIndex:2}],
      yAxis:[{type:'value',scale:true,axisLabel:{fontSize:9,color:tx},splitLine:{lineStyle:{color:isDark?'#3a3a3a':'#eee'}}},{type:'value',scale:true,axisLabel:{fontSize:8},gridIndex:1,splitLine:{show:false}},{type:'value',min:0,axisLabel:{fontSize:8},gridIndex:2,splitLine:{show:false},minInterval:1}],
      dataZoom:[{type:'inside',xAxisIndex:[0,1,2]},{type:'slider',xAxisIndex:[0,1,2],height:16,bottom:4}],
      series:[
        {name:'K线',type:'candlestick',data:kl.map(function(k){return[k.open,k.close,k.low,k.high]}),itemStyle:{color:'#E53935',color0:'#26C6DA',borderColor:'#E53935',borderColor0:'#26C6DA'}},
        {name:'成交量',type:'bar',data:kl.map(function(k,i){return{value:k.volume,itemStyle:{color:volColors[i]}}}),xAxisIndex:1,yAxisIndex:1},
        {name:'25日计数',type:'line',data:cntData,xAxisIndex:2,yAxisIndex:2,symbol:'none',smooth:true,lineStyle:{width:2,color:'#C62828'},markLine:{silent:true,symbol:'none',lineStyle:{type:'dashed',width:1},data:[{yAxis:5,label:{formatter:'confirmed 5',fontSize:9,color:'#C62828'}},{yAxis:3,label:{formatter:'warning 3',fontSize:9,color:'#E65100'}}]}}
      ]
    });
  }

  async function runDiag(){
    var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
    if(!date){div.style.display='none';return}var idx=document.getElementById('index-code').value;
    div.innerHTML='<div style="font-size:0.68rem;color:var(--text-tertiary);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
    try{var resp=await fetch(API_URL+'/api/distribution-day/diag?index='+idx+'&date='+date);var d=await resp.json();
    var h='<div style="font-size:0.65rem">'+date+' | 25日计数: <b style="color:'+(d.level==='confirmed'?'#C62828':'#E65100')+'">'+d.count_25d+'</b> ('+d.level+')</div>';
    if(d.recent_dist_days&&d.recent_dist_days.length){h+='<table style="margin:4px 0 0;font-size:0.6rem"><thead><tr><th>日期</th><th>类型</th></tr></thead><tbody>';d.recent_dist_days.forEach(function(r){h+='<tr><td>'+r.date+'</td><td>'+r.dist_label+'</td></tr>'});h+='</tbody></table>';}else{h+='<div style="font-size:0.62rem;color:var(--text-tertiary)">最近无抛盘日</div>'}
    div.innerHTML=h;}catch(e){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">请求失败</div>'}}

  function renderTable(){
    var div=document.getElementById('table');
    var totalDist=kl.filter(function(k){return k.dist_type}).length;
    var h='<div style="padding:8px 14px;font-size:0.68rem;color:var(--text-secondary)">抛盘日总数: <b style="color:#C62828">'+totalDist+'</b> 个 | 最新计数: <b>'+(cn.length?cn[cn.length-1].count:'—')+'</b> 个</div>';
    if(!ds.length){h+='<div class="loading-row">无信号事件</div>';div.innerHTML=h;return}
    h+='<table><thead><tr><th>#</th><th>日期</th><th>信号</th><th>计数</th></tr></thead><tbody>';
    [].concat(ds).reverse().forEach(function(s,i){
      var tc=s.level.includes('cleared')?'s-clr':s.level.includes('confirmed')?'s-conf':'s-warn';
      h+='<tr><td>'+(ds.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td class="'+tc+'">'+s.label+'</td><td>'+s.count+'</td></tr>';
    });
    div.innerHTML=h+'</tbody></table>';
  }
</script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"📉",brandText:"抛盘日回测",currentPage:"distribution-day"})</script>
</body>
</html>

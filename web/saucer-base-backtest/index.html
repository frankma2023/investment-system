<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碟形基部回测 · 投资手账本</title>
  <link rel="stylesheet" href="../shared/css/theme.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/xhs-cards.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <script src="../shared/js/echarts.min.js"></script>
  <style>
    .top-bar { display:flex; gap:12px; align-items:flex-end; padding:16px 20px; background:var(--card-bg); border-radius:18px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,0.04); flex-wrap:wrap; }
    .top-bar .fld { min-width:100px; }
    .top-bar label { display:block; font-size:0.6rem; font-weight:600; color:var(--text-tertiary); margin-bottom:3px; }
    .top-bar input,.top-bar select { width:100%; padding:7px 10px; border:1px solid var(--divider); border-radius:10px; font-size:0.75rem; background:var(--card-bg); color:var(--text-primary); box-sizing:border-box; }
    .top-bar .code-wrap { flex:1.5; display:flex; gap:6px; }
    .top-bar .code-wrap input { flex:1; }
    .chart-wrap { width:100%; height:480px; margin-bottom:12px; }
    .bottom-layout { display:flex; gap:14px; align-items:flex-start; }
    .bottom-left { width:340px; flex-shrink:0; display:flex; flex-direction:column; gap:10px; }
    .bottom-right { flex:1; min-width:0; display:flex; flex-direction:column; gap:14px; }
    .btn-run { width:100%; padding:11px; background:#FE2C55; color:#FFF; border:none; border-radius:14px; font-size:0.95rem; font-weight:800; cursor:pointer; }
    .btn-run:hover { opacity:0.88; } .btn-run:disabled { background:#CCC; cursor:not-allowed; }
    .btn-save { width:100%; padding:9px; background:var(--card-bg); border:1.5px solid var(--divider); border-radius:14px; font-size:0.85rem; font-weight:700; cursor:pointer; }
    .btn-save.saved { background:#E8F5E9; border-color:#4CAF50; color:#2E7D32; }
    .param-card { background:var(--card-bg); border:1px solid var(--divider); border-radius:16px; overflow:hidden; }
    .param-card-hd { display:flex; align-items:center; padding:9px 14px; cursor:pointer; font-size:0.73rem; font-weight:800; }
    .param-card-hd .dot { width:8px; height:8px; border-radius:50%; margin-right:8px; }
    .param-card-bd { padding:0 14px 10px; } .param-card-bd.collapsed { display:none; }
    .sr { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .sr .sl { width:78px; font-size:0.58rem; font-weight:600; color:var(--text-tertiary); flex-shrink:0; }
    .sr input[type=range] { flex:1; height:3px; }
    .sr .sv { width:44px; text-align:right; font-size:0.62rem; font-weight:700; }
    .tog-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .tog-row .sl { width:78px; font-size:0.58rem; font-weight:600; color:var(--text-tertiary); }
    .tsw { position:relative; width:32px; height:16px; border-radius:8px; border:none; cursor:pointer; }
    .tsw.on { background:#FE2C55; } .tsw.off { background:#CCC; }
    .tsw::after { content:''; position:absolute; top:2px; width:12px; height:12px; border-radius:50%; background:#FFF; transition:left 0.2s; }
    .tsw.on::after { left:18px; } .tsw.off::after { left:2px; }
    table { width:100%; border-collapse:collapse; font-size:0.7rem; }
    th,td { padding:4px 6px; text-align:center; border-bottom:1px solid var(--divider); }
    th { font-weight:700; color:var(--text-secondary); font-size:0.62rem; cursor:pointer; white-space:nowrap; }
    .t-up { color:#E53935; font-weight:700; }
    .nav-dropdown { position:relative; display:inline-flex; }
    .nav-dropdown-menu { display:none; position:absolute; top:100%; left:0; background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); min-width:150px; padding:6px 0; z-index:200; white-space:nowrap; }
    .nav-dropdown:hover .nav-dropdown-menu { display:block; }
    .nav-dropdown-menu a { display:block; padding:7px 16px; font-size:0.72rem; color:var(--text-secondary); text-decoration:none; }
    .nav-dropdown-menu a:hover { background:var(--color-accent-subtle); color:var(--color-accent); }
    .nav-dropdown-menu a.active { color:var(--color-accent); font-weight:700; }
    .anno-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin:0 4px; }
    @media (max-width:900px) { .bottom-layout { flex-direction:column; } .bottom-left { width:100%; } }
  </style>
</head>
<body>
  <div class="app-container">
    <nav id="top-nav"></nav>

    <!-- 扫描设置 -->
    <div class="top-bar">
      <div class="code-wrap"><div class="fld"><label>股票代码</label><input type="text" id="stock-code" value="601318" style="width:100px" onkeydown="if(event.key==='Enter')run()"><span id="stock-name" style="font-size:0.65rem;color:var(--text-tertiary);padding:7px 6px;flex-shrink:0"></span></div></div>
      <div class="fld"><label>开始</label><input type="date" id="date-start"></div>
      <div class="fld"><label>结束</label><input type="date" id="date-end"></div>
    </div>

    <!-- K线图 -->
    <div class="chart-wrap" id="chart"></div>
    <div style="font-size:0.6rem;color:var(--text-tertiary);margin-top:4px;margin-bottom:8px">
      <span class="anno-dot" style="background:#E91E63"></span>碟形突破 · 
      <span class="anno-dot" style="background:#FF9800"></span>前高 · 
      <span class="anno-dot" style="background:#4CAF50"></span>碟底
    </div>

    <div class="bottom-layout">
      <div class="bottom-left">
        <!-- 回调深度 -->
        <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#FE2C55"></span>🔴 回调深度</div><div class="param-card-bd" id="c1-bd">
          <div class="sr"><span class="sl">最小回调</span><input type="range" id="p-cmin" min="5" max="15" value="8" oninput="svp('p-cmin')"><span class="sv" id="p-cmin-v">8%</span></div>
          <div class="sr"><span class="sl">最大回调</span><input type="range" id="p-cmax" min="10" max="30" value="20" oninput="svp('p-cmax')"><span class="sv" id="p-cmax-v">20%</span></div>
          <div class="sr"><span class="sl">最小下降周</span><input type="range" id="p-mw" min="2" max="6" value="3" oninput="svn('p-mw')"><span class="sv" id="p-mw-v">3</span></div>
        </div></div>

        <!-- 形态切割 -->
        <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#FF9800"></span>🟠 形态切割</div><div class="param-card-bd" id="c2-bd">
          <div class="sr"><span class="sl">切割阈值</span><input type="range" id="p-cut" min="10" max="35" value="20" oninput="svp('p-cut')"><span class="sv" id="p-cut-v">20%</span></div>
          <div class="sr"><span class="sl">切割A上限</span><input type="range" id="p-ca" min="1" max="10" value="5" oninput="svp('p-ca')"><span class="sv" id="p-ca-v">5%</span></div>
          <div class="sr"><span class="sl">碟底最小龄</span><input type="range" id="p-ba" min="5" max="50" value="10" oninput="svn('p-ba')"><span class="sv" id="p-ba-v">10天</span></div>
        </div></div>

        <!-- 碟底平坦性 -->
        <div class="param-card" id="c3"><div class="param-card-hd" onclick="tc('c3')"><span class="dot" style="background:#4CAF50"></span>🟢 碟底平坦性</div><div class="param-card-bd" id="c3-bd">
          <div class="sr"><span class="sl">±5天振幅</span><input type="range" id="p-f5" min="2" max="10" value="5" oninput="svp('p-f5')"><span class="sv" id="p-f5-v">5%</span></div>
          <div class="sr"><span class="sl">±10天振幅</span><input type="range" id="p-f10" min="3" max="15" value="8" oninput="svp('p-f10')"><span class="sv" id="p-f10-v">8%</span></div>
          <div class="tog-row"><span class="sl">宽窗口必须</span><button class="tsw off" id="p-fwr-on" onclick="tog('p-fwr-on')"></button></div>
          <div class="sr"><span class="sl">最大斜率</span><input type="range" id="p-slp" min="1" max="20" value="5" oninput="svs('p-slp',0.0001)"><span class="sv" id="p-slp-v">0.0005</span></div>
        </div></div>

        <!-- 弧线圆润性 -->
        <div class="param-card" id="c4"><div class="param-card-hd" onclick="tc('c4')"><span class="dot" style="background:#2196F3"></span>🔵 弧线圆润性</div><div class="param-card-bd" id="c4-bd">
          <div class="sr"><span class="sl">日收益std</span><input type="range" id="p-as" min="3" max="20" value="8" oninput="svs('p-as',0.001)"><span class="sv" id="p-as-v">0.008</span></div>
          <div class="sr"><span class="sl">段最大跌幅</span><input type="range" id="p-ss" min="1" max="10" value="4" oninput="svs('p-ss',0.001)"><span class="sv" id="p-ss-v">0.004</span></div>
          <div class="tog-row"><span class="sl">对称性</span><button class="tsw on" id="p-sym-on" onclick="tog('p-sym-on')"></button></div>
        </div></div>

        <!-- 成交量 -->
        <div class="param-card" id="c5"><div class="param-card-hd" onclick="tc('c5')"><span class="dot" style="background:#9C27B0"></span>🟣 成交量</div><div class="param-card-bd" id="c5-bd">
          <div class="sr"><span class="sl">碟底量/50均</span><input type="range" id="p-vb" min="20" max="80" value="50" oninput="svp('p-vb')"><span class="sv" id="p-vb-v">50%</span></div>
          <div class="sr"><span class="sl">后半/前半</span><input type="range" id="p-vc" min="30" max="90" value="60" oninput="svp('p-vc')"><span class="sv" id="p-vc-v">60%</span></div>
          <div class="tog-row"><span class="sl">底部放量检查</span><button class="tsw on" id="p-vs-on" onclick="tog('p-vs-on')"></button></div>
        </div></div>

        <!-- 突破条件 -->
        <div class="param-card" id="c6"><div class="param-card-hd" onclick="tc('c6')"><span class="dot" style="background:#00BCD4"></span>🩵 突破条件</div><div class="param-card-bd" id="c6-bd">
          <div class="sr"><span class="sl">量比下限</span><input type="range" id="p-bv" min="10" max="20" value="13" oninput="svs('p-bv',0.1)"><span class="sv" id="p-bv-v">1.3</span></div>
          <div class="sr"><span class="sl">收盘位置</span><input type="range" id="p-cp" min="30" max="80" value="50" oninput="svp('p-cp')"><span class="sv" id="p-cp-v">50%</span></div>
          <div class="sr"><span class="sl">前置涨幅</span><input type="range" id="p-pa" min="15" max="60" value="30" oninput="svp('p-pa')"><span class="sv" id="p-pa-v">30%</span></div>
        </div></div>

        <!-- 柄部 -->
        <div class="param-card" id="c7"><div class="param-card-hd" onclick="tc('c7')"><span class="dot" style="background:#795548"></span>🟤 柄部</div><div class="param-card-bd" id="c7-bd">
          <div class="tog-row"><span class="sl">柄部检测</span><button class="tsw on" id="p-he-on" onclick="tog('p-he-on')"></button></div>
          <div class="tog-row"><span class="sl">必须带柄</span><button class="tsw off" id="p-hr-on" onclick="tog('p-hr-on')"></button></div>
          <div class="sr"><span class="sl">柄部回撤</span><input type="range" id="p-hd" min="8" max="25" value="15" oninput="svp('p-hd')"><span class="sv" id="p-hd-v">15%</span></div>
        </div></div>

        <button class="btn-run" id="btn-run">🔍 运行识别</button>
        <button class="btn-save" id="btn-save">💾 保存配置</button>
      </div>
      <div class="bottom-right">
        <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 信号明细</span></div><div class="table-wrapper" id="table"></div></div>
        <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🥏 形态摘要</span></div><div id="summary-box" style="padding:12px 16px;font-size:0.72rem;color:var(--text-secondary)">点击运行识别查看结果</div></div>
      </div>
    </div>
    <footer class="page-footer">❤️ 投资手账本 · 碟形基部 v1</footer>
  </div>

  <script src="../shared/js/theme.js"></script>
  <script src="../shared/js/api-client.js"></script>
  <script>
    const ST = 'saucer_base';

    function tc(id) { document.getElementById(id + '-bd').classList.toggle('collapsed'); }
    function tog(id) { const b = document.getElementById(id); b.classList.toggle('on'); b.classList.toggle('off'); }
    function svp(id) { const e = document.getElementById(id), v = document.getElementById(id + '-v'); if (e && v) v.textContent = e.value + '%'; }
    function svn(id) { const e = document.getElementById(id), v = document.getElementById(id + '-v'); if (e && v) v.textContent = e.value; }
    function svs(id, mul) { const e = document.getElementById(id), v = document.getElementById(id + '-v'); if (e && v) v.textContent = (parseInt(e.value) * mul).toFixed(4); }

    let ck = [], cs = [], chart, sma50v = 0;

    document.addEventListener('DOMContentLoaded', async () => {
      const now = new Date(); document.getElementById('date-end').value = now.toISOString().split('T')[0];
      const ago = new Date(now); ago.setFullYear(ago.getFullYear() - 2);
      document.getElementById('date-start').value = ago.toISOString().split('T')[0];
      chart = echarts.init(document.getElementById('chart'));
      document.getElementById('btn-run').addEventListener('click', run);
      document.getElementById('btn-save').addEventListener('click', saveCfg);
      await loadCfg();
      setTimeout(run, 500);
      new MutationObserver(function() { if (ck.length) { chart.dispose(); chart = echarts.init(document.getElementById('chart')); renderChart(); } }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    });

    function gp() {
      return {
        saucer_base: {
          correction_min: parseInt(document.getElementById('p-cmin').value) / 100,
          correction_max: parseInt(document.getElementById('p-cmax').value) / 100,
          min_descent_weeks: parseInt(document.getElementById('p-mw').value),
          cut_pct: parseInt(document.getElementById('p-cut').value) / 100,
          cut_check_A_pct: parseInt(document.getElementById('p-ca').value) / 100,
          min_bottom_age_days: parseInt(document.getElementById('p-ba').value),
          bottom_flatness_max: parseInt(document.getElementById('p-f5').value) / 100,
          bottom_flatness_wide: parseInt(document.getElementById('p-f10').value) / 100,
          bottom_flat_wide_required: document.getElementById('p-fwr-on').classList.contains('on'),
          bottom_slope_max: parseInt(document.getElementById('p-slp').value) * 0.0001,
          arc_smoothness_std: parseInt(document.getElementById('p-as').value) * 0.001,
          segment_slope_max: parseInt(document.getElementById('p-ss').value) * 0.001,
          ascent_symmetry_enabled: document.getElementById('p-sym-on').classList.contains('on'),
          vol_bottom_max: parseInt(document.getElementById('p-vb').value) / 100,
          vol_contraction: parseInt(document.getElementById('p-vc').value) / 100,
          vol_spike_check: document.getElementById('p-vs-on').classList.contains('on'),
          breakout_vol_ratio: parseInt(document.getElementById('p-bv').value) / 10,
          close_position_min: parseInt(document.getElementById('p-cp').value) / 100,
          min_prior_advance: parseInt(document.getElementById('p-pa').value) / 100,
          handle_enabled: document.getElementById('p-he-on').classList.contains('on'),
          handle_required: document.getElementById('p-hr-on').classList.contains('on'),
          handle_max_drawdown: parseInt(document.getElementById('p-hd').value) / 100,
        }
      };
    }

    async function run() {
      const btn = document.getElementById('btn-run'); btn.disabled = true; btn.textContent = '⏳';
      const code = document.getElementById('stock-code').value.trim();
      if (!code) { btn.disabled = false; btn.textContent = '🥏'; return; }

      try { const nr = await fetch('http://localhost:8788/api/stock-name?code=' + code + '&mode=stock'); if (nr.ok) { const nd = await nr.json(); document.getElementById('stock-name').textContent = nd.name || ''; } } catch (e) { }

      try {
        const start = document.getElementById('date-start').value;
        const end = document.getElementById('date-end').value;
        const resp = await fetch('http://localhost:8788/api/saucer-base?stock=' + code + '&date=' + end + '&start=' + start);
        const data = await resp.json();

        ck = data.klines || [];
        renderChart();

        cs = (data.signals || []).filter(s => s.signal_date >= start && s.signal_date <= end);
        renderTable();
        renderSummary();
        btn.textContent = '🔄';
      } catch (e) {
        console.error(e);
        btn.textContent = '❌';
      }
      btn.disabled = false;
    }

    function renderChart() {
      if (!chart || !ck.length) return;
      const dates = ck.map(k => k.date);
      const ma = function (p) {
        const r = [];
        let sum = 0;
        for (let i = 0; i < ck.length; i++) {
          if (ck[i].close != null) { sum += ck[i].close; if (i >= p) { sum -= ck[i - p].close; r.push(sum / p); } else { r.push(null); } }
          else { r.push(null); }
        }
        return r;
      };
      const ma10 = ma(10), ma50 = ma(50), ma250 = ma(250);
      const mc = ['#FF9800', '#2196F3', '#9C27B0'];

      // Signal markers
      const points = [];
      cs.forEach(s => {
        const si = dates.indexOf(s.signal_date);
        if (si < 0) return;
        points.push({
          value: [si, s.buy_point || s.prior_high_price],
          symbol: 'diamond', symbolSize: 18,
          itemStyle: { color: '#E91E63', borderColor: '#FFF', borderWidth: 1 }
        });
        // Prior high marker
        const phi = dates.indexOf(s.prior_high_date);
        if (phi >= 0) {
          points.push({
            value: [phi, s.prior_high_price],
            symbol: 'circle', symbolSize: 12,
            itemStyle: { color: '#FF9800', borderColor: '#FFF', borderWidth: 0.5 }
          });
        }
        // Bottom marker
        const bi = dates.indexOf(s.bottom_date);
        if (bi >= 0) {
          points.push({
            value: [bi, s.bottom_price],
            symbol: 'circle', symbolSize: 12,
            itemStyle: { color: '#4CAF50', borderColor: '#FFF', borderWidth: 0.5 }
          });
        }
      });

      const fmt = function (v) {
        if (v == null) return '—';
        if (v >= 1e8) return (v / 1e8).toFixed(2) + '亿';
        if (v >= 1e4) return (v / 1e4).toFixed(0) + '万';
        return v.toFixed(0);
      };
      const bg = document.documentElement.dataset.theme === 'dark' ? '#2A2627' : '#fff';

      chart.setOption({
        backgroundColor: bg,
        tooltip: {
          trigger: 'axis', axisPointer: { type: 'cross', crossStyle: { color: '#999' } },
          backgroundColor: 'rgba(255,255,255,0.75)', textStyle: { fontSize: 10 },
          formatter: function (params) {
            if (!params || !params.length) return '';
            const k = ck[params[0].dataIndex]; if (!k) return '';
            const chg = k.close - k.open, chgPct = k.open > 0 ? (chg / k.open * 100).toFixed(2) : '0.00';
            const col = chg >= 0 ? '#E53935' : '#26C6DA';
            return '<span style=font-size:12px;font-weight:700>' + k.date + '</span><br/>开盘：<b>' + k.open.toFixed(2) + '</b><br/>最高：<b>' + k.high.toFixed(2) + '</b><br/>最低：<b>' + k.low.toFixed(2) + '</b><br/>收盘：<b style=color:' + col + '>' + k.close.toFixed(2) + '</b><br/>涨跌：<b style=color:' + col + '>' + (chg >= 0 ? '+' : '') + chg.toFixed(2) + ' (' + (chg >= 0 ? '+' : '') + chgPct + '%)</b><br/>成交量：<b>' + fmt(k.volume) + '</b>';
          }
        },
        axisPointer: { link: [{ xAxisIndex: 'all' }] },
        grid: [{ left: '8%', right: '1%', top: 8, height: '60%' }, { left: '8%', right: '1%', top: '75%', height: '15%' }],
        xAxis: [{ type: 'category', data: dates, axisLabel: { fontSize: 9 }, axisLine: { lineStyle: { color: 'rgba(128,128,128,0.3)' } } }, { type: 'category', data: dates, axisLabel: { show: false }, axisLine: { lineStyle: { color: 'rgba(128,128,128,0.3)' } }, gridIndex: 1 }],
        yAxis: [{ type: 'value', scale: true, axisLabel: { fontSize: 9 }, splitLine: { lineStyle: { color: 'rgba(128,128,128,0.15)' } } }, { type: 'value', scale: true, axisLabel: { fontSize: 8 }, gridIndex: 1, splitLine: { show: false } }],
        dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 }, { type: 'slider', xAxisIndex: [0, 1], start: 0, end: 100, height: 16, bottom: 4 }],
        series: [
          { name: 'K线', type: 'candlestick', data: ck.map(k => [k.open, k.close, k.low, k.high]), itemStyle: { color: '#E53935', color0: '#26C6DA', borderColor: '#E53935', borderColor0: '#26C6DA' } },
          { name: '成交量', type: 'bar', data: ck.map((k, i) => ({ value: k.volume, itemStyle: { color: ck[i].close >= ck[i].open ? 'rgba(229,57,53,0.4)' : 'rgba(38,198,218,0.4)' } })), xAxisIndex: 1, yAxisIndex: 1 },
          { name: 'MA10', type: 'line', data: ma10, smooth: true, symbol: 'none', lineStyle: { width: 1, color: mc[0], type: 'dashed' } },
          { name: 'MA50', type: 'line', data: ma50, smooth: true, symbol: 'none', lineStyle: { width: 1.5, color: mc[1] } },
          { name: 'MA250', type: 'line', data: ma250, smooth: true, symbol: 'none', lineStyle: { width: 1, color: mc[2] } },
          { name: '碟形标记', type: 'scatter', data: points, z: 10 }
        ]
      });
    }

    function renderTable() {
      const div = document.getElementById('table');
      if (!cs.length) { div.innerHTML = '<div style=padding:24px;text-align:center;color:var(--text-tertiary)>无碟形基部突破信号</div>'; return; }
      let h = '<table><thead><tr><th>#</th><th>日期</th><th>类型</th><th>前高</th><th>碟底</th><th>回调</th><th>碟底振幅5d</th><th>碟底振幅10d</th><th>量比</th><th>买点</th></tr></thead><tbody>';
      [...cs].reverse().forEach((s, i) => {
        h += `<tr><td>${cs.length - i}</td><td style="font-weight:700">${s.signal_date}</td>
          <td>${s.pattern_type === 'saucer_with_handle' ? '🥏带柄碟形' : '🥏碟形'}</td>
          <td class="t-up">${s.prior_high_price}</td><td>${s.bottom_price}</td>
          <td>${s.drawdown_pct}%</td><td>${s.bottom_amp_5d}%</td><td>${s.bottom_amp_10d != null ? s.bottom_amp_10d + '%' : '—'}</td>
          <td>${s.breakout_vol_ratio}</td><td>${s.buy_point}</td></tr>`;
      });
      div.innerHTML = h + '</tbody></table>';
    }

    function renderSummary() {
      const div = document.getElementById('summary-box');
      if (!cs.length) { div.innerHTML = '<div style=font-size:0.72rem;color:var(--text-tertiary)>无突破信号。碟形基部是欧奈尔七种基部中较为罕见的形态，通常出现在大盘股机构重仓标的。</div>'; return; }
      const s = cs[cs.length - 1];
      div.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:0.68rem">
          <div><b>前高：</b>${s.prior_high_price} (${s.prior_high_date})</div>
          <div><b>碟底：</b>${s.bottom_price} (${s.bottom_date})</div>
          <div><b>回调深度：</b>${s.drawdown_pct}%</div>
          <div><b>下行天数：</b>${s.descent_days}天</div>
          <div><b>回升天数：</b>${s.ascent_days}天</div>
          <div><b>碟底质量：</b>${s.bottom_quality === 'shallow' ? '浅碟' : '标准'}</div>
          <div><b>弧线std：</b>${s.arc_std}</div>
          <div><b>上行std：</b>${s.ascent_std != null ? s.ascent_std : '—'}</div>
          <div><b>突破量比：</b>${s.breakout_vol_ratio}</div>
          <div><b>买点：</b>${s.buy_point}</div>
          <div><b>带柄：</b>${s.handle_flag ? '是 (高点=' + s.handle_high_price + ')' : '否'}</div>
          <div><b>收盘/SMA50：</b>${s.close_vs_sma50}</div>
        </div>`;
    }

    async function loadCfg() {
      try {
        const r = await fetch('http://localhost:8788/api/config?signal_type=' + ST, { cache: 'no-store' });
        const c = await r.json();
        if (!c || !c.saucer_base) return;
        const b = c.saucer_base;
        svs2('p-cmin', Math.round((b.correction_min || 0.08) * 100)); svp('p-cmin');
        svs2('p-cmax', Math.round((b.correction_max || 0.20) * 100)); svp('p-cmax');
        svs2('p-mw', b.min_descent_weeks || 3); svn('p-mw');
        svs2('p-cut', Math.round((b.cut_pct || 0.20) * 100)); svp('p-cut');
        svs2('p-ca', Math.round((b.cut_check_A_pct || 0.05) * 100)); svp('p-ca');
        svs2('p-ba', b.min_bottom_age_days || 10); svn('p-ba');
        svs2('p-f5', Math.round((b.bottom_flatness_max || 0.05) * 100)); svp('p-f5');
        svs2('p-f10', Math.round((b.bottom_flatness_wide || 0.08) * 100)); svp('p-f10');
        stog('p-fwr-on', b.bottom_flat_wide_required === true);
        svs2('p-slp', Math.round((b.bottom_slope_max || 0.0005) / 0.0001)); svs('p-slp', 0.0001);
        svs2('p-as', Math.round((b.arc_smoothness_std || 0.008) / 0.001)); svs('p-as', 0.001);
        svs2('p-ss', Math.round((b.segment_slope_max || 0.004) / 0.001)); svs('p-ss', 0.001);
        stog('p-sym-on', b.ascent_symmetry_enabled !== false);
        svs2('p-vb', Math.round((b.vol_bottom_max || 0.50) * 100)); svp('p-vb');
        svs2('p-vc', Math.round((b.vol_contraction || 0.60) * 100)); svp('p-vc');
        stog('p-vs-on', b.vol_spike_check !== false);
        svs2('p-bv', Math.round((b.breakout_vol_ratio || 1.3) * 10)); svs('p-bv', 0.1);
        svs2('p-cp', Math.round((b.close_position_min || 0.50) * 100)); svp('p-cp');
        svs2('p-pa', Math.round((b.min_prior_advance || 0.30) * 100)); svp('p-pa');
        stog('p-he-on', b.handle_enabled !== false);
        stog('p-hr-on', b.handle_required === true);
        svs2('p-hd', Math.round((b.handle_max_drawdown || 0.15) * 100)); svp('p-hd');
      } catch (e) { }
    }
    function svs2(id, v) { const e = document.getElementById(id); if (e) e.value = v; }
    function stog(id, on) { const b = document.getElementById(id); if (b) b.className = 'tsw ' + (on ? 'on' : 'off'); }

    async function saveCfg() {
      const btn = document.getElementById('btn-save'); btn.textContent = '⏳'; btn.disabled = true;
      const p = gp().saucer_base;
      const y = [
        '# 碟形基部参数', 'saucer_base:',
        '  correction_min: ' + p.correction_min,
        '  correction_max: ' + p.correction_max,
        '  min_descent_weeks: ' + p.min_descent_weeks,
        '  cut_pct: ' + p.cut_pct,
        '  cut_check_A_pct: ' + p.cut_check_A_pct,
        '  min_bottom_age_days: ' + p.min_bottom_age_days,
        '  bottom_flatness_max: ' + p.bottom_flatness_max,
        '  bottom_flatness_wide: ' + p.bottom_flatness_wide,
        '  bottom_flat_wide_required: ' + (p.bottom_flat_wide_required ? 'true' : 'false'),
        '  bottom_slope_max: ' + p.bottom_slope_max,
        '  arc_smoothness_std: ' + p.arc_smoothness_std,
        '  segment_slope_max: ' + p.segment_slope_max,
        '  ascent_symmetry_enabled: ' + (p.ascent_symmetry_enabled ? 'true' : 'false'),
        '  vol_bottom_max: ' + p.vol_bottom_max,
        '  vol_contraction: ' + p.vol_contraction,
        '  vol_spike_check: ' + (p.vol_spike_check ? 'true' : 'false'),
        '  breakout_vol_ratio: ' + p.breakout_vol_ratio,
        '  close_position_min: ' + p.close_position_min,
        '  min_prior_advance: ' + p.min_prior_advance,
        '  handle_enabled: ' + (p.handle_enabled ? 'true' : 'false'),
        '  handle_required: ' + (p.handle_required ? 'true' : 'false'),
        '  handle_max_drawdown: ' + p.handle_max_drawdown,
        ''
      ].join('\n');
      try {
        const r = await fetch('http://localhost:8788/api/config?signal_type=' + ST, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: y });
        const d = await r.json();
        if (d.ok) { btn.textContent = '✅'; btn.classList.add('saved'); setTimeout(() => { btn.textContent = '💾'; btn.classList.remove('saved'); btn.disabled = false; }, 2000); }
      } catch (e) { btn.textContent = '❌'; btn.disabled = false; }
    }
  </script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"🥏",brandText:"碟形基部回测",currentPage:"saucer-base-backtest"})</script>
</body>

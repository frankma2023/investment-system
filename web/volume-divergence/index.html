<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>量价背离回测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .bottom-layout{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:380px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}
  .param-card-bd{padding:8px 0 0}.param-card-bd.collapsed{display:none}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .table-wrapper td{border-bottom-color:rgba(0,0,0,.03)}
.chart-wrap{height:520px;margin-bottom:4px}
  .s-strong{color:#C62828;font-weight:700}.s-moderate{color:#E65100;font-weight:700}.s-weak{color:#1565C0;font-weight:700}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

<nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px"><label>类型</label><select id="mode" onchange="onModeChange()"><option value="stock">个股</option><option value="index">指数</option></select></div>
    <div class="code-wrap"><div class="fld"><label>代码</label><input type="text" id="stock-code" value="600519" style="width:100px" onkeydown="if(event.key==='Enter')run()"><span id="stock-name" style="margin-left:6px;font-weight:700;font-family:var(--font-display);font-size:0.85rem"></span></div></div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend"><span style="color:#C62828;font-weight:700">🔴 下跌放量 / 滞涨放量 → 清仓</span> | <span style="color:#E65100;font-weight:700">🟡 新高缩量 → 减仓</span> | <span style="color:#1565C0;font-weight:700">⚠️ 回升无量 → 减仓观察</span></div>

  <div class="bottom-layout">
    <div class="bottom-left">

      <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#607D8B"></span>⚙️ 通用</div><div class="param-card-bd" id="c1-bd">
        <div class="sr"><span class="sl">均量周期</span><input type="range" id="p-vm" min="20" max="120" value="50" oninput="svn('p-vm')"><span class="sv" id="p-vm-v">50</span></div>
      </div></div>

      <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#C62828"></span>🔴 下跌放量</div><div class="param-card-bd" id="c2-bd">
        <div class="sr"><span class="sl">最小跌幅</span><input type="range" id="p-dd" min="5" max="30" value="15" oninput="svs('p-dd',0.1)"><span class="sv" id="p-dd-v">1.5%</span></div>
        <div class="sr"><span class="sl">量比下限</span><input type="range" id="p-dv" min="10" max="30" value="15" oninput="svs('p-dv',0.1)"><span class="sv" id="p-dv-v">1.5</span></div>
      </div></div>

      <div class="param-card" id="c3"><div class="param-card-hd" onclick="tc('c3')"><span class="dot" style="background:#E65100"></span>🟡 新高缩量</div><div class="param-card-bd" id="c3-bd">
        <div class="sr"><span class="sl">新高天数</span><input type="range" id="p-nd" min="10" max="50" value="20" oninput="svn('p-nd')"><span class="sv" id="p-nd-v">20</span></div>
        <div class="sr"><span class="sl">前高量比</span><input type="range" id="p-np" min="30" max="90" value="60" oninput="svs('p-np',0.01)"><span class="sv" id="p-np-v">0.60</span></div>
        <div class="sr"><span class="sl">量比上限</span><input type="range" id="p-nv" min="50" max="95" value="85" oninput="svs('p-nv',0.01)"><span class="sv" id="p-nv-v">0.80</span></div>
      </div></div>

      <div class="param-card" id="c4"><div class="param-card-hd" onclick="tc('c4')"><span class="dot" style="background:#1565C0"></span>⚠️ 回升无量</div><div class="param-card-bd" id="c4-bd">
        <div class="sr"><span class="sl">反弹幅度</span><input type="range" id="p-rr" min="10" max="50" value="20" oninput="svs('p-rr',0.1)"><span class="sv" id="p-rr-v">2%</span></div>
        <div class="sr"><span class="sl">量比上限</span><input type="range" id="p-rv" min="30" max="80" value="70" oninput="svs('p-rv',0.01)"><span class="sv" id="p-rv-v">0.70</span></div>
      </div></div>

            <!-- 高位缩量参数 -->
      <div class="param-card" id="c6"><div class="param-card-hd" onclick="tc('c6')"><span class="dot" style="background:#2E7D32"></span>🟢 高位缩量</div><div class="param-card-bd" id="c6-bd">
        <div class="sr"><span class="sl">距高点上限</span><input type="range" id="p-hd" min="5" max="20" value="10" oninput="svp('p-hd')"><span class="sv" id="p-hd-v">10%</span></div>
        <div class="sr"><span class="sl">量比上限</span><input type="range" id="p-hv" min="30" max="80" value="70" oninput="svs('p-hv',0.01)"><span class="sv" id="p-hv-v">0.70</span></div>
      </div></div>

            <!-- 滞涨放量参数 -->
      <div class="param-card" id="c7"><div class="param-card-hd" onclick="tc('c7')"><span class="dot" style="background:#FF6F00"></span>🟠 滞涨放量</div><div class="param-card-bd" id="c7-bd">
        <div class="sr"><span class="sl">振幅上限</span><input type="range" id="p-sr" min="3" max="12" value="8" oninput="svp('p-sr')"><span class="sv" id="p-sr-v">8%</span></div>
        <div class="sr"><span class="sl">前期涨幅</span><input type="range" id="p-sg" min="3" max="15" value="5" oninput="svp('p-sg')"><span class="sv" id="p-sg-v">5%</span></div>
        <div class="sr"><span class="sl">量比下限</span><input type="range" id="p-sv" min="10" max="20" value="12" oninput="svs('p-sv',0.1)"><span class="sv" id="p-sv-v">1.20</span></div>
      </div></div>

      <!-- 综合因子参数 -->
      <div class="param-card" id="c5"><div class="param-card-hd" onclick="tc('c5')"><span class="dot" style="background:#7B1FA2"></span>🟣 综合因子</div><div class="param-card-bd" id="c5-bd">
        <div class="sr"><span class="sl">触发阈值</span><input type="range" id="p-cs" min="25" max="80" value="40" oninput="svn('p-cs')"><span class="sv" id="p-cs-v">40</span></div>
        <div class="sr"><span class="sl">VR弹性</span><input type="range" id="p-f1" min="0" max="25" value="25" oninput="svn('p-f1')"><span class="sv" id="p-f1-v">25</span></div>
        <div class="sr"><span class="sl">量趋势斜率</span><input type="range" id="p-f2" min="0" max="25" value="25" oninput="svn('p-f2')"><span class="sv" id="p-f2-v">25</span></div>
        <div class="sr"><span class="sl">量峰衰减</span><input type="range" id="p-f3" min="0" max="25" value="25" oninput="svn('p-f3')"><span class="sv" id="p-f3-v">25</span></div>
        <div class="sr"><span class="sl">均价量背离</span><input type="range" id="p-f4" min="0" max="25" value="25" oninput="svn('p-f4')"><span class="sv" id="p-f4-v">25</span></div>
      </div></div>

      <button class="btn-run" id="btn-run">🔍 回测</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>

    <div class="bottom-right">
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 量价背离信号</span></div><div class="table-wrapper" id="table"></div></div>
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🔎 单日排查</span></div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤️ 投资手账本 · 量价背离 Volume Divergence</footer>
</div>

<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/kline-chart.js"></script>
<script>
  const API_URL='http://'+window.location.hostname+':8788';
  function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
  function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
  function svs(id,mul){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=(parseInt(e.value)*mul).toFixed(mul<1?1:0)}
  function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
  var dl=[],signals=[],kc,runId=0;

  document.addEventListener('DOMContentLoaded',async()=>{
    var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
    document.getElementById('date-start').value=ago.toISOString().split('T')[0];
    document.getElementById('date-end').value=now.toISOString().split('T')[0];document.getElementById('diag-date').value=now.toISOString().split('T')[0];
    document.getElementById('btn-run').addEventListener('click',run);
    document.getElementById('btn-save').addEventListener('click',saveCfg);
    await loadCfg();
    setTimeout(function(){run(true)},500);
  });

  function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600519':'000300';run()}
  async function run(auto){
    runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
    var code=document.getElementById('stock-code').value.trim();
    var mode=document.getElementById('mode').value;
    if(!code){if(!auto)btn.disabled=false;if(!auto)btn.textContent='🔍 回测';return}
    try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
    try{
      var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
      var resp=await fetch(API_URL+'/api/volume-divergence?stock='+code+'&date='+end+'&start='+start+'&mode='+mode);
      var data=await resp.json();if(runId!==myId)return;
      dl=data.daily||[];signals=data.signals||[];
      renderChart();renderTable();if(!auto)btn.textContent='🔍 回测';
    }catch(e){console.error(e);if(!auto)btn.textContent='❌'}
    if(!auto)btn.disabled=false;
  }

  function renderChart(){
    if(!dl.length)return;
    var kl=dl,sm={},sigs=[];
    signals.forEach(function(s){
      var d=kl.find(function(k){return k.date===s.signal_date});
      if(!d)return;
      sigs.push({signal_date:s.signal_date,buy_point:d.high,drawdown_pct:0});
      sm[s.signal_date]={buy_point:d.high,drawdown_pct:0,label:s.label,color:{strong:'#C62828',moderate:'#E65100',weak:'#1565C0'}[s.signal_level]||'#666'};
    });
    var sc=signals.length&&signals[0].signal_level==='strong'?'#C62828':signals.length&&signals[0].signal_level==='moderate'?'#E65100':'#1565C0';
    if(!kc||(kc.chart&&kc.chart.isDisposed())){kc=KlineChart.create({container:document.getElementById('chart'),klines:kl,signals:sigs,signalMap:sm,signalColor:sc})}
    kc.update(kl,sigs,sm)
  }

  function renderTable(){
    var div=document.getElementById('table');
    if(!signals.length){div.innerHTML='<div class="loading-row">未检测到量价背离信号</div>';return}
    var h='<table><thead><tr><th>#</th><th>日期</th><th>信号类型</th><th>级别</th><th>详情</th></tr></thead><tbody>';
    [].concat(signals).reverse().forEach(function(s,i){
      var sc={'strong':'s-strong','moderate':'s-moderate','weak':'s-weak'}[s.signal_level]||'';
      var st={'strong':'🔴 强','moderate':'🟡 中','weak':'⚠️ 弱'}[s.signal_level]||s.signal_level;
      var dt='';
      if(s.signal_type==='new_high_shrink') dt='量比='+s.details.vol_ratio+' 触发='+(s.details.trigger||'')+(s.details.trigger==='B'?'(前高比='+s.details.prior_peak_vol_ratio+')':'');
      if(s.signal_type==='drop_surge') dt='跌幅='+s.details.decline_pct+'% 量比='+s.details.vol_ratio;
      if(s.signal_type==='stall_surge') dt='振幅='+s.details.price_range_pct+'% 量比='+s.details.seg_vol_ratio;
      if(s.signal_type==='rally_dry') dt='反弹='+s.details.rally_pct+'% 前跌='+s.details.prior_decline_pct+'% 量比='+s.details.vol_ratio;
      if(s.signal_type==='rising_shrink') dt='近10日均量='+s.details.recent_vol_ma+' 前10日均量='+s.details.prior_vol_ma;
      if(s.signal_type==='high_shrink') dt='距高点='+s.details.dist_from_high_pct+'% 量比='+s.details.seg_vol_ratio;
      if(s.signal_type==='composite_divergence') dt='得分='+s.details.score+'/100 因子:'+(s.details.factors||[]).join(',');
      h+='<tr><td>'+(signals.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td>'+s.label+'</td><td class="'+sc+'">'+st+'</td><td style="font-size:0.68rem">'+dt+'</td></tr>';
    });
    div.innerHTML=h+'</tbody></table>';
  }

  function gp(){return {volume_divergence:{
    vol_ma_days:parseInt(document.getElementById('p-vm').value),
    new_high_shrink:{lookback_days:parseInt(document.getElementById('p-nd').value),vol_ratio_max:parseInt(document.getElementById('p-nv').value)/100,prior_peak_vol_ratio:parseInt(document.getElementById('p-np').value)/100},
    drop_surge:{decline_min:parseInt(document.getElementById('p-dd').value)/1000,vol_ratio_min:parseInt(document.getElementById('p-dv').value)/10},
    rally_dry:{rally_min:parseInt(document.getElementById('p-rr').value)/1000,vol_ratio_max:parseInt(document.getElementById('p-rv').value)/100},
    stall_surge:{price_range_max:parseInt(document.getElementById('p-sr').value)/100,prior_gain_min:parseInt(document.getElementById('p-sg').value)/100,vol_ratio_min:parseInt(document.getElementById('p-sv').value)/10},
    high_shrink:{dist_max:parseInt(document.getElementById('p-hd').value)/100,vol_ratio_max:parseInt(document.getElementById('p-hv').value)/100},
    composite:{threshold:parseInt(document.getElementById('p-cs').value),factor1:parseInt(document.getElementById('p-f1').value),factor2:parseInt(document.getElementById('p-f2').value),factor3:parseInt(document.getElementById('p-f3').value),factor4:parseInt(document.getElementById('p-f4').value)}
  }}}
  async function saveCfg(){var btn=document.getElementById('btn-save');btn.textContent='⏳';var p=gp().volume_divergence;
    var y='# volume_divergence\nvolume_divergence:\n';for(var k in p){
      if(typeof p[k]==='object'){y+='  '+k+':\n';for(var k2 in p[k]){y+='    '+k2+': '+p[k][k2]+'\n'}}
      else{y+='  '+k+': '+p[k]+'\n'}}
    try{var r=await fetch(API_URL+'/api/config?signal_type=volume_divergence',{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾 保存配置';btn.classList.remove('saved')},2000)}}catch(e){btn.textContent='❌'}}
  async function loadCfg(){try{var r=await fetch(API_URL+'/api/config?signal_type=volume_divergence',{cache:'no-store'});var c=await r.json();console.log('loadCfg raw:',c);var b=c.volume_divergence||c;console.log('loadCfg b:',b);console.log('loadCfg b:',b);
    svs2('p-vm',b.vol_ma_days||50);svn('p-vm');
    var ds=b.drop_surge||{};svs2('p-dd',Math.round((ds.decline_min||0.015)*1000));svs('p-dd',0.1);svs2('p-dv',Math.round((ds.vol_ratio_min||1.5)*10));svs('p-dv',0.1);
    var nh=b.new_high_shrink||{};svs2('p-nv',Math.round((nh.vol_ratio_max||0.80)*100));svs('p-nv',0.01);svs2('p-np',Math.round((nh.prior_peak_vol_ratio||0.60)*100));svp('p-np');
    var rd=b.rally_dry||{};svs2('p-rr',Math.round((rd.rally_min||0.02)*1000));svs('p-rr',0.1);svs2('p-rv',Math.round((rd.vol_ratio_max||0.70)*100));svs('p-rv',0.01);
    var ss=b.stall_surge||{};svs2('p-sr',Math.round((ss.price_range_max||0.08)*100));svp('p-sr');svs2('p-sg',Math.round((ss.prior_gain_min||0.05)*100));svp('p-sg');svs2('p-sv',Math.round((ss.vol_ratio_min||1.20)*10));svs('p-sv',0.1);
    var hs=b.high_shrink||{};svs2('p-hd',Math.round((hs.dist_max||0.10)*100));svp('p-hd');svs2('p-hv',Math.round((hs.vol_ratio_max||0.70)*100));svs('p-hv',0.01);
    var cp=b.composite||{};svs2('p-cs',cp.threshold||55);svn('p-cs');svs2('p-f1',cp.factor1||25);svn('p-f1');svs2('p-f2',cp.factor2||25);svn('p-f2');svs2('p-f3',cp.factor3||25);svn('p-f3');svs2('p-f4',cp.factor4||25);svn('p-f4')}catch(e){console.error('loadCfg error:',e)}}

  async function runDiag(){
    var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
    if(!date){div.style.display='none';return}
    var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
    div.innerHTML='<div style="font-size:0.68rem;color:var(--muted);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
    try{var resp=await fetch(API_URL+'/api/volume-divergence/diag?stock='+code+'&date='+date+'&mode='+mode);var d=await resp.json();
    if(d.error){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">'+d.error+'</div>';return}
    var h='<table style="margin:0;font-size:0.62rem"><thead><tr><th>项目</th><th>值</th></tr></thead><tbody>';
    h+='<tr><td>K线总数</td><td style="font-weight:700">'+d.total_kline+'</td></tr>';
    h+='<tr><td>信号数</td><td style="font-weight:700">'+d.signals_count+'</td></tr>';
    d.signals.forEach(function(s){h+='<tr><td>'+s.type+'</td><td style="font-weight:700;color:'+({strong:'#C62828',moderate:'#E65100',weak:'#1565C0'}[s.level]||'#666')+'">'+({strong:'🔴 强',moderate:'🟡 中',weak:'⚠️ 弱'}[s.level]||s.level)+'</td></tr>'});
    h+='</tbody></table>';div.innerHTML=h;}catch(e){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">请求失败: '+e+'</div>'}
  }

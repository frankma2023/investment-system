<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个股财务分析 · 投资手账本</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">
<style>
.search-bar { display:flex; gap:8px; margin-bottom:16px; }
.search-bar input { flex:1; padding:12px 16px; border:2px solid var(--divider); border-radius:14px; font-family:var(--font-display); font-size:1rem; background:var(--card-bg); color:var(--text-primary); }
.search-bar input:focus { outline:none; border-color:#FE2C55; }
.search-bar button { padding:12px 24px; background:#FE2C55; color:#FFF; border:none; border-radius:14px; font-size:1rem; font-weight:800; cursor:pointer; font-family:var(--font-display); }
.search-bar button:hover { opacity:0.88; }
.search-bar button:disabled { background:#CCC; cursor:not-allowed; }
.result-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.result-grid .full { grid-column:1/-1; }
@media (max-width:800px) { .result-grid { grid-template-columns:1fr; } }

.metric-row { display:flex; gap:16px; flex-wrap:wrap; margin:8px 0; }
.metric-item { flex:1; min-width:80px; text-align:center; padding:8px; background:rgba(254,44,85,0.04); border-radius:10px; }
.metric-item .val { font-family:var(--font-display); font-size:1.2rem; font-weight:900; }
.metric-item .lbl { font-size:0.6rem; color:var(--text-tertiary); }
.metric-item .val.up { color:#FE2C55; }
.metric-item .val.down { color:#4CAF50; }

.mini-table { width:100%; font-size:0.7rem; border-collapse:collapse; }
.mini-table th { background:rgba(0,0,0,0.03); padding:6px 8px; text-align:left; font-weight:700; color:var(--text-tertiary); font-size:0.6rem; border-bottom:2px solid var(--divider); }
.mini-table td { padding:6px 8px; border-bottom:1px solid var(--divider); }
.mini-table .mono { font-family:var(--font-display); font-size:0.7rem; }

.tag { display:inline-block; padding:3px 8px; border-radius:6px; font-size:0.65rem; font-weight:700; }
.tag-green { background:#E8F5E9; color:#2E7D32; }
.tag-red { background:#FFEBEE; color:#C62828; }
.tag-orange { background:#FFF3E0; color:#E65100; }

.stock-header { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
.stock-header .code { font-family:var(--font-display); font-size:0.8rem; color:var(--text-tertiary); }
.stock-header .name { font-family:var(--font-display); font-size:1.1rem; font-weight:900; }
</style>
</head>
<body>
<div class="journal-dots"></div><div class="washi-tape washi-1"></div><div class="washi-tape washi-2"></div>
<div class="app-container">
<nav class="top-nav">
  <div class="nav-brand"><span class="nav-fox">🦊</span><span>个股财务分析</span><span class="nav-greeting">Stock Analysis</span></div>
  <div class="nav-links">
    <a href="../" class="nav-item">🏠 看板</a>
    <a href="../distribution-day/" class="nav-item">📉 抛盘日</a>
    <a href="../index-rs-backtest/" class="nav-item">🏆 指数强度</a>
    <a href="../index-scan/" class="nav-item">🔬 扫描</a>
    <a href="#" class="nav-item active">📊 财务分析</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<div class="search-bar">
  <input type="text" id="stock-input" placeholder="输入股票代码，如 000858 或 600519" onkeydown="if(event.key==='Enter')analyze()">
  <button id="btn-analyze" onclick="analyze()">🔍 一键分析</button>
</div>

<div id="results"></div>

<footer class="page-footer">❤️ 投资手账本 · 财务分析 · DCF / Comps / Earnings / 3-Statement</footer>
</div>
<script src="../shared/js/theme.js"></script>
<script>
var API='http://localhost:8788';

async function analyze(){
  var code=document.getElementById('stock-input').value.trim();
  if(!code){alert('请输入股票代码');return}
  var btn=document.getElementById('btn-analyze');
  btn.disabled=true; btn.textContent='⏳ 分析中...';
  document.getElementById('results').innerHTML='<div style="text-align:center;padding:48px;color:var(--text-tertiary)">⏳ 正在运行 DCF / Comps / Earnings / 3-Statement 分析...</div>';

  try{
    var resp=await fetch(API+'/api/stock-analysis?code='+code);
    var data=await resp.json();
    if(data.error){document.getElementById('results').innerHTML='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">❌ 错误</span></div><div style="padding:16px;color:#FE2C55">'+data.error+'</div></div>';return}
    renderResults(data);
  }catch(e){
    document.getElementById('results').innerHTML='<div style="padding:24px;color:#FE2C55">❌ 请求失败: '+e.message+'</div>';
  }
  finally{btn.disabled=false; btn.textContent='🔍 一键分析'}
}

function renderResults(data){
  var d=data.dcf||{}, c=data.comps||{}, e=data.earnings||{}, m=data.model||{};
  var name=d.name||c.name||e.name||m.name||'';
  var code=d.stock_code||c.stock_code||'';

  var html='<div class="stock-header"><span class="code">'+code+'</span><span class="name">'+name+'</span></div>';
  html+='<div class="result-grid">';

  // ═══ DCF ═══
  var upside=d.upside_pct;
  var upsideTag=upside>20?'<span class="tag tag-green">低估 '+upside+'%</span>':(upside<-10?'<span class="tag tag-red">高估 '+Math.abs(upside)+'%</span>':'<span class="tag tag-orange">合理</span>');
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">💰 DCF估值</span>'+upsideTag+'</div>';
  html+='<div class="metric-row">';
  html+='<div class="metric-item"><div class="val">'+(d.current_price||'—')+'</div><div class="lbl">当前价</div></div>';
  html+='<div class="metric-item"><div class="val '+(upside>0?'up':'down')+'">'+(d.target_price||'—')+'</div><div class="lbl">DCF目标价</div></div>';
  html+='<div class="metric-item"><div class="val">'+(d.enterprise_value?fmtNum(d.enterprise_value):'—')+'</div><div class="lbl">企业价值(亿)</div></div>';
  html+='<div class="metric-item"><div class="val">'+d.wacc+'</div><div class="lbl">WACC</div></div>';
  html+='</div>';
  if(d.projections){
    html+='<table class="mini-table"><tr><th>年</th><th>营收到</th><th>FCF到</th><th>现值</th></tr>';
    d.projections.forEach(function(p){html+='<tr><td>Y'+p.year+'</td><td class="mono">'+fmtNum(p.revenue)+'</td><td class="mono">'+fmtNum(p.ufcf)+'</td><td class="mono">'+fmtNum(p.pv)+'</td></tr>'});
    html+='</table>';
  }
  if(d.sensitivity){
    html+='<div style="font-size:0.6rem;color:var(--text-tertiary);margin-top:6px;">敏感性(WACC→目标价): ';
    d.sensitivity.forEach(function(s){html+=s.wacc+':'+s.target_price+' '});
    html+='</div>';
  }
  html+='</div>';

  // ═══ Comps ═══
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📊 可比公司分析</span><span style="font-size:0.65rem;color:var(--text-tertiary)">'+c.industry+' · '+c.peer_count+'家可比</span></div>';
  var mm=c.median_multiples||{};
  html+='<div class="metric-row">';
  html+='<div class="metric-item"><div class="val">'+(mm.pe||'—')+'x</div><div class="lbl">中位PE</div></div>';
  html+='<div class="metric-item"><div class="val">'+(mm.pb||'—')+'x</div><div class="lbl">中位PB</div></div>';
  html+='<div class="metric-item"><div class="val">'+(mm.ps||'—')+'x</div><div class="lbl">中位PS</div></div>';
  html+='</div>';
  var iv=c.implied_valuations||{};
  if(Object.keys(iv).length){
    html+='<div style="font-size:0.65rem;color:var(--text-tertiary)">隐含估值: ';
    for(var k in iv)html+=k+' '+iv[k]+'亿 ';
    html+='</div>';
  }
  if(c.peers&&c.peers.length>1){
    html+='<table class="mini-table" style="margin-top:8px"><tr><th>公司</th><th>营收</th><th>增长</th><th>PE</th><th>PB</th></tr>';
    c.peers.slice(0,6).forEach(function(p){
      var isSelf=p.code===code;
      html+='<tr'+(isSelf?' style="background:rgba(254,44,85,0.04);font-weight:700"':'')+'><td>'+(isSelf?'▶ ':'')+p.name+'</td><td class="mono">'+fmtNum(p.revenue)+'</td><td class="mono">'+(p.revenue_growth||'—')+'%</td><td class="mono">'+(p.pe||'—')+'</td><td class="mono">'+(p.pb||'—')+'</td></tr>';
    });
    html+='</table>';
  }
  html+='</div>';

  // ═══ Earnings ═══
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📈 盈利趋势</span><span style="font-size:0.65rem;color:var(--text-tertiary)">'+e.trend_summary+'</span></div>';
  var lt=e.latest||{};
  html+='<div class="metric-row">';
  html+='<div class="metric-item"><div class="val '+(lt.revenue_yoy>0?'up':'down')+'">'+(lt.revenue_yoy!=null?(lt.revenue_yoy>0?'+':'')+lt.revenue_yoy+'%':'—')+'</div><div class="lbl">营收同比</div></div>';
  html+='<div class="metric-item"><div class="val '+(lt.net_profit_yoy>0?'up':'down')+'">'+(lt.net_profit_yoy!=null?(lt.net_profit_yoy>0?'+':'')+lt.net_profit_yoy+'%':'—')+'</div><div class="lbl">净利同比</div></div>';
  html+='<div class="metric-item"><div class="val">'+(lt.gross_margin||'—')+'%</div><div class="lbl">毛利率</div></div>';
  html+='<div class="metric-item"><div class="val">'+(lt.roe||'—')+'%</div><div class="lbl">ROE</div></div>';
  html+='</div>';
  if(e.revenue_acceleration!=null){
    html+='<div style="font-size:0.65rem"><span class="tag '+(e.revenue_acceleration>0?'tag-green':'tag-red')+'">营收'+(e.revenue_acceleration>0?'加速':'减速')+' '+Math.abs(e.revenue_acceleration)+'pp</span> ';
    html+='<span class="tag '+(e.profit_acceleration>0?'tag-green':'tag-red')+'">净利'+(e.profit_acceleration>0?'加速':'减速')+' '+Math.abs(e.profit_acceleration)+'pp</span></div>';
  }
  if(e.quarters&&e.quarters.length){
    html+='<table class="mini-table" style="margin-top:8px"><tr><th>季度</th><th>营收</th><th>营收YoY</th><th>净利</th><th>净利YoY</th></tr>';
    e.quarters.slice(-4).forEach(function(q){html+='<tr><td>'+q.report_date+'</td><td class="mono">'+fmtNum(q.revenue)+'</td><td class="mono">'+(q.revenue_yoy||0)+'%</td><td class="mono">'+fmtNum(q.net_profit)+'</td><td class="mono">'+(q.net_profit_yoy||0)+'%</td></tr>'});
    html+='</table>';
  }
  html+='</div>';

  // ═══ 3-Statement ═══
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 三表预测</span><span style="font-size:0.65rem;color:var(--text-tertiary)">'+m.base_gross_margin+' 基准毛利率</span></div>';
  if(m.projections){
    html+='<table class="mini-table"><tr><th>年</th><th>营收</th><th>毛利</th><th>净利</th><th>经营CF</th><th>自由CF</th></tr>';
    m.projections.forEach(function(p){
      var i=p.income_statement||{}, cf=p.cash_flow||{};
      html+='<tr><td>Y'+p.year+'</td><td class="mono">'+fmtNum(i.revenue)+'</td><td class="mono">'+fmtNum(i.gross_profit)+'</td><td class="mono">'+fmtNum(i.net_income)+'</td><td class="mono">'+fmtNum(cf.operating_cf)+'</td><td class="mono">'+fmtNum(cf.free_cf)+'</td></tr>';
    });
    html+='</table>';
  }
  html+='</div>';

  html+='</div>';
  document.getElementById('results').innerHTML=html;
}

function fmtNum(v){if(v==null)return'—';var n=Math.abs(v);if(n>=1e8)return(v/1e8).toFixed(1)+'亿';if(n>=1e4)return(v/1e4).toFixed(1)+'万';return v.toFixed(1)}
</script>
</body>
</html>

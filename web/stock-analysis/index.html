<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个股财务分析 · 投资手账本</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">
<style>
.search-bar { display:flex; gap:8px; margin-bottom:16px; }
.search-bar input { flex:1; padding:12px 16px; border:2px solid var(--divider); border-radius:14px; font-family:var(--font-display); font-size:1rem; background:var(--card-bg); color:var(--text-primary); }
.search-bar input:focus { outline:none; border-color:#FE2C55; }

.nav-dropdown { position:relative; display:inline-flex; }
.nav-dropdown-menu { display:none; position:absolute; top:100%; left:0; background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); min-width:150px; padding:6px 0; z-index:200; white-space:nowrap; }
.nav-dropdown:hover .nav-dropdown-menu { display:block; }
.nav-dropdown-menu a { display:block; padding:7px 16px; font-size:0.72rem; color:var(--text-secondary); text-decoration:none; transition:background 0.15s; font-family:var(--font-display); }
.nav-dropdown-menu a:hover { background:var(--color-accent-subtle); color:var(--color-accent); }

.search-bar button { padding:12px 24px; background:#FE2C55; color:#FFF; border:none; border-radius:14px; font-size:1rem; font-weight:800; cursor:pointer; font-family:var(--font-display); }
.search-bar button:hover { opacity:0.88; }
.search-bar button:disabled { background:#CCC; cursor:not-allowed; }
.result-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.result-grid .full { grid-column:1/-1; }
@media (max-width:800px) { .result-grid { grid-template-columns:1fr; } }

.metric-row { display:flex; gap:16px; flex-wrap:wrap; margin:8px 0; }
.metric-item { flex:1; min-width:80px; text-align:center; padding:8px; background:rgba(254,44,85,0.04); border-radius:10px; }
.metric-item .val { font-family:var(--font-display); font-size:1.2rem; font-weight:900; }
.metric-item .lbl { font-size:0.6rem; color:var(--text-tertiary); }
.metric-item .val.up { color:#FE2C55; }
.metric-item .val.down { color:#4CAF50; }

.mini-table { width:100%; font-size:0.7rem; border-collapse:collapse; }
.mini-table th { background:rgba(0,0,0,0.03); padding:6px 8px; text-align:left; font-weight:700; color:var(--text-tertiary); font-size:0.6rem; border-bottom:2px solid var(--divider); }
.mini-table td { padding:6px 8px; border-bottom:1px solid var(--divider); }
.mini-table .mono { font-family:var(--font-display); font-size:0.7rem; }

.tag { display:inline-block; padding:3px 8px; border-radius:6px; font-size:0.65rem; font-weight:700; }
.tag-green { background:#E8F5E9; color:#2E7D32; }
.tag-red { background:#FFEBEE; color:#C62828; }
.tag-orange { background:#FFF3E0; color:#E65100; }

.stock-header { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
.stock-header .code { font-family:var(--font-display); font-size:0.8rem; color:var(--text-tertiary); }
.stock-header .name { font-family:var(--font-display); font-size:1.1rem; font-weight:900; }
</style>
</head>
<body>
<div class="journal-dots"></div><div class="washi-tape washi-1"></div><div class="washi-tape washi-2"></div>
<div class="app-container">
<nav id="top-nav"></nav>

<div class="search-bar">
  <input type="text" id="stock-input" placeholder="输入股票代码，如 000858 或 600519" onkeydown="if(event.key==='Enter')analyze()">
  <button id="btn-analyze" onclick="analyze()">🔍 一键分析</button>
</div>

<div id="results"></div>

<footer class="page-footer">❤️ 投资手账本 · 财务分析 · DCF / Comps / Earnings / 3-Statement</footer>
</div>
<script src="../shared/js/theme.js"></script>
<script>
var API='http://localhost:8788';

async function analyze(){
  var code=document.getElementById('stock-input').value.trim();
  if(!code){alert('请输入股票代码');return}
  var btn=document.getElementById('btn-analyze');
  btn.disabled=true; btn.textContent='⏳ 分析中...';
  document.getElementById('results').innerHTML='<div style="text-align:center;padding:48px;color:var(--text-tertiary)">⏳ 正在运行 DCF / Comps / Earnings / 3-Statement 分析...</div>';

  try{
    var resp=await fetch(API+'/api/stock-analysis?code='+code);
    var data=await resp.json();
    if(data.error){document.getElementById('results').innerHTML='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">❌ 错误</span></div><div style="padding:16px;color:#FE2C55">'+data.error+'</div></div>';return}
    renderResults(data);
  }catch(e){
    document.getElementById('results').innerHTML='<div style="padding:24px;color:#FE2C55">❌ 请求失败: '+e.message+'</div>';
  }
  finally{btn.disabled=false; btn.textContent='🔍 一键分析'}
}

function renderResults(data){
  var d=data.dcf||{}, c=data.comps||{}, e=data.earnings||{}, m=data.model||{};
  var name=d.name||c.name||e.name||m.name||'';
  var code=d.stock_code||c.stock_code||'';

  var html='<div class="stock-header"><span class="code">'+code+'</span><span class="name">'+name+'</span></div>';
  html+='<div class="result-grid" id="result-grid">';

  // ═══ DCF ═══
  var upside=d.upside_pct;
  var upsideTag=upside>20?'<span class="tag tag-green">低估 '+upside+'%</span>':(upside<-10?'<span class="tag tag-red">高估 '+Math.abs(upside)+'%</span>':'<span class="tag tag-orange">合理</span>');
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">💰 DCF估值</span>'+upsideTag+'<button class="btn-analysis" data-type="dcf" style="margin-left:auto;padding:3px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.65rem;font-family:var(--font-display);">📖 详解</button></div>';
  html+='<div class="metric-row">';
  html+='<div class="metric-item"><div class="val">'+(d.current_price||'—')+'</div><div class="lbl">当前价</div></div>';
  html+='<div class="metric-item"><div class="val '+(upside>0?'up':'down')+'">'+(d.target_price||'—')+'</div><div class="lbl">DCF目标价</div></div>';
  html+='<div class="metric-item"><div class="val">'+(d.enterprise_value?fmtNum(d.enterprise_value):'—')+'</div><div class="lbl">企业价值(亿)</div></div>';
  html+='<div class="metric-item"><div class="val">'+d.wacc+'</div><div class="lbl">WACC</div></div>';
  html+='</div>';
  if(d.projections){
    html+='<table class="mini-table"><tr><th>年份</th><th>营收</th><th>FCF</th><th>现值</th></tr>';
    d.projections.forEach(function(p){html+='<tr><td>'+p.year+'年</td><td class="mono">'+fmtNum(p.revenue)+'</td><td class="mono">'+fmtNum(p.ufcf)+'</td><td class="mono">'+fmtNum(p.pv)+'</td></tr>'});
    html+='</table>';
  }
  if(d.sensitivity){
    html+='<div style="font-size:0.6rem;color:var(--text-tertiary);margin-top:6px;">敏感性(WACC→目标价): ';
    d.sensitivity.forEach(function(s){html+=s.wacc+':'+s.target_price+' '});
    html+='</div>';
  }
  html+='</div>';

  // ═══ Comps ═══
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📊 可比公司分析</span><span style="font-size:0.65rem;color:var(--text-tertiary)">'+c.industry+' · '+c.peer_count+'家可比</span><button class="btn-analysis" data-type="comps" style="margin-left:auto;padding:3px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.65rem;font-family:var(--font-display);">📖 详解</button></div>';
  var mm=c.median_multiples||{};
  html+='<div class="metric-row">';
  html+='<div class="metric-item"><div class="val">'+(mm.pe||'—')+'x</div><div class="lbl">中位PE</div></div>';
  html+='<div class="metric-item"><div class="val">'+(mm.pb||'—')+'x</div><div class="lbl">中位PB</div></div>';
  html+='<div class="metric-item"><div class="val">'+(mm.ps||'—')+'x</div><div class="lbl">中位PS</div></div>';
  html+='</div>';
  var iv=c.implied_valuations||{};
  if(Object.keys(iv).length){
    html+='<div style="font-size:0.65rem;color:var(--text-tertiary)">隐含估值: ';
    for(var k in iv)html+=k+' '+iv[k]+'亿 ';
    html+='</div>';
  }
  if(c.peers&&c.peers.length>1){
    html+='<table class="mini-table" style="margin-top:8px"><tr><th>公司</th><th>营收</th><th>增长</th><th>PE</th><th>PB</th></tr>';
    c.peers.slice(0,6).forEach(function(p){
      var isSelf=p.code===code;
      html+='<tr'+(isSelf?' style="background:rgba(254,44,85,0.04);font-weight:700"':'')+'><td>'+(isSelf?'▶ ':'')+p.name+'</td><td class="mono">'+fmtNum(p.revenue)+'</td><td class="mono">'+(p.revenue_growth||'—')+'%</td><td class="mono">'+(p.pe||'—')+'</td><td class="mono">'+(p.pb||'—')+'</td></tr>';
    });
    html+='</table>';
  }
  html+='</div>';

  // ═══ Earnings ═══
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📈 盈利趋势</span><span style="font-size:0.65rem;color:var(--text-tertiary)">'+e.trend_summary+'</span><button class="btn-analysis" data-type="earnings" style="margin-left:auto;padding:3px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.65rem;font-family:var(--font-display);">📖 详解</button></div>';
  var lt=e.latest||{};
  html+='<div class="metric-row">';
  html+='<div class="metric-item"><div class="val '+(lt.revenue_yoy>0?'up':'down')+'">'+(lt.revenue_yoy!=null?(lt.revenue_yoy>0?'+':'')+lt.revenue_yoy+'%':'—')+'</div><div class="lbl">营收同比</div></div>';
  html+='<div class="metric-item"><div class="val '+(lt.net_profit_yoy>0?'up':'down')+'">'+(lt.net_profit_yoy!=null?(lt.net_profit_yoy>0?'+':'')+lt.net_profit_yoy+'%':'—')+'</div><div class="lbl">净利同比</div></div>';
  html+='<div class="metric-item"><div class="val">'+(lt.gross_margin||'—')+'%</div><div class="lbl">毛利率</div></div>';
  html+='<div class="metric-item"><div class="val">'+(lt.roe||'—')+'%</div><div class="lbl">ROE</div></div>';
  html+='</div>';
  if(e.revenue_acceleration!=null){
    html+='<div style="font-size:0.65rem"><span class="tag '+(e.revenue_acceleration>0?'tag-green':'tag-red')+'">营收'+(e.revenue_acceleration>0?'加速':'减速')+' '+Math.abs(e.revenue_acceleration)+'pp</span> ';
    html+='<span class="tag '+(e.profit_acceleration>0?'tag-green':'tag-red')+'">净利'+(e.profit_acceleration>0?'加速':'减速')+' '+Math.abs(e.profit_acceleration)+'pp</span></div>';
  }
  if(e.quarters&&e.quarters.length){
    html+='<table class="mini-table" style="margin-top:8px"><tr><th>季度</th><th>营收</th><th>营收YoY</th><th>净利</th><th>净利YoY</th></tr>';
    e.quarters.slice(-4).forEach(function(q){html+='<tr><td>'+q.report_date+'</td><td class="mono">'+fmtNum(q.revenue)+'</td><td class="mono">'+(q.revenue_yoy||0)+'%</td><td class="mono">'+fmtNum(q.net_profit)+'</td><td class="mono">'+(q.net_profit_yoy||0)+'%</td></tr>'});
    html+='</table>';
  }
  html+='</div>';

  // ═══ 3-Statement ═══
  html+='<div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 三表预测</span><span style="font-size:0.65rem;color:var(--text-tertiary)">基准年:'+(m.base_year||'—')+' · '+m.base_gross_margin+'</span><button class="btn-analysis" data-type="model" style="margin-left:auto;padding:3px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--card-bg);cursor:pointer;font-size:0.65rem;font-family:var(--font-display);">📖 详解</button></div>';
  if(m.projections){
    html+='<table class="mini-table"><tr><th>年份</th><th>营收</th><th>毛利</th><th>净利</th><th>经营CF</th><th>自由CF</th></tr>';
    m.projections.forEach(function(p){
      var i=p.income_statement||{}, cf=p.cash_flow||{};
      html+='<tr><td>'+p.year+'</td><td class="mono">'+fmtNum(i.revenue)+'</td><td class="mono">'+fmtNum(i.gross_profit)+'</td><td class="mono">'+fmtNum(i.net_income)+'</td><td class="mono">'+fmtNum(cf.operating_cf)+'</td><td class="mono">'+fmtNum(cf.free_cf)+'</td></tr>';
    });
    html+='</table>';
  }
  html+='</div>';

  html+='</div>';  // result-grid

  // ═══ 分析面板 ═══
  html+='<div class="xhs-card" id="analysis-panel" style="display:none;margin-top:16px">';
  html+='<div class="xhs-card-header"><span class="xhs-card-label">📖 详细分析</span><span id="analysis-title" style="font-size:0.7rem;color:var(--text-tertiary);margin-left:8px;"></span></div>';
  html+='<div id="analysis-body" style="padding:16px;font-size:0.8rem;line-height:1.8;color:var(--text-primary);max-height:60vh;overflow-y:auto;"></div>';
  html+='</div>';

  document.getElementById('results').innerHTML=html;
  setTimeout(function(){
    document.querySelectorAll('.btn-analysis').forEach(function(btn){
      btn.onclick=function(){ window._showAnalysis(this.dataset.type, data); };
    });
  }, 100);
}


window._showAnalysis=function(type, data){
  var panel=document.getElementById('analysis-panel');
  var body=document.getElementById('analysis-body');
  var title=document.getElementById('analysis-title');
  panel.style.display='';

  if(type==='dcf'){ title.textContent='DCF估值推演'; body.innerHTML=dcfAnalysis(data.dcf||{}); }
  else if(type==='comps'){ title.textContent='可比公司分析推演'; body.innerHTML=compsAnalysis(data.comps||{}); }
  else if(type==='earnings'){ title.textContent='盈利趋势推演'; body.innerHTML=earningsAnalysis(data.earnings||{}); }
  else if(type==='model'){ title.textContent='三表预测推演'; body.innerHTML=modelAnalysis(data.model||{}); }
  panel.scrollIntoView({behavior:'smooth'});
}

function fmtNum(v){if(v==null)return'—';var n=Math.abs(v);if(n>=1e8)return(v/1e8).toFixed(1)+'亿';if(n>=1e4)return(v/1e4).toFixed(1)+'万';return v.toFixed(1)}

// ══════ 分析文本生成 ══════

function dcfAnalysis(d){
  if(d.error)return '<p style="color:#FE2C55">❌ '+d.error+'</p>';
  var h='<h2 style="margin-top:0">DCF估值模型 · 完整推演</h2>';
  var rev=d.base_revenue||0, ebitda_m=d.ebitda_margin||'', da_m=d.da_pct||'', capex_m=d.capex_pct||'';
  var proj=d.projections||[], cp=d.current_price||0, tp=d.target_price||0;
  var ev=d.enterprise_value||0, eq=d.equity_value||0, nd=d.net_debt||0, tv=d.terminal_value||0;
  var ebitdaVal=parseFloat(ebitda_m)/100, daVal=parseFloat(da_m)/100, capexVal=parseFloat(capex_m)/100;

  // ═══ 第1章 ═══
  h+='<h3>第一章 · DCF是什么——金融界的"秤"</h3>';
  h+='<p>DCF（Discounted Cash Flow，现金流折现法）是华尔街估值的内核。它的底层逻辑只有一句话：<strong>一家公司值多少钱，等于它未来能赚的所有现金，折现回今天的总和。</strong></p>';
  h+='<p>为什么不用净利润而用现金流？因为净利润可以被会计手段"调节"——改变折旧年限、调整存货计价方式，都能让净利润变好看。但<strong>现金不会说谎</strong>——公司账户里有没有钱，是客观事实。所以DCF只关注一样东西：<strong>自由现金流（Free Cash Flow）</strong>——公司经营赚到的现金，减去必须再投回设备的钱之后，真正可以分给股东的部分。</p>';
  h+='<p>为什么要把未来的钱"折现"？因为今天的100元和一年后的100元不是一回事。如果我把100元存银行，年利率3%，一年后变成103元。反过来，一年后的100元，在今天只值100÷1.03≈97元。<strong>折现率就是这个"倒着算"的利率</strong>——用在股票估值中，它叫WACC（加权平均资本成本），反映的是投资这只股票的机会成本和风险。</p>';

  // ═══ 第2章 ═══
  h+='<h3>第二章 · 参数溯源——每一个数字从哪来</h3>';
  h+='<p>本DCF模型不依赖任何"经验值"或"行业惯例"。每一个参数都从公司真实年报中提取：</p>';
  h+='<table class="mini-table"><tr><th style="width:22%">参数</th><th style="width:12%">数值</th><th style="width:30%">真实来源</th><th style="width:36%">为什么选这个</th></tr>';
  h+='<tr><td>基准营收</td><td class="mono">'+fmtNum(rev)+'</td><td>年报 stock_financials_annual.revenue</td><td>最近一期年报的营业收入，是预测的起点</td></tr>';
  h+='<tr><td>EBITDA利润率</td><td class="mono">'+ebitda_m+'</td><td>年报扩展表 ebitda÷营收</td><td>反映公司的核心盈利能力——扣除所有营业费用前能赚多少</td></tr>';
  h+='<tr><td>折旧率</td><td class="mono">'+da_m+'</td><td>年报扩展表 depreciation_fa÷营收</td><td>固定资产的年度"分摊"——现金早已付出，所以后续算现金流要加回</td></tr>';
  h+='<tr><td>CapEx率</td><td class="mono">'+capex_m+'</td><td>(经营CF−自由CF)÷营收</td><td>每年必须再投入厂房设备的资金比例——重资产企业最核心的约束</td></tr>';
  h+='<tr><td>净债务</td><td class="mono">'+fmtNum(nd)+'</td><td>总资产×有息负债率</td><td>从企业价值扣减得到股权价值——债主优先，股东剩多少算多少</td></tr>';
  h+='<tr><td>WACC</td><td class="mono">'+d.wacc+'</td><td>模型假设(可调)</td><td>加权平均资本成本——10%意味着投资者要求年化10%的回报率</td></tr>';
  h+='</table>';

  // ═══ 第3章 ═══
  h+='<h3>第三章 · 自由现金流推演——从营收到FCF的每一步</h3>';
  h+='<p>以预测的第一年（'+proj[0].year+'年）为例，完整展示计算过程：</p>';
  var py=proj[0];
  var rev_y=py.revenue, ufcf_y=py.ufcf, pv_y=py.pv;
  var ebitda_y=rev_y*ebitdaVal, da_y=rev_y*daVal, capex_y=rev_y*capexVal;
  var ebit_y=ebitda_y-da_y, nopat_y=ebit_y*0.75, dnwc_y=(rev_y-rev)*0.01;

  h+='<div style="background:rgba(254,44,85,0.04);padding:16px;border-radius:10px;margin:8px 0">';
  h+='<p><strong>Step 1 · 营收</strong> = 基准'+fmtNum(rev)+' × (1+增长率) = <strong>'+fmtNum(rev_y)+'</strong></p>';
  h+='<p><strong>Step 2 · EBITDA</strong> = 营收 × EBITDA利润率 = '+fmtNum(rev_y)+' × '+ebitda_m+' = <strong>'+fmtNum(ebitda_y)+'</strong></p>';
  h+='<p><strong>Step 3 · EBIT</strong> = EBITDA − 折旧 = '+fmtNum(ebitda_y)+' − '+fmtNum(da_y)+' = <strong>'+fmtNum(ebit_y)+'</strong></p>';
  h+='<p style="color:var(--text-tertiary);font-size:0.75rem">折旧是怎么来的？公司建厂房花80亿，会计上分多年摊销——每年'+da_m+'相当于把80亿"分期付款"记在利润表上。但现金当年就已经全部付掉了，所以后面算现金流时要加回来。</p>';
  h+='<p><strong>Step 4 · NOPAT(税后净营业利润)</strong> = EBIT × (1−税率25%) = '+fmtNum(ebit_y)+' × 0.75 = <strong>'+fmtNum(nopat_y)+'</strong></p>';
  h+='<p><strong>Step 5 · 自由现金流</strong> = NOPAT + 折旧 − CapEx − 营运资本变动</p>';
  h+='<p>= '+fmtNum(nopat_y)+' + '+fmtNum(da_y)+' − '+fmtNum(capex_y)+' − '+fmtNum(dnwc_y)+' = <strong>'+fmtNum(ufcf_y)+'</strong></p>';
  h+='<p style="color:var(--text-tertiary);font-size:0.75rem">为什么加回折旧？因为折旧只是会计上的"纸面亏损"，并不是当年真实花出去的现金。公司在银行里的存款没有因为折旧而减少。所以算"实际赚了多少"时必须加回。CapEx（'+fmtNum(capex_y)+'）是真实的现金流出——买设备、建厂房——必须扣除。FCF='+fmtNum(ufcf_y)+'，意味着'+fmtNum(rev_y)+'的营收最终只留下这点可自由支配的现金——重资产制造业的典型特征。</p>';
  h+='</div>';

  // ═══ 第4章 ═══
  h+='<h3>第四章 · 折现——把未来的钱"翻译"成今天的钱</h3>';
  h+='<p>有了每年的FCF后，需要把它们折现回今天。折现公式：<strong>现值 = 未来现金流 ÷ (1+WACC)^n</strong>，其中n是年数。WACC='+d.wacc+'意味着每多等一年，钱就贬值'+d.wacc+'。</p>';
  h+='<table class="mini-table"><tr><th>年份</th><th>营收</th><th>FCF</th><th>折现因子</th><th>现值</th></tr>';
  proj.forEach(function(p,i){
    var df=1/Math.pow(1+0.10, i+0.5);
    h+='<tr><td>'+p.year+'</td><td class="mono">'+fmtNum(p.revenue)+'</td><td class="mono">'+fmtNum(p.ufcf)+'</td><td class="mono">'+df.toFixed(4)+'</td><td class="mono">'+fmtNum(p.pv)+'</td></tr>';
  });
  h+='</table>';
  var total_pv=proj.reduce(function(s,p){return s+(p.pv||0)},0);
  h+='<p>5年FCF现值合计：<strong>'+fmtNum(total_pv)+'</strong>。这意味着公司未来5年产生的自由现金流，折算到今天大约值这个数。</p>';

  h+='<h3>第五章 · 终值——5年之后的价值</h3>';
  h+='<p>一家公司不会只活5年。5年之后它还会继续经营、继续产生现金流。这部分叫<strong>终值（Terminal Value）</strong>——它通常占企业总价值的60~80%。本模型使用<strong>'+d.tv_method+'</strong>法计算终值：</p>';
  h+='<p>终值 = '+fmtNum(proj[4].revenue*ebitdaVal)+'(第5年EBITDA) × 退出倍数 = <strong>'+fmtNum(tv)+'</strong></p>';
  h+='<p>终值现值 = '+fmtNum(tv)+' ÷ (1+'+d.wacc+')^5.5 = <strong>'+fmtNum(tv)+'</strong></p>';

  h+='<h3>第六章 · 从企业价值到目标股价</h3>';
  h+='<div style="background:rgba(254,44,85,0.06);padding:12px;border-radius:10px;margin:8px 0">';
  h+='<p><strong>企业价值(EV)</strong> = FCF现值 + 终值现值 = '+fmtNum(total_pv)+' + '+fmtNum(tv)+' = <strong>'+fmtNum(ev)+'</strong></p>';
  h+='<p><strong>股权价值</strong> = EV − 净债务 = '+fmtNum(ev)+' − '+fmtNum(nd)+' = <strong>'+fmtNum(eq)+'</strong></p>';
  h+='<p><strong>目标股价</strong> = 股权价值 ÷ 总股本 = <strong>'+tp+'元</strong></p>';
  h+='</div>';
  h+='<p>当前股价<strong>'+cp+'元</strong>。DCF目标价<strong>'+tp+'元</strong>。需要注意的是，DCF对假设高度敏感——增长率差1个百分点、WACC差1个百分点，目标价可能差30%以上。请关注下方的敏感性分析表来理解目标价的可能范围。</p>';

  h+='<h3>第七章 · 敏感性分析</h3>';
  h+='<p>下表展示不同假设下的目标价变化——帮助你理解"安全边际"：</p>';
  h+='<table class="mini-table"><tr><th>假设</th><th>目标价</th><th>相对当前价</th></tr>';
  (d.sensitivity||[]).forEach(function(s){
    var up=((s.target_price/cp-1)*100).toFixed(0);
    h+='<tr><td>'+s.label+'</td><td class="mono">'+s.target_price+'元</td><td class="mono" style="color:'+(up>0?'#4CAF50':'#FE2C55')+'">'+(up>0?'+':'')+up+'%</td></tr>';
  });
  h+='</table>';

  h+='<h3>第八章 · DCF的局限性</h3>';
  h+='<p>DCF是估值理论的基石，但不是完美的工具。它的主要局限包括：</p>';
  h+='<p>• <strong>对假设极度敏感</strong>：终值通常占企业价值的60~80%，而终值本身又对永续增长率和WACC非常敏感。改变一个假设，估值可能翻倍或腰斩。</p>';
  h+='<p>• <strong>不适用于盈利不稳定的公司</strong>：DCF假设未来现金流可以合理预测。对于亏损公司、周期性行业、初创企业，DCF的预测可靠性大打折扣。</p>';
  h+='<p>• <strong>忽略了市场情绪</strong>：DCF给出"公司应该值多少钱"，但市场可能长期偏离这个价值。在牛市中DCF看起来总是太保守，在熊市中看起来总是太乐观。</p>';
  h+='<p>• <strong>建议</strong>：将DCF估值与可比公司分析（Comps）结合使用——DCF告诉你"内在价值"，Comps告诉你"市场愿意给多少"。两者差距就是你的投资机会。</p>';

  return h;
}

function compsAnalysis(c){
  if(c.error)return '<p style="color:#FE2C55">❌ '+c.error+'</p>';
  var h='<h2 style="margin-top:0">可比公司分析 · 完整推演</h2>';
  var mm=c.median_multiples||{}, iv=c.implied_valuations||{};

  h+='<h3>第一章 · 可比公司法是什么——金融界的"房价比较"</h3>';
  h+='<p>你要给一套房子定价，最直接的方法是看同一个小区、同样户型、类似装修的房子卖了多少钱。给股票估值也是一样——<strong>找相似的公司，看市场给它们多少倍估值，再应用到目标公司</strong>。</p>';
  h+='<p>可比公司法的核心工具是<strong>估值倍数（Multiples）</strong>——把公司的价值用某个财务指标"标准化"后进行比较。最常用的三个倍数是：</p>';
  h+='<p>• <strong>PE（市盈率）= 市值 ÷ 净利润</strong>。意思是"市场愿意为每1元净利润付多少钱"。PE=50表示你花50元买1元年利润——需要50年才能回本。高PE意味着市场预期高增长。</p>';
  h+='<p>• <strong>PB（市净率）= 市值 ÷ 净资产</strong>。比较适合银行、保险等资产驱动型行业。PB=3表示市场认为公司值净资产的3倍——"无形资产"（品牌、技术、管理）的价值。</p>';
  h+='<p>• <strong>PS（市销率）= 市值 ÷ 营业收入</strong>。适合亏损公司（因为没有净利润可用）。PS=5表示市场为公司每1元营收付5元。</p>';
  h+='<p>本模型中，<strong>所有倍数都不依赖外部数据库</strong>，而是从三大核心数据自行计算：股价 × 总股本 = 市值，市值 ÷ 净利润 = PE，市值 ÷ 净资产 = PB，市值 ÷ 营收 = PS。</p>';

  h+='<h3>第二章 · 可比公司筛选——"同一个小区"怎么定义</h3>';
  h+='<p>目标公司所在行业：<strong>'+c.industry+'</strong>（申万行业分类）。从该行业中找到了<strong>'+c.peer_count+'家</strong>可比公司。行业分类来自 stock_sw_industry 表，这是A股最常用的行业分类标准。</p>';
  h+='<p>行业分类不是完美的——同行业的公司可能业务差异很大（比如电力设备行业既有造发电机的，也有造电缆的）。"可比性"需要主观判断，本模型提供了一个客观的起点。</p>';

  h+='<h3>第三章 · 估值倍数计算——从股价到PE的完整链条</h3>';
  h+='<p>以下展示目标公司及其可比公司的核心数据——每一列都是实时计算的：</p>';
  var peers=c.peers||[];
  h+='<table class="mini-table"><tr><th>公司</th><th>营收(亿)</th><th>增长%</th><th>毛利率%</th><th>PE</th><th>PB</th><th>PS</th></tr>';
  peers.slice(0,8).forEach(function(p,i){
    var isSelf=p.code===c.stock_code;
    h+='<tr'+(isSelf?' style="background:rgba(254,44,85,0.04);font-weight:700"':'')+'>';
    h+='<td>'+(isSelf?'▶ ':'')+p.name+'</td>';
    h+='<td class="mono">'+fmtNum(p.revenue)+'</td>';
    h+='<td class="mono">'+(p.revenue_growth!=null?p.revenue_growth+'%':'—')+'</td>';
    h+='<td class="mono">'+(p.gross_margin||'—')+'%</td>';
    h+='<td class="mono">'+(p.pe||'—')+'</td>';
    h+='<td class="mono">'+(p.pb||'—')+'</td>';
    h+='<td class="mono">'+(p.ps||'—')+'</td></tr>';
  });
  h+='</table>';
  h+='<p>注意：部分可比公司的PE为"—"，通常是因为它们的净利润为负数（亏损）——PE不适用于亏损公司。PB和PS的覆盖率通常更高。</p>';
  var hasPe=peers.filter(function(p){return p.pe}).length;
  h+='<p>共<strong>'+hasPe+'家</strong>可比公司有PE数据。为什么不用平均值而用中位数？因为一个极端值（比如某家公司PE=6728）会严重拉偏平均值。中位数能更好地代表"典型"估值水平。</p>';

  h+='<h3>第四章 · 估值推导</h3>';
  h+='<p>行业中位估值倍数：<strong>PE='+(mm.pe||'—')+'倍，PB='+(mm.pb||'—')+'倍，PS='+(mm.ps||'—')+'倍</strong>。</p>';
  h+='<p>将这些倍数应用于目标公司的财务数据：</p>';
  for(var k in iv){
    h+='<p><strong>'+k+'</strong>：'+iv[k]+'亿</p>';
  }
  h+='<p>综合估值约<strong>'+fmtNum(c.average_valuation*1e8)+'</strong>（各方法平均）。</p>';
  h+='<p>可比公司法的结论不是"公司值X元"，而是<strong>"如果市场给同行业公司的平均估值倍数不变，那么目标公司应该值Y元"</strong>。它反映的是市场的<strong>相对定价</strong>，而非绝对价值。</p>';

  h+='<h3>第五章 · 解读与局限性</h3>';
  h+='<p>• <strong>PE的陷阱</strong>：PE低不一定"便宜"——可能是公司利润因为一次性收益（卖资产、政府补贴）虚高，第二年利润就跌回去了。要看扣非净利润。</p>';
  h+='<p>• <strong>PB的适用性</strong>：重资产企业（银行、钢铁、地产）适合用PB，因为它们的核心价值就在资产负债表中。轻资产企业（互联网、软件）的PB通常很高但不代表"贵"——它们的价值在无形资产（用户、数据、品牌），不在账面上。</p>';
  h+='<p>• <strong>可比性永远是个问题</strong>：没有两家公司完全相同。增长率、利润率、行业地位、管理团队——这些差异都应该反映在估值倍数上。如果目标公司的PE低于行业中位，可能意味着它确实被低估了，也可能意味着它的基本面比同行差。</p>';
  h+='<p>• <strong>建议</strong>：将可比公司分析和DCF结合使用。DCF告诉你"公司该值多少钱"，Comps告诉你"市场愿意给多少"。当两者差距很大时——要么是机会，要么是你看错了什么。</p>';

  return h;
}

function earningsAnalysis(e){
  if(e.error)return '<p style="color:#FE2C55">❌ '+e.error+'</p>';
  var h='<h2 style="margin-top:0">盈利趋势分析 · 完整推演</h2>';
  var qs=e.quarters||[], lt=e.latest||{};

  h+='<h3>第一章 · 季度数据 vs 年度数据——你看到的是什么</h3>';
  h+='<p>首先要厘清一个关键概念：本卡片展示的是<strong>季度数据</strong>，而非年度数据。每一个数字代表的是<strong>该季度单季</strong>的表现。比如"当季营收174.7亿"就是2026年1~3月这三个月的销售额，不是全年预测。</p>';
  h+='<p>为什么用季度而不用年度？因为季度数据能更早地发现趋势变化。如果等到年报出来才发现营收在下滑，可能股价已经跌了半年了。季报的频率（每3个月）远高于年报（每12个月），是趋势追踪的最佳粒度。</p>';
  h+='<p>表中<strong>营收同比（YoY）= (今年Q1营收 − 去年Q1营收) ÷ 去年Q1营收 × 100%</strong>。它回答的问题是："和去年同期相比，公司变大了还是变小了？"。同比消除了季节性因素——Q1通常比Q4营收少（因为春节），但今年的Q1和去年的Q1是同一个季节，可以直接比较。</p>';
  h+='<p><strong>营收环比（QoQ）= (今年Q1营收 − 去年Q4营收) ÷ 去年Q4营收 × 100%</strong>。它回答的问题是："和上个季度相比如何？"。环比反映的是短期动量——QoQ为负不一定说明问题（季节性），但连续两个季度的环比下降就需要关注。</p>';

  h+='<h3>第二章 · 核心指标解读</h3>';
  h+='<table class="mini-table"><tr><th>指标</th><th>最新值</th><th>含义</th><th>怎么算的</th></tr>';
  h+='<tr><td>营收同比</td><td class="mono">'+(lt.revenue_yoy>0?'+':'')+lt.revenue_yoy+'%</td><td>公司规模在扩张</td><td>(今年Q1营收−去年Q1营收)÷去年Q1营收</td></tr>';
  h+='<tr><td>净利同比</td><td class="mono">'+(lt.net_profit_yoy>0?'+':'')+lt.net_profit_yoy+'%</td><td>盈利能力在提升</td><td>(今年Q1净利−去年Q1净利)÷去年Q1净利</td></tr>';
  h+='<tr><td>毛利率</td><td class="mono">'+(lt.gross_margin||'—')+'%</td><td>产品本身的赚钱能力</td><td>(营收−营业成本)÷营收×100%</td></tr>';
  h+='<tr><td>ROE</td><td class="mono">'+(lt.roe||'—')+'%</td><td>股东投入资本的回报率</td><td>净利润÷股东权益×100%(年化)</td></tr>';
  h+='</table>';
  h+='<p><strong>毛利率</strong>反映的是公司最基本的赚钱能力——产品卖多少钱，扣掉原材料和制造成本后剩多少。毛利率高意味着产品有定价权（别人不能轻易取代你）。毛利率持续下降是危险信号——可能面临竞争加剧或成本上升。</p>';
  h+='<p><strong>ROE（净资产收益率）</strong>是巴菲特最看重的指标。它回答："股东每投1元钱，公司一年能赚回多少？"。ROE=10%意味着1元净资产产生0.1元年利润。A股长期ROE均值约8~10%，高于15%算优秀，高于20%是卓越。</p>';

  h+='<h3>第三章 · 趋势追踪——加速还是减速？</h3>';
  h+='<p>只看一个季度的数字是片面的。趋势分析的核心是<strong>看方向而非绝对值</strong>。本模型追踪最近3个季度的同比变化：</p>';
  var rt=e.revenue_trend||[], pt=e.profit_trend||[];
  h+='<table class="mini-table"><tr><th></th>';
  rt.forEach(function(v,i){h+='<th>Q'+(i+1)+'</th>'});
  h+='<th>变化</th></tr>';
  h+='<tr><td>营收同比</td>';
  rt.forEach(function(v){h+='<td class="mono" style="color:'+(v>0?'#4CAF50':'#FE2C55')+'">'+(v>0?'+':'')+v+'%</td>'});
  h+='<td class="mono" style="color:'+(e.revenue_acceleration>0?'#4CAF50':'#FE2C55')+'">'+(e.revenue_acceleration>0?'+':'')+e.revenue_acceleration+'pp</td></tr>';
  h+='<tr><td>净利同比</td>';
  pt.forEach(function(v){h+='<td class="mono" style="color:'+(v>0?'#4CAF50':'#FE2C55')+'">'+(v>0?'+':'')+v+'%</td>'});
  h+='<td class="mono" style="color:'+(e.profit_acceleration>0?'#4CAF50':'#FE2C55')+'">'+(e.profit_acceleration>0?'+':'')+e.profit_acceleration+'pp</td></tr>';
  h+='</table>';
  h+='<p><strong>加速/减速</strong> = 最新季度同比 − 最早季度同比。正数表示增速在加快（加速），负数表示增速在放缓（减速）。单位是"pp"（百分点），比如从+10%降到+5%，减速5pp。</p>';
  h+='<p>当前趋势：<strong>'+e.trend_summary+'</strong>。</p>';

  if(e.revenue_acceleration<0 && e.profit_acceleration>0){
    h+='<p>营收在减速但净利在加速——这是一个有趣的信号。通常有几种可能：(1)毛利率在改善，产品提价或成本下降；(2)费用率在下降，公司在控费；(3)一次性因素（政府补贴、资产处置收益）。需要结合毛利率趋势来判断——如果毛利率同步在上升，说明是(1)，这是基本面向好的信号。</p>';
  }else if(e.revenue_acceleration>0 && e.profit_acceleration<0){
    h+='<p>营收加速但净利减速——这是个危险信号。公司可能在"赔本赚吆喝"——靠降价或增加费用来推动收入增长，但利润被侵蚀。需要检查毛利率和费用率的变化。</p>';
  }

  h+='<h3>第四章 · 近四个季度明细</h3>';
  h+='<table class="mini-table"><tr><th>季度</th><th>营收</th><th>营收YoY</th><th>净利</th><th>净利YoY</th><th>毛利率</th></tr>';
  qs.slice(-4).forEach(function(q){
    h+='<tr><td>'+q.report_date+'</td>';
    h+='<td class="mono">'+fmtNum(q.revenue)+'</td>';
    h+='<td class="mono" style="color:'+(q.revenue_yoy>0?'#4CAF50':'#FE2C55')+'">'+(q.revenue_yoy>0?'+':'')+q.revenue_yoy+'%</td>';
    h+='<td class="mono">'+fmtNum(q.net_profit)+'</td>';
    h+='<td class="mono" style="color:'+(q.net_profit_yoy>0?'#4CAF50':'#FE2C55')+'">'+(q.net_profit_yoy>0?'+':'')+q.net_profit_yoy+'%</td>';
    h+='<td class="mono">'+q.gross_margin+'%</td></tr>';
  });
  h+='</table>';

  h+='<h3>第五章 · 使用建议</h3>';
  h+='<p>• <strong>不要只看一个季度</strong>：单季数据波动大——可能是季节性因素、一次性项目、会计调整。至少看连续4个季度才能形成趋势判断。</p>';
  h+='<p>• <strong>Q4要特别小心</strong>：A股的Q4经常有"财务洗澡"——公司在年底集中计提减值、清理库存，导致利润异常。如果Q4净利突然暴跌但Q1又恢复正常，大概率是财务处理而非经营恶化。</p>';
  h+='<p>• <strong>结合行业对比</strong>：营收增长10%好不好？如果行业平均增长20%，那10%说明公司可能在丢失市场份额。盈利趋势分析需要放到行业背景中才有意义。</p>';

  return h;
}

function modelAnalysis(m){
  if(m.error)return '<p style="color:#FE2C55">❌ '+m.error+'</p>';
  var h='', baseRev=fmtNum(m.base_revenue), sga=m.sga_pct||'?', da=m.da_pct||'?', capex=m.capex_pct||'?', gm=m.base_gross_margin||'?';
  var sgaVal=parseFloat(sga)/100, daVal=parseFloat(da)/100, capexVal=parseFloat(capex)/100, gmVal=parseFloat(gm)/100;
  var projs=m.projections||[], py=projs[0], pi=py.income_statement||{}, pcf=py.cash_flow||{};
  var rev1=pi.revenue, gp1=pi.gross_profit, ni1=pi.net_income, ocf1=pcf.operating_cf, fcf1=pcf.free_cf;
  var sga1=rev1*sgaVal, da1=rev1*daVal, capex1=rev1*capexVal, ebit1=gp1-sga1-da1;

  h+='<h2 style="margin-top:0">三表预测模型 · 完整推演</h2>';

  // ═══ 第一部分：数据基石 ═══
  h+='<h3>第一章 · 数据基石——所有参数均来自真实财报</h3>';
  h+='<p>财务模型的质量完全取决于输入数据的质量。本模型的每一个参数都能在公司的年报中找到对应的数字，没有任何"拍脑袋"估算。以下六项核心参数定义了东方电气未来三年的财务轨迹：</p>';
  h+='<table class="mini-table"><tr><th style="width:20%">参数</th><th style="width:15%">数值</th><th style="width:30%">真实来源</th><th style="width:35%">在模型中的作用</th></tr>';
  h+='<tr><td>基准营收</td><td class="mono">'+baseRev+'</td><td>2025年报 stock_financials_annual.revenue</td><td>所有预测的起点，未来每年乘以(1+增长率)</td></tr>';
  h+='<tr><td>毛利率</td><td class="mono">'+gm+'</td><td>2025年报 gross_margin</td><td>营收×毛利率=毛利润，反映产品定价权和成本控制力</td></tr>';
  h+='<tr><td>SG&A率</td><td class="mono">'+sga+'</td><td>年报扩展表 selling+admin 除营收</td><td>销售费用+管理费用占营收比，反映运营效率</td></tr>';
  h+='<tr><td>折旧率</td><td class="mono">'+da+'</td><td>年报扩展表 depreciation_fa 除营收</td><td>固定资产的年度"分摊"，不消耗现金但减少账面利润</td></tr>';
  h+='<tr><td>资本开支率</td><td class="mono">'+capex+'</td><td>(经营CF−自由CF)÷营收</td><td>每年需再投入厂房设备的资金比例，重资产企业核心约束</td></tr>';
  h+='<tr><td>基准营收增速</td><td class="mono">'+(m.base_growth||'?')+'</td><td>最近年报 revenue_yoy × 70%</td><td>第一年增长率取历史增速的70%，保守估计未来不会重复过去</td></tr>';
  h+='</table>';

  // ═══ 第二部分：增长率方法论 ═══
  h+='<h3>第二章 · 增长率从何而来——这不是随便填的数字</h3>';
  h+='<p>金融建模中，营收增长率是最关键的假设——差1个百分点，五年后的企业价值可能差20%。但增长率无法"精确预测"，我们只能基于历史规律做<strong>合理推断</strong>。本模型采用的方法叫"均值回归递减法"，其底层逻辑有三层：</p>';

  h+='<p><strong>第一层：看历史，知底线。</strong>东方电气过去五年（2021~2025）的营收增速分别为 28.3%→15.8%→9.6%→14.9%→12.8%，五年均值为<strong>16.3%</strong>。过去三年均值为<strong>12.4%</strong>。一家连续五年保持9%以上营收增长的公司，说明它处于一个持续扩张的行业，不是靠一次性订单活着的周期性企业。</p>';

  h+='<p><strong>第二层：向均值回归。</strong>金融学有一条铁律叫"均值回归"——高增长不可永远持续。一个30%增速的公司，五年后大概率降到10%以下。原因很简单：规模越大，增长越难。786亿的营收要增长12%，意味着要多卖出94亿的产品。而5年前478亿时增长28%只需要多卖134亿。绝对增量在变大但百分比在缩小——这不是公司"变差了"，是基数效应。</p>';

  h+='<p><strong>第三层：保守原则。</strong>我们不取历史均值16%，也不取最近一期的12.8%，而是取12.8%×70%=<strong>9.0%</strong>作为第一年基准——因为预测的本质不是"猜最可能的值"，而是"给自己留足安全边际"。如果公司实际增速超过9%，模型给出的估值是底线；如果公司连9%都达不到，那现在的估值可能偏高。</p>';

  h+='<p>后续年份逐年递减2个百分点：9%→7%→5%→4%→3%。五年复合增速约5.6%。这在全球工业设备行业中属于合理偏保守的假设。</p>';

  // ═══ 第三部分：六步推导 ═══
  h+='<h3>第三章 · 从营收到自由现金流——六步推导</h3>';
  h+='<p>以'+py.year+'年为例，完整展示如何从一笔营收变成最终的自由现金流：</p>';

  h+='<div style="background:rgba(254,44,85,0.04);padding:16px;border-radius:10px;margin:8px 0">';

  h+='<p><strong>Step 1 · 营收预测</strong><br>';
  h+='基准营收 '+baseRev+' × (1 + 增长率) = <strong>'+fmtNum(rev1)+'</strong><br>';
  h+='<span style="color:var(--text-tertiary);font-size:0.75rem">这是整个模型的起点。营收预测错了，后面全错。所以我们花了整个第二章讨论增长率的来龙去脉。</span></p>';

  h+='<p><strong>Step 2 · 毛利润</strong><br>';
  h+='营收 '+fmtNum(rev1)+' × 毛利率 '+gm+' = <strong>'+fmtNum(gp1)+'</strong><br>';
  h+='<span style="color:var(--text-tertiary);font-size:0.75rem">毛利率('+gm+')来自2025年报——东方电气每卖100元产品，扣除原材料和制造成本后剩15.9元。这个15.9元要支付后面的所有费用。</span></p>';

  h+='<p><strong>Step 3 · 扣除营业费用</strong><br>';
  h+='SG&A(销售+管理费) = '+fmtNum(rev1)+' × '+sga+' = <strong>−'+fmtNum(sga1)+'</strong><br>';
  h+='折旧摊销 = '+fmtNum(rev1)+' × '+da+' = <strong>−'+fmtNum(da1)+'</strong><br>';
  h+='EBIT(息税前利润) = '+fmtNum(gp1)+' − '+fmtNum(sga1)+' − '+fmtNum(da1)+' = <strong>'+fmtNum(ebit1)+'</strong><br>';
  h+='<span style="color:var(--text-tertiary);font-size:0.75rem">SG&A='+sga1.toFixed(0)+'亿，其中销售费用'+fmtNum(rev1*0.011)+'、管理费用'+fmtNum(rev1*0.048)+'。注意管理费用是销售费用的4.5倍——东方电气是研发和管理密集型而非销售驱动型企业。折旧'+fmtNum(da1)+'亿是"会计成本"——现金早已付过，但利润表上需要分摊。所以后续算现金流时要加回来。</span></p>';

  h+='<p><strong>Step 4 · 净利润</strong><br>';
  h+='EBIT '+fmtNum(ebit1)+' × (1 − 所得税率25%) = <strong>'+fmtNum(ni1)+'</strong><br>';
  h+='<span style="color:var(--text-tertiary);font-size:0.75rem">税率25%是法定企业所得税率。实际中企业可能有税收优惠，所以这个假设偏保守。</span></p>';

  h+='<p><strong>Step 5 · 经营现金流</strong><br>';
  h+='净利润 '+fmtNum(ni1)+' + 折旧 '+fmtNum(da1)+' = <strong>'+fmtNum(ocf1)+'</strong><br>';
  h+='<span style="color:var(--text-tertiary);font-size:0.75rem">这是整个模型中最反直觉的一步——为什么要把折旧加回来？因为折旧是"纸面亏损"。三年前公司花80亿建了厂房，当时现金已经付出去了。现在的折旧只是在利润表上逐年分摊这个80亿（每年'+fmtNum(da1)+'亿），并没有新的现金流出。而公司的银行存款并不会因为折旧减少——它只是会计规则。所以在算"公司今年实际赚了多少现金"时，必须把折旧加回净利润。</span></p>';

  h+='<p><strong>Step 6 · 自由现金流</strong><br>';
  h+='经营CF '+fmtNum(ocf1)+' − CapEx(资本开支) '+fmtNum(capex1)+' = <strong>'+fmtNum(fcf1)+'</strong><br>';
  h+='<span style="color:var(--text-tertiary);font-size:0.75rem">CapEx='+fmtNum(capex1)+'亿——这是东方电气为维持和扩大生产必须花出去的钱：买新设备、扩建厂房、升级产线。不花这笔钱，明年的产能就保不住。所以经营现金流虽然看起来还行（'+fmtNum(ocf1)+'），但扣除必需的资本开支后，真正自由可分配给股东的钱只有'+fmtNum(fcf1)+'。这就是重资产工业企业的宿命——赚钱机器本身就需要不断喂钱。</span></p>';

  h+='</div>';

  // ═══ 第四部分：三年全局 ═══
  h+='<h3>第四章 · 三年全貌</h3>';
  h+='<table class="mini-table"><tr><th>年</th><th>营收</th><th>毛利</th><th>SG&A</th><th>折旧</th><th>EBIT</th><th>净利</th><th>经营CF</th><th>CapEx</th><th>自由CF</th></tr>';
  projs.forEach(function(px){
    var ix=px.income_statement||{}, cfx=px.cash_flow||{};
    var rx=ix.revenue, sx=rx*sgaVal, dx=rx*daVal, cx=rx*capexVal;
    var ex=ix.gross_profit-sx-dx;
    h+='<tr><td>'+px.year+'</td><td class="mono">'+fmtNum(rx)+'</td><td class="mono">'+fmtNum(ix.gross_profit)+'</td><td class="mono">'+fmtNum(sx)+'</td><td class="mono">'+fmtNum(dx)+'</td><td class="mono">'+fmtNum(ex)+'</td><td class="mono">'+fmtNum(ix.net_income)+'</td><td class="mono">'+fmtNum(cfx.operating_cf)+'</td><td class="mono">'+fmtNum(cx)+'</td><td class="mono">'+fmtNum(cfx.free_cf)+'</td></tr>';
  });
  h+='</table>';
  h+='<p>观察三年趋势：营收稳步增长，自由现金流也随之改善——从'+fmtNum(fcf1)+'到'+fmtNum((projs[projs.length-1].cash_flow||{}).free_cf||0)+'。但注意自由现金流始终只占营收的2~3%。这意味着<strong>东方电气是一个"薄利但稳定"的生意</strong>——规模巨大但每一块钱营收留下的自由现金很少，大部分利润被持续的设备投入吞噬。这不是"坏公司"，而是"重资产行业的正常特征"。</p>';

  // ═══ 第五部分：三表联动 ═══
  h+='<h3>第五章 · 三张财务报表如何联动</h3>';
  h+='<p>很多投资者看财报只看净利润一个数字，这很危险——因为利润可以"做出来"，但现金做不了假。三表联动的精髓在于：<strong>任何一笔交易都会同时影响三张表</strong>。理解了这个，你就能看出财报里的猫腻。</p>';
  h+='<p>① <strong>卖出一台发电机组（100亿）</strong>：利润表记100亿收入、15.9亿毛利；资产负债表记应收账款增加100亿（如果客户还没付款）；现金流量表在客户付款时记100亿经营流入。如果利润表有收入但现金流没有——这就是"纸面利润"，要警惕。</p>';
  h+='<p>② <strong>建一条新产线（50亿）</strong>：现金流量表记50亿投资流出；资产负债表记固定资产增加50亿；利润表不直接影响，但未来每年折旧增加。公司可以在利润"好看"的同时现金枯竭——因为建产线不减少利润，只减少现金。</p>';
  h+='<p>③ <strong>折旧（每年'+fmtNum(da1)+'亿）</strong>：利润表记'+fmtNum(da1)+'亿费用，减少净利润；资产负债表记固定资产净值减少'+fmtNum(da1)+'亿；现金流量表不受影响——这就是为什么我们计算自由现金流时要加回折旧。</p>';
  h+='<p>④ <strong>三表的节点</strong>：利润表的净利润 → 通过留存收益流入资产负债表的股东权益；现金流量表的经营部分起点是净利润（加回折旧）；资产负债表的固定资产增加 = 上期余额 + CapEx - 折旧。这三个节点一旦出问题，整份报表就会出现勾稽不平——这是审计师抓造假的第一线索。</p>';

  h+='<h3>第六章 · 使用建议</h3>';
  h+='<p>三表预测模型是一个"假设驱动"的工具——你输入的增长率、利润率假设决定了输出结果。建议：</p>';
  h+='<p>• <strong>对比DCF卡片</strong>：三表预测和DCF使用相同的底层数据，但视角不同。DCF关注"公司值多少钱"（估值），三表关注"公司如何赚钱"（经营）。两者结合使用效果最好。</p>';
  h+='<p>• <strong>不要只看净利</strong>：净利润可以被折旧政策、存货计价方式"调节"。自由现金流才是公司真正赚到的、可以自由支配的钱。三表中的最后一列（自由CF）是核心。</p>';
  h+='<p>• <strong>CapEx是关键变量</strong>：如果未来公司不再需要大规模资本开支（比如产能建设高峰已过），自由现金流会大幅跳升。模型假定CapEx率恒定（'+capex+'），但实际情况可能变化——这是读这份报告时最需要关注的假设。</p>';

  return h;
}
</script>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>形态识别</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="../shared/js/echarts.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b',sp:'rgba(255,255,255,.04)'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['"Instrument Serif"','Georgia','serif'],mono:['"JetBrains Mono"','"Fira Code"','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  /* pattern-scan page-specific */
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:16px 20px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:90px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:4px;letter-spacing:.02em;text-transform:uppercase}
  .top-bar input,.top-bar select{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .top-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}
  .btn-scan{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font-body);transition:all .2s}
  .btn-scan:hover{background:rgba(245,158,11,.18)}.btn-scan:disabled{opacity:.4;cursor:not-allowed}
  .mode-btn{padding:4px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(26,26,31,.4);color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--font-body);transition:all .2s}
  .mode-btn.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .chart-controls{display:flex;gap:16px;align-items:center;padding:6px 0;margin-bottom:6px}
  .chart-controls .ctrl-group{display:flex;align-items:center;gap:4px}
  .chart-controls .ctrl-label{font-size:10px;font-weight:500;color:var(--muted);margin-right:4px;text-transform:uppercase;letter-spacing:.04em}
  .chart-controls .ctrl-btn{padding:5px 14px;border:1px solid var(--border);border-radius:10px;background:rgba(26,26,31,.4);color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--font-body);backdrop-filter:blur(10px)}
  .chart-controls .ctrl-btn:hover{border-color:var(--border-hover);color:#d4d4d8}
  .chart-controls .ctrl-btn.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .chart-wrap{width:100%;height:560px;margin-bottom:0}
  .bottom-layout{display:flex;gap:14px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:340px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .rec-section{margin-bottom:8px}.rec-section:last-child{margin-bottom:0}
  .rec-label{font-size:11px;font-weight:500;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:4px}
  .rec-text{font-size:12px;color:var(--text-secondary);line-height:1.6}
  .timeline-wrap{max-height:520px;overflow-y:auto}
  .tl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 8px;cursor:pointer;transition:background .15s;border-radius:10px;border-bottom:1px solid rgba(255,255,255,.03)}
  .tl-item:last-child{border-bottom:none}
  .tl-item:hover{background:rgba(245,158,11,.06)}
  .tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
  .tl-info{flex:1;min-width:0}
  .tl-date{font-size:10px;color:var(--muted)}
  .tl-name{font-size:12px;font-weight:500;color:#d4d4d8}
  .tl-desc{font-size:10px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tl-empty{font-size:12px;color:var(--muted);text-align:center;padding:32px 0}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .top-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.3)}
  html[data-theme="light"] .ctrl-btn{background:rgba(255,255,255,.6);border-color:var(--divider);color:var(--muted)}
  html[data-theme="light"] .ctrl-btn:hover{border-color:rgba(0,0,0,.15);color:#374151}
  html[data-theme="light"] .rec-text{color:var(--text-secondary)}
  html[data-theme="light"] .tl-item{border-bottom-color:rgba(0,0,0,.04)}
  html[data-theme="light"] .tl-name{color:var(--text-primary)}
  html[data-theme="light"] .tl-desc{color:var(--text-secondary)}
  html[data-theme="light"] .chart-controls .ctrl-label{color:var(--muted)}
  html[data-theme="light"] .signal-legend{color:var(--muted)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>
(function(){
  var c=document.getElementById('bg-canvas'),w=c.width=window.innerWidth,h=c.height=window.innerHeight;
  var ctx=c.getContext('2d'),particles=[],N=60;
  for(var i=0;i<N;i++)particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<N;i++){var p=particles[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(245,158,11,'+p.o+')';ctx.fill()}
    for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle='rgba(245,158,11,'+((100-dist)/100*.06)+')';ctx.stroke()}}}
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight});
})();
</script>
<div class="app-container">

      <!-- 导航栏 -->
    <nav id="top-nav"></nav>

    <!-- 参数横条 -->
    <div class="top-bar">
      <div class="fld" style="flex:0.7;min-width:160px"><label>股票/指数代码</label><div style="display:flex;gap:6px;align-items:center"><button class="mode-btn active" id="btn-stock" onclick="switchMode('stock')">个股</button><button class="mode-btn" id="btn-index" onclick="switchMode('index')">指数</button><input type="text" id="code" value="600519" style="flex:1" onkeydown="if(event.key==='Enter')scan()"><span id="stock-name" style="font-size:0.65rem;color:var(--muted);white-space:nowrap;flex-shrink:0"></span></div></div>
      <div class="fld"><label>开始日期</label><input type="date" id="date-start"></div>
      <div class="fld"><label>结束日期</label><input type="date" id="date-end"></div>
      <button class="btn-scan" onclick="scan()">🔍 扫描</button>
    </div>

    <!-- 图表控件栏 -->
    <div class="chart-controls">
      <div class="ctrl-group">
        <span class="ctrl-label">指标</span>
        <button class="ctrl-btn active" id="btn-ma" onclick="toggleOverlay('ma')">📈 均线</button>
        <button class="ctrl-btn" id="btn-bb" onclick="toggleOverlay('bb')">📊 布林</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">周期</span>
        <button class="ctrl-btn active" id="btn-daily" onclick="switchPeriod('daily')">日K</button>
        <button class="ctrl-btn" id="btn-weekly" onclick="switchPeriod('weekly')">周K</button>
        <button class="ctrl-btn" id="btn-monthly" onclick="switchPeriod('monthly')">月K</button>
      </div>
    </div>

    <!-- 图表区：单 ECharts，三格（K线+MA / BB / 成交量） -->
    <div class="chart-wrap" id="chart"></div>

    <!-- 信号标记图例 -->
    <div class="signal-legend" id="signal-legend"></div>

    <!-- 下方双栏 -->
    <div class="bottom-layout">
      <!-- 左：分析建议 -->
      <div class="bottom-left">
        <div class="xhs-card" style="min-height:180px">
          <div class="xhs-card-header">
            <span class="xhs-card-label">📊 分析建议</span>
          </div>
          <div id="rec-content" style="color:var(--muted);font-size:0.7rem;">点击「扫描」查看分析建议</div>
        </div>
      </div>
      <!-- 右：信号时间线 -->
      <div class="bottom-right">
        <div class="xhs-card">
          <div class="xhs-card-header">
            <span class="xhs-card-label">📅 信号时间线</span>
          </div>
          <div class="timeline-wrap" id="timeline-wrap">
            <div class="tl-empty" id="tl-empty">暂无信号</div>
            <div id="tl-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 图例 -->
    <div class="legend-row" id="legend-row"></div>
  </div>

  <script src="app.js"></script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"🔎",brandText:"形态识别",currentPage:"pattern-scan"})</script>
<script>if(typeof toggleTheme!=='function'){window.toggleTheme=function(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n)}}
function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==="dark"?"light":"dark";h.dataset.theme=n;localStorage.setItem("theme",n)}
(function(){var s=localStorage.getItem("theme")||"dark";document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

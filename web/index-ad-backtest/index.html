<style>

<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>

<script>
var API = 'http://'+window.location.hostname+':8788';
var lastData = [];
var tblSort = { key: 'ad_line', dir: 'desc' };

function toggleCard(id) { document.getElementById(id+'-body').classList.toggle('collapsed'); }
function syncSlider() { document.getElementById('window-days-v').textContent = document.getElementById('window-days').value + '日'; }
function onMethodChange() {
  var raw = document.querySelector('input[name="ad-method"]:checked').value;
  document.getElementById('method-raw-label').style.borderColor = raw === 'raw' ? '#FE2C55' : 'var(--divider)';
  document.getElementById('method-raw-label').style.background = raw === 'raw' ? 'rgba(254,44,85,0.06)' : '';
  document.getElementById('method-zscore-label').style.borderColor = raw === 'zscore' ? '#FE2C55' : 'var(--divider)';
  document.getElementById('method-zscore-label').style.background = raw === 'zscore' ? 'rgba(254,44,85,0.06)' : '';
}

(function() {
  // 默认今天，API会自动回退到最近交易日
  var d = new Date();
  document.getElementById('rs-date').value = d.toISOString().slice(0,10);
})();

document.getElementById('btn-run').addEventListener('click', run);
document.getElementById('btn-save').addEventListener('click', save);

// 加载配置恢复上次的方法选择
(async function loadConfig() {
  try {
    var resp = await fetch(API + '/api/config?signal_type=index_ad');
    var cfg = await resp.json();
    if (cfg && cfg.method) {
      var radio = document.querySelector('input[name="ad-method"][value="' + cfg.method + '"]');
      if (radio) { radio.checked = true; onMethodChange(); }
    }
    if (cfg && cfg.window_days) {
      document.getElementById('window-days').value = cfg.window_days;
      syncSlider();
    }
  } catch(e) {}
})();

async function run() {
  var btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = '⏳ 计算中...';

  var pool = document.getElementById('pool-select').value;
  var date = document.getElementById('rs-date').value;
  var win = document.getElementById('window-days').value;

  var method = document.querySelector('input[name="ad-method"]:checked').value;

  try {
    var url = API + '/api/index-ad?pool=' + pool + '&date=' + date + '&window=' + win + '&method=' + method;
    console.log('Fetching:', url);
    var resp = await fetch(url);
    var data = await resp.json();
    console.log('Response keys:', Object.keys(data));
    if (data.error) { alert(data.error); return; }

    var poolData = data.pools && data.pools[pool];
    lastData = (poolData && poolData.rankings) || [];
    console.log('Items:', lastData.length);
    if (lastData.length > 0) {
      console.log('First item keys:', Object.keys(lastData[0]));
      console.log('First item:', JSON.stringify(lastData[0]).substring(0, 200));
    }
    document.getElementById('table-info').textContent = ' · ' + lastData.length + ' 个指数 · ' + (data.as_of_date || '');
    updateStats();
    renderTable();
  } catch (e) {
    console.error(e);
    alert('❌ ' + e.message);
  }
  finally { btn.disabled = false; btn.textContent = '🔍 计算'; }
}

function updateStats() {
  var d = lastData || [];
  document.getElementById('stat-total').textContent = d.length;
  document.getElementById('stat-inflow').textContent = d.filter(function(r){ return (r.ad_score || 0) >= 0; }).length;
  document.getElementById('stat-outflow').textContent = d.filter(function(r){ return (r.ad_score || 0) < 0; }).length;
  var top = d[0];
  document.getElementById('stat-top').textContent = top ? (top.name || top.code || '—') : '—';
}

function ratingClass(g) {
  return 'rating-' + (g || '').replace('+','plus').replace('-','minus').toLowerCase();
}

function renderTable() {
  var d = [].concat(lastData);
  var key = tblSort.key, dir = tblSort.dir;
  d.sort(function(a,b) {
    var va = a[key] != null ? a[key] : (key==='ad_line' ? -Infinity : '');
    var vb = b[key] != null ? b[key] : (key==='ad_line' ? -Infinity : '');
    if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return dir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });

  var cols = [
    { label:'排名', key:'ad_line' },
    { label:'代码', key:'code' },
    { label:'名称', key:'name' },
    { label:'AD_Line(换手)', key:'ad_line' },
    { label:'百分位', key:'percentile' },
    { label:'评级', key:'rating' },
    { label:'AD_Score', key:'ad_score' },
    { label:'含义', key:'meaning' },
  ];

  var html = '<table class="data-table"><thead><tr>';
  cols.forEach(function(c, i) {
    var indicator = '';
    if (tblSort.key === c.key) indicator = ' data-indicator="' + tblSort.dir + '"';
    html += '<th class="sortable"' + indicator + ' data-col="' + i + '" data-type="' + (['code','name','rating','meaning'].indexOf(c.key)>=0 ? 'string' : 'number') + '" onclick="sortBy(\'' + c.key + '\',' + i + ')">' + c.label + '</th>';
  });
  html += '</tr></thead><tbody>';

  d.forEach(function(r, idx) {
    var ad = r.ad_line != null ? (r.ad_line).toFixed(3) : '—';
    var pct = r.percentile != null ? r.percentile.toFixed(1) + '%' : '—';
    var score = r.ad_score != null ? r.ad_score : '—';
    var grade = r.rating || '—';
    html += '<tr>';
    html += '<td>' + (idx + 1) + '</td>';
    html += '<td class="mono clickable-code" onclick="showConstituents(\'' + r.code + '\', \'' + (r.name || '').replace(/'/g, "\\'") + '\')">' + r.code + '</td>';
    html += '<td>' + (r.name || r.code) + '</td>';
    html += '<td class="mono">' + ad + '</td>';
    html += '<td class="mono">' + pct + '</td>';
    html += '<td><span class="rating-badge ' + ratingClass(grade) + '">' + grade + '</span></td>';
    html += '<td class="mono">' + score + '</td>';
    html += '<td style="font-size:0.65rem;color:var(--text-tertiary)">' + (r.meaning || '') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('results-table').innerHTML = html;
}

function sortBy(key, col) {
  tblSort.dir = tblSort.key === key ? (tblSort.dir === 'asc' ? 'desc' : 'asc') : (key === 'ad_line' ? 'desc' : 'asc');
  tblSort.key = key;
  renderTable();
}

async function save() {
  var win = document.getElementById('window-days').value;
  var method = document.querySelector('input[name="ad-method"]:checked').value;
  var yaml = 'method: ' + method + '\nwindow_days: ' + win + '\n\nratings:\n';
  [{g:'A+',p:90},{g:'A',p:80},{g:'B+',p:70},{g:'B',p:60},{g:'C+',p:50},{g:'C',p:40},{g:'D+',p:30},{g:'D',p:20},{g:'E',p:10},{g:'E-',p:0}].forEach(function(r) {
    yaml += '  - { grade: "' + r.g + '", min_pct: ' + r.p + ' }\n';
  });
  try {
    var resp = await fetch(API + '/api/config?signal_type=index_ad', { method:'POST', body: yaml });
    if (resp.ok) { var btn = document.getElementById('btn-save'); btn.textContent = '✓ 已保存'; setTimeout(function(){ btn.textContent = '💾 保存配置'; }, 2000); }
  } catch(e) {}
}

/* ══════ 成分股弹窗 ══════ */
function closeModal() {
  document.getElementById('constituent-modal').style.display = 'none';
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('constituent-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
});

async function showConstituents(indexCode, indexName) {
  var modal = document.getElementById('constituent-modal');
  var body = document.getElementById('modal-body');
  var title = document.getElementById('modal-title');

  title.textContent = (indexName || indexCode) + ' (' + indexCode + ')';
  body.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-tertiary);">⏳ 加载中...</div>';
  modal.style.display = 'flex';

  try {
    var resp = await fetch(API + '/api/index-constituents?index_code=' + indexCode);
    var data = await resp.json();
    if (!data.constituents || !data.constituents.length) {
      body.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-tertiary);">该指数暂无成分股数据</div>';
      return;
    }
    var html = '<div style="margin-bottom:8px;font-size:0.7rem;color:var(--text-tertiary);">快照: ' + (data.snapshot_date || '—') + ' · ' + data.count + ' 只</div>';
    html += '<table class="data-table"><thead><tr><th>#</th><th>代码</th><th>名称</th><th>权重(%)</th></tr></thead><tbody>';
    data.constituents.forEach(function(c, i) {
      var w = (c.weighting != null) ? (c.weighting * 100).toFixed(2) : '—';
      html += '<tr><td>' + (i+1) + '</td><td class="mono">' + c.stock_code + '</td><td>' + (c.name || '—') + '</td><td class="mono">' + w + '</td></tr>';
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = '<div style="text-align:center;padding:32px;color:#FE2C55;">❌ 加载失败</div>';
  }
}

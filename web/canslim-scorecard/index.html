<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>CAN SLIM 评分卡 · 投资手账本</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
.top-bar { display:flex; gap:10px; align-items:flex-end; padding:14px 18px; background:var(--card-bg); border-radius:18px; margin-bottom:10px; box-shadow:0 1px 6px rgba(0,0,0,0.04); flex-wrap:wrap; }
.top-bar .fld { flex:1; min-width:90px; }
.top-bar label { display:block; font-size:0.58rem; font-weight:600; color:var(--text-tertiary); margin-bottom:2px; }
.top-bar input { width:100%; padding:7px 8px; border:1px solid var(--divider); border-radius:10px; font-size:0.72rem; background:var(--card-bg); color:var(--text-primary); box-sizing:border-box; }
.btn-run { padding:8px 22px; background:#FE2C55; color:#FFF; border:none; border-radius:12px; font-size:0.85rem; font-weight:800; cursor:pointer; }
.btn-run:disabled { background:#CCC; }
.btn-save { padding:6px 14px; background:var(--card-bg); border:1.5px solid var(--divider); border-radius:10px; font-size:0.7rem; font-weight:700; cursor:pointer; }
.btn-save:hover { border-color:var(--color-accent); color:var(--color-accent); }

/* Layout: left=params, right=results */
.bottom-layout { display:flex; gap:12px; align-items:flex-start; }
.bottom-left { width:340px; flex-shrink:0; display:flex; flex-direction:column; gap:8px; }
.bottom-right { flex:1; min-width:0; display:flex; flex-direction:column; gap:10px; }

/* Radar */
.radar-wrap { width:100%; height:420px; background:var(--card-bg); border-radius:16px; border:1px solid var(--divider); }

/* Score table */
.score-card { background:var(--card-bg); border:1px solid var(--divider); border-radius:16px; padding:14px 18px; }
.score-card h3 { font-size:0.8rem; margin:0 0 10px; display:flex; align-items:center; gap:6px; }
.grade-badge { display:inline-block; padding:3px 14px; border-radius:10px; font-size:1rem; font-weight:900; }
.grade-S { background:#E8F5E9; color:#2E7D32; } .grade-A { background:#E3F2FD; color:#1565C0; }
.grade-B { background:#FFF8E1; color:#F57F17; } .grade-C { background:#FFF3E0; color:#E65100; }
.grade-D { background:#FFEBEE; color:#C62828; } .grade-E { background:#FCE4EC; color:#880E4F; }

/* Dimension card */
.dim-card { border-left:3px solid #ddd; padding:6px 10px; margin-bottom:4px; border-radius:0 8px 8px 0; background:var(--card-bg); }
.dim-card .dim-header { display:flex; justify-content:space-between; align-items:center; font-size:0.72rem; font-weight:700; }
.dim-card .dim-detail { font-size:0.58rem; color:var(--text-tertiary); margin-top:2px; }
.dim-card .dim-sub { font-size:0.6rem; color:var(--text-secondary); padding-left:10px; }
.dim-c { border-left-color:#E53935; } .dim-a { border-left-color:#FF9800; } .dim-n { border-left-color:#4CAF50; }
.dim-s { border-left-color:#2196F3; } .dim-l { border-left-color:#9C27B0; } .dim-i { border-left-color:#795548; }
.score-pos { color:#2E7D32; } .score-neg { color:#C62828; } .score-zero { color:var(--text-tertiary); }

/* Param card */
.param-card { background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; overflow:hidden; }
.param-card-hd { display:flex; align-items:center; padding:8px 12px; cursor:pointer; font-size:0.68rem; font-weight:800; }
.param-card-hd .dot { width:7px; height:7px; border-radius:50%; margin-right:6px; }
.param-card-bd { padding:6px 12px 10px; }
.param-card-bd.collapsed { display:none; }
.param-row { display:flex; align-items:center; gap:6px; margin-bottom:2px; }
.param-row label { width:130px; font-size:0.56rem; color:var(--text-tertiary); flex-shrink:0; }
.param-row input { flex:1; padding:3px 6px; border:1px solid var(--divider); border-radius:6px; font-size:0.58rem; background:var(--card-bg); color:var(--text-primary); }

.nav-dropdown { position:relative; display:inline-flex; }
.nav-dropdown-menu { display:none; position:absolute; top:100%; left:0; background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); min-width:150px; padding:6px 0; z-index:200; white-space:nowrap; }
.nav-dropdown:hover .nav-dropdown-menu { display:block; }
.nav-dropdown-menu a { display:block; padding:7px 16px; font-size:0.72rem; color:var(--text-secondary); text-decoration:none; }
.nav-dropdown-menu a:hover { background:var(--color-accent-subtle); color:var(--color-accent); }
.nav-dropdown-menu a.active { color:var(--color-accent); font-weight:700; }
@media (max-width:800px) { .bottom-layout { flex-direction:column; } .bottom-left { width:100%; } }
</style>
</head>
<body>
<div class="app-container">
<nav id="top-nav"></nav>

<div class="top-bar">
  <div class="fld" style="flex:0 0 110px;min-width:90px"><label>股票代码</label><input type="text" id="code" style="width:100px" placeholder="600519" onkeydown="if(event.key==='Enter')doScore()" onchange="fetchName()"></div>
  <span id="stock-name" style="font-size:0.7rem;font-weight:700;color:var(--text-primary);padding-top:14px;flex-shrink:0;min-width:60px"></span>
  <div class="fld" style="flex:0.5"><label>评分日期</label><input type="date" id="date"></div>
  <button class="btn-run" onclick="doScore()">🎯 评分</button>
  <button class="btn-save" onclick="saveResults()">💾 保存结果</button>
  <button class="btn-save" onclick="saveConfig()">⚙️ 保存配置</button>
</div>

<div class="bottom-layout">
  <!-- Left: Parameter Config -->
  <div class="bottom-left" id="param-panel">
    <div class="param-card" id="param-c"><div class="param-card-hd" onclick="document.getElementById('body-c').classList.toggle('collapsed')"><span class="dot" style="background:#E53935"></span>C 当期盈利(22分) ▸</div><div class="param-card-bd" id="body-c"></div></div>
    <div class="param-card" id="param-a"><div class="param-card-hd" onclick="document.getElementById('body-a').classList.toggle('collapsed')"><span class="dot" style="background:#FF9800"></span>A 年度盈利(15分) ▸</div><div class="param-card-bd" id="body-a"></div></div>
    <div class="param-card" id="param-n"><div class="param-card-hd" onclick="document.getElementById('body-n').classList.toggle('collapsed')"><span class="dot" style="background:#4CAF50"></span>N 形态新高(17分) ▸</div><div class="param-card-bd" id="body-n"></div></div>
    <div class="param-card" id="param-s"><div class="param-card-hd" onclick="document.getElementById('body-s').classList.toggle('collapsed')"><span class="dot" style="background:#2196F3"></span>S 供给需求(7分) ▸</div><div class="param-card-bd" id="body-s"></div></div>
    <div class="param-card" id="param-l"><div class="param-card-hd" onclick="document.getElementById('body-l').classList.toggle('collapsed')"><span class="dot" style="background:#9C27B0"></span>L 领军股(22分) ▸</div><div class="param-card-bd" id="body-l"></div></div>
    <div class="param-card" id="param-i"><div class="param-card-hd" onclick="document.getElementById('body-i').classList.toggle('collapsed')"><span class="dot" style="background:#795548"></span>I 机构认同(17分) ▸</div><div class="param-card-bd" id="body-i"></div></div>
  </div>

  <!-- Right: Results -->
  <div class="bottom-right">
    <div class="score-card">
      <h3>📊 评分明细 <span id="grade-badge" class="grade-badge">—</span> <span style="font-size:0.65rem;color:var(--text-tertiary)" id="m-advice"></span></h3>
      <div id="dim-results"></div>
    </div>
    <div class="radar-wrap" id="radar-chart"></div>
  </div>
</div>
</div>
<script src="app.js"></script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"🎯",brandText:"CAN SLIM 评分卡",currentPage:"canslim-scorecard"})</script>
</body>
</html>

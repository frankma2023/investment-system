<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>

<script>
var API='http://'+window.location.hostname+':8788', lastData=[], tblSort={key:'code',dir:'asc'};
function toggleCard(id){document.getElementById(id+'-body').classList.toggle('collapsed')}
function syncSlider(id){document.getElementById(id+'-v').textContent=document.getElementById(id).value}
function syncRsi(){document.getElementById('rsi-period-v').textContent=document.getElementById('rsi-period').value}
function onSensChange(){var v=document.querySelector('input[name="sensitivity"]:checked').value;
  document.getElementById('sens-long-label').style.borderColor=v==='long'?'#FE2C55':'var(--divider)'; document.getElementById('sens-long-label').style.background=v==='long'?'rgba(254,44,85,0.06)':'';
  document.getElementById('sens-short-label').style.borderColor=v==='short'?'#FE2C55':'var(--divider)'; document.getElementById('sens-short-label').style.background=v==='short'?'rgba(254,44,85,0.06)':'';}
function onVpChange(){var v=document.querySelector('input[name="vp-mode"]:checked').value;
  document.getElementById('vp-slow-label').style.borderColor=v==='slow'?'#FE2C55':'var(--divider)'; document.getElementById('vp-slow-label').style.background=v==='slow'?'rgba(254,44,85,0.06)':'';
  document.getElementById('vp-fast-label').style.borderColor=v==='fast'?'#FE2C55':'var(--divider)'; document.getElementById('vp-fast-label').style.background=v==='fast'?'rgba(254,44,85,0.06)':'';}
(function(){var d=new Date();document.getElementById('rs-date').value=d.toISOString().slice(0,10)})();
document.getElementById('btn-run').addEventListener('click',run);
document.getElementById('btn-save').addEventListener('click',save);

(async function loadConfig(){
  try{
    var resp=await fetch(API+'/api/config?signal_type=divergence');
    var cfg=await resp.json();
    if(!cfg)return;
    if(cfg.sensitivity){var r=document.querySelector('input[name="sensitivity"][value="'+cfg.sensitivity+'"]');if(r){r.checked=true;onSensChange()}}
    if(cfg.volume_price&&cfg.volume_price.mode){var r=document.querySelector('input[name="vp-mode"][value="'+cfg.volume_price.mode+'"]');if(r){r.checked=true;onVpChange()}}
    if(cfg.volume_price&&cfg.volume_price.min_strength){setSlider('vp-strength',cfg.volume_price.min_strength)}
    if(cfg.rsi&&cfg.rsi.period){setSlider('rsi-period',cfg.rsi.period)}
    if(cfg.rsi&&cfg.rsi.lookback){setSlider('rsi-lookback',cfg.rsi.lookback)}
    if(cfg.macd&&cfg.macd.lookback){setSlider('macd-lookback',cfg.macd.lookback)}
    if(cfg.breadth){setSlider('br-days',cfg.breadth.consecutive_days);setSlider('br-top',cfg.breadth.top_threshold);setSlider('br-bot',cfg.breadth.bottom_threshold)}
  }catch(e){}
})();
function setSlider(id,val){var el=document.getElementById(id);if(el){el.value=val;syncSlider(id)}}

async function run(){
  var btn=document.getElementById('btn-run'); btn.disabled=true; btn.textContent='⏳ 计算中...';
  var pool=document.getElementById('pool-select').value;
  var date=document.getElementById('rs-date').value;
  var sens=document.querySelector('input[name="sensitivity"]:checked').value;
  var vpm=document.querySelector('input[name="vp-mode"]:checked').value;
  try{
    var url=API+'/api/index-divergence?pool='+pool+'&date='+date+'&sensitivity='+sens+'&_t='+Date.now();
    var resp=await fetch(url); var data=await resp.json();
    if(data.error){alert(data.error);return}
    lastData=data.indices||[];
    document.getElementById('table-info').textContent=' · '+lastData.length+' 个指数 · '+data.as_of_date;
    updateStats(); renderTable();
  }catch(e){alert('❌ '+e.message)}
  finally{btn.disabled=false; btn.textContent='🔍 计算'}
}
function updateStats(){
  var d=lastData;
  document.getElementById('stat-total').textContent=d.length;
  var hasTop=0,hasBot=0,hasStrong=0,hasNone=0;
  d.forEach(function(r){
    var top=false,bot=false,strong=false;
    ['div_vp','div_rsi','div_macd','div_breadth'].forEach(function(k){
      if(r[k]&&r[k].type==='top'){top=true;if(r[k].level>=2)strong=true}
      if(r[k]&&r[k].type==='bottom'){bot=true;if(r[k].level>=2)strong=true}
    });
    if(top)hasTop++; if(bot)hasBot++; if(strong)hasStrong++; if(!top&&!bot)hasNone++;
  });
  document.getElementById('stat-top').textContent=hasTop;
  document.getElementById('stat-bot').textContent=hasBot;
  document.getElementById('stat-strong').textContent=hasStrong;
  document.getElementById('stat-none').textContent=hasNone;
}
function divBadge(div){
  if(!div)return '<span style="color:var(--muted)">—</span>';
  var cls=div.type==='top'?'div-top-':'div-bot-';
  return '<span class="div-badge '+cls+div.level+'">'+(div.type==='top'?'顶':'底')+'·'+(div.level===3?'强':div.level===2?'确':'潜')+'</span>';
}
function renderTable(){
  var d=[].concat(lastData);
  var key=tblSort.key,dir=tblSort.dir;
  d.sort(function(a,b){
    var va=a[key]!=null?a[key]:'',vb=b[key]!=null?b[key]:'';
    if(typeof va==='string')return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return dir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
  });
  var cols=[{l:'代码',k:'code'},{l:'名称',k:'name'},{l:'收盘价',k:'close'},
    {l:'量价',k:'div_vp'},{l:'RSI',k:'div_rsi'},{l:'MACD',k:'div_macd'},{l:'成分股',k:'div_breadth'},
    {l:'共振',k:'resonance_level'},{l:'预警',k:'alert_text'}];
  var html='<table class="data-table"><thead><tr>';
  cols.forEach(function(c,i){
    var ind=tblSort.key===c.k?' data-indicator="'+tblSort.dir+'"':'';
    html+='<th class="sortable"'+ind+' data-col="'+i+'" onclick="sortBy(\''+c.k+'\')">'+c.l+'</th>';
  });
  html+='</tr></thead><tbody>';
  d.forEach(function(r){
    html+='<tr>';
    html+='<td class="mono clickable-code" onclick="showConstituents(\''+r.code+'\')">'+r.code+'</td><td>'+r.name+'</td>';
    html+='<td class="mono">'+(r.close?r.close.toFixed(2):'—')+'</td>';
    html+='<td>'+divBadge(r.div_vp)+'</td>';
    html+='<td>'+divBadge(r.div_rsi)+'</td>';
    html+='<td>'+divBadge(r.div_macd)+'</td>';
    html+='<td>'+divBadge(r.div_breadth)+'</td>';
    var res=r.resonance_level||'无';
    var resCls='';
    if(res==='高')resCls='resonance-high';
    else if(res==='中')resCls='resonance-mid';
    else if(res==='低')resCls='resonance-low';
    html+='<td><span class="'+resCls+'">'+res+'</span></td>';
    html+='<td style="font-size:0.65rem;color:var(--muted)">'+(r.alert_text||'')+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('results-table').innerHTML=html;
}
function sortBy(key){
  tblSort.dir=tblSort.key===key?(tblSort.dir==='asc'?'desc':'asc'):'asc';
  tblSort.key=key; renderTable();
}

function closeModal(){document.getElementById('constituent-modal').style.display='none';}
document.addEventListener('DOMContentLoaded',function(){document.getElementById('constituent-modal').addEventListener('click',function(e){if(e.target===this)closeModal()})});
async function showConstituents(code){
  var modal=document.getElementById('constituent-modal'),body=document.getElementById('modal-body'),title=document.getElementById('modal-title');
  title.textContent=code; body.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);">⏳ 加载中...</div>'; modal.style.display='flex';
  try{
    var resp=await fetch(API+'/api/index-constituents?index_code='+code); var data=await resp.json();
    if(!data.constituents||!data.constituents.length){body.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);">暂无成分股数据</div>';return}
    var html='<div style="margin-bottom:8px;font-size:0.7rem;color:var(--muted);">快照: '+data.snapshot_date+' · '+data.count+' 只</div><table class="data-table"><thead><tr><th>#</th><th>代码</th><th>名称</th><th>权重(%)</th></tr></thead><tbody>';
    data.constituents.forEach(function(c,i){var w=c.weighting!=null?(c.weighting*100).toFixed(2):'—';html+='<tr><td>'+(i+1)+'</td><td class="mono">'+c.stock_code+'</td><td>'+(c.name||'—')+'</td><td class="mono">'+w+'</td></tr>'});
    html+='</tbody></table>'; body.innerHTML=html;
  }catch(e){body.innerHTML='<div style="text-align:center;padding:32px;color:#FE2C55;">❌ 加载失败</div>'}
}

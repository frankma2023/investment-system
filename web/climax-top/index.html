<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>高潮见顶回测 · 投资手账本</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/xhs-cards.css">
<link rel="stylesheet" href="../shared/css/components.css">
<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .s-warn{color:#E65100;font-weight:700}.s-conf{color:#C62828;font-weight:700}
</style>
</head>
<body>
<div class="app-container">
  <nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px"><label>类型</label><select id="mode" onchange="onModeChange()"><option value="stock">个股</option><option value="index">指数</option></select></div>
    <div class="code-wrap"><div class="fld"><label>代码</label><input type="text" id="stock-code" value="600519" style="width:100px" onkeydown="if(event.key==='Enter')run()"><span id="stock-name" style="margin-left:6px;font-weight:700;font-family:var(--font-display);font-size:0.85rem"></span></div></div>
    <div class="fld" style="flex:0.5;min-width:90px"><label>周期</label><select id="period" onchange="renderChart()"><option value="day">日线</option><option value="week">周线</option><option value="month">月线</option></select></div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend">🔴 高潮见顶确认 | ⚠️ 高潮进行中</div>

  <div class="bottom-layout">
    <div class="bottom-left">
      <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#C62828"></span>🔴 前期涨幅</div><div class="param-card-bd" id="c1-bd">
        <div class="sr"><span class="sl">最低涨幅</span><input type="range" id="p-pg" min="50" max="200" value="100" oninput="svp('p-pg')"><span class="sv" id="p-pg-v">100%</span></div>
      </div></div>

      <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#E65100"></span>🟠 高潮周</div><div class="param-card-bd" id="c2-bd">
        <div class="sr"><span class="sl">最少周数</span><input type="range" id="p-cwmin" min="1" max="3" value="2" oninput="svn('p-cwmin')"><span class="sv" id="p-cwmin-v">2</span></div>
        <div class="sr"><span class="sl">最多周数</span><input type="range" id="p-cwmax" min="2" max="5" value="3" oninput="svn('p-cwmax')"><span class="sv" id="p-cwmax-v">3</span></div>
        <div class="sr"><span class="sl">单周涨幅</span><input type="range" id="p-cwg" min="10" max="25" value="15" oninput="svp('p-cwg')"><span class="sv" id="p-cwg-v">15%</span></div>
        <div class="sr"><span class="sl">总涨幅</span><input type="range" id="p-ctg" min="15" max="60" value="25" oninput="svp('p-ctg')"><span class="sv" id="p-ctg-v">25%</span></div>
      </div></div>

      <div class="param-card" id="c3"><div class="param-card-hd" onclick="tc('c3')"><span class="dot" style="background:#1565C0"></span>🔵 成交量</div><div class="param-card-bd" id="c3-bd">
        <div class="sr"><span class="sl">单周量比</span><input type="range" id="p-vs" min="15" max="30" value="20" oninput="svs('p-vs',0.1)"><span class="sv" id="p-vs-v">2.0</span></div>
        <div class="sr"><span class="sl">累计量比</span><input type="range" id="p-vc" min="30" max="70" value="50" oninput="svs('p-vc',0.1)"><span class="sv" id="p-vc-v">5.0</span></div>
      </div></div>

      <div class="param-card" id="c4"><div class="param-card-hd" onclick="tc('c4')"><span class="dot" style="background:#2E7D32"></span>🟢 评分阈值</div><div class="param-card-bd" id="c4-bd">
        <div class="sr"><span class="sl">Warning分</span><input type="range" id="p-sw" min="40" max="80" value="65" oninput="svn('p-sw')"><span class="sv" id="p-sw-v">65</span></div>
        <div class="sr"><span class="sl">Confirmed分</span><input type="range" id="p-sc" min="60" max="90" value="80" oninput="svn('p-sc')"><span class="sv" id="p-sc-v">80</span></div>
      </div></div>

      <button class="btn-run" id="btn-run">🔍 运行检测</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>

    <div class="bottom-right">
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 高潮见顶信号</span></div><div class="table-wrapper" id="table"></div></div>
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🔎 单日排查</span></div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--color-accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤️ 投资手账本 · 高潮见顶 Climax Top</footer>
</div>

<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/kline-chart.js"></script>
<script src="../shared/js/theme.js"></script>
<script>
  const API_URL='http://'+window.location.hostname+':8788';
  function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
  function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
  function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
  function svs(id,mul){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=(parseInt(e.value)*mul).toFixed(1)}
  var rawKlines=[],wk=[],ws=[],kc,runId=0;

  document.addEventListener('DOMContentLoaded',async()=>{
    var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
    document.getElementById('date-start').value=ago.toISOString().split('T')[0];
    document.getElementById('date-end').value=now.toISOString().split('T')[0];document.getElementById('diag-date').value=now.toISOString().split('T')[0];
    document.getElementById('btn-run').addEventListener('click',run);
    document.getElementById('btn-save').addEventListener('click',saveCfg);
    await loadCfg();
    setTimeout(function(){run(true)},500);
  });

  function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600519':'000300';run()}
  async function run(auto){
    runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
    var code=document.getElementById('stock-code').value.trim();
    var mode=document.getElementById('mode').value;
    if(!code){if(!auto)btn.disabled=false;if(!auto)btn.textContent='📊';return}
    try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
    try{
      var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
      var resp=await fetch(API_URL+'/api/climax-top?stock='+code+'&date='+end+'&start='+start+'&mode='+mode);
      var data=await resp.json();if(runId!==myId)return;
      rawKlines=data.daily||[];wk=data.weekly||[];ws=data.signals||[];
      renderChart();renderTable();if(!auto)btn.textContent='🔍 运行检测';
    }catch(e){console.error(e);btn.textContent='❌'}
    if(!auto)btn.disabled=false;
  }

  function gp(){return {climax_top:{
    min_prior_gain:parseInt(document.getElementById('p-pg').value)/100,
    climax_weeks_min:parseInt(document.getElementById('p-cwmin').value),
    climax_weeks_max:parseInt(document.getElementById('p-cwmax').value),
    climax_weekly_gain_min:parseInt(document.getElementById('p-cwg').value)/100,
    climax_total_gain_min:parseInt(document.getElementById('p-ctg').value)/100,
    vol_ratio_spike:parseInt(document.getElementById('p-vs').value)/10,
    vol_ratio_cumulative:parseInt(document.getElementById('p-vc').value)/10,
    score_warning:parseInt(document.getElementById('p-sw').value),
    score_confirmed:parseInt(document.getElementById('p-sc').value),
  }}}
  async function saveCfg(){var btn=document.getElementById('btn-save');btn.textContent='⏳';var p=gp().climax_top;
    var y='# climax_top\nclimax_top:\n';for(var k in p){y+='  '+k+': '+p[k]+'\n'}
    try{var r=await fetch(API_URL+'/api/config?signal_type=climax_top',{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾 保存配置';btn.classList.remove('saved')},2000)}}catch(e){btn.textContent='❌'}}
  async function loadCfg(){try{var r=await fetch(API_URL+'/api/config?signal_type=climax_top',{cache:'no-store'});var c=await r.json();if(!c||!c.climax_top)return;var b=c.climax_top;
    svs2('p-pg',Math.round((b.min_prior_gain||1.0)*100));svp('p-pg');svs2('p-cwmin',b.climax_weeks_min||2);svn('p-cwmin');svs2('p-cwmax',b.climax_weeks_max||3);svn('p-cwmax');svs2('p-cwg',Math.round((b.climax_weekly_gain_min||0.15)*100));svp('p-cwg');svs2('p-ctg',Math.round((b.climax_total_gain_min||0.25)*100));svp('p-ctg');svs2('p-vs',Math.round((b.vol_ratio_spike||2.0)*10));svs('p-vs',0.1);svs2('p-vc',Math.round((b.vol_ratio_cumulative||5.0)*10));svs('p-vc',0.1);svs2('p-sw',b.score_warning||65);svn('p-sw');svs2('p-sc',b.score_confirmed||80);svn('p-sc')}catch(e){}}
  function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}

  function renderChart(){
    var period=document.getElementById('period').value;
    var kl=period==='day'?rawKlines:period==='month'?KlineChart.aggregate(rawKlines,'month'):wk;
    if(!kl.length)return;
    var warningSigs=[],confirmedMarkers=[],sm={};
    ws.forEach(function(s){
      var w=kl.find(function(k){return k.date===s.signal_date});
      if(!w)return;
      if(s.signal_type==='climax_confirmed'){
        confirmedMarkers.push({date:s.signal_date,price:w.high,label:'🔴 高潮见顶确认',symbol:'pin',color:'#C62828',size:32});
      } else {
        warningSigs.push({signal_date:s.signal_date,buy_point:w.high,drawdown_pct:parseFloat(s.climax_gain_pct)||0});
        sm[s.signal_date]={buy_point:w.high,drawdown_pct:parseFloat(s.climax_gain_pct)||0};
      }
    });
    if(!kc){
      kc=KlineChart.create({container:document.getElementById('chart'),klines:kl,signals:warningSigs,signalMap:sm,signalColor:'#E65100',signalTooltipPrefix:'⚠️ 高潮进行中',extraMarkers:confirmedMarkers});
    }
    kc.update(kl,warningSigs,sm,confirmedMarkers);
  }

  async function runDiag(){
    var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
    if(!date){div.style.display='none';return}
    var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
    div.innerHTML='<div style="font-size:0.68rem;color:var(--text-tertiary);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
    try{var resp=await fetch(API_URL+'/api/climax-top/diag?stock='+code+'&date='+date+'&mode='+mode);var d=await resp.json();
    if(d.error){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">'+d.error+'</div>';return}
    var h='<table style="margin:0;font-size:0.62rem"><thead><tr><th>条件</th><th>实际值</th><th>阈值</th><th>判定</th></tr></thead><tbody>';
    d.results.forEach(function(c){var cc=c.pass?'<td style="color:#4CAF50">✅</td>':'<td style="color:#FF6B6B">❌</td>';h+='<tr><td>'+c.condition+'</td><td>'+c.value+'</td><td>'+c.threshold+'</td>'+cc+'</tr>'});
    h+='</tbody></table>';div.innerHTML=h;}catch(e){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">请求失败: '+e+'</div>'}
  }

  function renderTable(){
    var div=document.getElementById('table');
    if(!ws.length){div.innerHTML='<div class="loading-row">未检测到高潮见顶信号</div>';return}
    var h='<table><thead><tr><th>#</th><th>信号日期</th><th>类型</th><th>高潮区间</th><th>周数</th><th>涨幅</th><th>前期涨幅</th><th>得分</th></tr></thead><tbody>';
    [].concat(ws).reverse().forEach(function(s,i){
      var tc=s.signal_type==='climax_confirmed'?'s-conf':'s-warn';
      h+='<tr><td>'+(ws.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td class="'+tc+'">'+(s.signal_type==='climax_confirmed'?'🔴 确认':'⚠️ 警告')+'</td><td>'+s.climax_start+' ~ '+s.climax_end+'</td><td>'+s.climax_weeks+'</td><td>'+s.climax_gain_pct+'%</td><td>'+s.prior_gain_pct+'%</td><td><b>'+s.score+'</b></td></tr>';
    });
    div.innerHTML=h+'</tbody></table>';
  }
</script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"📉",brandText:"高潮见顶回测",currentPage:"climax-top"})</script>
</body>
</html>

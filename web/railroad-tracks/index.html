<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>铁轨线回测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<style>
  .chart-wrap{height:520px;margin-bottom:4px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:var(--muted)}
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:14px 18px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:var(--shadow-card);flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:80px}
  .top-bar label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:rgba(26,26,31,.4);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:all .2s}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .bottom-layout{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:380px;flex-shrink:0}
  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
  .param-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
  .param-card-hd{font-family:var(--font-display);font-size:14px;font-weight:400;color:#d4d4d8;cursor:pointer;display:flex;align-items:center;gap:8px}
  .param-card-bd{padding:8px 0 0}.param-card-bd.collapsed{display:none}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sr{display:flex;align-items:center;gap:8px;padding:4px 0}
  .sl{font-size:11px;color:var(--muted);min-width:60px}
  .sv{font-size:11px;font-weight:500;color:var(--text-primary);min-width:36px;text-align:right}
  input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .btn-run{padding:8px 24px;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px}
  .btn-run:hover{background:rgba(245,158,11,.18)}.btn-run:disabled{opacity:.4;cursor:not-allowed}
  .btn-save{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:8px;margin-left:6px}
  .btn-save:hover{color:#d4d4d8;border-color:var(--border-hover)}.btn-save.saved{color:var(--rise)}
  .table-wrapper{overflow-x:auto;font-size:11px}
  .table-wrapper table{width:100%;border-collapse:collapse}
  .table-wrapper th{text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .table-wrapper td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-weight:300}
  .s-conf{color:var(--fall);font-weight:500}.s-warn{color:var(--accent);font-weight:500}.s-clr{color:var(--rise);font-weight:500}
  html[data-theme="light"] .top-bar{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .param-card{background:rgba(255,255,255,.75);border-color:var(--divider)}
  html[data-theme="light"] .param-card-hd{color:#374151}
  html[data-theme="light"] .table-wrapper td{border-bottom-color:rgba(0,0,0,.03)}
.chart-wrap{height:520px;margin-bottom:4px}
  .s-S{color:#C62828;font-weight:700}.s-A{color:#E65100;font-weight:700}.s-B{color:#6D4C41;font-weight:700}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

<nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.5;min-width:80px"><label>类型</label><select id="mode" onchange="onModeChange()"><option value="stock">个股</option><option value="index">指数</option></select></div>
    <div class="code-wrap"><div class="fld"><label>代码</label><input type="text" id="stock-code" value="600519" style="width:100px" onkeydown="if(event.key==='Enter')run()"><span id="stock-name" style="margin-left:6px;font-weight:700;font-family:var(--font-display);font-size:0.85rem"></span></div></div>
    <div class="fld" style="flex:0.5"><label>周期</label><select id="period" onchange="renderChart()"><option value="day">日线</option><option value="week">周线</option></select></div>
    <div class="fld"><label>开始</label><input type="date" id="date-start" onchange="run()"></div>
    <div class="fld"><label>结束</label><input type="date" id="date-end" onchange="run()"></div>
  </div>

  <div id="chart" class="chart-wrap"></div>
  <div class="chart-legend">🔴 周线铁轨(S) | 🟠 日线双根(A+) | 🟡 日线双根(A) | 🟣 单根十字(B)</div>

  <div class="bottom-layout">
    <div class="bottom-left">
      <div class="param-card" id="c1"><div class="param-card-hd" onclick="tc('c1')"><span class="dot" style="background:#C62828"></span>🔴 周线铁轨(S)</div><div class="param-card-bd" id="c1-bd">
        <div class="sr"><span class="sl">前期涨幅</span><input type="range" id="p-wpg" min="30" max="100" value="50" oninput="svp('p-wpg')"><span class="sv" id="p-wpg-v">50%</span></div>
        <div class="sr"><span class="sl">Week1振幅</span><input type="range" id="p-wa1" min="10" max="25" value="15" oninput="svp('p-wa1')"><span class="sv" id="p-wa1-v">15%</span></div>
        <div class="sr"><span class="sl">Week2涨幅</span><input type="range" id="p-wg2" min="1" max="5" value="2" oninput="svp('p-wg2')"><span class="sv" id="p-wg2-v">±2%</span></div>
        <div class="tog-row"><span class="sl">Week1放量</span><button class="tsw off" id="p-wv1" onclick="tog('p-wv1')"></button></div>
        <div class="tog-row"><span class="sl">Week2放量</span><button class="tsw off" id="p-wv2" onclick="tog('p-wv2')"></button></div>
      </div></div>
      <div class="param-card" id="c2"><div class="param-card-hd" onclick="tc('c2')"><span class="dot" style="background:#E65100"></span>🟠 日线双根(A)</div><div class="param-card-bd" id="c2-bd">
        <div class="sr"><span class="sl">实体上限</span><input type="range" id="p-dbe" min="10" max="30" value="20" oninput="svp('p-dbe')"><span class="sv" id="p-dbe-v">20%</span></div>
        <div class="sr"><span class="sl">影线下限</span><input type="range" id="p-dsh" min="25" max="45" value="35" oninput="svp('p-dsh')"><span class="sv" id="p-dsh-v">35%</span></div>
        <div class="tog-row"><span class="sl">要求一阴一阳</span><button class="tsw off" id="p-dop" onclick="tog('p-dop')"></button></div>
      </div></div>
      <div class="param-card" id="c3"><div class="param-card-hd" onclick="tc('c3')"><span class="dot" style="background:#6D4C41"></span>⚪ 日线单根(B)</div><div class="param-card-bd" id="c3-bd">
        <div class="sr"><span class="sl">实体上限</span><input type="range" id="p-sbe" min="5" max="25" value="15" oninput="svp('p-sbe')"><span class="sv" id="p-sbe-v">15%</span></div>
        <div class="sr"><span class="sl">影线下限</span><input type="range" id="p-ssh" min="30" max="50" value="40" oninput="svp('p-ssh')"><span class="sv" id="p-ssh-v">40%</span></div>
      </div></div>
      <button class="btn-run" id="btn-run">🔍 回测</button>
      <button class="btn-save" id="btn-save">💾 保存配置</button>
    </div>
    <div class="bottom-right">
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">📋 铁轨线信号</span></div><div class="table-wrapper" id="table"></div></div>
      <div class="xhs-card"><div class="xhs-card-header"><span class="xhs-card-label">🔎 单日排查</span></div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center"><input type="date" id="diag-date" style="padding:6px 10px;border:1px solid var(--divider);border-radius:10px;font-size:0.72rem;background:var(--card-bg);color:var(--text-primary);flex:1"><button onclick="runDiag()" style="padding:7px 16px;background:var(--accent);color:#FFF;border:none;border-radius:10px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0">排查</button></div>
        <div id="diag-result" style="padding:0 16px 14px;display:none"></div>
      </div>
    </div>
  </div>
  <footer class="page-footer">❤️ 投资手账本 · 铁轨线 Railroad Tracks</footer>
</div>

<script src="../shared/js/echarts.min.js"></script>
<script src="../shared/js/kline-chart.js"></script>
<script>
  const API_URL='http://'+window.location.hostname+':8788';
  function tc(id){document.getElementById(id+'-bd').classList.toggle('collapsed')}
  function tog(id){var b=document.getElementById(id);b.classList.toggle('on');b.classList.toggle('off')}
  function svp(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value+'%'}
  function svn(id){var e=document.getElementById(id),v=document.getElementById(id+'-v');if(e&&v)v.textContent=e.value}
  var dl=[],wk=[],as=[],kc,runId=0;

  document.addEventListener('DOMContentLoaded',async()=>{
    var now=new Date();var ago=new Date(now);ago.setFullYear(ago.getFullYear()-2);
    document.getElementById('date-start').value=ago.toISOString().split('T')[0];
    document.getElementById('date-end').value=now.toISOString().split('T')[0];document.getElementById('diag-date').value=now.toISOString().split('T')[0];
    document.getElementById('btn-run').addEventListener('click',run);
    document.getElementById('btn-save').addEventListener('click',saveCfg);
    await loadCfg();
    setTimeout(function(){run(true)},800);
  });

  function onModeChange(){var m=document.getElementById('mode').value;document.getElementById('stock-code').value=m==='stock'?'600519':'000300';run()}

  async function run(auto){
    runId++;var myId=runId;var btn=document.getElementById('btn-run');if(!auto){btn.disabled=true;btn.textContent='⏳';}
    var code=document.getElementById('stock-code').value.trim();
    var mode=document.getElementById('mode').value;
    if(!code){btn.disabled=false;btn.textContent='📊';return}
    try{var nr=await fetch(API_URL+'/api/stock-name?code='+code+'&mode='+mode);if(nr.ok){var nd=await nr.json();document.getElementById('stock-name').textContent=nd.name||''}}catch(e){}
    try{
      var end=document.getElementById('date-end').value,start=document.getElementById('date-start').value;
      var resp=await fetch(API_URL+'/api/railroad-tracks?stock='+code+'&date='+end+'&start='+start+'&mode='+mode);
      var data=await resp.json();if(runId!==myId)return;
      dl=data.daily||[];wk=data.weekly||[];
      as=data.all_signals||[];
      renderChart();renderTable();if(!auto)btn.textContent='🔍 回测';
    }catch(e){console.error(e);btn.textContent='❌'}
    if(!auto)btn.disabled=false;
  }

  function gp(){var p={w_prior_gain_min:parseInt(document.getElementById('p-wpg').value)/100,
    w_week1_amp_min:parseInt(document.getElementById('p-wa1').value)/100,
    w_week2_gain_max:parseInt(document.getElementById('p-wg2').value)/100,
    w_week2_gain_min:-parseInt(document.getElementById('p-wg2').value)/100,
    w_vol_required_week1:document.getElementById('p-wv1').classList.contains('on'),
    w_vol_required_week2:document.getElementById('p-wv2').classList.contains('on'),
    d_double_body_max:parseInt(document.getElementById('p-dbe').value)/100,
    d_double_shadow_min:parseInt(document.getElementById('p-dsh').value)/100,
    d_double_require_opposite:document.getElementById('p-dop').classList.contains('on'),
    d_single_body_max:parseInt(document.getElementById('p-sbe').value)/100,
    d_single_shadow_min:parseInt(document.getElementById('p-ssh').value)/100,
  };return {railroad_tracks:p}}
  async function saveCfg(){var btn=document.getElementById('btn-save');btn.textContent='⏳';var p=gp().railroad_tracks;
    var y='# railroad_tracks\nrailroad_tracks:\n';for(var k in p){y+='  '+k+': '+p[k]+'\n'}
    try{var r=await fetch(API_URL+'/api/config?signal_type=railroad_tracks',{method:'POST',headers:{'Content-Type':'text/plain'},body:y});var d=await r.json();if(d.ok){btn.textContent='✅';btn.classList.add('saved');setTimeout(function(){btn.textContent='💾';btn.classList.remove('saved')},2000)}}catch(e){btn.textContent='❌'}}
  async function loadCfg(){try{var r=await fetch(API_URL+'/api/config?signal_type=railroad_tracks',{cache:'no-store'});var c=await r.json();if(!c||!c.railroad_tracks)return;var b=c.railroad_tracks;
    svs2('p-wpg',Math.round((b.w_prior_gain_min||0.5)*100));svp('p-wpg');svs2('p-wa1',Math.round((b.w_week1_amp_min||0.15)*100));svp('p-wa1');svs2('p-wg2',Math.round(Math.abs(b.w_week2_gain_max||0.02)*100));svp('p-wg2');
    stog('p-wv1',b.w_vol_required_week1);stog('p-wv2',b.w_vol_required_week2);svs2('p-dbe',Math.round((b.d_double_body_max||0.20)*100));svp('p-dbe');svs2('p-dsh',Math.round((b.d_double_shadow_min||0.35)*100));svp('p-dsh');
    stog('p-dop',b.d_double_require_opposite);svs2('p-sbe',Math.round((b.d_single_body_max||0.15)*100));svp('p-sbe');svs2('p-ssh',Math.round((b.d_single_shadow_min||0.40)*100));svp('p-ssh')}catch(e){}}
  function svs2(id,v){var e=document.getElementById(id);if(e)e.value=v}
  function stog(id,on){var b=document.getElementById(id);if(b)b.className='tsw '+(on?'on':'off')}

  function renderChart(){
    var period=document.getElementById('period').value;
    var kl=period==='day'&&dl.length?dl:wk;
    if(!kl.length)return;
    var sm={},sigs=[],xmarks=[],colors={strong_sell:'#C62828',A_plus:'#E65100',A:'#FF9800',B:'#9C27B0'};
    as.forEach(function(s){
      var d=kl.find(function(k){return k.date===s.signal_date});
      if(!d)return;
      xmarks.push({date:s.signal_date,price:d.high,label:s.label,symbol:'pin',color:colors[s.signal_level]||'#9C27B0',size:28});
      sigs.push({signal_date:s.signal_date,buy_point:d.high,drawdown_pct:0,label:s.label});
      sm[s.signal_date]={buy_point:d.high,drawdown_pct:0,label:s.label,color:colors[s.signal_level]||'#9C27B0'};
    });
    if(!kc){
      kc=KlineChart.create({container:document.getElementById('chart'),klines:kl,signals:sigs,signalMap:sm,signalColor:'#C62828',signalTooltipPrefix:'🚂 铁轨线',extraMarkers:xmarks});
    }kc.update(kl,sigs,sm,xmarks)
  }

  async function runDiag(){
    var date=document.getElementById('diag-date').value,div=document.getElementById('diag-result');
    if(!date){div.style.display='none';return}var code=document.getElementById('stock-code').value.trim(),mode=document.getElementById('mode').value;
    div.innerHTML='<div style="font-size:0.68rem;color:var(--muted);padding:6px 0">⏳ 检测中...</div>';div.style.display='block';
    try{var resp=await fetch(API_URL+'/api/railroad-tracks/diag?stock='+code+'&date='+date+'&mode='+mode);var d=await resp.json();
    var h='<div style="font-size:0.65rem">'+date+' | '+code+' | 总信号: <b>'+d.total_signals+'</b> (S:'+d.by_type.S+' A:'+d.by_type.A+' B:'+d.by_type.B+')</div>';
    if(d.latest&&d.latest.length){h+='<table style="margin:4px 0 0;font-size:0.6rem"><thead><tr><th>日期</th><th>信号</th></tr></thead><tbody>';d.latest.forEach(function(s){h+='<tr><td>'+s.date+'</td><td>'+s.label+'</td></tr>'});h+='</tbody></table>';}
    div.innerHTML=h;}catch(e){div.innerHTML='<div style="font-size:0.68rem;color:#FF6B6B">请求失败</div>'}}

  function renderTable(){
    var div=document.getElementById('table');
    if(!as.length){div.innerHTML='<div class="loading-row">未检测到铁轨线信号</div>';return}
    var h='<table><thead><tr><th>#</th><th>日期</th><th>类型</th><th>级别</th><th>详情</th></tr></thead><tbody>';
    [].concat(as).reverse().forEach(function(s,i){
      var lv=s.signal_level,cl='s-'+(lv==='strong_sell'?'S':lv==='A_plus'||lv==='A'?'A':'B');
      var dt=s.details||{};
      var info='';
      if(s.signal_type==='railroad_weekly')info='WK1 '+dt.week1_date+' 振幅'+dt.week1_amp+'% | WK2 涨幅'+dt.week2_gain+'% | 置信度 '+dt.confidence;
      else if(s.signal_type==='railroad_daily_double')info='D1 '+dt.day1_date+' D2 '+dt.day2_date+' '+(dt.is_opposite?'一阴一阳':'')+' '+(dt.vol_ok?'放量':'')+' '+(dt.confirmed?'✓确认':'');
      else info='日 '+dt.day_date+' '+(dt.vol_ok?'放量':'')+' '+(dt.confirmed?'✓确认':'');
      h+='<tr><td>'+(as.length-i)+'</td><td style="font-weight:700">'+s.signal_date+'</td><td>'+s.label+'</td><td class="'+cl+'">'+lv+'</td><td style="font-size:0.6rem">'+info+'</td></tr>';
    });
    div.innerHTML=h+'</tbody></table>';
  }
</script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"🚂",brandText:"铁轨线回测",currentPage:"railroad-tracks"})
// Theme toggle
function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('theme',n);if(typeof renderChart==='function')renderChart()}
(function(){var s=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=s})();
</script>
</body>
</html>

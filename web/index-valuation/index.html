<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>指数估值</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#0f0f12',card:'#1a1a1f',border:'rgba(255,255,255,.06)',muted:'#8b8b90',accent:'#f59e0b'},fontFamily:{sans:['Inter','system-ui','sans-serif'],display:['Instrument Serif','Georgia','serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link rel="stylesheet" href="../shared/css/hanako-glass.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
  .top-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
  .top-bar label{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
  .top-bar input,.top-bar select{font-family:var(--font-body);padding:5px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);outline:none;transition:all .2s;backdrop-filter:blur(10px)}
  .top-bar input:focus,.top-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;flex-wrap:wrap}
  .tab{padding:6px 14px;border:1px solid var(--border);border-radius:10px;background:rgba(26,26,31,.4);color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:500;transition:all .2s;white-space:nowrap}
  .tab:hover{border-color:var(--border-hover);color:#d4d4d8}
  .tab.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .tab-content{display:none;animation:fadeIn .4s ease}
  .tab-content.active{display:block}
  .btn-glass{font-family:var(--font-body);font-size:10px;font-weight:500;padding:4px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--card);color:var(--muted);transition:all .2s;text-decoration:none;display:inline-block}
  .btn-glass:hover{color:#d4d4d8;background:rgba(255,255,255,.04);border-color:var(--border-hover)}
  .btn-accent{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .btn-accent:hover{background:rgba(245,158,11,.18)}
  html[data-theme="light"] .top-bar input,html[data-theme="light"] .top-bar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .tab{background:rgba(255,255,255,.6);border-color:var(--divider);color:var(--muted)}
  html[data-theme="light"] .tab:hover{border-color:rgba(0,0,0,.15);color:#374151}
  html[data-theme="light"] .tab.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
.top-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
  .top-bar label{font-family:var(--font-display);font-size:0.65rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
  .top-bar select,.top-bar input{padding:8px 10px;border:1px solid var(--divider);border-radius:12px;font-family:var(--font-display);font-size:0.8rem;background:var(--card-bg);color:var(--text-primary)}
  .nav-dropdown:hover .nav-dropdown-menu{display:block}
  @media(max-width:768px){.stat-cards{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>(function(){var c=document.getElementById("bg-canvas"),w=c.width=window.innerWidth,h=c.height=window.innerHeight;var ctx=c.getContext("2d"),N=60;var p=[];for(var i=0;i<N;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<N;i++){var P=p[i];P.x+=P.vx;P.y+=P.vy;if(P.x<0)P.x=w;if(P.x>w)P.x=0;if(P.y<0)P.y=h;if(P.y>h)P.y=0;ctx.beginPath();ctx.arc(P.x,P.y,P.r,0,Math.PI*2);ctx.fillStyle="rgba(245,158,11,"+P.o+")";ctx.fill()}for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle="rgba(245,158,11,"+((100-dist)/100*.06)+")";ctx.stroke()}}}requestAnimationFrame(draw)}draw();window.addEventListener("resize",function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight})})();
</script>
<div class="app-container">

<nav id="top-nav"></nav>

  <div class="top-bar">
    <div><label>搜索/选择指数</label><input type="text" id="idx-search" placeholder="输入代码或名称筛选..." oninput="filterIndices()" onkeydown="if(event.key==='Enter'){var l=filterIndices(true);if(l.length===1){document.getElementById('idx-select').value=l[0].code;loadData();}}" style="width:220px;margin-right:8px"><select id="idx-select" onchange="loadData()" style="max-width:300px"></select></div>
    <div><label>起始年份</label><select id="year-start" onchange="loadData()"><option value="2016">2016</option><option value="2018">2018</option><option value="2020">2020</option><option value="2022">2022</option><option value="2024">2024</option></select></div>
    <div><label>截止年份</label><select id="year-end" onchange="loadData()"><option value="2026" selected>至今</option><option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option></select></div>
  </div>

  <div class="stat-cards" id="stats"></div>

  <div class="chart-card"><div class="chart-title">📊 PE-TTM 走势与十年分位</div><div id="chart-pe" style="height:380px"></div><div id="text-pe" class="analysis-text"></div></div>
  <div class="chart-card"><div class="chart-title">📊 PB 走势与十年分位</div><div id="chart-pb" style="height:380px"></div><div id="text-pb" class="analysis-text"></div></div>
  <div class="chart-card"><div class="chart-title">📊 股息率 走势与十年分位</div><div id="chart-dyr" style="height:300px"></div></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="chart-card"><div class="chart-title">📊 ROE（%）</div><div id="chart-roe" style="height:260px"></div><div id="text-roe" class="analysis-text"></div></div>
    <div class="chart-card"><div class="chart-title">📊 EPS（元/股）</div><div id="chart-eps" style="height:260px"></div><div id="text-eps" class="analysis-text"></div></div>
    <div class="chart-card"><div class="chart-title">📊 营业收入（亿）</div><div id="chart-revenue" style="height:260px"></div><div id="text-revenue" class="analysis-text"></div></div>
    <div class="chart-card"><div class="chart-title">📊 净利润（亿）</div><div id="chart-np" style="height:260px"></div><div id="text-np" class="analysis-text"></div></div>
    <div class="chart-card"><div class="chart-title">📊 净利润率（%）</div><div id="chart-npm" style="height:260px"></div><div id="text-npm" class="analysis-text"></div></div>
    <div class="chart-card"><div class="chart-title">📊 营业利润率（%）</div><div id="chart-opm" style="height:260px"></div><div id="text-opm" class="analysis-text"></div></div>
    <div class="chart-card"><div class="chart-title">📊 A股分红金额（亿）</div><div id="chart-div" style="height:260px"></div><div id="text-div" class="analysis-text"></div></div>
    <div class="chart-card"><div class="chart-title">📊 税金及附加（亿）</div><div id="chart-tax" style="height:260px"></div></div>
  </div>
</div>
<footer class="page-footer">❤️ 投资手账本 · 估值分位 · 数据来源: 理杏仁 index_fundamental_daily</footer>

<script>
function toggleTheme(){var h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('valpct-theme',n);setTimeout(loadData,200)}
(function(){var s=localStorage.getItem('valpct-theme')||'light';document.documentElement.dataset.theme=s})();

var API='http://'+window.location.hostname+':8788',allIndices=[];

async function init(){
  var resp=await fetch(API+'/api/crowding/indices');
  allIndices=await resp.json();
  renderSelect(allIndices);
  document.getElementById('idx-select').value='000300';
  loadData();
}

function filterIndices(ret){
  var q=(document.getElementById('idx-search').value||'').toUpperCase();
  var list=allIndices.filter(function(x){return !q||x.code.indexOf(q)>=0||(x.name||'').toUpperCase().indexOf(q)>=0});
  renderSelect(list);
  if(ret)return list;
}

function renderSelect(list){
  var sel=document.getElementById('idx-select'),cur=sel.value;
  sel.innerHTML='';
  list.forEach(function(x){var o=document.createElement('option');o.value=x.code;o.textContent=x.code+' '+x.name;sel.appendChild(o)});
  if(list.some(function(x){return x.code===cur}))sel.value=cur;
  else if(list.length===1){sel.value=list[0].code;setTimeout(loadData,100);}
  else if(list.length>0)sel.value=list[0].code;
}

async function loadData(){
  var code=document.getElementById('idx-select').value;
  var sy=document.getElementById('year-start').value,ey=document.getElementById('year-end').value;
  var endDate=ey==='2026'?'2026-05-07':ey+'-12-31';
  var resp=await fetch(API+'/api/valuation?code='+code+'&start='+sy+'-01-01&end='+endDate);
  var data=await resp.json();
  var hsResp=await fetch(API+'/api/valuation?code=000300&start='+sy+'-01-01&end='+endDate);
  var hs=await hsResp.json();
  if(!data.dates||!data.dates.length){document.getElementById('stats').innerHTML='<div class="stat-card"><div class="val">—</div><div class="lbl">无数据</div></div>';return}

  var last=data.dates.length-1,pe=data.pe[last],pePct=data.pe_pct[last],pb=data.pb[last],pbPct=data.pb_pct[last],dyr=data.dyr[last],dyrPct=data.dyr_pct[last];

  function clr(p){if(p==null)return'var(--muted)';if(p>=0.8)return'var(--rise)';if(p>=0.6)return'var(--muted)';if(p<=0.3)return'var(--fall)';return'var(--text-secondary)'}
  document.getElementById('stats').innerHTML=
    '<div class="stat-card"><div class="val">'+(pe?pe.toFixed(1):'—')+'</div><div class="lbl">PE-TTM</div></div>'+
    '<div class="stat-card"><div class="val" style="color:'+clr(pePct)+'">'+(pePct!=null?(pePct*100).toFixed(0)+'%':'—')+'</div><div class="lbl">PE 十年分位</div></div>'+
    '<div class="stat-card"><div class="val">'+(pb?pb.toFixed(2):'—')+'</div><div class="lbl">PB</div></div>'+
    '<div class="stat-card"><div class="val" style="color:'+clr(pbPct)+'">'+(pbPct!=null?(pbPct*100).toFixed(0)+'%':'—')+'</div><div class="lbl">PB 十年分位</div></div>'+
    '<div class="stat-card"><div class="val">'+(dyr?(dyr*100).toFixed(2)+'%':'—')+'</div><div class="lbl">股息率</div></div>'+
    '<div class="stat-card"><div class="val" style="color:'+clr(dyrPct)+'">'+(dyrPct!=null?(dyrPct*100).toFixed(0)+'%':'—')+'</div><div class="lbl">股息率 十年分位</div></div>';

  var isDark=document.documentElement.dataset.theme==='dark';
  var peColor=isDark?'#FF6B6B':'#E8553D',pbColor=isDark?'#539BF5':'#3568B8',dyrColor=isDark?'#4ECDC4':'#2D9D5A';
  var pctColor='#E8A838',hsColor=isDark?'#777':'#B0B0B0',tx=isDark?'#999':'#6E6E6E',sp=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.04)';

  buildChart('chart-pe','PE-TTM',data.dates,data.pe,data.pe_pct,hs.pe,peColor);
  buildChart('chart-pb','PB',data.dates,data.pb,data.pb_pct,hs.pb,pbColor);
  buildChart('chart-dyr','股息率%',data.dates,data.dyr&&data.dyr.map(function(v){return v!=null?(v*100).toFixed(2):null}),data.dyr_pct,hs.dyr&&hs.dyr.map(function(v){return v!=null?(v*100).toFixed(2):null}),dyrColor);
  genText('text-pe','PE-TTM',data.pe,data.pe_pct,hs.pe,'倍',clr(pePct));
  genText('text-pb','PB',data.pb,data.pb_pct,hs.pb,'倍',clr(pbPct));
  loadFS(code);
}

async function loadFS(code){
  try{
    var resp=await fetch(API+'/api/valuation/fs?code='+code);
    var fs=await resp.json();
    if(!fs.dates||!fs.dates.length)return;
    var isDark=document.documentElement.dataset.theme==='dark';
    var up=isDark?'#FF6B6B':'#E8553D',dn=isDark?'#4ECDC4':'#2D9D5A';
    buildBar('chart-roe','ROE %',fs.dates,fs.roe,dn);genFsText('text-roe','ROE',fs.roe,'%',fs.dates);
    buildBar('chart-eps','EPS',fs.dates,fs.eps,up);genFsText('text-eps','EPS',fs.eps,'元',fs.dates);
    buildBarBig('chart-revenue','营业收入',fs.dates,fs.revenue,'亿');genFsText('text-revenue','营业收入',fs.revenue,'亿',fs.dates);
    buildBarBig('chart-np','净利润',fs.dates,fs.net_profit,'亿');genFsText('text-np','净利润',fs.net_profit,'亿',fs.dates);
    buildBar('chart-npm','净利润率 %',fs.dates,fs.net_margin,up);genFsText('text-npm','净利润率',fs.net_margin,'%',fs.dates);
    buildBar('chart-opm','营业利润率 %',fs.dates,fs.op_margin,dn);genFsText('text-opm','营业利润率',fs.op_margin,'%',fs.dates);
    buildBarBig('chart-div','A股分红',fs.dates,fs.dividend,'亿');genFsText('text-div','A股分红金额',fs.dividend,'亿',fs.dates);
    buildBarBig('chart-tax','税金及附加',fs.dates,fs.tax,'亿');
  }catch(e){console.error('FS:',e)}
}

function buildChart(id,name,dates,vals,pcts,hsVals,lineColor){
  var dom=document.getElementById(id);if(dom._echart)dom._echart.dispose();
  var ch=echarts.init(dom),isDark=document.documentElement.dataset.theme==='dark';
  var tx=isDark?'#999':'#6E6E6E',sp=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.04)';
  var pctVals=pcts.map(function(v){return v!=null?(v*100).toFixed(0):null});
  ch.setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    legend:{data:[name,'沪深300','十年分位%'],bottom:20,textStyle:{color:tx,fontSize:10},selectedMode:true},
    grid:{left:'8%',right:'4%',top:12,bottom:56},
    xAxis:{type:'category',data:dates,axisLabel:{color:tx,fontSize:9,formatter:function(v){return v.slice(0,7)}},axisLine:{lineStyle:{color:sp}}},
    dataZoom:[{type:'inside',start:50,end:100},{type:'slider',start:50,end:100,height:18,bottom:4}],
    yAxis:[{type:'value',name:name,axisLabel:{color:tx,fontSize:9},splitLine:{lineStyle:{color:sp}}},{type:'value',name:'分位%',min:0,max:100,axisLabel:{color:tx,fontSize:9,formatter:function(v){return v+'%'}},splitLine:{show:false}}],
    series:[
      {name:name,type:'line',data:vals,smooth:true,symbol:'none',lineStyle:{color:lineColor,width:1.5},yAxisIndex:0},
      {name:'沪深300',type:'line',data:hsVals,smooth:true,symbol:'none',lineStyle:{color:'#AAA',width:1,type:'dotted'},yAxisIndex:0},
      {name:'十年分位%',type:'line',data:pctVals,smooth:true,symbol:'none',lineStyle:{color:'#E8A838',width:1.5,type:'dashed'},yAxisIndex:1,
        markLine:{silent:true,data:[{yAxis:70,label:{formatter:'偏高',color:tx,fontSize:9},lineStyle:{color:'#FFB347',type:'dotted'}},{yAxis:30,label:{formatter:'偏低',color:tx,fontSize:9},lineStyle:{color:'#26C6DA',type:'dotted'}}]}}
    ]
  });dom._echart=ch;
}

function genText(id,name,vals,pcts,hsVals,unit,pctClr){
  var last=vals.length-1,cur=vals[last],curPct=pcts[last];
  var vv=vals.filter(function(v){return v!=null}),avg=vv.reduce(function(a,b){return a+b},0)/vv.length;
  var mx=Math.max.apply(null,vv),mn=Math.min.apply(null,vv);
  var hsCur=hsVals[last];
  var pctText=curPct!=null?(curPct*100).toFixed(0)+'%':'未知',level='',advice='';
  if(curPct==null){level='无法判断';advice='数据不足'}
  else if(curPct>=0.8){level='严重偏高';advice='处于近十年高位区间，安全边际极低。若非趋势强劲的主升浪，应考虑减仓或回避。高估值透支未来多年盈利增长，一旦市场情绪转向或利率上行，估值收缩风险显著'}
  else if(curPct>=0.6){level='偏高';advice='高于历史中位数，需警惕估值回调风险。若指数RS强度持续走高可持有，但不宜追高加仓，建议设置更紧的止损位'}
  else if(curPct>=0.4){level='中性';advice='估值处于合理区间，无明显高估或低估。可根据趋势策略正常操作，结合个股RS选股'}
  else if(curPct>=0.2){level='偏低';advice='低于历史均值，具备一定安全边际。若RS强度同步拐头向上，是较好的中长期布局窗口，可逐步建仓'}
  else{level='严重低估';advice='处于近十年低位，市场情绪极度悲观，往往是逆向投资的最佳时机。需确认基本面未发生永久性恶化，建议小仓位试探'}
  var vsHS=hsCur?((cur/hsCur-1)*100).toFixed(1)+'%':'—';
  var h='<b>当前'+name+'：</b>'+cur.toFixed(2)+unit+'，十年分位 <b style="color:'+pctClr+'">'+pctText+'</b>（'+level+'）。';
  h+='近十年均值 '+avg.toFixed(2)+unit+'，最高 '+mx.toFixed(2)+unit+'，最低 '+mn.toFixed(2)+unit+'。';
  h+='沪深300当前为 '+hsCur.toFixed(2)+unit+'，该指数相对沪深300 '+(cur>hsCur?'高':'低')+vsHS+'。';
  h+='<b>建议：</b>'+advice+'。';
  document.getElementById(id).innerHTML=h;
}

init();

function buildBar(id,name,dates,vals,color){
  var dom=document.getElementById(id);if(dom._echart)dom._echart.dispose();
  var ch=echarts.init(dom),isDark=document.documentElement.dataset.theme==='dark';
  var tx=isDark?'#999':'#6E6E6E',sp=isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';
  var avg=vals.filter(function(v){return v!=null}).reduce(function(a,b){return a+b},0)/vals.filter(function(v){return v!=null}).length;
  ch.setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    grid:{left:'8%',right:'4%',top:12,bottom:36},
    xAxis:{type:'category',data:dates,axisLabel:{color:tx,fontSize:9},axisLine:{lineStyle:{color:sp}}},
    yAxis:{type:'value',axisLabel:{color:tx,fontSize:9},splitLine:{lineStyle:{color:sp}}},
    series:[
      {name:name,type:'bar',data:vals.map(function(v){return v!=null?v:'—'}),itemStyle:{color:color,borderRadius:[4,4,0,0]},barWidth:'50%',
        label:{show:true,position:'top',fontSize:9,color:tx,
          formatter:function(p){return p.value!=null&&p.value!=='—'?name.indexOf('%')>=0?(p.value*100).toFixed(1)+'%':p.value.toFixed(2):''}}},
      {name:'均值',type:'line',data:vals.map(function(){return avg}),smooth:false,symbol:'none',lineStyle:{color:'#E8A838',width:1,type:'dashed'}}
    ]
  });dom._echart=ch;
}

function buildBarBig(id,name,dates,vals,unit){
  var dom=document.getElementById(id);if(dom._echart)dom._echart.dispose();
  var ch=echarts.init(dom),isDark=document.documentElement.dataset.theme==='dark';
  var tx=isDark?'#999':'#6E6E6E',sp=isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';
  var vv=vals.filter(function(v){return v!=null}),avg=vv.reduce(function(a,b){return a+b},0)/vv.length;
  var d1=vals.map(function(v){return v!=null?(v/1e8).toFixed(1):null});
  var d2=vals.map(function(){return (avg/1e8).toFixed(1)});
  ch.setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis',formatter:function(p){return p[0].name+'<br/>'+p[0].marker+name+': '+(p[0].value||'—')+unit}},
    grid:{left:'10%',right:'4%',top:12,bottom:36},
    xAxis:{type:'category',data:dates,axisLabel:{color:tx,fontSize:9},axisLine:{lineStyle:{color:sp}}},
    yAxis:{type:'value',axisLabel:{color:tx,fontSize:9,formatter:function(v){return v+unit}},splitLine:{lineStyle:{color:sp}}},
    series:[
      {name:name,type:'bar',data:d1,itemStyle:{color:'#539BF5',borderRadius:[4,4,0,0]},barWidth:'50%',
        label:{show:true,position:'top',fontSize:9,color:tx,formatter:function(p){return p.value!=null?p.value+unit:''}}},
      {name:'均值',type:'line',data:d2,smooth:false,symbol:'none',lineStyle:{color:'#E8A838',width:1,type:'dashed'}}
    ]
  });dom._echart=ch;
}

function genFsText(id,name,vals,unit,dates){
  var vv=vals.filter(function(v){return v!=null});
  if(!vv.length){document.getElementById(id).innerHTML='数据不足';return}
  var cur=vv[vv.length-1],prev=vv.length>1?vv[vv.length-2]:null;
  var avg=vv.reduce(function(a,b){return a+b},0)/vv.length;
  var mx=Math.max.apply(null,vv),mn=Math.min.apply(null,vv);
  var yoy=prev&&prev>0?((cur/prev-1)*100).toFixed(1)+'%':'—';
  var trend=cur>avg?'高于':'低于';
  var curDisp=unit==='亿'?(cur/1e8).toFixed(1):cur.toFixed(2);
  var avgDisp=unit==='亿'?(avg/1e8).toFixed(1):avg.toFixed(2);
  var mxDisp=unit==='亿'?(mx/1e8).toFixed(1):mx.toFixed(2);
  var mnDisp=unit==='亿'?(mn/1e8).toFixed(1):mn.toFixed(2);
  var latestYr=dates[dates.length-1];
  var h='<b>'+latestYr+'年：</b>'+name+' '+curDisp+unit+'，同比 '+(yoy.indexOf('-')>=0?'':'+')+yoy+'。';
  h+='近十年均值 '+avgDisp+unit+'，当前'+trend+'均值。最高 '+mxDisp+unit+'（'+dates[vv.indexOf(mx)]+'年），最低 '+mnDisp+unit+'（'+dates[vv.indexOf(mn)]+'年）。';
  document.getElementById(id).innerHTML=h;
}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日精选 · 知行</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--coral:#FF6B8A;--coral-glow:rgba(255,107,138,0.3);--mint:#4DE8B2;--lavender:#A78BFA;--lavender-glow:rgba(167,139,250,0.3);--sunny:#FBBF24;--sky:#60A5FA;--card:rgba(255,255,255,0.5);--card-border:rgba(255,255,255,0.65);--text:#3D1F4A;--text-soft:#8B6B9E;--text-faint:#B8A0C8}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:linear-gradient(160deg,#FDF2F8 0%,#F0E6FF 30%,#E8F4FF 60%,#FFF5E8 100%);background-attachment:fixed;color:var(--text);font-family:'Nunito',"Noto Sans SC",sans-serif;font-size:0.78rem;line-height:1.35;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:.4}
  .orb-1{width:300px;height:300px;background:var(--coral);top:-80px;right:-60px;animation:orbFloat 8s ease-in-out infinite}
  .orb-2{width:240px;height:240px;background:var(--lavender);bottom:-60px;left:-40px;animation:orbFloat 10s ease-in-out 2s infinite}
  .orb-3{width:160px;height:160px;background:var(--mint);top:50%;left:50%;animation:orbFloat 12s ease-in-out 4s infinite}
  @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(25px,-15px) scale(1.08)}50%{transform:translate(-10px,20px) scale(.95)}75%{transform:translate(-20px,-10px) scale(1.04)}}
  .container{max-width:1200px;margin:0 auto;padding:16px 24px 40px;position:relative;z-index:1}

  /* Nav */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;margin-bottom:16px;background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:2px solid var(--card-border);border-radius:26px;box-shadow:0 4px 18px rgba(167,139,250,0.1),inset 0 1px 0 rgba(255,255,255,0.5);position:relative;overflow:visible;z-index:100}
  .nav-brand{font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,var(--coral),var(--lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent;z-index:1}
  .nav-links{display:flex;gap:8px;align-items:center;z-index:1}
  .nav-links a{font-size:.58rem;font-weight:700;color:var(--text-soft);text-decoration:none;padding:3px 8px;border-radius:12px;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
  .nav-links a:hover{background:rgba(167,139,250,.1);color:var(--lavender);transform:translateY(-1px);box-shadow:0 3px 10px var(--lavender-glow)}
  .nav-links a.active{background:linear-gradient(135deg,var(--lavender),var(--coral));color:#fff;box-shadow:0 3px 15px var(--coral-glow)}
  /* dropdown */
  .nav-drop{position:relative;display:inline-flex}
  .nav-drop-menu{display:none;position:absolute;top:100%;left:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(30px);border:2px solid var(--card-border);border-radius:18px;padding:4px 0;min-width:130px;z-index:999;box-shadow:0 8px 30px rgba(167,139,250,0.15)}
  .nav-drop:hover .nav-drop-menu{display:block}
  .nav-drop-menu a{display:block;padding:5px 14px;font-size:.55rem;color:var(--text-soft);text-decoration:none;font-weight:600}
  .nav-drop-menu a:hover{background:rgba(167,139,250,.08);color:var(--lavender)}

  /* Hero */
  .hero{background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:2px solid var(--card-border);border-radius:30px;padding:22px 28px;margin-bottom:16px;box-shadow:0 8px 32px rgba(167,139,250,.08),inset 0 1px 0 rgba(255,255,255,.5);position:relative;overflow:hidden}
  .hero::after{content:'';position:absolute;top:-15px;right:-25px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,107,138,.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
  .hero h1{font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:900;line-height:1.15;letter-spacing:-.02em;position:relative;z-index:1}
  .hero h1 .gr{background:linear-gradient(135deg,var(--coral) 20%,var(--lavender) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hero .sub{font-size:.62rem;color:var(--text-soft);margin-top:2px;font-weight:600}
  .mkt-badge{display:inline-block;font-size:.58rem;font-weight:800;padding:5px 14px;border-radius:16px;margin-bottom:8px;letter-spacing:.02em;backdrop-filter:blur(10px)}
  .mkt-up{background:rgba(77,232,178,.2);color:#059669;border:1.5px solid rgba(77,232,178,.3)}
  .mkt-cor{background:rgba(251,191,36,.2);color:#B45309;border:1.5px solid rgba(251,191,36,.3)}
  .mkt-bear{background:rgba(255,107,138,.2);color:#BE185D;border:1.5px solid rgba(255,107,138,.3)}

  /* Tabs */
  .tabs{display:flex;gap:8px;margin:14px 0}
  .tab{padding:8px 20px;border-radius:20px;font-size:.64rem;font-weight:800;cursor:pointer;background:var(--card);backdrop-filter:blur(20px);border:2px solid var(--card-border);color:var(--text-soft);transition:all .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 3px 12px rgba(167,139,250,.05)}
  .tab:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(167,139,250,.12)}
  .tab.active{background:linear-gradient(135deg,var(--lavender),var(--coral));color:#fff;border-color:transparent;box-shadow:0 8px 28px rgba(167,139,250,.25)}

  /* Toolbar */
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0 16px}
  .tb-input,.tb-select{padding:7px 14px;border:2px solid var(--card-border);border-radius:16px;font-size:.62rem;font-weight:600;background:var(--card);backdrop-filter:blur(20px);color:var(--text);font-family:inherit;outline:none;box-shadow:0 2px 10px rgba(167,139,250,.04);transition:all .2s}
  .tb-input:focus,.tb-select:focus{border-color:var(--lavender);box-shadow:0 4px 18px var(--lavender-glow)}
  .tb-input::placeholder{color:var(--text-faint)}

  /* Table */
  .table-shell{background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:2px solid var(--card-border);border-radius:24px;overflow:hidden;box-shadow:0 8px 36px rgba(167,139,250,.07),inset 0 1px 0 rgba(255,255,255,.4);animation:fadeUp .4s ease-out}
  @keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
  .scr-table{width:100%;border-collapse:collapse;font-size:.64rem}
  .scr-table thead{position:sticky;top:0;z-index:5}
  .scr-table th{text-align:center;padding:8px 4px;background:rgba(167,139,250,.05);font-size:.64rem;font-weight:800;letter-spacing:.03em;color:var(--text-soft);cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid rgba(167,139,250,.06)}
  .scr-table th:hover{color:var(--lavender)}
  .scr-table td{padding:7px 4px;text-align:center;border-bottom:1px solid rgba(167,139,250,.03);font-weight:300;font-size:.64rem}
  .scr-table tbody tr{transition:all .15s}
  .scr-table tbody tr:hover{background:rgba(167,139,250,.03);transform:scale(1.003)}
  .scr-table a{color:var(--lavender);text-decoration:none;font-weight:800}

  /* Tags */
  .tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.5rem;font-weight:800;letter-spacing:.01em;backdrop-filter:blur(8px)}
  .tag-l{background:rgba(167,139,250,.15);color:var(--lavender);border:1.5px solid rgba(167,139,250,.2)}
  .tag-b{background:rgba(251,191,36,.15);color:#B45309;border:1.5px solid rgba(251,191,36,.2)}
  .tag-d{background:rgba(255,107,138,.15);color:var(--coral);border:1.5px solid rgba(255,107,138,.2)}

  /* Score bar */
  .sbar{display:inline-flex;align-items:center;gap:4px}
  .sbar-track{width:38px;height:6px;border-radius:3px;background:rgba(167,139,250,.06);overflow:hidden}
  .sbar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
  .sbar-val{font-weight:800;font-size:.64rem}

  /* Buttons */
  .bubble-btn{font-size:.54rem;padding:4px 10px;border-radius:14px;cursor:pointer;border:2px solid var(--card-border);background:var(--card);backdrop-filter:blur(15px);color:var(--text-soft);text-decoration:none;display:inline-block;font-family:inherit;font-weight:800;transition:all .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 10px rgba(167,139,250,.05)}
  .bubble-btn:hover{transform:translateY(-1px) scale(1.02);box-shadow:0 5px 18px rgba(167,139,250,.14);border-color:var(--lavender)}
  .bubble-btn.cta{background:linear-gradient(135deg,var(--lavender),var(--coral));color:#fff;border-color:transparent;box-shadow:0 4px 18px var(--coral-glow)}
  .bubble-btn.mint{background:linear-gradient(135deg,var(--mint),var(--sky));color:#fff;border-color:transparent;box-shadow:0 4px 18px rgba(77,232,178,.25)}

  /* Modal */
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,31,74,.3);backdrop-filter:blur(6px);z-index:200;overflow-y:auto}
  .modal-card{background:rgba(255,255,255,.6);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:2px solid rgba(255,255,255,.7);max-width:780px;margin:40px auto;border-radius:28px;padding:28px;position:relative;box-shadow:0 20px 60px rgba(167,139,250,.14),inset 0 1px 0 rgba(255,255,255,.4);animation:modalUp .3s cubic-bezier(.34,1.56,.64,1)}
  @keyframes modalUp{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal-card h2{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;margin-bottom:14px;letter-spacing:-.02em;background:linear-gradient(135deg,var(--coral),var(--lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .modal-close{position:absolute;top:14px;right:18px;width:28px;height:28px;border-radius:50%;background:rgba(255,107,138,.1);border:2px solid rgba(255,107,138,.2);font-size:.85rem;cursor:pointer;color:var(--coral);display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
  .modal-close:hover{background:rgba(255,107,138,.2);transform:rotate(90deg) scale(1.1)}
  .loading{text-align:center;padding:40px 20px;color:var(--text-faint);font-weight:700;font-size:.72rem}

  @media(max-width:768px){.container{padding:10px 8px 30px}.modal-card{margin:12px;padding:18px}.nav{flex-direction:column;gap:8px}.scr-table{font-size:.58rem}}
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>

<div class="container">
  <nav class="nav" id="top-nav"></nav>

  <div class="hero">
    <span id="market-badge" class="mkt-badge">加载中...</span>
    <h1><span class="gr">⭐ 欧奈尔每日精选</span></h1>
    <div class="sub" id="info-row"></div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-stock" onclick="switchMode('stock')">📈 股票精选</div>
    <div class="tab" id="tab-index" onclick="switchMode('index')">📊 指数精选</div>
  </div>

  <div class="toolbar">
    <input type="text" class="tb-input" id="filter-input" placeholder="🔍 搜索代码或名称..." oninput="renderTable()">
    <select class="tb-select" id="cat-filter" onchange="renderTable()"><option value="">全部</option><option value="双强">双强</option><option value="龙头">龙头</option></select>
    <select class="tb-select" id="score-filter" onchange="renderTable()"><option value="0">全部得分</option><option value="80">≥80</option><option value="70">≥70</option><option value="60">≥60</option></select>
  </div>

  <div id="table-wrap"><div class="loading">加载中...</div></div>
</div>

<div class="modal-overlay" id="rec-modal"><div class="modal-card"><button class="modal-close" onclick="document.getElementById('rec-modal').style.display='none'">✕</button><div id="rec-content" style="font-size:.68rem;line-height:1.6;color:var(--text)"></div></div></div>
<div class="modal-overlay" id="oneil-modal"><div class="modal-card"><button class="modal-close" onclick="document.getElementById('oneil-modal').style.display='none'">✕</button><div id="oneil-content" style="font-size:.68rem;line-height:1.6;color:var(--text)"></div></div></div>

<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandText:'每日精选',currentPage:'screening'})</script>
<script>
const API='http://localhost:8788';let allItems=[],sortCol='oneil_score',sortDir='desc',currentMode='stock';
const DISPLAY_NAMES={'base_breakout':'基部突破','double_bottom':'双重底','flat_base':'扁平基部','saucer_base':'碟形基部','standard_breakout':'标准突破','cup_handle':'杯柄突破','pocket_pivot':'口袋支点','top_pattern':'顶部形态','climax_top':'高潮见顶','breakout_failure':'突破失败','distribution_day':'抛盘日','box_range':'箱体震荡','high_tight_flag':'高紧旗','stepping_bottom':'递升底部','lower_low_breakout':'递升突破','cdl':'K线形态','talib':'TA指标','volume_divergence':'量价背离','railroad_tracks':'铁轨线','double_top':'双重顶','head_shoulders_top':'头肩顶'};
function cn(s){return DISPLAY_NAMES[s]||s}
function switchMode(mode){currentMode=mode;document.getElementById('tab-stock').className='tab'+(mode==='stock'?' active':'');document.getElementById('tab-index').className='tab'+(mode==='index'?' active':'');document.getElementById('cat-filter').style.display=mode==='stock'?'':'none';document.getElementById('score-filter').style.display=mode==='stock'?'':'none';allItems=[];sortCol=(mode==='stock'?'oneil_score':'index_score');document.getElementById('table-wrap').innerHTML='<div class="loading">加载中...</div>';load()}
async function load(){try{const r=await fetch(API+'/api/discipline/screening?mode='+currentMode);const d=await r.json();if(d.market_warning){document.getElementById('info-row').insertAdjacentHTML('beforebegin','<div style="background:rgba(251,191,36,.15);border:1.5px solid rgba(251,191,36,.3);border-radius:16px;padding:6px 14px;margin:8px 0;font-size:.62rem;font-weight:700;color:#B45309;text-align:center">⚠ <b>市场提醒</b>：当前大盘处于"'+d.market_phase+'"阶段，非理想买入环境。</div>')}allItems=d.items||[];document.getElementById('info-row').innerHTML=d.date+' · '+d.count+' 只 · 大盘: '+(d.market_phase||'—')+' · 建议仓位: '+(allItems[0]?.suggested_position_size||'—')+'%';const ph=d.market_phase||'';const b=document.getElementById('market-badge');if(ph.includes('上升')||ph.includes('确认')){b.className='mkt-badge mkt-up';b.textContent='🟢 '+ph}else if(ph.includes('回调')||ph.includes('修正')){b.className='mkt-badge mkt-cor';b.textContent='🟡 '+ph}else{b.className='mkt-badge mkt-bear';b.textContent=ph||'—'}renderTable()}catch(e){document.getElementById('table-wrap').innerHTML='<div class="loading">加载失败: '+e.message+'</div>'}}
function fs(s){if(s==null)return'<span style="color:var(--text-faint)">—</span>';const v=Math.max(0,Math.min(100,s));let c='#4DE8B2';if(v<60)c='#FBBF24';if(v<40)c='#FF6B8A';return'<span class="sbar"><span class="sbar-track"><span class="sbar-fill" style="width:'+v+'%;background:'+c+'"></span></span><span class="sbar-val" style="color:'+c+'">'+v.toFixed(0)+'</span></span>'}
function renderTable(){const f=(document.getElementById('filter-input').value||'').toLowerCase();const cat=document.getElementById('cat-filter').value;const smin=parseInt(document.getElementById('score-filter').value)||0;let items=allItems.slice();if(currentMode==='index'&&items.length>10)items=items.slice(0,10);if(cat)items=items.filter(i=>(i.rs_category||'').includes(cat));if(f)items=items.filter(i=>(i.stock_code||'').toLowerCase().includes(f)||(i.stock_name||'').toLowerCase().includes(f));if(smin)items=items.filter(i=>(i.oneil_score||0)>=smin);const col=sortCol||'oneil_score',dir=sortDir||'desc';items.sort((a,b)=>{let va=a[col]!=null?a[col]:-Infinity,vb=b[col]!=null?b[col]:-Infinity;if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}return dir==='asc'?(va-vb):(vb-va)});if(!items.length){document.getElementById('table-wrap').innerHTML='<div class="loading">无匹配结果</div>';return}let h='<div class="table-shell"><table class="scr-table"><thead><tr>';if(currentMode==='index'){h+='<th onclick="tc(\'index_score\')">⭐评分'+sa('index_score')+'</th><th onclick="tc(\'index_code\')">代码'+sa('index_code')+'</th><th onclick="tc(\'index_name\')">名称'+sa('index_name')+'</th><th onclick="tc(\'pool_name\')">池'+sa('pool_name')+'</th><th onclick="tc(\'rps_250\')">RPS250'+sa('rps_250')+'</th><th onclick="tc(\'rps_20\')">RPS20'+sa('rps_20')+'</th><th onclick="tc(\'signal_count\')">信号'+sa('signal_count')+'</th><th onclick="tc(\'ideal_buy\')">买点'+sa('ideal_buy')+'</th><th>操作</th>'}else{h+='<th onclick="tc(\'oneil_score\')">⭐评分'+sa('oneil_score')+'</th><th onclick="tc(\'stock_code\')">代码'+sa('stock_code')+'</th><th onclick="tc(\'stock_name\')">名称'+sa('stock_name')+'</th><th onclick="tc(\'industry_name\')">行业'+sa('industry_name')+'</th><th>RS</th><th onclick="tc(\'rps_250\')">RPS250'+sa('rps_250')+'</th><th onclick="tc(\'canslim_total\')">CANSLIM'+sa('canslim_total')+'</th><th onclick="tc(\'signal_count\')">信号'+sa('signal_count')+'</th><th onclick="tc(\'ideal_buy\')">买点'+sa('ideal_buy')+'</th><th onclick="tc(\'resonance_name\')">共振'+sa('resonance_name')+'</th><th>操作</th>'}h+='</tr></thead><tbody>';for(const it of items){h+='<tr>';if(currentMode==='index'){h+='<td>'+fs(it.index_score)+'</td><td><a href="review-index.html?code='+(it.index_code||'')+'">'+(it.index_code||'')+'</a></td><td>'+(it.index_name||'')+'</td><td style="font-size:.54rem;color:var(--text-faint)">'+(it.pool_name||'')+'</td><td>'+((it.rps_250||0).toFixed(0))+'</td><td>'+((it.rps_20||0).toFixed(0))+'</td><td>'+(it.signal_count||0)+'</td><td>'+(it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—')+'</td><td style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap"><button class="bubble-btn cta" onclick="addWL(\''+(it.index_code||'')+'\',\''+(it.index_name||'')+'\')">+自选</button><a class="bubble-btn mint" style="font-weight:300" href="javascript:void(0)" onclick="showIndexOneil(\''+(it.index_code||'')+'\',\''+(it.index_name||'')+'\')" >欧奈尔说</a></a></td>'}else{const cats=(it.rs_category||'').split(' / ').map(c=>{let cl='tag-l';if(c==='加速')cl='tag-b';if(c==='双强')cl='tag-d';return'<span class="tag '+cl+'">'+c.trim()+'</span>'}).join(' ');h+='<td>'+fs(it.oneil_score)+'</td><td><a href="review.html?code='+it.stock_code+'">'+it.stock_code+'</a></td><td>'+(it.stock_name||'')+'</td><td>'+(it.industry_name||'')+'</td><td>'+cats+'</td><td>'+((it.rps_250||0).toFixed(0))+'</td><td>'+(it.canslim_total!=null?it.canslim_total.toFixed(0):'-')+'</td><td>'+(it.signal_count||0)+'</td><td>'+(it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—')+'</td><td>'+(it.resonance_name?'<span style="color:#E65100;font-weight:700">'+it.resonance_name+'</span><br><span style="font-size:.46rem;color:var(--text-faint)">'+(it.resonance_pool||'')+'</span>':'—')+'</td><td style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap"><button class="bubble-btn cta" onclick="addWL(\''+it.stock_code+'\',\''+it.stock_name+'\')">+自选</button><a class="bubble-btn" style="font-weight:300" href="javascript:void(0)" onclick="showRec(\''+it.stock_code+'\',\''+it.stock_name+'\')" >精选理由</a></a><a class="bubble-btn mint" style="font-weight:300" href="javascript:void(0)" onclick="showOneil(\''+it.stock_code+'\',\''+it.stock_name+'\')" >欧奈尔说</a></a></td>'}h+='</tr>'}h+='</tbody></table></div>';document.getElementById('table-wrap').innerHTML=h}
function sa(c){return c===sortCol?(sortDir==='asc'?' ▲':' ▼'):''}
function tc(c){if(sortCol===c)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=c;sortDir='desc'}renderTable()}
let loadingRec=false;
async function addWL(code,name){if(loadingRec)return;loadingRec=true;try{const r=await fetch(API+'/api/discipline/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stock_code:code,stock_name:name})});const d=await r.json();alert(d.added?'⭐ 已加入自选池！':(d.error||'失败'))}catch(e){alert('请求失败')}finally{loadingRec=false}}
async function showRec(code,name){document.getElementById('rec-modal').style.display='block';document.getElementById('rec-content').innerHTML='<div class="loading">加载中...</div>';try{const r=await fetch(API+'/api/discipline/recommendation/'+code);const d=await r.json();let html='<h2>📝 '+d.stock_name+'（'+d.stock_code+'）</h2>';html+='<p style="color:var(--text-faint);font-size:.6rem;margin:0 0 14px;">'+(d.industry||'')+' · '+new Date().toLocaleString()+'</p>';const m=d.market||{};html+='<p style="font-size:.72rem;line-height:1.6;">基于 CAN SLIM 体系对 <b>'+d.stock_name+'</b> 进行了六层评估。</p>';html+='<h3 style="color:var(--lavender);margin:16px 0 6px;font-size:.75rem;">第一层 · 大盘环境</h3><p style="font-size:.68rem">市场处于 <b>'+(m.phase||'—')+'</b>，建议仓位 <b>'+(m.position||'—')+'%</b>。</p>';html+='<h3 style="color:var(--lavender);margin:16px 0 6px;font-size:.75rem;">第二层 · RS 动量</h3><p style="font-size:.68rem">RPS250: <b>'+((d.rs||{}).rps_250||0).toFixed(0)+'</b></p>';html+='<h3 style="color:var(--lavender);margin:16px 0 6px;font-size:.75rem;">第三层 · CANSLIM</h3><p style="font-size:.68rem">评分 <b>'+((d.canslim||{}).score||'—')+'</b></p>';html+='<h3 style="color:var(--lavender);margin:16px 0 6px;font-size:.75rem;">第四层 · 信号</h3><p style="font-size:.68rem">近5日买入信号: <b>'+(d.signals?.buy||0)+'</b> 个</p>';html+='<hr style="border:0;border-top:1.5px solid rgba(167,139,250,.1);margin:18px 0;">';html+='<p style="font-size:.55rem;color:var(--text-faint);">⚠ 不构成投资建议。</p>';document.getElementById('rec-content').innerHTML=html}catch(e){document.getElementById('rec-content').innerHTML='<div class="loading">加载失败</div>'}}
async function showOneil(code,name){const modal=document.getElementById('oneil-modal');const content=document.getElementById('oneil-content');modal.style.display='block';content.innerHTML='<div class="loading">🧭 欧奈尔正在深度审视...</div>';try{const r=await fetch(API+'/api/discipline/oneil-analysis/'+code);const d=await r.json();if(d.html){content.innerHTML='<h2>🧭 欧奈尔说：'+(name||code)+'（'+code+'）</h2><p style="color:var(--text-faint);font-size:.58rem;margin:0 0 16px;">AI 深度分析 · 基于《像欧奈尔信徒一样交易》</p>'+d.html+'<p style="font-size:.5rem;color:var(--text-faint);margin-top:12px;"><i>"意见观点无所谓，只有事实以及量价同市场运行一样真实。" —— 比尔·欧奈尔</i></p>'}else{content.innerHTML='<div class="loading">AI 未返回内容</div>'}}catch(e){content.innerHTML='<div class="loading">❌ 分析失败</div>'}}
async function showIndexOneil(code,name){const modal=document.getElementById('oneil-modal');const content=document.getElementById('oneil-content');modal.style.display='block';content.innerHTML='<div class="loading">🧭 欧奈尔正在深度审视...</div>';try{const r=await fetch(API+'/api/discipline/oneil-analysis-index/'+code);const d=await r.json();if(d.html){content.innerHTML='<h2>🧭 欧奈尔说：'+(name||code)+'（'+code+'）</h2><p style="color:var(--text-faint);font-size:.58rem;margin:0 0 16px;">指数深度分析</p>'+d.html}else{content.innerHTML='<div class="loading">AI 未返回内容</div>'}}catch(e){content.innerHTML='<div class="loading">❌ 分析失败</div>'}}

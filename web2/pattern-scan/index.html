<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🔎</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>形态识别 · 知行</title>
<script src="../shared/js/echarts.min.js"></script>
<style>
  :root {
    --parchment: #F5F4ED;
    --ivory: #FAF9F5;
    --sand: #E8E6DC;
    --ink: #1B365D;
    --ink-light: #2D5A8A;
    --near-black: #141413;
    --dark-warm: #3D3D3A;
    --stone: #6b6a64;
    --error: #B53333;
    --card-bg: var(--ivory);
    --text-primary: var(--near-black);
    --text-secondary: var(--stone);
    --text-tertiary: #8b8a84;
    --divider: var(--sand);
    --accent: var(--ink);
    --accent-subtle: rgba(27,54,93,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--parchment);color:var(--near-black);
    font-family:"Noto Sans SC","Helvetica Neue",sans-serif;
    line-height:1.5;
    max-width:1300px;margin:0 auto;
    -webkit-font-smoothing:antialiased;
  }
  .app-container{padding:20px 28px 60px}

  /* Top bar */
  .top-bar{display:flex;gap:12px;align-items:flex-end;padding:16px 20px;background:var(--ivory);border:1px solid var(--sand);border-radius:14px;margin-bottom:12px;flex-wrap:wrap}
  .top-bar .fld{flex:1;min-width:90px}
  .top-bar label{display:block;font-size:0.6rem;font-weight:500;color:var(--text-tertiary);margin-bottom:3px}
  .top-bar input,.top-bar select{width:100%;padding:7px 10px;border:1px solid var(--sand);border-radius:10px;font-size:0.75rem;background:var(--parchment);color:var(--text-primary);box-sizing:border-box;font-family:inherit}
  .btn-scan{padding:8px 24px;background:var(--ink);color:#FFF;border:none;border-radius:12px;font-size:0.85rem;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
  .btn-scan:hover{opacity:0.9}
  .btn-scan:disabled{background:var(--sand);cursor:not-allowed;color:var(--stone)}

  /* Mode buttons */
  .mode-btn{padding:3px 8px;border:1px solid var(--sand);border-radius:8px;background:var(--ivory);color:var(--text-secondary);font-size:0.6rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .mode-btn.active{background:var(--ink);color:#FFF;border-color:var(--ink);font-weight:500}

  /* Chart controls */
  .chart-controls{display:flex;gap:16px;align-items:center;padding:6px 0;margin-bottom:6px}
  .chart-controls .ctrl-group{display:flex;align-items:center;gap:4px}
  .chart-controls .ctrl-label{font-size:0.6rem;font-weight:500;color:var(--text-tertiary);margin-right:4px}
  .chart-controls .ctrl-btn{padding:4px 12px;border:1px solid var(--sand);border-radius:10px;background:var(--ivory);color:var(--text-secondary);font-size:0.68rem;cursor:pointer;transition:all 0.15s;font-family:inherit}
  .chart-controls .ctrl-btn:hover{border-color:var(--ink);color:var(--ink)}
  .chart-controls .ctrl-btn.active{background:var(--ink);color:#FFF;border-color:var(--ink);font-weight:500}

  /* Chart */
  .chart-wrap{width:100%;height:560px;margin-bottom:0}

  /* Signal legend */
  .signal-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0 10px 0;font-size:0.62rem;align-items:center;color:var(--text-tertiary)}
  .signal-legend .sl-item{display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;color:var(--text-secondary)}
  .signal-legend .sl-sym{font-size:0.9rem;line-height:1}

  /* Bottom layout */
  .bottom-layout{display:flex;gap:14px;align-items:flex-start;margin-bottom:10px}
  .bottom-left{flex:1;min-width:0}
  .bottom-right{width:340px;flex-shrink:0}

  /* Cards */
  .xhs-card{background:var(--ivory);border:1px solid var(--sand);border-radius:14px;overflow:hidden;margin-bottom:8px}
  .xhs-card-header{padding:10px 14px;border-bottom:1px solid var(--sand)}
  .xhs-card-label{font-family:Georgia,serif;font-size:0.72rem;font-weight:400;color:var(--ink);letter-spacing:-0.01em}

  /* Timeline */
  .timeline-wrap{max-height:520px;overflow-y:auto}
  .tl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 8px;cursor:pointer;transition:background 0.15s;border-radius:10px;border-bottom:1px solid var(--sand)}
  .tl-item:last-child{border-bottom:none}
  .tl-item:hover{background:var(--accent-subtle)}
  .tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
  .tl-info{flex:1;min-width:0}
  .tl-date{font-size:0.62rem;color:var(--text-tertiary)}
  .tl-name{font-size:0.75rem;font-weight:600;color:var(--text-primary)}
  .tl-desc{font-size:0.62rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tl-empty{font-size:0.72rem;color:var(--text-tertiary);text-align:center;padding:32px 0}

  /* Legend row */
  .legend-row{display:flex;gap:12px;flex-wrap:wrap;padding:6px 0;font-size:0.62rem;align-items:center}
  .legend-row .lg-item{display:flex;align-items:center;gap:5px;cursor:default}
  .legend-row .lg-dot{width:9px;height:9px;border-radius:2px}
  .legend-row .lg-circle{border-radius:50%}

  /* Recommendation */
  .rec-section{margin-bottom:8px}
  .rec-section:last-child{margin-bottom:0}
  .rec-label{font-size:0.62rem;font-weight:600;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:4px}
  .rec-text{font-size:0.7rem;color:var(--text-secondary);line-height:1.5}

  @media(max-width:900px){.bottom-layout{flex-direction:column}.bottom-right{width:100%}}
</style>
</head>
<body>
<div class="app-container">
  <nav id="top-nav"></nav>

  <div class="top-bar">
    <div class="fld" style="flex:0.7;min-width:160px"><label>股票/指数代码</label><div style="display:flex;gap:6px;align-items:center"><button class="mode-btn active" id="btn-stock" onclick="switchMode('stock')">个股</button><button class="mode-btn" id="btn-index" onclick="switchMode('index')">指数</button><input type="text" id="code" value="600519" style="flex:1" onkeydown="if(event.key==='Enter')scan()"><span id="stock-name" style="font-size:0.65rem;color:var(--text-tertiary);white-space:nowrap;flex-shrink:0"></span></div></div>
    <div class="fld"><label>开始日期</label><input type="date" id="date-start"></div>
    <div class="fld"><label>结束日期</label><input type="date" id="date-end"></div>
    <button class="btn-scan" onclick="scan()">🔍 扫描</button>
  </div>

  <div class="chart-controls">
    <div class="ctrl-group">
      <span class="ctrl-label">指标</span>
      <button class="ctrl-btn active" id="btn-ma" onclick="toggleOverlay('ma')">📈 均线</button>
      <button class="ctrl-btn" id="btn-bb" onclick="toggleOverlay('bb')">📊 布林</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">周期</span>
      <button class="ctrl-btn active" id="btn-daily" onclick="switchPeriod('daily')">日K</button>
      <button class="ctrl-btn" id="btn-weekly" onclick="switchPeriod('weekly')">周K</button>
      <button class="ctrl-btn" id="btn-monthly" onclick="switchPeriod('monthly')">月K</button>
    </div>
  </div>

  <div class="chart-wrap" id="chart"></div>
  <div class="signal-legend" id="signal-legend"></div>

  <div class="bottom-layout">
    <div class="bottom-left">
      <div class="xhs-card" style="min-height:180px">
        <div class="xhs-card-header"><span class="xhs-card-label">📊 分析建议</span></div>
        <div id="rec-content" style="color:var(--text-tertiary);font-size:0.7rem;padding:12px 14px">点击「扫描」查看分析建议</div>
      </div>
    </div>
    <div class="bottom-right">
      <div class="xhs-card">
        <div class="xhs-card-header"><span class="xhs-card-label">📅 信号时间线</span></div>
        <div class="timeline-wrap" id="timeline-wrap">
          <div class="tl-empty" id="tl-empty">暂无信号</div>
          <div id="tl-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="legend-row" id="legend-row"></div>
</div>

<script src="app.js"></script>
<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandText:'形态识别',currentPage:'pattern-scan'})</script>
</body>
</html>

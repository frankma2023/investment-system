<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抛盘日回测 · NEO 全息终端</title>
<link rel="stylesheet" href="../shared/themes/neo.css">
<link rel="stylesheet" href="../shared/css/dashboard-base.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
  .bt-layout { display:flex; gap:16px; align-items:flex-start; }
  .bt-left { width:330px; flex-shrink:0; display:flex; flex-direction:column; gap:12px; }
  .bt-right { flex:1; min-width:0; display:flex; flex-direction:column; gap:16px; }
  .date-row { display:flex; gap:8px; }
  .date-row .date-field { flex:1; }
  .date-field label { display:block; font-family:var(--font-display); font-size:0.55rem; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
  .date-field input { width:100%; padding:7px 10px; border:1px solid var(--glass-border); border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:0.72rem; background:var(--bg-input); color:var(--text-primary); }
  .index-select-wrap label { display:block; font-family:var(--font-display); font-size:0.55rem; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
  .index-select-wrap select { width:100%; padding:7px 10px; border:1px solid var(--glass-border); border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:0.75rem; background:var(--bg-input); color:var(--text-primary); }

  .btn-run {
    display:block; width:100%; padding:10px;
    background:var(--neon-cyan); color:var(--bg-deep); border:none;
    border-radius:var(--radius-sm); font-family:var(--font-display);
    font-size:0.78rem; font-weight:700; cursor:pointer;
    letter-spacing:0.08em; transition:opacity 0.2s, box-shadow 0.2s;
    text-transform:uppercase;
  }
  .btn-run:hover { opacity:0.85; box-shadow:0 0 16px rgba(0,229,255,0.3); }
  .btn-run:disabled { background:var(--border); cursor:not-allowed; box-shadow:none; }
  .btn-save {
    display:block; width:100%; padding:8px;
    background:var(--glass-bg); color:var(--neon-cyan);
    border:1px solid var(--glass-border); border-radius:var(--radius-sm);
    font-family:var(--font-display); font-size:0.68rem; font-weight:600;
    cursor:pointer; letter-spacing:0.06em; transition:border-color 0.2s;
  }
  .btn-save:hover { border-color:var(--border-bright); }
  .btn-compare {
    padding:8px 16px; background:var(--glass-bg); color:var(--text-secondary);
    border:1px solid var(--glass-border); border-radius:var(--radius-sm);
    font-family:var(--font-display); font-size:0.65rem; font-weight:500; cursor:pointer; letter-spacing:0.04em;
  }

  /* ── NEO Param Card ── */
  .neo-param { background:var(--glass-bg); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-card); position:relative; }
  .neo-param::before { content:''; position:absolute; top:0;right:0; pointer-events:none; width:20px;height:20px; border-right:1px solid rgba(0,200,255,0.12); border-top:1px solid rgba(0,200,255,0.12); }
  .neo-param-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; cursor:pointer; border-bottom:1px solid rgba(0,200,255,0.06); }
  .neo-param-header .dot { width:8px; height:8px; border-radius:50%; margin-right:8px; flex-shrink:0; }
  .neo-param-header .title { font-family:var(--font-display); font-size:0.65rem; font-weight:600; flex:1; letter-spacing:0.06em; text-transform:uppercase; }
  .neo-param-header .toggle { position:relative; width:36px; height:20px; border-radius:10px; border:none; cursor:pointer; transition:background 0.2s; }
  .neo-param-header .toggle.on { background:var(--neon-cyan); box-shadow:0 0 8px rgba(0,229,255,0.3); }
  .neo-param-header .toggle.off { background:rgba(0,200,255,0.1); }
  .neo-param-header .toggle::after { content:''; position:absolute; top:2px; width:16px; height:16px; border-radius:50%; background:#05080f; transition:left 0.2s; }
  .neo-param-header .toggle.on::after { left:18px; }
  .neo-param-header .toggle.off::after { left:2px; }
  .neo-param-body { padding:10px 14px 12px; }
  .neo-param-body.collapsed { display:none; }

  .slider-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .slider-row:last-child { margin-bottom:0; }
  .slider-row .s-label { width:64px; font-size:0.58rem; color:var(--text-tertiary); font-family:var(--font-display); flex-shrink:0; text-transform:uppercase; letter-spacing:0.05em; }
  .slider-row input[type=range] { flex:1; height:3px; -webkit-appearance:none; background:rgba(0,200,255,0.1); border-radius:2px; outline:none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:2px; background:var(--neon-cyan); cursor:pointer; border:2px solid #05080f; box-shadow:0 0 6px rgba(0,229,255,0.4); }
  .slider-row .s-val { width:50px; text-align:right; font-size:0.62rem; font-weight:700; color:var(--neon-cyan); font-family:var(--font-display); flex-shrink:0; }

  .stat-cards { display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--glass-border); border-radius:var(--radius-md); overflow:hidden; }
  .stat-card { background:var(--glass-bg); backdrop-filter:blur(10px); padding:10px 8px; text-align:center; }
  .stat-value { font-family:var(--font-display); font-size:1.2rem; font-weight:700; color:var(--text-primary); letter-spacing:0.04em; }
  .stat-label { font-size:0.55rem; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.08em; font-family:var(--font-display); margin-top:2px; }
  .stat-value.up { color:var(--color-up); text-shadow:0 0 6px var(--color-up-glow); }
  .stat-value.down { color:var(--color-down); text-shadow:0 0 6px var(--color-down-glow); }

  #compare-panel { display:none; margin-top:12px; padding:14px; background:var(--glass-bg); backdrop-filter:blur(10px); border:1px solid var(--glass-border); border-radius:var(--radius-lg); }
  #compare-panel select { width:100%; padding:6px 10px; border-radius:var(--radius-sm); border:1px solid var(--glass-border); font-family:var(--font-mono); font-size:0.68rem; background:var(--bg-input); color:var(--text-primary); margin-bottom:4px; }

  #table-signals .data-table { min-width:900px; }
  #table-signals .data-table td { font-size:0.62rem; }

  @media (max-width:900px) { .bt-layout { flex-direction:column; } .bt-left { width:100%; } .stat-cards { grid-template-columns:repeat(3,1fr); } }
</style>
</head>
<body class="neo-body">

<nav class="neo-nav">
  <span class="neo-nav-brand">DD_PRTCL v3.7</span>
  <div class="neo-nav-links">
    <a href="#" class="neo-nav-link active">[抛盘日]</a>
    <a href="#" class="neo-nav-link">[追盘日]</a>
    <a href="#" class="neo-nav-link">[大盘扫描]</a>
    <a href="#" class="neo-nav-link">[指数扫描]</a>
    <a href="#" class="neo-nav-link">[买入形态]</a>
    <a href="#" class="neo-nav-link">[仓位管理]</a>
  </div>
  <div class="nav-actions">
    <span class="neo-sync-pulse"></span>
    <span style="font-family:var(--font-display);font-size:0.58rem;color:var(--text-tertiary);letter-spacing:0.08em;">DIST-DAY V3</span>
    <button class="theme-btn" onclick="toggleTheme()">◈</button>
  </div>
</nav>

<div class="dashboard" style="padding-top:16px">

  <div class="bt-layout">

    <!-- ═══ LEFT ═══ -->
    <div class="bt-left">

      <div class="neo-card" style="padding:16px">
        <div class="neo-card-label">回测设置</div>
        <div class="index-select-wrap">
          <label>INDEX</label>
          <select id="index-select"></select>
        </div>
        <div class="date-row" style="margin-top:10px">
          <div class="date-field"><label>开始</label><input type="date" id="date-start"></div>
          <div class="date-field"><label>结束</label><input type="date" id="date-end"></div>
        </div>
      </div>

      <!-- Card 1 -->
      <div class="neo-param" id="card1">
        <div class="neo-param-header" onclick="toggleCard('card1')">
          <span class="dot" style="background:var(--color-up);box-shadow:0 0 6px var(--color-up-glow)"></span>
          <span class="title" style="color:var(--color-up)">标准抛盘</span>
          <button class="toggle on" id="card1-toggle" onclick="event.stopPropagation();toggleCardEnabled('card1')"></button>
        </div>
        <div class="neo-param-body" id="card1-body">
          <div class="slider-row"><span class="s-label">跌幅 ≤</span><input type="range" id="c1-decline" min="-5.0" max="0" step="0.05" value="-0.10" oninput="syncSlider('c1-decline')"><span class="s-val" id="c1-decline-v">−0.10%</span></div>
          <div class="slider-row"><span class="s-label">量比 ≥</span><input type="range" id="c1-vol" min="0.80" max="2.00" step="0.01" value="1.00" oninput="syncSlider('c1-vol')"><span class="s-val" id="c1-vol-v">1.00</span></div>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="neo-param" id="card2">
        <div class="neo-param-header" onclick="toggleCard('card2')">
          <span class="dot" style="background:var(--neon-amber);box-shadow:0 0 6px rgba(255,171,0,0.4)"></span>
          <span class="title" style="color:var(--neon-amber)">假阳线（伪装）</span>
          <button class="toggle on" id="card2-toggle" onclick="event.stopPropagation();toggleCardEnabled('card2')"></button>
        </div>
        <div class="neo-param-body" id="card2-body">
          <div class="slider-row"><span class="s-label">涨幅 ≥</span><input type="range" id="c2-chg-min" min="-1.0" max="1.0" step="0.05" value="-0.30" oninput="syncSlider('c2-chg-min')"><span class="s-val" id="c2-chg-min-v">−0.30%</span></div>
          <div class="slider-row"><span class="s-label">涨幅 ≤</span><input type="range" id="c2-chg-max" min="-1.0" max="1.0" step="0.05" value="0.20" oninput="syncSlider('c2-chg-max')"><span class="s-val" id="c2-chg-max-v">0.20%</span></div>
          <div class="slider-row"><span class="s-label">冲高 ≥</span><input type="range" id="c2-surge" min="0" max="5.0" step="0.1" value="0.50" oninput="syncSlider('c2-surge')"><span class="s-val" id="c2-surge-v">0.50%</span></div>
          <div class="slider-row"><span class="s-label">量比 ≥</span><input type="range" id="c2-vol" min="0.90" max="2.00" step="0.05" value="1.10" oninput="syncSlider('c2-vol')"><span class="s-val" id="c2-vol-v">1.10</span></div>
          <div class="slider-row"><span class="s-label">上影 ≥</span><input type="range" id="c2-shadow" min="1.0" max="3.0" step="0.1" value="1.5" oninput="syncSlider('c2-shadow')"><span class="s-val" id="c2-shadow-v">1.5×</span></div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="neo-param" id="card3">
        <div class="neo-param-header" onclick="toggleCard('card3')">
          <span class="dot" style="background:var(--neon-purple);box-shadow:0 0 6px rgba(213,0,249,0.4)"></span>
          <span class="title" style="color:var(--neon-purple)">盘中反转</span>
          <button class="toggle on" id="card3-toggle" onclick="event.stopPropagation();toggleCardEnabled('card3')"></button>
        </div>
        <div class="neo-param-body" id="card3-body">
          <div class="slider-row"><span class="s-label">冲高 ≥</span><input type="range" id="c3-surge" min="0" max="5.0" step="0.1" value="0.50" oninput="syncSlider('c3-surge')"><span class="s-val" id="c3-surge-v">0.50%</span></div>
          <div class="slider-row"><span class="s-label">量比 ≥</span><input type="range" id="c3-vol" min="0.90" max="2.00" step="0.05" value="1.10" oninput="syncSlider('c3-vol')"><span class="s-val" id="c3-vol-v">1.10</span></div>
          <div class="slider-row"><span class="s-label">上影 ≥</span><input type="range" id="c3-shadow" min="1.0" max="3.0" step="0.1" value="1.5" oninput="syncSlider('c3-shadow')"><span class="s-val" id="c3-shadow-v">1.5×</span></div>
          <div class="slider-row"><span class="s-label">收盘 ≤ 中价</span><input type="range" id="c3-midpt" min="30" max="70" step="1" value="50" oninput="syncSliderInt('c3-midpt')"><span class="s-val" id="c3-midpt-v">50%</span></div>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="neo-param" id="card4">
        <div class="neo-param-header" onclick="toggleCard('card4')">
          <span class="dot" style="background:var(--text-primary)"></span>
          <span class="title" style="color:var(--text-primary)">重抛盘 ×2</span>
          <button class="toggle on" id="card4-toggle" onclick="event.stopPropagation();toggleCardEnabled('card4')"></button>
        </div>
        <div class="neo-param-body" id="card4-body">
          <div class="slider-row"><span class="s-label">跌幅 ≤</span><input type="range" id="c4-decline" min="-10.0" max="0" step="0.1" value="-1.50" oninput="syncSlider('c4-decline')"><span class="s-val" id="c4-decline-v">−1.50%</span></div>
          <div class="slider-row"><span class="s-label">量比 ≥</span><input type="range" id="c4-vol" min="0.80" max="2.00" step="0.01" value="0.98" oninput="syncSlider('c4-vol')"><span class="s-val" id="c4-vol-v">0.98</span></div>
        </div>
      </div>

      <button class="btn-run" id="btn-run">▶ 运行回测</button>
      <button class="btn-save" id="btn-save">保存配置</button>
      <button class="btn-compare" id="btn-compare">对比历史</button>

      <div id="compare-panel">
        <div style="font-weight:700;margin-bottom:8px;font-family:var(--font-display);font-size:0.65rem;color:var(--neon-cyan);letter-spacing:0.06em;">◆ 对比两次回测</div>
        <select id="compare-select-1"></select>
        <select id="compare-select-2"></select>
        <button class="btn-run" style="font-size:0.7rem;margin-top:8px" onclick="runComparison()">对比</button>
      </div>
    </div>

    <!-- ═══ RIGHT ═══ -->
    <div class="bt-right">
      <div class="stat-cards">
        <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label">交易日</div></div>
        <div class="stat-card"><div class="stat-value up" id="stat-signals">—</div><div class="stat-label">信号</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-standard">—</div><div class="stat-label">标准</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-special">—</div><div class="stat-label">假阳线</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-reverse">—</div><div class="stat-label">反转</div></div>
        <div class="stat-card"><div class="stat-value up" id="stat-heavy">—</div><div class="stat-label">重×2</div></div>
      </div>

      <div class="section">
        <div class="neo-card-label">◆ K线 · 抛盘日标记</div>
        <div class="neo-card">
          <div class="chart-container" id="chart-kline" style="height:480px;"></div>
        </div>
      </div>

      <div class="section">
        <div class="neo-card-label">◆ 抛盘日明细 <span style="font-size:0.55rem;color:var(--text-tertiary)">点击表头排序</span></div>
        <div class="neo-card">
          <div class="table-wrap" id="table-signals"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  function toggleTheme() {
    var html = document.documentElement;
    var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem('dd-neo-theme', next);
  }
  (function() {
    var s = localStorage.getItem('dd-neo-theme') || 'dark';
    document.documentElement.dataset.theme = s;
  })();

  function toggleCard(id) {
    var b = document.getElementById(id+'-body');
    if (b) b.classList.toggle('collapsed');
  }
  function toggleCardEnabled(id) {
    var b = document.getElementById(id+'-toggle');
    b.classList.toggle('on'); b.classList.toggle('off');
  }
  function syncSlider(id) {
    var el = document.getElementById(id);
    var v = document.getElementById(id+'-v');
    if (!el || !v) return;
    var val = parseFloat(el.value);
    if (id.includes('decline') || id.includes('chg-min') || id.includes('chg-max')) v.textContent = (val>=0?'+':'') + val.toFixed(2) + '%';
    else if (id.includes('shadow')) v.textContent = val.toFixed(1) + '×';
    else if (id.includes('vol')) v.textContent = val.toFixed(2);
    else if (id.includes('surge')) v.textContent = val.toFixed(2) + '%';
  }
  function syncSliderInt(id) {
    var el = document.getElementById(id);
    var v = document.getElementById(id+'-v');
    if (!el || !v) return;
    v.textContent = el.value + '%';
  }
</script>
<script src="../shared/js/api-client.js"></script>
<script src="../shared/js/kline-chart.js?v=20260505b"></script>
<script src="../distribution-day/js/table.js?v=20260505b"></script>
<script src="../distribution-day/js/main.js?v=20260429e"></script>
</body>
</html>

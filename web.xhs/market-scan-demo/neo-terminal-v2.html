<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO-TERMINAL v2 · A股量化全息看板</title>
<script src="../shared/js/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');

/* ═══════════ DARK MODE (03-future-tech original) ═══════════ */
:root {
  --bg-deep: #05080f;
  --bg-surface: rgba(10,15,30,0.8);
  --bg-card: rgba(16,24,48,0.6);
  --bg-card-hover: rgba(20,30,60,0.8);
  --border-glow: rgba(0,200,255,0.15);
  --border-bright: rgba(0,200,255,0.4);
  --neon-cyan: #00e5ff;
  --neon-magenta: #ff4081;
  --neon-green: #76ff03;
  --neon-amber: #ffab00;
  --neon-purple: #d500f9;
  --text-primary: #e0f0ff;
  --text-secondary: #80b0d0;
  --text-dim: #406080;
  --glass-bg: rgba(10,20,50,0.5);
  --glass-border: rgba(0,200,255,0.1);
  --color-up: #ff4466;
  --color-up-glow: rgba(255,68,102,0.3);
  --color-down: #00e676;
  --color-down-glow: rgba(0,230,118,0.3);
  --font-tech: 'Share Tech Mono', 'Noto Sans SC', monospace;
  --font-display: 'Orbitron', 'Noto Sans SC', sans-serif;
  --nav-bg: rgba(5,8,15,0.92);
}

/* ═══════════ LIGHT MODE ═══════════ */
[data-theme="light"] {
  --bg-deep: #eef2f8;
  --bg-surface: rgba(240,244,250,0.9);
  --bg-card: rgba(255,255,255,0.75);
  --bg-card-hover: rgba(255,255,255,0.92);
  --border-glow: rgba(0,140,200,0.15);
  --border-bright: rgba(0,140,200,0.35);
  --neon-cyan: #0080b8;
  --neon-magenta: #c83050;
  --neon-green: #2a8a40;
  --neon-amber: #b87800;
  --neon-purple: #7a30c0;
  --text-primary: #0a1620;
  --text-secondary: #4a6078;
  --text-dim: #7a90a8;
  --glass-bg: rgba(255,255,255,0.6);
  --glass-border: rgba(0,140,200,0.12);
  --color-up: #d43050;
  --color-up-glow: rgba(212,48,80,0.15);
  --color-down: #1a8a40;
  --color-down-glow: rgba(26,138,64,0.15);
  --nav-bg: rgba(238,242,248,0.92);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-tech);
  min-height: 100vh;
  overflow-x: hidden;
  letter-spacing: 0.02em;
}

/* Scanline overlay */
body::after {
  content: ''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}
[data-theme="light"] body::after { opacity:0.4; }

/* Grid */
body::before {
  content: ''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ═══════════ NAV ═══════════ */
.nav {
  position: sticky; top:0; z-index:100;
  background: var(--nav-bg); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-glow);
  display: flex; align-items: center; padding: 0 24px; height: 48px;
}
.nav::after {
  content:''; position:absolute; bottom:-1px; left:0;
  width:200px; height:2px;
  background: linear-gradient(90deg, var(--neon-cyan), transparent);
}
.nav-brand {
  font-family: var(--font-display);
  font-size: 0.7rem; font-weight: 700; color: var(--neon-cyan);
  letter-spacing: 0.12em; text-shadow: 0 0 20px rgba(0,229,255,0.3);
  margin-right: 24px; text-transform: uppercase;
}
.nav-links { display:flex; gap:1px; flex:1; overflow-x:auto; }
.nav-link {
  padding: 6px 14px; border-radius: 3px;
  font-size: 0.66rem; color: var(--text-secondary);
  text-decoration: none; white-space: nowrap;
  transition: all 0.2s; letter-spacing: 0.04em;
  font-family: var(--font-display);
}
.nav-link:hover { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,229,255,0.3); }
.nav-link.active {
  color: var(--neon-cyan); background: rgba(0,200,255,0.06);
  border: 1px solid rgba(0,200,255,0.15);
  box-shadow: 0 0 8px rgba(0,200,255,0.1);
}
.nav-actions { display:flex; align-items:center; gap:14px; margin-left:auto; }
.theme-btn {
  width: 32px; height: 32px; border-radius: 3px;
  border: 1px solid var(--glass-border); background: var(--glass-bg);
  color: var(--neon-cyan); cursor: pointer;
  display:flex; align-items:center; justify-content:center;
  font-size: 0.85rem; transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--border-bright); box-shadow: 0 0 12px rgba(0,229,255,0.15); }
.sync-pulse {
  width:8px; height:8px; background:var(--neon-green); border-radius:50%;
  box-shadow: 0 0 8px var(--neon-green), 0 0 20px var(--neon-green);
  animation: syncPulse 1.5s ease-in-out infinite;
}
@keyframes syncPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }

.dashboard {
  max-width: 1520px; margin:0 auto; padding:20px 24px 40px; position:relative; z-index:1;
}

/* Grid */
.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:18px; }

/* ═══════════ GLASS CARD ═══════════ */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 6px;
  padding: 20px; position: relative; overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.glass-card:hover {
  border-color: var(--border-bright);
  box-shadow: 0 0 30px rgba(0,200,255,0.08), inset 0 0 30px rgba(0,200,255,0.02);
}
.glass-card::before {
  content:''; position:absolute; top:0; right:0; pointer-events:none;
  width:30px; height:30px;
  border-right:1px solid rgba(0,200,255,0.15);
  border-top:1px solid rgba(0,200,255,0.15);
}
.card-label {
  font-family: var(--font-display); font-size: 0.55rem;
  color: var(--neon-cyan); text-transform: uppercase;
  letter-spacing: 0.15em; margin-bottom: 14px;
  display:flex; align-items:center; gap:8px;
}
.card-label::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, var(--border-glow), transparent);
}
.section { margin-bottom:18px; }

/* ═══════════ STATE BANNER ═══════════ */
.state-banner {
  display:grid; grid-template-columns:repeat(8,1fr);
  gap:1px; background:var(--glass-border); border-radius:6px;
  overflow:hidden; margin-bottom:18px; border:1px solid var(--glass-border);
}
.state-card {
  background: var(--glass-bg); backdrop-filter: blur(12px);
  padding: 12px 10px; text-align: center;
  transition: border-color 0.3s;
}
.state-card.active { border-color: var(--neon-amber); box-shadow: 0 0 20px rgba(255,171,0,0.08); }
.state-value {
  font-family: var(--font-display); font-size: 0.8rem;
  font-weight: 700; color: var(--text-primary); letter-spacing: 0.06em;
}
.state-value.up { color:var(--color-up); text-shadow:0 0 6px var(--color-up-glow); }
.state-value.down { color:var(--color-down); text-shadow:0 0 6px var(--color-down-glow); }
.state-value.warn { color:var(--neon-amber); }
.state-label {
  font-size: 0.55rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px;
  font-family: var(--font-display);
}

/* ═══════════ HOLO NUMBER ═══════════ */
.holo-number {
  font-family: var(--font-display); font-size: 3rem; font-weight: 900;
  background: linear-gradient(180deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1; text-align: center;
  filter: drop-shadow(0 0 15px rgba(0,229,255,0.4));
}
.holo-number.warning {
  background: linear-gradient(180deg, var(--neon-amber) 0%, var(--neon-magenta) 100%);
  -webkit-background-clip: text; background-clip: text;
  filter: drop-shadow(0 0 15px rgba(255,171,0,0.4));
}
.holo-sub {
  font-size: 0.58rem; color: var(--text-dim); text-align: center;
  text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px;
}

/* ═══════════ DATA BARS ═══════════ */
.data-bar-wrap { display:flex; flex-direction:column; gap:8px; }
.data-bar { display:flex; align-items:center; gap:8px; }
.data-bar-label {
  width:44px; font-size:0.58rem; color:var(--text-secondary);
  text-align:right; text-transform:uppercase; letter-spacing:0.08em;
}
.data-bar-track {
  flex:1; height:16px; background:rgba(0,200,255,0.05);
  border:1px solid rgba(0,200,255,0.1); border-radius:2px;
  position:relative; overflow:hidden;
}
.data-bar-fill {
  height:100%; border-radius:1px; position:relative; transition:width 0.8s ease;
}
.data-bar-fill::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation:barShine 3s ease-in-out infinite;
}
@keyframes barShine { 0%,100%{transform:translateX(-100%)} 50%{transform:translateX(100%)} }
.fill-cyan { background:linear-gradient(90deg, rgba(0,229,255,0.3), rgba(0,229,255,0.7)); }
.fill-green { background:linear-gradient(90deg, rgba(118,255,3,0.3), rgba(118,255,3,0.7)); }
.fill-amber { background:linear-gradient(90deg, rgba(255,171,0,0.3), rgba(255,171,0,0.7)); }
.fill-magenta { background:linear-gradient(90deg, rgba(255,64,129,0.3), rgba(255,64,129,0.7)); }
.data-bar-value {
  width:40px; font-family:var(--font-tech); font-size:0.66rem;
  color:var(--text-primary); text-align:right;
}

/* ═══════════ DD GRID ═══════════ */
.dd-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:8px;
}
.dd-cell {
  aspect-ratio:1; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  font-size:0.5rem; font-weight:700; font-family:var(--font-display);
}
.dd-cell.high { background:rgba(255,64,129,0.5); border:1px solid rgba(255,64,129,0.6); color:#fff; }
.dd-cell.medium { background:rgba(255,171,0,0.4); border:1px solid rgba(255,171,0,0.5); color:#fff; }
.dd-cell.empty { border:1px dashed rgba(0,200,255,0.1); }

/* ═══════════ WARNING STRIP ═══════════ */
.warning-strip {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px;
  background:rgba(255,64,129,0.06); border:1px solid rgba(255,64,129,0.2);
  border-left:3px solid var(--neon-magenta); border-radius:4px;
  font-size:0.65rem; color:var(--neon-magenta);
  letter-spacing:0.04em; margin-top:18px;
}
.warn-marker {
  font-family:var(--font-display); font-size:0.8rem;
  animation:warnBlink 2s step-end infinite;
}
@keyframes warnBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ═══════════ DIVERGENCE ═══════════ */
.div-line { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:0.66rem; }
.div-marker { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.div-marker.caution { background:var(--neon-amber); box-shadow:0 0 6px var(--neon-amber); }
.div-marker.danger { background:var(--neon-magenta); box-shadow:0 0 6px var(--neon-magenta); }
.div-marker.ok { background:var(--neon-cyan); box-shadow:0 0 6px var(--neon-cyan); }

/* ═══════════ TABLE ═══════════ */
.table-wrap { overflow-x:auto; max-height:440px; overflow-y:auto; }
.data-table {
  width:100%; border-collapse:collapse;
  font-family:var(--font-tech); font-size:0.64rem; min-width:1800px;
}
.data-table thead { position:sticky; top:0; z-index:2; }
.data-table th {
  background:rgba(5,8,15,0.95); color:var(--text-dim);
  font-weight:400; text-align:right; padding:5px 6px;
  font-size:0.52rem; text-transform:uppercase;
  letter-spacing:0.08em; border-bottom:1px solid var(--border-glow);
  cursor:pointer; user-select:none; white-space:nowrap;
  font-family:var(--font-display);
}
.data-table th:hover { color:var(--neon-cyan); }
.data-table th::after { content:' ↕'; font-size:0.45rem; opacity:0.3; }
.data-table th.sorted-asc::after { content:' ↑'; opacity:1; color:var(--color-up); }
.data-table th.sorted-desc::after { content:' ↓'; opacity:1; color:var(--color-down); }
.data-table td {
  padding:4px 6px; text-align:right; font-size:0.6rem;
  border-bottom:1px solid rgba(0,200,255,0.03);
  white-space:nowrap; color:var(--text-primary);
}
.data-table td:first-child, .data-table th:first-child { text-align:left; }
.data-table tr:hover td { background:rgba(0,200,255,0.03); }
.td-up { color:var(--color-up); }
.td-down { color:var(--color-down); }

/* ═══════════ CONFIG ═══════════ */
.config-panel { background:var(--glass-bg); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:6px; position:relative; overflow:hidden; }
.config-panel::before { content:''; position:absolute; top:0;right:0; pointer-events:none; width:30px;height:30px; border-right:1px solid rgba(0,200,255,0.15); border-top:1px solid rgba(0,200,255,0.15); }
.config-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px 16px; padding:16px 20px; }
.config-item { display:flex; flex-direction:column; gap:4px; }
.config-label { display:flex; justify-content:space-between; font-size:0.56rem; color:var(--text-secondary); letter-spacing:0.03em; }
.config-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.config-val { font-weight:700; color:var(--neon-cyan); font-family:var(--font-display); font-size:0.62rem; }
.config-slider { -webkit-appearance:none; width:100%; height:3px; border-radius:2px; background:rgba(0,200,255,0.1); outline:none; }
.config-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px;height:12px; border-radius:2px; background:var(--neon-cyan); cursor:pointer; border:2px solid #05080f; box-shadow:0 0 8px rgba(0,229,255,0.4); }

.chart-container { width:100%; }

@media (max-width:1200px) {
  .state-banner { grid-template-columns:repeat(4,1fr); }
  .grid-2 { grid-template-columns:1fr; }
  .config-grid { grid-template-columns:repeat(4,1fr); }
}
@media (max-width:768px) {
  .state-banner { grid-template-columns:repeat(2,1fr); }
  .config-grid { grid-template-columns:repeat(2,1fr); }
  .nav-links { display:none; }
}
</style>
</head>

<script>
/* ═══════════ THEME ═══════════ */
function toggleTheme() {
  var html = document.documentElement;
  var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('neo-theme', next);
  setTimeout(redrawAllCharts, 100);
}
(function(){
  var s = localStorage.getItem('neo-theme') || 'dark';
  document.documentElement.dataset.theme = s;
})();

/* ═══════════ STATS ═══════════ */
function renderStats() {
  var items = [
    {l:'市场阶段',v:'尝试反弹',c:''},{l:'反弹天数',v:'第3天',c:''},
    {l:'风险等级',v:'警戒',c:'warn'},{l:'建议仓位',v:'≤30%',c:''},
    {l:'抛盘日(25d)',v:'4',c:'down'},{l:'追盘日',v:'已确认',c:'up'},
    {l:'FTD天数',v:'第5天',c:''},{l:'健康评分',v:'52/100',c:'warn'}
  ];
  document.getElementById('statsStrip').innerHTML = items.map(function(x){
    return '<div class="state-card"><div class="state-value '+x.c+'">'+x.v+'</div><div class="state-label">'+x.l+'</div></div>';
  }).join('');
}
renderStats();

/* ═══════════ DATA ═══════════ */
function genKline() {
  var data = []; var o = 3800, h, l, c, vol;
  var start = new Date(2025,6,1);
  for (var i=0;i<200;i++) {
    var d = new Date(start); d.setDate(d.getDate()+i);
    if (d.getDay()===0||d.getDay()===6) continue;
    var chg = (Math.random()-0.48)*2.5;
    var hlR = o*(0.005+Math.random()*0.025);
    h = o+hlR*(0.3+Math.random()*0.7); l = o-hlR*(0.3+Math.random()*0.7);
    c = o*(1+chg/100); c = Math.max(l,Math.min(h,c));
    vol = (0.6+Math.random()*2.5)*1e8;
    if (i>160&&i<170&&Math.random()<0.3){c=o*0.985;h=o*1.005;l=c*0.99;vol*=1.6;}
    if (i>180&&i<190){c=o*(1.01+Math.random()*0.03);vol*=1.5;}
    data.push({date:d.toISOString().split('T')[0],open:+o.toFixed(2),close:+c.toFixed(2),high:+h.toFixed(2),low:+l.toFixed(2),volume:Math.round(vol),turnover:(vol*0.008).toFixed(0),tRate:(0.3+Math.random()*1.2).toFixed(2)});
    o=c;
  }
  return data;
}
var kdata = genKline();

function calcMA(d,f,p) {
  return d.map(function(_,i){
    if (i<p-1) return null;
    var s=0; for (var j=i-p+1;j<=i;j++) s+=d[j][f];
    return +(s/p).toFixed(2);
  });
}

function getTC() {
  var dark = document.documentElement.dataset.theme === 'dark';
  return {
    up:dark?'#ff4466':'#d43050', dn:dark?'#00e676':'#1a8a40',
    upB:dark?'#e03050':'#b82840', dnB:dark?'#00c860':'#148030',
    ax:dark?'#306090':'#80a0b8', axSp:dark?'rgba(0,200,255,0.06)':'rgba(0,140,200,0.08)',
    tx:dark?'#6898c0':'#3a5a7a', tx2:dark?'#e0f0ff':'#0a1620',
    ma:['#ffab00','#00e5ff','#b388ff','#ff6e40','#40c4ff','#8d6e63']
  };
}

/* ═══════════ K-LINE ═══════════ */
function buildKline() {
  var dom = document.getElementById('klineChart');
  var ch = echarts.init(dom,null,{devicePixelRatio:2});
  var tc = getTC();
  var raw = kdata;
  var dates = raw.map(function(d){return d.date;});
  var ohlc = raw.map(function(d){return [d.open,d.close,d.low,d.high];});
  var vols = raw.map(function(d){return d.volume;});
  var mas={}; [5,10,20,50,120,250].forEach(function(p){mas[p]=calcMA(raw,'close',p);});

  ch.setOption({
    backgroundColor:'transparent',
    animation:true,
    tooltip:{
      trigger:'axis',
      axisPointer:{type:'cross',crossStyle:{color:tc.ax},label:{backgroundColor:'rgba(5,8,15,0.75)',color:tc.tx2}},
      backgroundColor:'rgba(5,8,15,0.75)',
      borderColor:'rgba(0,200,255,0.15)',
      textStyle:{color:'#e0f0ff',fontSize:11,fontFamily:'Share Tech Mono, monospace'},
      formatter:function(ps){
        var d=raw[ps[0].dataIndex];
        var chg=(d.close-d.open).toFixed(2);
        var cp=((d.close-d.open)/d.open*100).toFixed(2);
        var cl=d.close>=d.open?tc.up:tc.dn;
        return '<div style="font-size:12px;font-weight:700;color:#00e5ff;margin-bottom:6px;">◆ '+d.date+'</div>'
          +'<div>开盘 <b>'+d.open+'</b> &nbsp; 最高 <b style="color:'+tc.up+'">'+d.high+'</b> &nbsp; 最低 <b style="color:'+tc.dn+'">'+d.low+'</b></div>'
          +'<div>收盘 <b>'+d.close+'</b> &nbsp; 涨跌 <b style="color:'+cl+'">'+chg+' ('+cp+'%)</b></div>'
          +'<div style="margin-top:4px;">成交量 <b>'+((d.volume/1e8).toFixed(2))+'亿</b> &nbsp; 成交额 <b>'+((d.turnover/1e8).toFixed(2))+'亿</b></div>'
          +'<div>换手率 <b>'+d.tRate+'%</b></div>';
      }
    },
    axisPointer:{link:[{xAxisIndex:[0,1]}]},
    grid:[
      {left:'8%',right:'8%',top:50,height:'60%'},
      {left:'8%',right:'8%',top:'76%',height:'14%'}
    ],
    xAxis:[
      {type:'category',data:dates,gridIndex:0,axisLine:{lineStyle:{color:tc.ax}},axisTick:{show:false},axisLabel:{color:tc.tx,fontSize:9},splitLine:{show:false},boundaryGap:true,axisPointer:{label:{show:false}}},
      {type:'category',data:dates,gridIndex:1,axisLine:{lineStyle:{color:tc.ax}},axisTick:{show:false},axisLabel:{show:false},splitLine:{show:false},boundaryGap:true}
    ],
    yAxis:[
      {scale:true,gridIndex:0,axisLine:{lineStyle:{color:tc.ax}},axisTick:{show:false},splitLine:{lineStyle:{color:tc.axSp,type:'dashed'}},axisLabel:{color:tc.tx,fontSize:9,formatter:function(v){return v.toFixed(0);}}},
      {scale:true,gridIndex:1,axisLine:{lineStyle:{color:tc.ax}},axisTick:{show:false},splitLine:{lineStyle:{color:tc.axSp,type:'dashed'}},axisLabel:{color:tc.tx,fontSize:8,formatter:function(v){return (v/1e8).toFixed(1)+'亿';}}}
    ],
    dataZoom:[
      {type:'inside',xAxisIndex:[0,1],start:50,end:100},
      {type:'slider',xAxisIndex:[0,1],start:50,end:100,height:20,bottom:8,borderColor:'rgba(0,200,255,0.1)',backgroundColor:'rgba(5,8,15,0.5)',fillerColor:'rgba(0,200,255,0.06)',handleStyle:{color:'#00e5ff'},textStyle:{color:tc.tx,fontSize:9}}
    ],
    series:[
      {name:'K',type:'candlestick',data:ohlc,xAxisIndex:0,yAxisIndex:0,
        itemStyle:{color:tc.up,color0:tc.dn,borderColor:tc.upB,borderColor0:tc.dnB}
      },
      {name:'VOL',type:'bar',data:vols,xAxisIndex:1,yAxisIndex:1,
        itemStyle:{color:function(p){return raw[p.dataIndex].close>=raw[p.dataIndex].open?tc.up:tc.dn;}}
      }
    ].concat([5,10,20,50,120,250].map(function(p,i){
      return {name:'MA'+p,type:'line',data:mas[p],xAxisIndex:0,yAxisIndex:0,smooth:true,symbol:'none',lineStyle:{width:1,color:tc.ma[i]}};
    }))
  });
  dom._echart = ch;
  window.addEventListener('resize',function(){ch.resize();});
}
buildKline();

/* ═══════════ TABLE ═══════════ */
var tblCols = ['代码','名称','现价','涨跌%','市盈率','市净率','ROE%','营收增速%','净利增速%','EPS','RS20','RS120','MA50%','MA200%','换手率%','量比','市值(亿)','基金','抛压','评级'];
var tblKeys = ['code','name','price','chg','pe','pb','roe','rev','profit','eps','rs20','rs120','ma50','ma200','turnover','volRatio','mcap','funds','distScore','rating'];
var stkCodes = ['600519','000858','300750','601012','002415','600036','000333','688981','000001','603259'];
var stkNames = ['贵州茅台','五粮液','宁德时代','隆基绿能','海康威视','招商银行','美的集团','中芯国际','平安银行','药明康德'];

function genTbl() {
  return stkCodes.map(function(c,i){
    return {
      code:c,name:stkNames[i],
      price:(30+Math.random()*300).toFixed(2),
      chg:((Math.random()-0.45)*8).toFixed(2),
      pe:(15+Math.random()*60).toFixed(1), pb:(1.5+Math.random()*8).toFixed(1),
      roe:(5+Math.random()*25).toFixed(1),
      rev:((Math.random()-0.3)*40).toFixed(1), profit:((Math.random()-0.3)*50).toFixed(1),
      eps:(0.5+Math.random()*8).toFixed(2),
      rs20:(10+Math.random()*90).toFixed(0), rs120:(10+Math.random()*90).toFixed(0),
      ma50:((Math.random()-0.3)*30).toFixed(1), ma200:((Math.random()-0.3)*25).toFixed(1),
      turnover:(0.3+Math.random()*5).toFixed(2), volRatio:(0.5+Math.random()*2).toFixed(2),
      mcap:(100+Math.random()*9000).toFixed(0), funds:Math.floor(20+Math.random()*300),
      distScore:(Math.random()*5).toFixed(1),
      rating:['A','B+','B','C+','C','A-','B-','A+','B','B+'][i]
    };
  });
}
var tblData = genTbl();
var tblSort = {key:null,dir:'asc'};

function renderTbl(sk, sd) {
  var d = [].concat(tblData);
  if (sk) {
    d.sort(function(a,b){
      var va = isNaN(a[sk])?a[sk]:+a[sk], vb = isNaN(b[sk])?b[sk]:+b[sk];
      return sd==='asc'?(va>vb?1:-1):(va<vb?1:-1);
    });
  }
  var h = '<table class="data-table"><thead><tr>';
  tblCols.forEach(function(c,i){
    var cls = sk===tblKeys[i]?(sd==='asc'?'sorted-asc':'sorted-desc'):'';
    h+='<th class="'+cls+'" onclick="sortTbl(\''+tblKeys[i]+'\')">'+c+'</th>';
  });
  h+='</tr></thead><tbody>';
  d.forEach(function(r){
    h+='<tr>';
    h+='<td>'+r.code+'</td><td style="font-weight:600">'+r.name+'</td>';
    h+='<td>'+r.price+'</td><td class="'+(+r.chg>=0?'td-up':'td-down')+'">'+(+r.chg>=0?'+':'')+r.chg+'%</td>';
    h+='<td>'+r.pe+'</td><td>'+r.pb+'</td><td>'+r.roe+'</td><td>'+r.rev+'</td><td>'+r.profit+'</td>';
    h+='<td>'+r.eps+'</td><td>'+r.rs20+'</td><td>'+r.rs120+'</td>';
    h+='<td class="'+(+r.ma50>=0?'td-up':'td-down')+'">'+(+r.ma50>=0?'+':'')+r.ma50+'%</td>';
    h+='<td class="'+(+r.ma200>=0?'td-up':'td-down')+'">'+(+r.ma200>=0?'+':'')+r.ma200+'%</td>';
    h+='<td>'+r.turnover+'%</td><td>'+r.volRatio+'</td><td>'+r.mcap+'</td><td>'+r.funds+'</td>';
    h+='<td>'+r.distScore+'</td><td style="font-weight:700;color:var(--neon-cyan)">'+r.rating+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('tableContainer').innerHTML = h;
}
function sortTbl(k) {
  if (tblSort.key===k) tblSort.dir = tblSort.dir==='asc'?'desc':'asc';
  else {tblSort.key=k;tblSort.dir='asc';}
  renderTbl(tblSort.key,tblSort.dir);
}
renderTbl();

function renderCfg() {
  document.getElementById('configGrid').innerHTML = cfgs.map(function(p){
    var dv = Number.isInteger(p.v)?p.v:p.v.toFixed(2);
    return '<div class="config-item"><div class="config-label"><span class="config-name" title="'+p.n+'">'+p.n+'</span><span class="config-val">'+dv+p.u+'</span></div><input type="range" class="config-slider" min="'+p.mn+'" max="'+p.mx+'" step="'+p.st+'" value="'+p.v+'" data-u="'+p.u+'" oninput="updCfg(this)"></div>';
  }).join('');
}
function updCfg(sl) {
  var v=+sl.value,u=sl.dataset.u,dv=Number.isInteger(v)?v:v.toFixed(2);
  sl.closest('.config-item').querySelector('.config-val').textContent=dv+u;
}
renderCfg();

/* ═══════════ REDRAW ═══════════ */
function redrawAllCharts() {
  ['klineChart','chart1','chart2','chart3','chart4'].forEach(function(id){
    var d = document.getElementById(id);
    if (d._echart) d._echart.dispose();
  });
  buildKline();buildC1();buildC2();buildC3();buildC4();
}
window.addEventListener('resize',function(){
  document.querySelectorAll('.chart-container').forEach(function(d){
    if (d._echart) d._echart.resize();
  });
});

<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloomberg 终端风 · A股量化看板</title>
<script src="../shared/js/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');

/* ═══════════ THEME: DARK (default) ═══════════ */
:root {
  --bg-root: #0d1117;
  --bg-surface: #121820;
  --bg-card: #161c26;
  --bg-card-hover: #1a2130;
  --bg-input: #1a2130;
  --border: #252d3a;
  --border-focus: #3a4558;
  --border-subtle: #1e2632;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-tertiary: #5c6570;
  --text-inverse: #0d1117;
  --color-up: #e34d4d;
  --color-up-bg: rgba(227,77,77,0.08);
  --color-up-border: rgba(227,77,77,0.15);
  --color-down: #3cba6c;
  --color-down-bg: rgba(60,186,108,0.08);
  --color-down-border: rgba(60,186,108,0.15);
  --color-neutral: #d4a843;
  --color-accent: #539bf5;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.02) inset;
  --shadow-hover: 0 2px 8px rgba(0,0,0,0.4);
  --nav-bg: #0a0e14;
  --nav-border: #1e2632;
  --font-mono: 'JetBrains Mono', 'Noto Sans SC', monospace;
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
}

/* ═══════════ THEME: LIGHT ═══════════ */
[data-theme="light"] {
  --bg-root: #f5f3ef;
  --bg-surface: #faf9f6;
  --bg-card: #ffffff;
  --bg-card-hover: #faf9f6;
  --bg-input: #f5f3ef;
  --border: #e2ded8;
  --border-focus: #c4bfb6;
  --border-subtle: #ece8e2;
  --text-primary: #1a1814;
  --text-secondary: #666058;
  --text-tertiary: #9c9688;
  --text-inverse: #faf9f6;
  --color-up: #d43838;
  --color-up-bg: rgba(212,56,56,0.06);
  --color-up-border: rgba(212,56,56,0.12);
  --color-down: #2d9d5a;
  --color-down-bg: rgba(45,157,90,0.06);
  --color-down-border: rgba(45,157,90,0.12);
  --color-neutral: #b8861e;
  --color-accent: #3568b8;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.02);
  --shadow-hover: 0 2px 8px rgba(0,0,0,0.06);
  --nav-bg: #ffffff;
  --nav-border: #e2ded8;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-root);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════ NAV ═══════════ */
.nav {
  position: sticky; top:0; z-index:100;
  background: var(--nav-bg);
  border-bottom: 1px solid var(--nav-border);
  display: flex; align-items: center;
  padding: 0 24px; height: 48px;
  gap: 0;
  backdrop-filter: blur(8px);
}
.nav-brand {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.06em;
  margin-right: 24px;
  white-space: nowrap;
}
.nav-links {
  display: flex; gap: 2px;
  overflow-x: auto;
  flex: 1;
}
.nav-link {
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 0.72rem;
  color: var(--text-secondary);
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  letter-spacing: 0.02em;
}
.nav-link:hover { color: var(--text-primary); background: var(--bg-card); }
.nav-link.active { color: var(--color-accent); background: rgba(83,155,245,0.08); font-weight: 600; }
.nav-actions {
  display: flex; align-items: center; gap: 12px;
  margin-left: auto;
}
.theme-btn {
  width: 34px; height: 34px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.theme-btn:hover { border-color: var(--border-focus); color: var(--text-primary); }
.live-dot {
  width: 7px; height: 7px;
  background: var(--color-up);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--color-up);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity:1; }
  50% { opacity:0.3; }
}

/* ═══════════ LAYOUT ═══════════ */
.main {
  max-width: 1520px;
  margin: 0 auto;
  padding: 20px 24px 40px;
}
.section { margin-bottom: 20px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
}
.section-title {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.section-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.06em;
}
.badge-up { background: var(--color-up-bg); color: var(--color-up); border: 1px solid var(--color-up-border); }
.badge-neutral { background: rgba(212,168,67,0.08); color: var(--color-neutral); border: 1px solid rgba(212,168,67,0.15); }

/* ═══════════ STATS STRIP ═══════════ */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 1px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 20px;
}
.stat-cell {
  background: var(--bg-card);
  padding: 12px 16px;
  text-align: center;
}
.stat-label {
  font-size: 0.58rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--font-mono);
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 600;
  margin-top: 2px;
}
.stat-value.up { color: var(--color-up); }
.stat-value.down { color: var(--color-down); }
.stat-value.neutral { color: var(--color-neutral); }

/* ═══════════ CARDS ═══════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow-card);
}
.card:hover { border-color: var(--border-focus); box-shadow: var(--shadow-hover); }
.card-body { padding: 16px; }
.chart-container { width: 100%; }

/* ═══════════ GRID ═══════════ */
.grid-1 { display: grid; grid-template-columns: 1fr; gap: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-full { grid-column: 1 / -1; }

/* ═══════════ TABLE ═══════════ */
.table-wrap {
  overflow-x: auto;
  max-height: 460px;
  overflow-y: auto;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  min-width: 1800px;
}
.data-table thead { position: sticky; top:0; z-index:2; }
.data-table th {
  background: var(--bg-surface);
  color: var(--text-tertiary);
  font-weight: 500;
  text-align: right;
  padding: 5px 6px;
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 2px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.data-table th:hover { color: var(--text-primary); }
.data-table th::after {
  content: ' ↕';
  font-size: 0.55rem;
  opacity: 0.3;
}
.data-table th.sorted-asc::after { content: ' ↑'; opacity: 1; color: var(--color-up); }
.data-table th.sorted-desc::after { content: ' ↓'; opacity: 1; color: var(--color-down); }
.data-table td {
  padding: 4px 6px;
  text-align: right;
  border-bottom: 1px solid var(--border-subtle);
  white-space: nowrap;
  color: var(--text-primary);
  font-size: 0.64rem;
}
.data-table td:first-child, .data-table th:first-child { text-align: left; }
.data-table tr:hover td { background: var(--bg-card-hover); }
.td-up { color: var(--color-up); }
.td-down { color: var(--color-down); }

/* ═══════════ CONFIG PANEL ═══════════ */
.config-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-card);
}
.config-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px 16px;
  padding: 16px 20px;
}
.config-item { display: flex; flex-direction: column; gap: 4px; }
.config-label {
  display: flex; justify-content: space-between;
  font-size: 0.62rem;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  letter-spacing: 0.03em;
}
.config-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.config-val {
  font-weight: 600;
  color: var(--text-primary);
}
.config-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
}
.config-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--color-accent);
  cursor: pointer;
  border: 2px solid var(--bg-card);
  box-shadow: 0 0 4px rgba(0,0,0,0.2);
}

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 1200px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
  .config-grid { grid-template-columns: repeat(4, 1fr); }
  .stats-strip { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 768px) {
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  .config-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-strip { grid-template-columns: repeat(2, 1fr); }
  .nav-links { display: none; }
}

/* ═══════════ TOOLTIP enhancement ═══════════ */
.tooltip-transparent .echarts-tooltip {
  background: rgba(22,28,38,0.75) !important;
  backdrop-filter: blur(4px);
}

/* ═══════════ Knolling: micro-shadow on edges ═══════════ */
.card, .config-panel {
  position: relative;
}
.card::after, .config-panel::after {
  content: '';
  position: absolute;
  inset: 0; pointer-events: none;
  border-radius: inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
[data-theme="light"] .card::after,
[data-theme="light"] .config-panel::after {
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
}
</style>
</head>
<body>

<!-- ═══════════ NAV ═══════════ -->
<nav class="nav">
  <span class="nav-brand">A-QUANT // v3.2</span>
  <div class="nav-links">
    <a href="#" class="nav-link active">大盘扫描</a>
    <a href="#" class="nav-link">指数扫描</a>
    <a href="#" class="nav-link">个股基本面</a>
    <a href="#" class="nav-link">买入形态</a>

</nav>

<div class="main">

  <!-- ═══════════ STATS STRIP ═══════════ -->
  <div class="stats-strip" id="statsStrip"></div>

  <!-- ═══════════ HERO: K-LINE ═══════════ -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">K线 · 沪深300 (000300)</span>
      <span class="section-badge badge-up">FTD DAY 5</span>
    </div>
    <div class="card">
      <div class="chart-container" id="klineChart" style="height:520px;"></div>
    </div>
  </div>

  <!-- ═══════════ CHARTS GRID ═══════════ -->
  <div class="section">
    <div class="section-header"><span class="section-title">多维度图表</span></div>
    <div class="grid-2">
      <div class="card"><div class="chart-container" id="chart1" style="height:340px;"></div></div>
      <div class="card"><div class="chart-container" id="chart2" style="height:340px;"></div></div>
      <div class="card"><div class="chart-container" id="chart3" style="height:300px;"></div></div>
      <div class="card"><div class="chart-container" id="chart4" style="height:300px;"></div></div>
    </div>
  </div>

  <!-- ═══════════ TABLE ═══════════ -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">成分股扫描 · 20维数据</span>
      <span class="section-badge badge-neutral">10 ROWS</span>
    </div>
    <div class="card">
      <div class="table-wrap" id="tableContainer"></div>
    </div>
  </div>

  <!-- ═══════════ CONFIG PANEL ═══════════ -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">策略参数配置</span>
      <span class="section-badge badge-neutral" id="configCount">20 PARAMS</span>
    </div>
    <div class="config-panel">
      <div class="config-grid" id="configGrid"></div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   THEME TOGGLE
   ═══════════════════════════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.querySelector('.theme-btn');
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  btn.textContent = next === 'dark' ? '☀' : '☾';
  localStorage.setItem('bloomberg-theme', next);
  setTimeout(redrawAllCharts, 100);
}
(function initTheme() {
  const saved = localStorage.getItem('bloomberg-theme') || 'dark';
  document.documentElement.dataset.theme = saved;
  document.querySelector('.theme-btn').textContent = saved === 'dark' ? '☀' : '☾';
})();

/* ═══════════════════════════════════════════════════════════
   STATS STRIP
   ═══════════════════════════════════════════════════════════ */
function renderStatsStrip() {
  const stats = [
    { label: '市场阶段', value: '尝试反弹', cls: 'neutral' },
    { label: '反弹天数', value: 'Day 3', cls: '' },
    { label: '风险等级', value: '警戒', cls: 'neutral' },
    { label: '建议仓位', value: '≤30%', cls: '' },
    { label: '抛盘日(25d)', value: '4', cls: 'down' },
    { label: 'FTD状态', value: '确认', cls: 'up' },
    { label: 'FTD天数', value: 'Day 5', cls: '' },
    { label: '健康评分', value: '52/100', cls: 'neutral' },
  ];
  document.getElementById('statsStrip').innerHTML = stats.map(s =>
    `<div class="stat-cell"><div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.value}</div></div>`
  ).join('');
}
renderStatsStrip();

/* ═══════════════════════════════════════════════════════════
   MOCK K-LINE DATA (200 trading days)
   ═══════════════════════════════════════════════════════════ */
function generateKlineData() {
  const dates = [];
  let o = 3800, h, l, c, vol;
  const data = [];
  const start = new Date(2025, 6, 1);
  for (let i = 0; i < 200; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    dates.push(d.toISOString().split('T')[0]);
    const change = (Math.random() - 0.48) * 2.5;
    const hlRange = o * (0.005 + Math.random() * 0.025);
    h = o + hlRange * (0.3 + Math.random() * 0.7);
    l = o - hlRange * (0.3 + Math.random() * 0.7);
    c = o * (1 + change / 100);
    c = Math.max(l, Math.min(h, c));
    vol = (0.6 + Math.random() * 2.5) * 1e8;
    // Inject distribution days and FTD pattern
    if (i > 160 && i < 170 && Math.random() < 0.3) {
      c = o * 0.985;
      h = o * 1.005;
      l = c * 0.99;
      vol *= 1.6;
    }
    if (i > 180 && i < 190) {
      c = o * (1.01 + Math.random() * 0.03);
      vol *= 1.5;
    }
    data.push({ date: dates[dates.length - 1], open: +o.toFixed(2), close: +c.toFixed(2), high: +h.toFixed(2), low: +l.toFixed(2), volume: Math.round(vol), turnover: (vol * 0.008).toFixed(0), turnoverRate: (0.3 + Math.random() * 1.2).toFixed(2) });
    o = c;
  }
  return { dates, data };
}
const klineRaw = generateKlineData();

function calcMA(data, field, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += data[j][field];
    return +(sum / period).toFixed(2);
  });
}

/* ═══════════════════════════════════════════════════════════
   ECHARTS HELPERS
   ═══════════════════════════════════════════════════════════ */
function getThemeColors() {
  const isDark = document.documentElement.dataset.theme === 'dark';
  return {
    upColor: isDark ? '#e34d4d' : '#d43838',
    downColor: isDark ? '#3cba6c' : '#2d9d5a',
    upBorder: isDark ? '#c94040' : '#b83030',
    downBorder: isDark ? '#30a05c' : '#258a4a',
    axisColor: isDark ? '#5c6570' : '#9c9688',
    axisSplitColor: isDark ? '#1e2632' : '#e2ded8',
    textColor: isDark ? '#8b949e' : '#666058',
    bgColor: isDark ? '#161c26' : '#ffffff',
    tooltipBg: isDark ? 'rgba(22,28,38,0.75)' : 'rgba(255,255,255,0.78)',
    gridBg: isDark ? 'rgba(255,255,255,0.01)' : 'rgba(0,0,0,0.01)',
    maColors: ['#f0c060','#539bf5','#d080e0','#f09060','#60c0c0','#a0a0c0'],
  };
}

/* ═══════════════════════════════════════════════════════════
   K-LINE CHART (主图)
   ═══════════════════════════════════════════════════════════ */
function buildKlineChart() {
  const dom = document.getElementById('klineChart');
  const chart = echarts.init(dom, null, { devicePixelRatio: 2 });
  const tc = getThemeColors();
  const raw = klineRaw.data;
  const dates = raw.map(d => d.date);
  const ohlc = raw.map(d => [d.open, d.close, d.low, d.high]);
  const vols = raw.map(d => d.volume);
  const categories = dates;

  const mas = {};
  [5,10,20,50,120,250].forEach(p => {
    mas[p] = calcMA(raw, 'close', p);
  });

  chart.setOption({
    backgroundColor: tc.bgColor,
    animation: true,
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross', crossStyle: { color: tc.axisColor }, label: { backgroundColor: tc.bgColor, color: tc.textColor } },
      backgroundColor: tc.tooltipBg,
      borderColor: tc.axisSplitColor,
      textStyle: { color: tc.textColor, fontSize: 12, fontFamily: 'JetBrains Mono, monospace' },
      formatter: function(params) {
        const d = raw[params[0].dataIndex];
        const chg = (d.close - d.open).toFixed(2);
        const chgPct = ((d.close - d.open) / d.open * 100).toFixed(2);
        const color = d.close >= d.open ? tc.upColor : tc.downColor;
        return `<div style="font-size:13px;font-weight:700;margin-bottom:6px;">${d.date}</div>
          <div>开盘 <b>${d.open}</b> &nbsp; 最高 <b style="color:${tc.upColor}">${d.high}</b> &nbsp; 最低 <b style="color:${tc.downColor}">${d.low}</b></div>
          <div>收盘 <b>${d.close}</b> &nbsp; 涨跌 <b style="color:${color}">${chg} (${chgPct}%)</b></div>
          <div style="margin-top:4px;">成交量 <b>${(d.volume/1e8).toFixed(2)}亿</b> &nbsp; 成交额 <b>${(d.turnover/1e8).toFixed(2)}亿</b></div>
          <div>换手率 <b>${d.turnoverRate}%</b></div>`;
      }
    },
    axisPointer: { link: [{ xAxisIndex: [0, 1] }] },
    grid: [
      { left: '8%', right: '8%', top: 50, height: '60%' },
      { left: '8%', right: '8%', top: '76%', height: '14%' }
    ],
    xAxis: [
      { type: 'category', data: categories, gridIndex: 0, axisLine: { lineStyle: { color: tc.axisColor } }, axisTick: { show: false }, axisLabel: { color: tc.textColor, fontSize: 10 }, splitLine: { show: false }, boundaryGap: true, axisPointer: { label: { show: false } } },

/* ═══════════════════════════════════════════════════════════
   20-COLUMN SORTABLE TABLE
   ═══════════════════════════════════════════════════════════ */
const tableColumns = [
  '代码','名称','现价','涨跌%','市盈率','市净率','ROE%','营收增速%','净利增速%',
  'EPS','RS_20','RS_120','MA50%','MA200%','换手率%','量比','市值(亿)','基金家数','抛压评分','综合评级'
];
const stocks = [
  '600519','000858','300750','601012','002415','600036','000333','688981','000001','603259'
];
const names = [
  '贵州茅台','五粮液','宁德时代','隆基绿能','海康威视','招商银行','美的集团','中芯国际','平安银行','药明康德'
];
function genTableData() {
  return stocks.map((code, i) => ({
    code, name: names[i],
    price: (30 + Math.random() * 300).toFixed(2),
    chg: ((Math.random() - 0.45) * 8).toFixed(2),
    pe: (15 + Math.random() * 60).toFixed(1),
    pb: (1.5 + Math.random() * 8).toFixed(1),
    roe: (5 + Math.random() * 25).toFixed(1),
    rev: ((Math.random() - 0.3) * 40).toFixed(1),
    profit: ((Math.random() - 0.3) * 50).toFixed(1),
    eps: (0.5 + Math.random() * 8).toFixed(2),
    rs20: (10 + Math.random() * 90).toFixed(0),
    rs120: (10 + Math.random() * 90).toFixed(0),
    ma50: ((Math.random() - 0.3) * 30).toFixed(1),
    ma200: ((Math.random() - 0.3) * 25).toFixed(1),
    turnover: (0.3 + Math.random() * 5).toFixed(2),
    volRatio: (0.5 + Math.random() * 2).toFixed(2),
    mcap: (100 + Math.random() * 9000).toFixed(0),
    funds: Math.floor(20 + Math.random() * 300),
    distScore: (Math.random() * 5).toFixed(1),
    rating: ['A','B+','B','C+','C','A-','B-','A+','B','B+'][i],
  }));
}
const tableData = genTableData();

function renderTable(sortKey = null, sortDir = 'asc') {
  let data = [...tableData];
  if (sortKey) {
    data.sort((a,b) => {
      const va = isNaN(a[sortKey]) ? a[sortKey] : +a[sortKey];
      const vb = isNaN(b[sortKey]) ? b[sortKey] : +b[sortKey];
      return sortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
  }
  const keys = ['code','name','price','chg','pe','pb','roe','rev','profit','eps','rs20','rs120','ma50','ma200','turnover','volRatio','mcap','funds','distScore','rating'];
  let html = '<table class="data-table"><thead><tr>';
  tableColumns.forEach((col, i) => {
    const k = keys[i];
    const cls = sortKey === k ? (sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc') : '';
    html += `<th class="${cls}" onclick="sortTable('${k}')">${col}</th>`;
  });
  html += '</tr></thead><tbody>';
  data.forEach(d => {
    html += '<tr>';
    html += `<td>${d.code}</td><td style="font-weight:600">${d.name}</td>`;
    html += `<td>${d.price}</td>`;
    html += `<td class="${+d.chg>=0?'td-up':'td-down'}">${(+d.chg>=0?'+':'')}${d.chg}%</td>`;
    html += `<td>${d.pe}</td><td>${d.pb}</td><td>${d.roe}</td><td>${d.rev}</td><td>${d.profit}</td>`;
    html += `<td>${d.eps}</td><td>${d.rs20}</td><td>${d.rs120}</td>`;
    html += `<td class="${+d.ma50>=0?'td-up':'td-down'}">${(+d.ma50>=0?'+':'')}${d.ma50}%</td>`;
    html += `<td class="${+d.ma200>=0?'td-up':'td-down'}">${(+d.ma200>=0?'+':'')}${d.ma200}%</td>`;
    html += `<td>${d.turnover}%</td><td>${d.volRatio}</td><td>${d.mcap}</td><td>${d.funds}</td>`;
    html += `<td>${d.distScore}</td><td style="font-weight:700">${d.rating}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;
}
let tableSort = { key: null, dir: 'asc' };
function sortTable(key) {
  if (tableSort.key === key) tableSort.dir = tableSort.dir === 'asc' ? 'desc' : 'asc';
  else { tableSort.key = key; tableSort.dir = 'asc'; }
  renderTable(tableSort.key, tableSort.dir);
}
renderTable();

];

function renderConfigPanel() {
  document.getElementById('configGrid').innerHTML = configParams.map(p => {
    const displayVal = Number.isInteger(p.val) ? p.val : p.val.toFixed(2);
    return `<div class="config-item">
      <div class="config-label"><span class="config-name" title="${p.name}">${p.name}</span><span class="config-val">${displayVal}${p.unit}</span></div>
      <input type="range" class="config-slider" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.val}"
        data-key="${p.key}" data-unit="${p.unit}" oninput="updateConfig(this)">
    </div>`;
  }).join('');
}
function updateConfig(slider) {
  const item = slider.closest('.config-item');
  const valSpan = item.querySelector('.config-val');
  const val = +slider.value;
  const unit = slider.dataset.unit;
  const displayVal = Number.isInteger(val) ? val : val.toFixed(2);
  valSpan.textContent = displayVal + unit;
}
renderConfigPanel();

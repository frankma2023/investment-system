<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日精选 · 知行</title>
<style>
  :root{--bg:#F5F4ED;--ink:#1B365D;--ink-light:#2D5A8A;--sand:#E8E6DC;--text:#141413;--text2:#504e49;--text3:#8b8a84;--err:#B53333}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:Georgia,"Noto Serif SC",serif;font-size:.78rem;line-height:1.4;min-height:100vh;-webkit-font-smoothing:antialiased}

  /* ══ Neumorphic System ══ */
  .container{max-width:1200px;margin:0 auto;padding:20px 28px 50px}
  .neu-card{background:var(--bg);border-radius:18px;padding:20px 26px;margin-bottom:16px;
    box-shadow:6px 6px 14px rgba(0,0,0,.07),-4px -4px 10px rgba(255,255,255,.8)}
  .neu-card-inset{background:var(--bg);border-radius:18px;padding:20px 26px;margin-bottom:16px;
    box-shadow:inset 3px 3px 8px rgba(0,0,0,.06),inset -2px -2px 5px rgba(255,255,255,.7)}

  /* Nav */
  .nav-wrap{margin-bottom:18px}

  /* Hero */
  .hero h1{font-family:Georgia,serif;font-size:1.15rem;font-weight:400;color:var(--ink);letter-spacing:-.01em;margin-bottom:2px}
  .hero .sub{font-size:.6rem;color:var(--text3);font-weight:300}
  .mkt-badge{display:inline-block;font-size:.56rem;font-weight:400;padding:4px 14px;border-radius:14px;margin-bottom:8px;
    box-shadow:inset 2px 2px 4px rgba(0,0,0,.05),inset -1px -1px 2px rgba(255,255,255,.6)}
  .mkt-up{color:#2E7D32}.mkt-cor{color:#E65100}.mkt-bear{color:var(--err)}

  /* Tabs */
  .tabs{display:flex;gap:8px;margin:14px 0}
  .tab{padding:7px 18px;border-radius:14px;font-size:.62rem;font-weight:300;cursor:pointer;color:var(--text2);background:var(--bg);border:none;transition:all .25s;
    box-shadow:4px 4px 10px rgba(0,0,0,.06),-3px -3px 7px rgba(255,255,255,.7)}
  .tab:hover{box-shadow:2px 2px 5px rgba(0,0,0,.04),-1px -1px 3px rgba(255,255,255,.5)}
  .tab.active{color:var(--ink);font-weight:600;
    box-shadow:inset 3px 3px 6px rgba(0,0,0,.06),inset -2px -2px 4px rgba(255,255,255,.6)}

  /* Toolbar */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0 18px}
  .tb-in{font-family:Georgia,"Noto Serif SC",serif;padding:6px 14px;border:none;border-radius:12px;font-size:.6rem;font-weight:300;background:var(--bg);color:var(--text);outline:none;transition:all .2s;
    box-shadow:inset 2px 2px 5px rgba(0,0,0,.05),inset -1px -1px 3px rgba(255,255,255,.5)}
  .tb-in:focus{box-shadow:inset 3px 3px 7px rgba(0,0,0,.07),inset -2px -2px 4px rgba(255,255,255,.6)}
  .tb-in::placeholder{color:var(--text3)}

  /* Table */
  .tbl-wrap{background:var(--bg);border-radius:18px;overflow:hidden;
    box-shadow:6px 6px 16px rgba(0,0,0,.07),-4px -4px 12px rgba(255,255,255,.8)}
  .scr-table{width:100%;border-collapse:collapse;font-size:.62rem}
  .scr-table thead{position:sticky;top:0;z-index:5}
  .scr-table th{text-align:center;padding:10px 4px;font-size:.58rem;font-weight:400;color:var(--ink);background:var(--bg);border-bottom:1px solid var(--sand);cursor:pointer;user-select:none;white-space:nowrap;letter-spacing:.02em}
  .scr-table th:hover{color:var(--ink-light)}
  .scr-table td{text-align:center;padding:8px 4px;border-bottom:1px solid rgba(0,0,0,.03);font-weight:300;font-size:.58rem}
  .scr-table tbody tr:hover{box-shadow:inset 1px 1px 3px rgba(0,0,0,.03),inset -1px -1px 2px rgba(255,255,255,.4)}
  .scr-table a{color:var(--ink);text-decoration:none;font-weight:400}

  /* Tags */
  .tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:.48rem;font-weight:300;letter-spacing:.01em;
    box-shadow:inset 1px 1px 2px rgba(0,0,0,.03),inset -1px -1px 1px rgba(255,255,255,.4)}
  .tag-l{color:var(--ink)}.tag-b{color:#B45309}.tag-d{color:var(--err)}

  /* Score bar */
  .sbar{display:inline-flex;align-items:center;gap:4px}
  .sbar-track{width:36px;height:6px;border-radius:3px;overflow:hidden;
    box-shadow:inset 1px 1px 3px rgba(0,0,0,.06),inset -1px -1px 2px rgba(255,255,255,.5)}
  .sbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .sbar-val{font-weight:300;font-size:.6rem}

  /* Buttons */
  .nbtn{font-family:Georgia,"Noto Serif SC",serif;font-size:.52rem;padding:5px 12px;border-radius:12px;cursor:pointer;border:none;font-weight:300;text-decoration:none;display:inline-block;transition:all .2s;background:var(--bg);
    box-shadow:3px 3px 7px rgba(0,0,0,.06),-2px -2px 5px rgba(255,255,255,.6)}
  .nbtn:hover{box-shadow:1px 1px 3px rgba(0,0,0,.04),-1px -1px 2px rgba(255,255,255,.4)}
  .nbtn:active,.nbtn-pressed{box-shadow:inset 2px 2px 4px rgba(0,0,0,.06),inset -1px -1px 2px rgba(255,255,255,.4)}
  .nbtn-cta{color:var(--ink);font-weight:600;
    box-shadow:4px 4px 10px rgba(27,54,93,.1),-3px -3px 7px rgba(255,255,255,.7)}
  .nbtn-cta:hover{box-shadow:2px 2px 6px rgba(27,54,93,.08),-1px -1px 3px rgba(255,255,255,.5)}

  /* Modal */
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,20,19,.3);backdrop-filter:blur(3px);z-index:200;overflow-y:auto}
  .modal-card{background:var(--bg);max-width:780px;margin:40px auto;border-radius:20px;padding:30px;position:relative;
    box-shadow:8px 8px 20px rgba(0,0,0,.08),-6px -6px 14px rgba(255,255,255,.9)}
  .modal-card h2{font-family:Georgia,serif;font-size:1rem;font-weight:400;color:var(--ink);margin-bottom:14px;letter-spacing:-.01em}
  .modal-close{position:absolute;top:14px;right:18px;width:28px;height:28px;border-radius:50%;border:none;font-size:.8rem;cursor:pointer;color:var(--text2);background:var(--bg);display:flex;align-items:center;justify-content:center;transition:all .2s;
    box-shadow:2px 2px 5px rgba(0,0,0,.05),-1px -1px 3px rgba(255,255,255,.6)}
  .modal-close:hover{box-shadow:inset 2px 2px 4px rgba(0,0,0,.05),inset -1px -1px 2px rgba(255,255,255,.4)}

  .loading{text-align:center;padding:40px 20px;color:var(--text3);font-weight:300;font-size:.7rem}

  @media(max-width:768px){.container{padding:10px 10px 30px}.modal-card{margin:12px;padding:18px}}
</style>
</head>
<body>
<div class="container">
  <div class="nav-wrap"><nav id="top-nav"></nav></div>

  <div class="neu-card">
    <span id="market-badge" class="mkt-badge">加载中...</span>
    <div class="hero"><h1>欧奈尔每日精选</h1><div class="sub" id="info-row"></div></div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-stock" onclick="switchMode('stock')">📈 股票精选</div>
    <div class="tab" id="tab-index" onclick="switchMode('index')">📊 指数精选</div>
  </div>

  <div class="toolbar">
    <input type="text" class="tb-in" id="filter-input" placeholder="搜索代码或名称..." oninput="renderTable()">
    <select class="tb-in" id="cat-filter" onchange="renderTable()"><option value="">全部</option><option value="双强">双强</option><option value="龙头">龙头</option></select>
    <select class="tb-in" id="score-filter" onchange="renderTable()"><option value="0">全部得分</option><option value="80">≥80</option><option value="70">≥70</option><option value="60">≥60</option></select>
  </div>

  <div id="table-wrap"><div class="loading">加载中...</div></div>
</div>

<div class="modal-overlay" id="rec-modal"><div class="modal-card"><button class="modal-close" onclick="document.getElementById('rec-modal').style.display='none'">✕</button><div id="rec-content" style="font-size:.64rem;line-height:1.6;color:var(--text)"></div></div></div>
<div class="modal-overlay" id="oneil-modal"><div class="modal-card"><button class="modal-close" onclick="document.getElementById('oneil-modal').style.display='none'">✕</button><div id="oneil-content" style="font-size:.64rem;line-height:1.6;color:var(--text)"></div></div></div>

<script src="../shared/js/nav.js"></script>
<script>Nav.init({brandText:'每日精选',currentPage:'screening'})</script>
<script>
const API='http://localhost:8788';let allItems=[],sortCol='oneil_score',sortDir='desc',currentMode='stock';
const DN={'base_breakout':'基部突破','double_bottom':'双重底','flat_base':'扁平基部','saucer_base':'碟形基部','standard_breakout':'标准突破','cup_handle':'杯柄突破','pocket_pivot':'口袋支点','top_pattern':'顶部形态','climax_top':'高潮见顶','breakout_failure':'突破失败','distribution_day':'抛盘日','cdl':'K线形态','talib':'TA指标','volume_divergence':'量价背离','railroad_tracks':'铁轨线','double_top':'双重顶','head_shoulders_top':'头肩顶'};
function cn(s){return DN[s]||s}
function switchMode(m){currentMode=m;document.getElementById('tab-stock').className='tab'+(m==='stock'?' active':'');document.getElementById('tab-index').className='tab'+(m==='index'?' active':'');document.getElementById('cat-filter').style.display=m==='stock'?'':'none';document.getElementById('score-filter').style.display=m==='stock'?'':'none';allItems=[];sortCol=(m==='stock'?'oneil_score':'index_score');document.getElementById('table-wrap').innerHTML='<div class="loading">加载中...</div>';load()}
async function load(){try{const r=await fetch(API+'/api/discipline/screening?mode='+currentMode);const d=await r.json();if(d.market_warning){document.getElementById('info-row').insertAdjacentHTML('beforebegin','<div style="background:var(--bg);border-radius:12px;padding:6px 14px;margin:8px 0;font-size:.58rem;color:#E65100;text-align:center;box-shadow:inset 2px 2px 4px rgba(0,0,0,.04),inset -1px -1px 2px rgba(255,255,255,.5)">⚠ <b>市场提醒</b>：'+d.market_phase+'阶段，非理想买入环境</div>')}allItems=d.items||[];document.getElementById('info-row').innerHTML=d.date+' · '+d.count+' 只 · '+d.market_phase;const ph=d.market_phase||'';const b=document.getElementById('market-badge');if(ph.includes('上升')||ph.includes('确认')){b.className='mkt-badge mkt-up';b.textContent='🟢 '+ph}else if(ph.includes('回调')||ph.includes('修正')){b.className='mkt-badge mkt-cor';b.textContent='🟡 '+ph}else{b.className='mkt-badge mkt-bear';b.textContent=ph||'—'}renderTable()}catch(e){document.getElementById('table-wrap').innerHTML='<div class="loading">加载失败</div>'}}
function fs(s){if(s==null)return'<span style="color:var(--text3)">—</span>';const v=Math.max(0,Math.min(100,s));let c='#4CAF50';if(v<60)c='#FF9800';if(v<40)c='#F44336';return'<span class="sbar"><span class="sbar-track"><span class="sbar-fill" style="width:'+v+'%;background:'+c+'"></span></span><span class="sbar-val" style="color:'+c+'">'+v.toFixed(0)+'</span></span>'}
function renderTable(){const f=(document.getElementById('filter-input').value||'').toLowerCase();const cat=document.getElementById('cat-filter').value;const smin=parseInt(document.getElementById('score-filter').value)||0;let items=allItems.slice();if(currentMode==='index'&&items.length>10)items=items.slice(0,10);if(cat)items=items.filter(i=>(i.rs_category||'').includes(cat));if(f)items=items.filter(i=>(i.stock_code||'').toLowerCase().includes(f)||(i.stock_name||'').toLowerCase().includes(f));if(smin)items=items.filter(i=>(i.oneil_score||0)>=smin);const col=sortCol||'oneil_score',dir=sortDir||'desc';items.sort((a,b)=>{let va=a[col]!=null?a[col]:-Infinity,vb=b[col]!=null?b[col]:-Infinity;if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}return dir==='asc'?(va-vb):(vb-va)});if(!items.length){document.getElementById('table-wrap').innerHTML='<div class="loading">无匹配结果</div>';return}let h='<div class="tbl-wrap"><table class="scr-table"><thead><tr>';if(currentMode==='index'){h+='<th onclick="tc(\'index_score\')">评分'+sa('index_score')+'</th><th onclick="tc(\'index_code\')">代码'+sa('index_code')+'</th><th onclick="tc(\'index_name\')">名称'+sa('index_name')+'</th><th onclick="tc(\'pool_name\')">池'+sa('pool_name')+'</th><th onclick="tc(\'rps_250\')">RPS250'+sa('rps_250')+'</th><th onclick="tc(\'rps_20\')">RPS20'+sa('rps_20')+'</th><th onclick="tc(\'signal_count\')">信号'+sa('signal_count')+'</th><th onclick="tc(\'ideal_buy\')">买点'+sa('ideal_buy')+'</th><th>操作</th>'}else{h+='<th onclick="tc(\'oneil_score\')">评分'+sa('oneil_score')+'</th><th onclick="tc(\'stock_code\')">代码'+sa('stock_code')+'</th><th onclick="tc(\'stock_name\')">名称'+sa('stock_name')+'</th><th onclick="tc(\'industry_name\')">行业'+sa('industry_name')+'</th><th>RS</th><th onclick="tc(\'rps_250\')">RPS250'+sa('rps_250')+'</th><th onclick="tc(\'canslim_total\')">CANSLIM'+sa('canslim_total')+'</th><th onclick="tc(\'signal_count\')">信号'+sa('signal_count')+'</th><th onclick="tc(\'ideal_buy\')">买点'+sa('ideal_buy')+'</th><th onclick="tc(\'resonance_name\')">共振'+sa('resonance_name')+'</th><th>操作</th>'}h+='</tr></thead><tbody>';for(const it of items){h+='<tr>';if(currentMode==='index'){h+='<td>'+fs(it.index_score)+'</td><td><a href="review-index.html?code='+(it.index_code||'')+'">'+(it.index_code||'')+'</a></td><td>'+(it.index_name||'')+'</td><td style="font-size:.5rem;color:var(--text3)">'+(it.pool_name||'')+'</td><td>'+((it.rps_250||0).toFixed(0))+'</td><td>'+((it.rps_20||0).toFixed(0))+'</td><td>'+(it.signal_count||0)+'</td><td>'+(it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—')+'</td><td style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap"><button class="nbtn nbtn-cta" onclick="addWL(\''+(it.index_code||'')+'\',\''+(it.index_name||'')+'\')">+自选</button><a class="nbtn" href="javascript:void(0)" onclick="showIndexOneil(\''+(it.index_code||'')+'\',\''+(it.index_name||'')+'\')">欧奈尔说</a></td>'}else{const cats=(it.rs_category||'').split(' / ').map(c=>{let cl='tag-l';if(c==='加速')cl='tag-b';if(c==='双强')cl='tag-d';return'<span class="tag '+cl+'">'+c.trim()+'</span>'}).join(' ');h+='<td>'+fs(it.oneil_score)+'</td><td><a href="review.html?code='+it.stock_code+'">'+it.stock_code+'</a></td><td>'+(it.stock_name||'')+'</td><td>'+(it.industry_name||'')+'</td><td>'+cats+'</td><td>'+((it.rps_250||0).toFixed(0))+'</td><td>'+(it.canslim_total!=null?it.canslim_total.toFixed(0):'-')+'</td><td>'+(it.signal_count||0)+'</td><td>'+(it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—')+'</td><td>'+(it.resonance_name?'<span style="color:#E65100">'+it.resonance_name+'</span><br><span style="font-size:.45rem;color:var(--text3)">'+(it.resonance_pool||'')+'</span>':'—')+'</td><td style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap"><button class="nbtn nbtn-cta" onclick="addWL(\''+it.stock_code+'\',\''+it.stock_name+'\')">+自选</button><a class="nbtn" href="javascript:void(0)" onclick="showRec(\''+it.stock_code+'\',\''+it.stock_name+'\')">精选理由</a><a class="nbtn" href="javascript:void(0)" onclick="showOneil(\''+it.stock_code+'\',\''+it.stock_name+'\')">欧奈尔说</a></td>'}h+='</tr>'}h+='</tbody></table></div>';document.getElementById('table-wrap').innerHTML=h}
function sa(c){return c===sortCol?(sortDir==='asc'?' ▲':' ▼'):''}
function tc(c){if(sortCol===c)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=c;sortDir='desc'}renderTable()}
let lr=false;
async function addWL(code,name){if(lr)return;lr=true;try{const r=await fetch(API+'/api/discipline/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stock_code:code,stock_name:name})});const d=await r.json();alert(d.added?'已加入自选池':(d.error||'失败'))}catch(e){alert('请求失败')}finally{lr=false}}
async function showRec(code,name){document.getElementById('rec-modal').style.display='block';document.getElementById('rec-content').innerHTML='<div class="loading">加载中...</div>';try{const r=await fetch(API+'/api/discipline/recommendation/'+code);const d=await r.json();let h='<h2>📝 '+d.stock_name+'（'+d.stock_code+'）</h2>';h+='<p style="color:var(--text3);font-size:.56rem;margin:0 0 14px;">'+(d.industry||'')+' · '+new Date().toLocaleString()+'</p>';h+='<p style="font-size:.66rem;line-height:1.6;">基于 CAN SLIM 体系对 <b>'+d.stock_name+'</b> 的六层评估。</p>';const m=d.market||{};h+='<h3 style="color:var(--ink);margin:16px 0 6px;font-size:.7rem;font-weight:400">大盘环境</h3><p style="font-size:.62rem">'+(m.phase||'—')+' · 建议仓位 '+(m.position||'—')+'%</p>';h+='<h3 style="color:var(--ink);margin:16px 0 6px;font-size:.7rem;font-weight:400">RS 动量</h3><p style="font-size:.62rem">RPS250: <b>'+((d.rs||{}).rps_250||0).toFixed(0)+'</b></p>';h+='<h3 style="color:var(--ink);margin:16px 0 6px;font-size:.7rem;font-weight:400">CANSLIM</h3><p style="font-size:.62rem">评分 <b>'+((d.canslim||{}).score||'—')+'</b></p>';h+='<h3 style="color:var(--ink);margin:16px 0 6px;font-size:.7rem;font-weight:400">信号</h3><p style="font-size:.62rem">买入信号: <b>'+(d.signals?.buy||0)+'</b> 个</p>';h+='<hr style="border:0;border-top:1px solid var(--sand);margin:18px 0;">';h+='<p style="font-size:.5rem;color:var(--text3);">⚠ 不构成投资建议。</p>';document.getElementById('rec-content').innerHTML=h}catch(e){document.getElementById('rec-content').innerHTML='<div class="loading">加载失败</div>'}}
async function showOneil(code,name){const m=document.getElementById('oneil-modal');const c=document.getElementById('oneil-content');m.style.display='block';c.innerHTML='<div class="loading">欧奈尔正在深度审视...</div>';try{const r=await fetch(API+'/api/discipline/oneil-analysis/'+code);const d=await r.json();if(d.html){c.innerHTML='<h2>🧭 欧奈尔说：'+(name||code)+'（'+code+'）</h2><p style="color:var(--text3);font-size:.54rem;margin:0 0 16px;">AI 深度分析 · 基于《像欧奈尔信徒一样交易》</p>'+d.html+'<p style="font-size:.46rem;color:var(--text3);margin-top:12px;"><i>"意见观点无所谓，只有事实以及量价同市场运行一样真实。" —— 比尔·欧奈尔</i></p>'}else{c.innerHTML='<div class="loading">AI 未返回内容</div>'}}catch(e){c.innerHTML='<div class="loading">分析失败</div>'}}
async function showIndexOneil(code,name){const m=document.getElementById('oneil-modal');const c=document.getElementById('oneil-content');m.style.display='block';c.innerHTML='<div class="loading">欧奈尔正在深度审视...</div>';try{const r=await fetch(API+'/api/discipline/oneil-analysis-index/'+code);const d=await r.json();if(d.html){c.innerHTML='<h2>🧭 欧奈尔说：'+(name||code)+'（'+code+'）</h2><p style="color:var(--text3);font-size:.54rem;margin:0 0 16px;">指数深度分析</p>'+d.html}else{c.innerHTML='<div class="loading">AI 未返回内容</div>'}}catch(e){c.innerHTML='<div class="loading">分析失败</div>'}}
load();
</script>
</body>
</html>

<style>
  /* CSS variables aliases */
  :root {--color-up:var(--rise);--color-down:var(--fall);--color-accent:var(--accent);--color-accent-subtle:var(--accent-subtle)}

  .panel-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .panel-header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:#d4d4d8;letter-spacing:-.01em}
  .info-row{font-size:11px;color:var(--muted);margin:4px 0 10px}
  .mode-tabs{display:flex;gap:6px;margin:10px 0}
  .mode-tab{padding:7px 18px;border:1px solid var(--border);border-radius:10px;font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;background:rgba(26,26,31,.4);color:var(--muted);transition:all .2s;backdrop-filter:blur(10px)}
  .mode-tab:hover{border-color:var(--border-hover);color:#d4d4d8}
  .mode-tab.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:10px 0 16px}
  .toolbar input,.toolbar select{font-family:var(--font-body);padding:7px 12px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:var(--card);color:var(--text-primary);outline:none;transition:all .2s;backdrop-filter:blur(10px)}
  .toolbar input:focus,.toolbar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .toolbar input::placeholder{color:var(--muted)}
  .score-bar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-right:3px;transition:width .4s ease}
  .mkt-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 14px;border-radius:12px;border:1px solid var(--border);backdrop-filter:blur(10px)}
  .mkt-up{color:var(--rise);background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2)}
  .mkt-cor{color:var(--accent);background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2)}
  .mkt-bear{color:var(--fall);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}

  .table-shell{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-card)}
  .scr-table{width:100%;border-collapse:collapse;font-size:12px}
  .scr-table thead{position:sticky;top:0;z-index:5}
  .scr-table th{text-align:center;padding:9px 4px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;background:var(--card-solid);backdrop-filter:blur(10px);text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;z-index:5}
  .scr-table th:hover{color:#d4d4d8}
  .scr-table td{padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.03);text-align:center;font-weight:300}
  .scr-table tbody tr:hover{background:rgba(255,255,255,.02)}
  .scr-table a{color:var(--accent);text-decoration:none;font-weight:500}

  .btn-xs{font-size:11px;padding:4px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:rgba(26,26,31,.4);color:var(--muted);text-decoration:none;display:inline-block;transition:all .2s;backdrop-filter:blur(10px)}
  .btn-xs:hover{color:#d4d4d8;background:rgba(255,255,255,.04)}
  .btn-xs.add{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}

  .tag{display:inline-block;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:500;letter-spacing:.02em}
  .tag-l{background:rgba(168,85,247,.08);color:#a855f7;border:1px solid rgba(168,85,247,.15)}
  .tag-b{background:rgba(6,182,212,.08);color:#06b6d4;border:1px solid rgba(6,182,212,.15)}
  .tag-d{background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.15)}

  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto}
  .modal-card{max-width:800px;margin:40px auto;padding:32px;position:relative;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:0 1px 2px rgba(0,0,0,.2),0 16px 48px rgba(0,0,0,.1)}
  .modal-close-btn{position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);transition:color .2s}
  .modal-close-btn:hover{color:#d4d4d8}
  .loading{text-align:center;padding:40px;color:var(--muted);font-family:var(--font-display)}

  /* Light mode overrides */
  html[data-theme="light"] .panel-header h1{color:#374151}
  html[data-theme="light"] .info-row{color:var(--muted)}
  html[data-theme="light"] .mode-tab{background:rgba(255,255,255,.6);border-color:var(--divider);color:var(--muted)}
  html[data-theme="light"] .mode-tab:hover{border-color:rgba(0,0,0,.15);color:#374151}
  html[data-theme="light"] .mode-tab.active{background:rgba(217,119,6,.08);color:var(--accent);border-color:var(--accent-border)}
  html[data-theme="light"] .toolbar input,html[data-theme="light"] .toolbar select{background:rgba(255,255,255,.7);border-color:var(--divider);color:var(--text-primary)}
  html[data-theme="light"] .table-shell{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,.06)}
  html[data-theme="light"] .scr-table th{background:rgba(255,255,255,.9);color:#6b7280;border-bottom:1px solid rgba(0,0,0,.06)}
  html[data-theme="light"] .scr-table td{border-bottom:1px solid rgba(0,0,0,.03)}
  html[data-theme="light"] .scr-table tbody tr:hover{background:rgba(0,0,0,.02)}
  html[data-theme="light"] .scr-table a{color:#d97706}
  html[data-theme="light"] .btn-xs{background:rgba(255,255,255,.6);border-color:var(--divider);color:var(--muted)}
  html[data-theme="light"] .btn-xs:hover{color:var(--text-primary);background:rgba(0,0,0,.03)}
  html[data-theme="light"] .btn-xs.add{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
  html[data-theme="light"] .tag-l{background:rgba(168,85,247,.08);color:#7c3aed;border:1px solid rgba(168,85,247,.15)}
  html[data-theme="light"] .tag-b{background:rgba(6,182,212,.08);color:#0891b2;border:1px solid rgba(6,182,212,.15)}
  html[data-theme="light"] .tag-d{background:rgba(239,68,68,.08);color:#dc2626;border:1px solid rgba(239,68,68,.15)}
  html[data-theme="light"] .modal-card{background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.06)}
  html[data-theme="light"] .loading{color:#6b7280}
  html[data-theme="light"] .mkt-up{color:#059669}
  html[data-theme="light"] .mkt-cor{color:#d97706}
  html[data-theme="light"] .mkt-bear{color:#dc2626}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>
(function(){
  var c=document.getElementById('bg-canvas'),w=c.width=window.innerWidth,h=c.height=window.innerHeight;
  var ctx=c.getContext('2d'),particles=[],N=60;
  for(var i=0;i<N;i++)particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<N;i++){
      var p=particles[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(245,158,11,'+p.o+')';ctx.fill();
    }
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle='rgba(245,158,11,'+((100-dist)/100*.06)+')';ctx.stroke()}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',function(){w=c.width=window.innerWidth;h=c.height=window.innerHeight});
})();
</script>
<div class="app-container">
  <nav class="top-nav" id="top-nav"></nav>

  <div class="panel-header">

    <h1>📋 欧奈尔每日精选</h1>

    <span id="market-badge" class="mkt-badge">加载中...</span>

  </div>

  <div class="mode-tabs">

    <div class="mode-tab active" id="tab-stock" onclick="switchMode('stock')">📈 股票精选</div>

    <input type="text" id="filter-input" placeholder="搜索..." oninput="renderTable()">

    <select id="cat-filter" onchange="renderTable()">

      <option value="">全部</option><option value="双强">双强</option><option value="龙头">龙头</option>

    <select id="score-filter" onchange="renderTable()">

      <option value="0">全部得分</option><option value="80">≥80</option><option value="70">≥70</option><option value="60">≥60</option>

</div>

<script src="../shared/js/nav.js"></script>

<script>

Nav.init({brandIcon:'⬤',brandText:'每日精选',currentPage:'screening'});

let allItems=[],sortCol='oneil_score',sortDir='desc',currentMode='stock';

const DISPLAY_NAMES={'base_breakout':'基部突破','double_bottom':'双重底','flat_base':'扁平基部','saucer_base':'碟形基部','standard_breakout':'标准突破','cup_handle':'杯柄突破','pocket_pivot':'口袋支点','top_pattern':'顶部形态','climax_top':'高潮见顶','breakout_failure':'突破失败','distribution_day':'抛盘日','box_range':'箱体震荡','high_tight_flag':'高紧旗','stepping_bottom':'递升底部','lower_low_breakout':'递升突破','cdl':'K线形态','talib':'TA指标','volume_divergence':'量价背离','railroad_tracks':'铁轨线','double_top':'双重顶','head_shoulders_top':'头肩顶'};

function cn(s){return DISPLAY_NAMES[s]||s}



function switchMode(mode){

  currentMode=mode;

  document.getElementById('tab-stock').className='mode-tab'+(mode==='stock'?' active':'');

  document.getElementById('tab-index').className='mode-tab'+(mode==='index'?' active':'');

  // 指数模式下隐藏股票专属筛选器

  document.getElementById('cat-filter').style.display=mode==='stock'?'':'none';

  document.getElementById('score-filter').style.display=mode==='stock'?'':'none';

  allItems=[]; sortCol=(mode==='stock'?'oneil_score':'index_score');

  document.getElementById('table-wrap').innerHTML='<div class="loading">加载中...</div>';

  load();

}

async function load(){

  try{

    const r=await fetch('/api/discipline/screening?mode='+currentMode);const d=await r.json();

    if(d.market_warning){

      document.getElementById('info-row').insertAdjacentHTML('beforebegin','<div style="background:#FFF3E0;border:1px solid #FF9800;border-radius:8px;padding:8px 14px;margin:8px 0;font-size:.7rem;color:#E65100;text-align:center;">⚠ <b>市场提醒</b>：当前大盘处于「'+d.market_phase+'」阶段，非 O\'Neil 理想买入环境。以下精选仅供观察参考，建议控制仓位、等待追盘日确认后再行动。</div>');

    }

    allItems=d.items||[];

    document.getElementById('info-row').innerHTML=`${d.date||'—'} · ${d.count} 只 · 大盘: ${d.market_phase||'—'} · 建议仓位: ${allItems[0]?.suggested_position_size||'—'}%`;

    const ph=d.market_phase||'';const b=document.getElementById('market-badge');

    if(ph.includes('上升')||ph.includes('确认')){b.className='mkt-badge mkt-up';b.textContent='🟢 '+ph}

    else if(ph.includes('回调')||ph.includes('修正')){b.className='mkt-badge mkt-cor';b.textContent='🟡 '+ph}

    else{b.className='mkt-badge mkt-bear';b.textContent=ph||'—'}

    renderTable();

  }catch(e){document.getElementById('table-wrap').innerHTML='<div class="loading">加载失败: '+e.message+'</div>'}

}



function fs(s){if(s==null)return'-';const v=Math.max(0,Math.min(100,s));let c='#4CAF50';if(v<60)c='#FF9800';if(v<40)c='#F44336';return`<span style="display:inline-flex;align-items:center;gap:2px"><span class="score-bar" style="width:${v*.4}px;background:${c}"></span><b style="color:${c}">${v.toFixed(0)}</b></span>`}



function renderTable(){

  const f=(document.getElementById('filter-input').value||'').toLowerCase();

  const cat=document.getElementById('cat-filter').value;

  const smin=parseInt(document.getElementById('score-filter').value)||0;

  let items=allItems.slice();
  if(currentMode==='index'&&items.length>10) items=items.slice(0,10);

  if(cat) items=items.filter(i=>(i.rs_category||'').includes(cat));

  if(f) items=items.filter(i=>(i.stock_code||'').toLowerCase().includes(f)||(i.stock_name||'').toLowerCase().includes(f));

  if(smin) items=items.filter(i=>(i.oneil_score||0)>=smin);

  const col=sortCol||'oneil_score',dir=sortDir||'desc';

  items.sort((a,b)=>{let va=a[col]!=null?a[col]:-Infinity,vb=b[col]!=null?b[col]:-Infinity;if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}return dir==='asc'?(va-vb):(vb-va)});

  if(!items.length){document.getElementById('table-wrap').innerHTML='<div class="loading">无匹配结果</div>';return}

  let h='<div class="table-shell"><table class="scr-table"><thead><tr>';

  if(currentMode==='index'){

    h+=`<th onclick="tc('index_score')">得分${sa('index_score')}</th>`;

    h+=`<th onclick="tc('index_code')">指数代码${sa('index_code')}</th>`;

    h+=`<th onclick="tc('index_name')">名称${sa('index_name')}</th>`;

    h+=`<th onclick="tc('pool_name')">池${sa('pool_name')}</th>`;

    h+=`<th onclick="tc('rps_250')">RPS250${sa('rps_250')}</th>`;

    h+=`<th onclick="tc('rps_20')">RPS20${sa('rps_20')}</th>`;

    h+=`<th onclick="tc('signal_count')">信号${sa('signal_count')}</th>`;

    h+=`<th onclick="tc('ideal_buy')">买点${sa('ideal_buy')}</th>`;
      h+=`<th>操作</th>`;

  }else{

    h+=`<th onclick="tc('oneil_score')">O'Neil${sa('oneil_score')}</th>`;

    h+=`<th onclick="tc('stock_code')">代码${sa('stock_code')}</th>`;

    h+=`<th onclick="tc('stock_name')">名称${sa('stock_name')}</th>`;

    h+=`<th onclick="tc('industry_name')">行业${sa('industry_name')}</th>`;

    h+=`<th>RS</th>`;

    h+=`<th onclick="tc('rps_250')">RPS250${sa('rps_250')}</th>`;

    h+=`<th onclick="tc('canslim_total')">CANSLIM${sa('canslim_total')}</th>`;

    h+=`<th onclick="tc('signal_count')">信号${sa('signal_count')}</th>`;

    h+=`<th onclick="tc('ideal_buy')">买点${sa('ideal_buy')}</th>`;

    h+=`<th onclick="tc('resonance_name')">共振${sa('resonance_name')}</th>`;

    h+=`<th>操作</th>`;

  }

  h+='</tr></thead><tbody>';

  for(const it of items){

    h+='<tr>';

    if(currentMode==='index'){

      const poolTag = `<span style="font-size:.55rem;color:var(--text-secondary)">${it.pool_name||''}</span>`;

      h+=`<td>${fs(it.index_score)}</td>`;

      h+=`<td><a href="review-index.html?code=${it.index_code||''}"><b>${it.index_code||''}</b></a></td>`;

      h+=`<td>${it.index_name||''}</td>`;

      h+=`<td>${poolTag}</td>`;

      h+=`<td>${(it.rps_250||0).toFixed(0)}</td>`;

      h+=`<td>${(it.rps_20||0).toFixed(0)}</td>`;

      h+=`<td>${it.signal_count||0} <span style="font-size:.5rem;color:var(--text-tertiary)">${(it.signal_summary||'').split('/').map(cn).join('/')}</span></td>`;

      h+=`<td>${it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—'}</td>`;
      h+=`<td style="display:flex;gap:3px;justify-content:center;"><button class="btn-xs add" onclick="addWL('${it.index_code||''}','${it.index_name||''}')">+自选</button><a class="btn-xs" href="javascript:void(0)" onclick="showIndexRec('${it.index_code||''}','${it.index_name||''}')"> 精选理由</a><a class="btn-xs" href="javascript:void(0)" onclick="showIndexOneil('${it.index_code||''}','${it.index_name||''}')"> 欧奈尔说</a></td>`;

    }else{

      const cats=(it.rs_category||'').split(' / ').map(c=>{let cl='tag-l';if(c==='加速')cl='tag-b';if(c==='双强')cl='tag-d';return`<span class="tag ${cl}">${c.trim()}</span>`}).join(' ');

      h+=`<td>${fs(it.oneil_score)}</td>`;

      h+=`<td><a href="review.html?code=${it.stock_code}">${it.stock_code}</a></td>`;

      h+=`<td>${it.stock_name||''}</td>`;

      h+=`<td>${it.industry_name||''}</td>`;

      h+=`<td>${cats}</td>`;

      h+=`<td>${(it.rps_250||0).toFixed(0)}</td>`;

      h+=`<td>${it.canslim_total!=null?it.canslim_total.toFixed(0):'-'}</td>`;

      h+=`<td>${it.signal_count||0} <span style="font-size:.5rem;color:var(--text-tertiary)">${it.signal_summary.split('/').map(cn).join('/')}</span></td>`;

      h+=`<td>${it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—'}</td>`;

      h+=`<td>${it.resonance_name?`<span style="color:#E65100;font-weight:600">${it.resonance_name}</span><br><span style="font-size:.5rem;color:var(--text-tertiary)">${it.resonance_pool||''}</span>`:'—'}</td>`;

      h+=`<td style="display:flex;gap:3px;justify-content:center;">`;

      h+=`<button class="btn-xs add" onclick="addWL('${it.stock_code}','${it.stock_name}')">+自选</button>`;

      h+=`<a class="btn-xs" href="javascript:void(0)" onclick="showRec('${it.stock_code}','${it.stock_name}')"> 精选理由</a>
      <a class="btn-xs" href="javascript:void(0)" onclick="showOneil('${it.stock_code}','${it.stock_name}')"> 欧奈尔说</a>`;

      h+=`</td>`;

    }

    h+='</tr>';

  }

  h+='</tbody></table></div>';

  document.getElementById('table-wrap').innerHTML=h;

}



function sa(c){return c===sortCol?(sortDir==='asc'?' ▲':' ▼'):''}

function tc(c){if(sortCol===c)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=c;sortDir='desc'}renderTable()}



async function addWL(code,name){

  try{const r=await fetch('/api/discipline/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stock_code:code,stock_name:name})});const d=await r.json();alert(d.added?'已加入自选池':(d.error||'失败'))}catch(e){alert('请求失败')}

}

<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抛盘日回测 · Bloomberg 终端</title>
<link rel="stylesheet" href="../shared/themes/bloomberg.css">
<link rel="stylesheet" href="../shared/css/dashboard-base.css">
<script src="../shared/js/echarts.min.js"></script>
<style>
  .bt-layout { display:flex; gap:16px; align-items:flex-start; }
  .bt-left { width:330px; flex-shrink:0; display:flex; flex-direction:column; gap:12px; }
  .bt-right { flex:1; min-width:0; display:flex; flex-direction:column; gap:16px; }
  .date-row { display:flex; gap:8px; }
  .date-row .date-field { flex:1; }
  .date-field label { display:block; font-family:var(--font-mono); font-size:0.6rem; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .date-field input { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:0.75rem; background:var(--bg-input); color:var(--text-primary); }
  .index-select-wrap label { display:block; font-family:var(--font-mono); font-size:0.6rem; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .index-select-wrap select { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:0.78rem; background:var(--bg-input); color:var(--text-primary); }

  .btn-run {
    display:block; width:100%; padding:10px;
    background:var(--color-accent); color:#fff; border:none;
    border-radius:var(--radius-sm); font-family:var(--font-mono);
    font-size:0.82rem; font-weight:600; cursor:pointer;
    letter-spacing:0.04em; transition:opacity 0.2s;
  }
  .btn-run:hover { opacity:0.85; }
  .btn-run:disabled { background:var(--border); cursor:not-allowed; }
  .btn-save {
    display:block; width:100%; padding:8px;
    background:var(--bg-card); color:var(--color-accent);
    border:1px solid var(--border); border-radius:var(--radius-sm);
    font-family:var(--font-mono); font-size:0.75rem; font-weight:600;
    cursor:pointer; transition:border-color 0.2s;
  }
  .btn-save:hover { border-color:var(--border-focus); }
  .btn-compare {
    padding:8px 16px; background:var(--bg-card); color:var(--text-secondary);
    border:1px solid var(--border); border-radius:var(--radius-sm);
    font-family:var(--font-mono); font-size:0.72rem; font-weight:500; cursor:pointer;
  }

  /* ── Bloomberg Param Card ── */
  .bbg-param { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-card); }
  .bbg-param-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border-subtle); }
  .bbg-param-header .dot { width:8px; height:8px; border-radius:50%; margin-right:8px; flex-shrink:0; }
  .bbg-param-header .title { font-family:var(--font-mono); font-size:0.72rem; font-weight:600; flex:1; letter-spacing:0.03em; }
  .bbg-param-header .toggle { position:relative; width:36px; height:20px; border-radius:10px; border:none; cursor:pointer; transition:background 0.2s; }
  .bbg-param-header .toggle.on { background:var(--color-accent); }
  .bbg-param-header .toggle.off { background:var(--border); }
  .bbg-param-header .toggle::after { content:''; position:absolute; top:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:left 0.2s; }
  .bbg-param-header .toggle.on::after { left:18px; }
  .bbg-param-header .toggle.off::after { left:2px; }
  .bbg-param-body { padding:10px 14px 12px; }
  .bbg-param-body.collapsed { display:none; }

  .slider-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .slider-row:last-child { margin-bottom:0; }
  .slider-row .s-label { width:64px; font-size:0.62rem; color:var(--text-tertiary); font-family:var(--font-mono); flex-shrink:0; text-transform:uppercase; letter-spacing:0.04em; }
  .slider-row input[type=range] { flex:1; height:3px; -webkit-appearance:none; background:var(--border); border-radius:2px; outline:none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--color-accent); cursor:pointer; border:2px solid var(--bg-card); }
  .slider-row .s-val { width:50px; text-align:right; font-size:0.65rem; font-weight:600; color:var(--text-primary); font-family:var(--font-mono); flex-shrink:0; }

  .stat-cards { display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--border); border-radius:var(--radius-md); overflow:hidden; }
  .stat-card { background:var(--bg-card); padding:10px 8px; text-align:center; }
  .stat-value { font-family:var(--font-mono); font-size:1.3rem; font-weight:700; color:var(--text-primary); }
  .stat-label { font-size:0.58rem; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.06em; font-family:var(--font-mono); margin-top:2px; }
  .stat-value.up { color:var(--color-up); }
  .stat-value.down { color:var(--color-down); }

  #compare-panel { display:none; margin-top:12px; padding:14px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); }
  #compare-panel select { width:100%; padding:6px 10px; border-radius:var(--radius-sm); border:1px solid var(--border); font-family:var(--font-mono); font-size:0.7rem; background:var(--bg-input); color:var(--text-primary); margin-bottom:4px; }

  /* data-table override for signal table */
  #table-signals .data-table { min-width:900px; }
  #table-signals .data-table td { font-size:0.65rem; }

  @media (max-width:900px) { .bt-layout { flex-direction:column; } .bt-left { width:100%; } .stat-cards { grid-template-columns:repeat(3,1fr); } }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">DD-BACKTEST // v3.2</span>
  <div class="nav-links">
    <a href="#" class="nav-link active">抛盘日回测</a>
    <a href="#" class="nav-link">追盘日回测</a>
    <a href="#" class="nav-link">大盘扫描</a>
    <a href="#" class="nav-link">指数扫描</a>
    <a href="#" class="nav-link">买入形态</a>
    <a href="#" class="nav-link">仓位管理</a>
  </div>
  <div class="nav-actions">
    <span class="live-dot"></span>
    <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-tertiary);">抛盘日 V3</span>
    <button class="theme-btn" onclick="toggleTheme()">☀</button>
  </div>
</nav>

<div class="dashboard" style="padding-top:16px">

  <div class="bt-layout">

    <!-- ═══ LEFT PANEL ═══ -->
    <div class="bt-left">

      <div class="card">
        <div class="section-header"><span class="section-title">回测设置</span></div>
        <div class="index-select-wrap">
          <label>指数</label>
          <select id="index-select"></select>
        </div>
        <div class="date-row" style="margin-top:10px">
          <div class="date-field"><label>开始日期</label><input type="date" id="date-start"></div>
          <div class="date-field"><label>结束日期</label><input type="date" id="date-end"></div>
        </div>
      </div>

      <!-- Card 1: Standard -->
      <div class="bbg-param" id="card1">
        <div class="bbg-param-header" onclick="toggleCard('card1')">
          <span class="dot" style="background:var(--color-up)"></span>
          <span class="title">标准抛盘</span>
          <button class="toggle on" id="card1-toggle" onclick="event.stopPropagation();toggleCardEnabled('card1')"></button>
        </div>
        <div class="bbg-param-body" id="card1-body">
          <div class="slider-row">
            <span class="s-label">跌幅 ≤</span>
            <input type="range" id="c1-decline" min="-5.0" max="0" step="0.05" value="-0.10" oninput="syncSlider('c1-decline')">
            <span class="s-val" id="c1-decline-v">−0.10%</span>
          </div>
          <div class="slider-row">
            <span class="s-label">量比 ≥</span>
            <input type="range" id="c1-vol" min="0.80" max="2.00" step="0.01" value="1.00" oninput="syncSlider('c1-vol')">
            <span class="s-val" id="c1-vol-v">1.00</span>
          </div>
        </div>
      </div>

      <!-- Card 2: Stealth -->
      <div class="bbg-param" id="card2">
        <div class="bbg-param-header" onclick="toggleCard('card2')">
          <span class="dot" style="background:var(--color-neutral)"></span>
          <span class="title">假阳线（伪装）</span>
          <button class="toggle on" id="card2-toggle" onclick="event.stopPropagation();toggleCardEnabled('card2')"></button>
        </div>
        <div class="bbg-param-body" id="card2-body">
          <div class="slider-row">
            <span class="s-label">涨幅 ≥</span>
            <input type="range" id="c2-chg-min" min="-1.0" max="1.0" step="0.05" value="-0.30" oninput="syncSlider('c2-chg-min')">
            <span class="s-val" id="c2-chg-min-v">−0.30%</span>
          </div>
          <div class="slider-row">
            <span class="s-label">涨幅 ≤</span>
            <input type="range" id="c2-chg-max" min="-1.0" max="1.0" step="0.05" value="0.20" oninput="syncSlider('c2-chg-max')">
            <span class="s-val" id="c2-chg-max-v">0.20%</span>
          </div>
          <div class="slider-row">
            <span class="s-label">冲高 ≥</span>
            <input type="range" id="c2-surge" min="0" max="5.0" step="0.1" value="0.50" oninput="syncSlider('c2-surge')">
            <span class="s-val" id="c2-surge-v">0.50%</span>
          </div>
          <div class="slider-row">
            <span class="s-label">量比 ≥</span>
            <input type="range" id="c2-vol" min="0.90" max="2.00" step="0.05" value="1.10" oninput="syncSlider('c2-vol')">
            <span class="s-val" id="c2-vol-v">1.10</span>
          </div>
          <div class="slider-row">
            <span class="s-label">上影 ≥</span>
            <input type="range" id="c2-shadow" min="1.0" max="3.0" step="0.1" value="1.5" oninput="syncSlider('c2-shadow')">
            <span class="s-val" id="c2-shadow-v">1.5×</span>
          </div>
        </div>
      </div>

      <!-- Card 3: Reversal -->
      <div class="bbg-param" id="card3">
        <div class="bbg-param-header" onclick="toggleCard('card3')">
          <span class="dot" style="background:#a78bfa"></span>
          <span class="title">盘中反转</span>
          <button class="toggle on" id="card3-toggle" onclick="event.stopPropagation();toggleCardEnabled('card3')"></button>
        </div>
        <div class="bbg-param-body" id="card3-body">
          <div class="slider-row">
            <span class="s-label">冲高 ≥</span>
            <input type="range" id="c3-surge" min="0" max="5.0" step="0.1" value="0.50" oninput="syncSlider('c3-surge')">
            <span class="s-val" id="c3-surge-v">0.50%</span>
          </div>
          <div class="slider-row">
            <span class="s-label">量比 ≥</span>
            <input type="range" id="c3-vol" min="0.90" max="2.00" step="0.05" value="1.10" oninput="syncSlider('c3-vol')">
            <span class="s-val" id="c3-vol-v">1.10</span>
          </div>
          <div class="slider-row">
            <span class="s-label">上影 ≥</span>
            <input type="range" id="c3-shadow" min="1.0" max="3.0" step="0.1" value="1.5" oninput="syncSlider('c3-shadow')">
            <span class="s-val" id="c3-shadow-v">1.5×</span>
          </div>
          <div class="slider-row">
            <span class="s-label">收盘 ≤ 中价</span>
            <input type="range" id="c3-midpt" min="30" max="70" step="1" value="50" oninput="syncSliderInt('c3-midpt')">
            <span class="s-val" id="c3-midpt-v">50%</span>
          </div>
        </div>
      </div>

      <!-- Card 4: Heavy -->
      <div class="bbg-param" id="card4">
        <div class="bbg-param-header" onclick="toggleCard('card4')">
          <span class="dot" style="background:var(--text-primary)"></span>
          <span class="title">重抛盘 ×2</span>
          <button class="toggle on" id="card4-toggle" onclick="event.stopPropagation();toggleCardEnabled('card4')"></button>
        </div>
        <div class="bbg-param-body" id="card4-body">
          <div class="slider-row">
            <span class="s-label">跌幅 ≤</span>
            <input type="range" id="c4-decline" min="-10.0" max="0" step="0.1" value="-1.50" oninput="syncSlider('c4-decline')">
            <span class="s-val" id="c4-decline-v">−1.50%</span>
          </div>
          <div class="slider-row">
            <span class="s-label">量比 ≥</span>
            <input type="range" id="c4-vol" min="0.80" max="2.00" step="0.01" value="0.98" oninput="syncSlider('c4-vol')">
            <span class="s-val" id="c4-vol-v">0.98</span>
          </div>
        </div>
      </div>

      <button class="btn-run" id="btn-run">运行回测</button>
      <button class="btn-save" id="btn-save">保存配置</button>
      <button class="btn-compare" id="btn-compare">对比历史</button>

      <div id="compare-panel">
        <div style="font-weight:700;margin-bottom:8px;font-family:var(--font-mono);font-size:0.72rem;">对比两次回测</div>
        <select id="compare-select-1"></select>
        <select id="compare-select-2"></select>
        <button class="btn-run" style="font-size:0.75rem;margin-top:8px" onclick="runComparison()">对比</button>
      </div>
    </div>

    <!-- ═══ RIGHT PANEL ═══ -->
    <div class="bt-right">
      <div class="stat-cards">
        <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label">交易日</div></div>
        <div class="stat-card"><div class="stat-value up" id="stat-signals">—</div><div class="stat-label">信号</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-standard">—</div><div class="stat-label">标准</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-special">—</div><div class="stat-label">假阳线</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-reverse">—</div><div class="stat-label">反转</div></div>
        <div class="stat-card"><div class="stat-value up" id="stat-heavy">—</div><div class="stat-label">重×2</div></div>
      </div>

      <div class="card">
        <div class="section-header"><span class="section-title">K线 · 抛盘日标记</span></div>
        <div class="chart-container" id="chart-kline" style="height:480px;"></div>
      </div>

      <div class="card">
        <div class="section-header"><span class="section-title">抛盘日明细</span><span style="font-size:0.65rem;color:var(--text-tertiary);font-family:var(--font-mono)">点击表头排序</span></div>
        <div class="table-wrap" id="table-signals"></div>
      </div>
    </div>
  </div>

</div>

<script>
  function toggleTheme() {
    var html = document.documentElement;
    var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem('dd-bbg-theme', next);
    document.querySelector('.theme-btn').textContent = next === 'dark' ? '☀' : '☾';
  }
  (function() {
    var s = localStorage.getItem('dd-bbg-theme') || 'dark';
    document.documentElement.dataset.theme = s;
    document.querySelector('.theme-btn').textContent = s === 'dark' ? '☀' : '☾';
  })();

  function toggleCard(id) {
    var b = document.getElementById(id+'-body');
    if (b) b.classList.toggle('collapsed');
  }
  function toggleCardEnabled(id) {
    var b = document.getElementById(id+'-toggle');
    b.classList.toggle('on'); b.classList.toggle('off');
  }
  function syncSlider(id) {
    var el = document.getElementById(id);
    var v = document.getElementById(id+'-v');
    if (!el || !v) return;
    var val = parseFloat(el.value);
    if (id.includes('decline') || id.includes('chg-min') || id.includes('chg-max')) v.textContent = (val>=0?'+':'') + val.toFixed(2) + '%';
    else if (id.includes('shadow')) v.textContent = val.toFixed(1) + '×';
    else if (id.includes('vol')) v.textContent = val.toFixed(2);
    else if (id.includes('surge')) v.textContent = val.toFixed(2) + '%';
  }
  function syncSliderInt(id) {
    var el = document.getElementById(id);
    var v = document.getElementById(id+'-v');
    if (!el || !v) return;
    v.textContent = el.value + '%';
  }
</script>
<script src="../shared/js/api-client.js"></script>
<script src="../shared/js/kline-chart.js?v=20260505b"></script>
<script src="../distribution-day/js/table.js?v=20260505b"></script>
<script src="../distribution-day/js/main.js?v=20260429e"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>形态识别 · 投资手账本</title>
  <link rel="stylesheet" href="../shared/css/theme.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/xhs-cards.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <script src="../shared/js/echarts.min.js"></script>
  <style>
    .top-bar { display:flex; gap:12px; align-items:flex-end; padding:16px 20px; background:var(--card-bg); border-radius:18px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,0.04); flex-wrap:wrap; }
    .top-bar .fld { flex:1; min-width:90px; }
    .top-bar label { display:block; font-size:0.6rem; font-weight:600; color:var(--text-tertiary); margin-bottom:3px; }
    .top-bar input,.top-bar select { width:100%; padding:7px 10px; border:1px solid var(--divider); border-radius:10px; font-size:0.75rem; background:var(--card-bg); color:var(--text-primary); box-sizing:border-box; }
    .btn-scan { padding:8px 24px; background:#FE2C55; color:#FFF; border:none; border-radius:14px; font-size:0.9rem; font-weight:800; cursor:pointer; white-space:nowrap; }
    .btn-scan:hover { opacity:0.88; } .btn-scan:disabled { background:#CCC; cursor:not-allowed; }

    /* 个股/指数切换 */
    .mode-btn { padding:3px 8px; border:1px solid var(--divider); border-radius:8px; background:var(--card-bg); color:var(--text-secondary); font-size:0.6rem; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .mode-btn.active { background:var(--color-accent); color:#FFF; border-color:var(--color-accent); font-weight:700; }

    /* 图表控件栏 */
    .chart-controls { display:flex; gap:16px; align-items:center; padding:6px 0; margin-bottom:6px; }
    .chart-controls .ctrl-group { display:flex; align-items:center; gap:4px; }
    .chart-controls .ctrl-label { font-size:0.6rem; font-weight:600; color:var(--text-tertiary); margin-right:4px; }
    .chart-controls .ctrl-btn { padding:4px 12px; border:1px solid var(--divider); border-radius:10px; background:var(--card-bg); color:var(--text-secondary); font-size:0.68rem; cursor:pointer; transition:all 0.15s; }
    .chart-controls .ctrl-btn:hover { border-color:var(--color-accent); color:var(--color-accent); }
    .chart-controls .ctrl-btn.active { background:#FE2C55; color:#FFF; border-color:#FE2C55; font-weight:700; }

    /* 图表区域 */
    .chart-wrap { width:100%; height:560px; margin-bottom:0; }

    /* 信号标记图例 */
    .signal-legend { display:flex; gap:12px; flex-wrap:wrap; padding:6px 0 10px 0; font-size:0.62rem; align-items:center; color:var(--text-tertiary); }
    .signal-legend .sl-item { display:inline-flex; align-items:center; gap:4px; font-size:0.65rem; color:var(--text-secondary); }
    .signal-legend .sl-sym { font-size:0.9rem; line-height:1; }

    /* 下方双栏 */
    .bottom-layout { display:flex; gap:14px; align-items:flex-start; margin-bottom:10px; }
    .bottom-left { flex:1; min-width:0; }
    .bottom-right { width:340px; flex-shrink:0; }
    @media (max-width:900px) { .bottom-layout { flex-direction:column; } .bottom-right { width:100%; } }

    /* 分析建议卡片内部 */
    .rec-section { margin-bottom:8px; }
    .rec-section:last-child { margin-bottom:0; }
    .rec-label { font-size:0.62rem; font-weight:700; color:var(--color-accent); margin-bottom:3px; display:flex; align-items:center; gap:4px; }
    .rec-text { font-size:0.7rem; color:var(--text-secondary); line-height:1.5; }

    /* 信号时间线 */
    .timeline-wrap { max-height:520px; overflow-y:auto; }
    .tl-item { display:flex; align-items:flex-start; gap:10px; padding:7px 8px; cursor:pointer; transition:background 0.15s; border-radius:10px; border-bottom:1px solid var(--divider); }
    .tl-item:last-child { border-bottom:none; }
    .tl-item:hover { background:var(--color-accent-subtle); }
    .tl-dot { width:10px; height:10px; border-radius:50%; margin-top:4px; flex-shrink:0; }
    .tl-info { flex:1; min-width:0; }
    .tl-date { font-size:0.62rem; color:var(--text-tertiary); }
    .tl-name { font-size:0.75rem; font-weight:700; }
    .tl-desc { font-size:0.62rem; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tl-empty { font-size:0.72rem; color:var(--text-tertiary); text-align:center; padding:32px 0; }

    /* 图例行 */
    .legend-row { display:flex; gap:12px; flex-wrap:wrap; padding:6px 0; font-size:0.62rem; align-items:center; }
    .legend-row .lg-item { display:flex; align-items:center; gap:5px; cursor:default; }
    .legend-row .lg-dot { width:9px; height:9px; border-radius:2px; }
    .legend-row .lg-circle { border-radius:50%; }

    /* 导航下拉 */
    .nav-dropdown { position:relative; display:inline-flex; }
    .nav-dropdown-menu { display:none; position:absolute; top:100%; left:0; background:var(--card-bg); border:1px solid var(--divider); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); min-width:150px; padding:6px 0; z-index:200; white-space:nowrap; }
    .nav-dropdown:hover .nav-dropdown-menu { display:block; }
    .nav-dropdown-menu a { display:block; padding:7px 16px; font-size:0.72rem; color:var(--text-secondary); text-decoration:none; }
    .nav-dropdown-menu a:hover { background:var(--color-accent-subtle); color:var(--color-accent); }
    .nav-dropdown-menu a.active { color:var(--color-accent); font-weight:700; }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 导航栏 -->
    <nav id="top-nav"></nav>

    <!-- 参数横条 -->
    <div class="top-bar">
      <div class="fld" style="flex:0.7;min-width:160px"><label>股票/指数代码</label><div style="display:flex;gap:6px;align-items:center"><button class="mode-btn active" id="btn-stock" onclick="switchMode('stock')">个股</button><button class="mode-btn" id="btn-index" onclick="switchMode('index')">指数</button><input type="text" id="code" value="600519" style="flex:1" onkeydown="if(event.key==='Enter')scan()"><span id="stock-name" style="font-size:0.65rem;color:var(--text-tertiary);white-space:nowrap;flex-shrink:0"></span></div></div>
      <div class="fld"><label>开始日期</label><input type="date" id="date-start"></div>
      <div class="fld"><label>结束日期</label><input type="date" id="date-end"></div>
      <button class="btn-scan" onclick="scan()">🔍 扫描</button>
    </div>

    <!-- 图表控件栏 -->
    <div class="chart-controls">
      <div class="ctrl-group">
        <span class="ctrl-label">指标</span>
        <button class="ctrl-btn active" id="btn-ma" onclick="toggleOverlay('ma')">📈 均线</button>
        <button class="ctrl-btn" id="btn-bb" onclick="toggleOverlay('bb')">📊 布林</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">周期</span>
        <button class="ctrl-btn active" id="btn-daily" onclick="switchPeriod('daily')">日K</button>
        <button class="ctrl-btn" id="btn-weekly" onclick="switchPeriod('weekly')">周K</button>
        <button class="ctrl-btn" id="btn-monthly" onclick="switchPeriod('monthly')">月K</button>
      </div>
    </div>

    <!-- 图表区：单 ECharts，三格（K线+MA / BB / 成交量） -->
    <div class="chart-wrap" id="chart"></div>

    <!-- 信号标记图例 -->
    <div class="signal-legend" id="signal-legend"></div>

    <!-- 下方双栏 -->
    <div class="bottom-layout">
      <!-- 左：分析建议 -->
      <div class="bottom-left">
        <div class="xhs-card" style="min-height:180px">
          <div class="xhs-card-header">
            <span class="xhs-card-label">📊 分析建议</span>
          </div>
          <div id="rec-content" style="color:var(--text-tertiary);font-size:0.7rem;">点击「扫描」查看分析建议</div>
        </div>
      </div>
      <!-- 右：信号时间线 -->
      <div class="bottom-right">
        <div class="xhs-card">
          <div class="xhs-card-header">
            <span class="xhs-card-label">📅 信号时间线</span>
          </div>
          <div class="timeline-wrap" id="timeline-wrap">
            <div class="tl-empty" id="tl-empty">暂无信号</div>
            <div id="tl-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 图例 -->
    <div class="legend-row" id="legend-row"></div>
  </div>

  <script src="app.js"></script>
  <script src="../shared/js/nav.js"></script>
  <script>Nav.init({brandIcon:"🔎",brandText:"形态识别",currentPage:"pattern-scan"})</script>
</body>
</html>

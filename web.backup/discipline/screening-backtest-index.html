<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指数回测 · 知行</title>
  <link rel="stylesheet" href="../shared/css/theme.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/xhs-cards.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <style>
    body { max-width: 1200px; margin: 0 auto; }
    .panel-header { padding: 16px 0 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .panel-header h1 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 900; margin: 0; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 10px 0; }
    .toolbar select, .toolbar input { padding: 6px 10px; border: 1px solid var(--divider); border-radius: 8px; font-size: 0.7rem; background: var(--card-bg); color: var(--text-primary); }
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0; }
    .stat-card { background: var(--card-bg); border-radius: 10px; padding: 10px 14px; border: 1px solid var(--divider); text-align: center; min-width: 90px; }
    .stat-card .val { font-size: 1.1rem; font-weight: 800; }
    .stat-card .lbl { font-size: 0.55rem; color: var(--text-tertiary); margin-top: 2px; }
    .green { color: #2E7D32; } .red { color: #C62828; }
    .bt-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
    .bt-table th { text-align: center; padding: 7px 3px; border-bottom: 2px solid var(--divider); font-size: 0.6rem; font-weight: 700; color: var(--text-secondary); white-space: nowrap; position: sticky; top: 0; background: var(--bg); }
    .bt-table td { padding: 5px 3px; border-bottom: 1px solid var(--divider); text-align: center; }
    .bt-table tr:hover { background: var(--card-bg); }
    .bt-table a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: var(--text-tertiary); }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; overflow-y: auto; }
    .modal-box { background: var(--card-bg); max-width: 600px; margin: 40px auto; border-radius: 16px; padding: 28px; }
    .modal-box h3 { font-size: .9rem; margin: 0 0 12px; }
    .modal-box table { width: 100%; font-size: .7rem; border-collapse: collapse; }
    .modal-box td { padding: 4px 8px; border-bottom: 1px solid var(--divider); }
    .modal-box .label { color: var(--text-secondary); font-size: .6rem; }
    .modal-box .val { font-weight: 700; text-align: right; }
    .modal-box .ok { color: #2E7D32; } .modal-box .warn { color: #E65100; }
    .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="app-container">
    <nav class="top-nav" id="top-nav"></nav>
    <div class="panel-header"><h1>📈 指数精选回测</h1></div>
    <div class="toolbar">
      <label style="font-size:0.65rem;color:var(--text-secondary);">精选日期</label>
      <select id="date-select" onchange="load()"></select>
    </div>
    <div id="stats-row" class="stats-row"></div>
    <div id="table-wrap"><div class="loading">选择日期查看回测</div></div>
  </div>

  <div class="modal-overlay" id="bd-modal">
    <div class="modal-box" style="position:relative;">
      <button class="modal-close" onclick="document.getElementById('bd-modal').style.display='none'">✕</button>
      <div id="bd-content"></div>
    </div>
  </div>
  <script src="../shared/js/nav.js"></script>
  <script>
    Nav.init({ brandIcon: '🦊', brandText: '知行', currentPage: 'screening-backtest-index' });
    async function init() {
      const resp = await fetch('/api/discipline/screening-backtest-index');
      const d = await resp.json();
      const sel = document.getElementById('date-select');
      sel.innerHTML = '';
      if (!d.available_dates || d.available_dates.length === 0) {
        sel.innerHTML = '<option>— 暂无历史数据 —</option>';
        return;
      }
      for (const dt of d.available_dates) {
        const opt = document.createElement('option');
        opt.value = dt; opt.textContent = dt;
        if (dt === d.date) opt.selected = true;
        sel.appendChild(opt);
      }
      if (d.items && d.items.length) render(d);
    }
    async function load() {
      const date = document.getElementById('date-select').value;
      document.getElementById('table-wrap').innerHTML = '<div class="loading">加载中...</div>';
      const resp = await fetch('/api/discipline/screening-backtest-index?date=' + date);
      const d = await resp.json();
      render(d);
    }
    let _items = [];

    function showBreakdown(idx) {
      const it = _items[idx];
      if (!it) return;
      const rps250 = it.rps_250 || 0;
      const rps20 = it.rps_20 || 0;
      const sigScore = it.signal_score || 0;
      const score = it.index_score || 0;
      const rpsComp = Math.min(rps250, 100) / 100 * 50;
      const sigComp = Math.min(sigScore, 100) / 100 * 50;
      const sigSummary = (it.signal_summary || '').split('/').map(function(s) {
        const MAP = {'base_breakout':'基部突破','pocket_pivot':'口袋支点','cdl':'K线形态','talib':'TA指标'};
        return MAP[s.trim()] || s.trim();
      }).join(' / ');

      let h = '<h3>📊 ' + (it.index_name || it.index_code) + ' 得分拆解</h3>';
      h += '<p style="font-size:.6rem;color:var(--text-tertiary);margin:0 0 12px;">总分 = RPS250 × 0.50 + 信号分 × 0.50</p>';

      // Layer 1
      const mkt = it.market_phase || '—';
      h += '<table><tr><td class="label">L1 大盘闸门</td><td class="val ' + (mkt.includes('上升')||mkt.includes('确认')?'ok':'warn') + '">' + mkt + '</td></tr>';

      // Layer 2
      const rsOk = rps250 >= 75 && rps20 >= 80;
      h += '<tr><td class="label">L2 RS 强度</td><td class="val">';
      h += 'RPS<sub>250</sub>=' + rps250.toFixed(0) + ' (≥75 ' + (rps250>=75?'✓':'✗') + ') ';
      h += 'RPS<sub>20</sub>=' + rps20.toFixed(0) + ' (≥80 ' + (rps20>=80?'✓':'✗') + ')';
      h += '</td></tr>';

      // Layer 3
      h += '<tr><td class="label">L3 趋势健康</td><td class="val ok">MA多头 + 量能放大 ✓</td></tr>';

      // Layer 4
      h += '<tr><td class="label">L4 技术信号</td><td class="val">';
      h += '信号数=' + (it.signal_count||0) + ' · ' + sigSummary;
      h += '<br>最佳主信号分=' + (sigScore > 0 ? (it.buy_source||'—') : '—');
      h += ' · 额外基部+0 · 额外形态+0';
      h += '</td></tr>';

      // Score breakdown
      h += '<tr style="border-top:2px solid var(--divider);"><td class="label">RPS 组件</td><td class="val">' + rps250.toFixed(0) + ' / 100 × 50 = <b>' + rpsComp.toFixed(1) + '</b></td></tr>';
      h += '<tr><td class="label">信号组件</td><td class="val">' + sigScore.toFixed(0) + ' / 100 × 50 = <b>' + sigComp.toFixed(1) + '</b></td></tr>';
      h += '<tr style="font-size:.8rem;"><td class="label"><b>最终得分</b></td><td class="val" style="font-size:.9rem;"><b>' + score.toFixed(0) + '</b></td></tr>';
      h += '</table>';

      document.getElementById('bd-content').innerHTML = h;
      document.getElementById('bd-modal').style.display = 'flex';
    }

    function fmtPct(v) {
      if (v == null) return '—';
      const cls = v >= 0 ? 'green' : 'red';
      const sign = v >= 0 ? '+' : '';
      return `<span class="${cls}">${sign}${v}%</span>`;
    }
    function render(d) {
      const s = d.stats || {};
      let st = `<div class="stat-card"><div class="val">${s.count||0}</div><div class="lbl">精选数</div></div>`;
      for (const tag of ['return_5d', 'return_10d', 'return_20d']) {
        const label = tag.replace('return_', '') + '日';
        const r = s[tag] || {};
        const cls = (r.avg_return||0) >= 0 ? 'green' : 'red';
        st += `<div class="stat-card"><div class="val ${cls}">${r.avg_return!=null?r.avg_return+'%':'—'}</div><div class="lbl">${label} · 均收益</div>`;
        st += `<div style="font-size:0.55rem;color:var(--text-tertiary)">胜率 ${r.win_rate!=null?r.win_rate+'%':'—'} · 有效 ${r.valid||0}`;
        if (r.best) st += `<br>最佳 ${r.best.index_code}`;
        if (r.worst) st += `<br>最差 ${r.worst.index_code}`;
        st += `</div></div>`;
      }
      document.getElementById('stats-row').innerHTML = st;
      const items = d.items || [];
      _items = items;
      if (!items.length) { document.getElementById('table-wrap').innerHTML = '<div class="loading">该日期无精选数据</div>'; return; }
      let h = '<table class="bt-table"><thead><tr>';
      h += '<th>排名</th><th>指数代码</th><th>名称</th><th>得分</th><th>池</th><th>买点</th><th>信号日</th><th>当日价</th><th>5日收益</th><th>10日收益</th><th>20日收益</th><th>K线天数</th>';
      h += '</tr></thead><tbody>';
      for (let idx = 0; idx < items.length; idx++) {
        const it = items[idx];
        h += '<tr>';
        h += `<td>${it.rank||'—'}</td>`;
        h += `<td><a href="javascript:void(0)" onclick="showBreakdown(${idx})" style="cursor:pointer;text-decoration:underline">${it.index_code||''}</a></td>`;
        h += `<td>${it.index_name||''}</td>`;
        h += `<td><b>${it.index_score!=null?it.index_score.toFixed(0):'—'}</b></td>`;
        h += `<td style="font-size:0.6rem">${it.pool_name||''}</td>`;
        h += `<td>${it.ideal_buy?'¥'+it.ideal_buy.toFixed(2):'—'}</td>`;
        h += `<td style="font-size:0.6rem">${it.buy_signal_date||'—'}</td>`;
        h += `<td>${it.close_0d?'¥'+it.close_0d.toFixed(2):'—'}</td>`;
        h += `<td>${fmtPct(it.return_5d)}</td>`;
        h += `<td>${fmtPct(it.return_10d)}</td>`;
        h += `<td>${fmtPct(it.return_20d)}</td>`;
        h += `<td style="font-size:0.6rem;color:var(--text-tertiary)">${it.holding_days||0}d</td>`;
        h += '</tr>';
      }
      h += '</tbody></table>';
      document.getElementById('table-wrap').innerHTML = h;
    }
    init();
  </script>
</body>
</html>
